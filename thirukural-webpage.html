{num: 1104, line1: "நீங்கின் தெறூஉம் குறுகின் குளிர்காயும்", line2: "தீயாண்டுப் பெற்றாள் இவள்.", eng: "Where did she discover this strange fire? It burns my heart when she steps away, and cools my soul when she draws near."},
{num: 1105, line1: "வேட்டப் பொழுதின் அவையவை போலுமே", line2: "தோட்டார்பூண் மென்தோள் துயில்.", eng: "An embrace within her flower-adorned arms yields a fresh, unique joy every single time, like a new discovery of delight."},
{num: 1106, line1: "உறுதோறு உயிர் தளிர்ப்பத் தீண்டலால் பேதைக்கு", line2: "அமிழ்தின் இயன்றன தோள்.", eng: "Her arms must be woven out of pure celestial nectar; every time they touch my body, my very life-breath blossoms anew."},
{num: 1107, line1: "தம்மில் இருந்து தமதுபாத்து உண்பாரும்", line2: "அம்மான் மென்தோள் புணர்ச்சி நேர்.", eng: "The delight of this close embrace is like a householder sharing his simple food with guests—it leaves no room for any regret."},
{num: 1108, line1: "வீழுஇருவர்க்கு இனிதே புணர்ச்சி முயக்கம்", line2: "இடையீடுபடின் ஆற்றாமை உடைத்து.", eng: "A tight, unyielding embrace is sweet to lovers; even the thinnest breath of air passing between their chests feels like a painful separation."},
{num: 1109, line1: "ஊடலும் உத்தரவும் ஒப்புரவும் என்றுஇந்நான்",line2: "கூடலின் இன்பம் தரும்.", eng: "To feel a small misunderstanding, to clear it up, and to melt back into a close embrace—these are the steps of love's true dance."},
{num: 1110, line1: "அறிதோறும் அறியாமை கண்டற்றால் காமம்", line2: "செறிதோறும் சேயிழை மாட்டு.", eng: "The more one reads classic texts, the more one realizes his own ignorance; the more I embrace this maiden, the more deep beauty I find."},

{num: 1111, line1: "நன்னீரை வாழி அனிச்சமே நின்னினும்", line2: "மென்னீரள் யாம்வீழ் பவள்.", eng: "May you prosper, O delicate Anicham flower! You are soft indeed, but the maiden I love is far gentler and softer than you."},
{num: 1112, line1: "மலர்காணின் மையாத்தி நெஞ்சே இவள்கண்", line2: "பலர்காணும் பூவொக்கும் என்று.", eng: "O my heart, do not be deceived when you look at a blue lotus blossom; it cannot match the private radiance of her brilliant eyes."},
{num: 1113, line1: "முறிமேனி முத்தம் முறுவல் வெறிநாற்றம்", line2: "வேல்வடிவ கண்இவள் மாட்டு.", eng: "Her skin has the glow of a tender shoot, her teeth are pure pearls, her breath is natural fragrance, and her eyes are sharp spears."},
{num: 1114, line1: "காணின் குவளை கவிழ்ந்துநிலன் நோக்கும்", line2: "மாணிழை கண்ஒவ்வேம் என்று.", eng: "If the blue lotus could truly see the eyes of this beautifully adorned maiden, it would droop down to the earth in complete shame."},
{num: 1115, line1: "அனிச்சப்பூக் கால்களையாள் பெய்தாள் நுசுப்பிற்கு", line2: "நல்ல பறைபடா தற்று.", eng: "She wove delicate Anicham flowers into her hair without trimming their stems; I fear her slender waist will break under that heavy burden."},
{num: 1116, line1: "விண்மகிழ் தீம்பால் விழுமியாள் மேனிக்கு", line2: "மண்மகிழ் மல்லல் அணைத்து.", eng: "The brilliant stars are confused in their courses; they mistake the radiant face of my beloved for the beautiful silver moon."},
{num: 1117, line1: "மாதர் முகந்தானே சந்திரனாயின் இவள்", line2: "மேனிக்கு மாறும்உண்டோ இல்.", eng: "Are there spots on the moon because it tried to copy the flawless beauty of this maiden's face and failed in the attempt?"},
{num: 1118, line1: "மாதர் முகம்போல் ஒளிவிட வல்லையாயின்", line2: "காதலை நீயும் மதி.", eng: "O moon! If you can shed a light that matches the soft warmth of her countenance, only then shall I love your presence in the sky."},
{num: 1119, line1: "மலரன்ன கண்ணாள் முகம்ஒப்பின் ஞாயிBlock", line2: "எல்லாரும் காணும் நிலத்து.", eng: "If you desire to look like her lotus eyes, O moon, you must stop showing yourself to the entire crowd and shine only for me."},
{num: 1120, line1: "அனிச்சமும் அன்னத்தின் தூவியும் மாதர்", line2: "அடிக்கு நெருஞ்சிப் பழம்.", eng: "The soft Anicham flower and the downy feathers of a swan are like jagged thorny burrs when placed beneath her tender feet."},

{num: 1121, line1: "பாலோடு அளாய நீர் போன்றது ஒளிரும்இழை", line2: "பாலோடு எனக்கள்ள தொடர்பு.", eng: "The bond between me and this brightly adorned maiden is like water blended seamlessly with milk."},
{num: 1122, line1: "உடம்பொடு உயிரிடை என்னமற்று அன்ன", line2: "மடந்தையொடு எம்மிடை நட்பு.", eng: "The love between me and this gentle maiden is as inseparable as the bond between the body and the soul."},
{num: 1123, line1: "கருமணிக் பாவாய்நீ போதாயாம் வீழும்", line2: "திருநுதற்கு இல்லை இடம்.", eng: "O image in my pupil, step aside! There is not enough room here to hold the beautiful brow of my beloved."},
{num: 1124, line1: "வாழ்தல் உயிர்க்கன்னள் ஆயிழை சாதல்", line2: "அதனின் பிரிவாரது இடத்து.", eng: "When she is with me, this finely jeweled maiden is life itself; when she departs, it feels like death."},
{num: 1125, line1: "உள்ளுவன் மன்யான் மறப்பின்மற வாத", line2: "கொள்ளத்தகை யாள் குணம்.", eng: "I would think of her if I could ever forget her; but how can I forget the unforgettable qualities of my precious one?"},
{num: 1126, line1: "கண்ணுள்ளின் போகார் இமைப்பின் பருவரார்", line2: "நுண்ணியர்எம் காத லவர்.", eng: "My lover is so subtle that he dwells forever inside my eyes; he never leaves, and even when I blink, he feels no pain."},
{num: 1127, line1: "கண்ணுள்ளார் காத லவராகக் கண்ணும்", line2: "எழுதாம் கரப்பாக்கு அறிந்துக.", eng: "Since my lover resides inside my eyes, I refrain from painting them with kohl, lest it should hide his presence even for a moment."},
{num: 1128, line1: "நெஞ்சத்தார் காத லவராக எய்தும்பின்", line2: "வெய்யது உவப்பார்வேப் பாக்கு.", eng: "Since my lover dwells inside my heart, I fear eating hot food, lest it should burn him who lives within."},
{num: 1129, line1: "இமைப்பின் கரப்பாக்கு அறிவல்கண் டார்த்", line2: "திமைப்பாரோ ஈங்கிவ் வுலகு.", eng: "I know that blinking hides my lover from my view; is that why the people of this world praise those who never close their eyes?"},
{num: 1130, line1: "உவந்துறைவர் நெஞ்சத் தெமக்கவர் மற்றென்", line2: "கண்ணுள் உறைவர் களித்து.", eng: "He dwells joyfully inside my heart; and yet, he resides delightfully within my eyes as well."},

{num: 1131, line1: "காமம் உழந்து வருந்தினார்க்கு ஏமமாய்", line2: "மடலல்லது இல்லை வழி.", eng: "For those suffering the ultimate pangs of love-longing, there is no shield or path left except to ride the jagged palmyra horse (Madal)."},
{num: 1132, line1: "நாணொடு நல்லாண்மை விட்டு வழிவந்த", line2: "மடலூர்வன் மாண்புடை யார்.", eng: "Casting away all conventional reserve and manly pride, I shall mount this jagged frame to proclaim my love to the world."},
{num: 1133, line1: "நாணொடு நல்லாண்மை உடையேன்மற்று ஆங்கு", line2: "நாணொடு நல்லாண்மை விட்டு.", eng: "I once possessed a firm sense of reserve and dignity; but the intense torrent of love has swept those barriers entirely away."},
{num: 1134, line1: "காமக் கடும்பூசல் தாங்காது நாணென்னும்", line2: "ஏமக் கலமுறிந்த தற்று.", eng: "The small raft called reserve has been shattered to pieces by the rushing, violent ocean of my longing for her."},
{num: 1135, line1: "தொடங்கிய கைகொடுத்து மாண்டார் வினைத்திட்பம்", line2: "வேந்தன்கண் ஊறெய்தி உள்ளப் படும்.", eng: "The maiden who wears delicate bangles has handed me this torment; the option of riding the palmyra frame is her gift to me."},
{num: 1136, line1: "மடலூர்தல் யாமத்தும செய்யுமென் நெஞ்சம்", line2: "மடலூர்தல் மாலை யவள்.", eng: "My mind thinks of mounting the palmyra frame even in the deep silence of midnight; my eyes can find no rest from her image."},
{num: 1137, line1: "கடலன்ன காமம் உழந்தும் மடலேறாப்", line2: "பெண்ணிற் பெருந்தக்கது இல்.", eng: "There is nothing more noble than the restraint of a woman; though her love is like an ocean, she never mounts the palmyra frame."},
{num: 1138, line1: "நிறையரியர் மன்பேதை யென்னாது காமம்", line2: "மறையிறந்து மன்று படும்.", eng: "My passion has broken out from its secret chamber; it now stands in the open square for everyone to see and discuss."},
{num: 1139, line1: "அறம்பொருள் இன்பம் உயிரச்சம் நான்கின்", line2: "திறம்தெரிந்து தேறப் படும்.", eng: "My hidden love believes that nobody knows its depth; yet it walks through the streets with a loud trumpet, declaring itself."},
{num: 1140, line1: "கண்ணெதிரே கள்ளமாய் நோக்கும் கயவர்போல்", line2: "நண்ணிய காமம் தரும்.", eng: "The simple fools mock my state before my face; they have never experienced the sweet, crushing weight of a love like mine."},

{num: 1141, line1: "அலரெழ ஆருயிர் நிற்கும் அதனைப்", line2: "பலரறியார் பாக்கியத் தால்.", eng: "The rising gossip of the village sustains my fragile life; thank fortune that the crowd does not know it keeps me alive."},
{num: 1142, line1: "அலரென்னும் அற்புதம் அறியாதார் நெஞ்சத்து", line2: "அலரெழ ஆருயிர் உறும்.", eng: "These public rumors have done me a favor: they have brought the image of my beautiful maiden closer to my arms than before."},
{num: 1143, line1: "அலரெழ ஆருயிர் நிற்கும் அதனைப்", line2: "பலரறியார் பாக்கியத் தால்.", eng: "I possess this love through the talk of the town; to lose this gossip would be like losing the very presence of my beloved."},
{num: 1144, line1: "அலரினால் காமம் வளரும் அதனைப்", line2: "பலரறியார் பாக்கியத் தால்.", eng: "The gossip of the villagers merely pours water on my passion; it makes the plant of love grow faster and stronger every day."},
{num: 1145, line1: "நெருப்பினுள் நெய்பெய்து அணைப்பலென் றற்றால்", line2: "அலரினால் காமமடக்கல்.", eng: "To think that public gossip can crush my passion is like attempting to put out a roaring fire by pouring pure oil onto it."},
{num: 1146, line1: "திங்கள் அரவுண்ணக் கண்டுமற்று அக்குடை", line2: "திங்கள் அரவுண்ணு மாறு.", eng: "Did the eclipse of the moon cause such a stir? The whole village is talking about our secret meetings as if the sky had fallen."},
{num: 1147, line1: "ஊரவர் சொல்லும் உரையொன்றும் காமத்து", line2: "ஊரவர் சொல்லும் உரை.", eng: "The rumors raised by this town have turned my love into a heavy debt; but the embrace of my lover makes it worth paying."},
{num: 1148, line1: "அலரெழ ஆருயிர் நிற்கும் அதனைப்", line2: "பலரறியார் பாக்கியத் தால்.", eng: "Why should the villagers busy themselves with our secret affection? Their talk merely fans the flame that consumes my mind."},
{num: 1149, line1: "ஊரவர் கவ்வை எருவாக அன்னைசொல்", line2: "நீராக வப்பயிரும் காமம்.", eng: "The gossip of the town acts as fertilizer, and my mother's sharp scolding acts as water; the plant of my love grows immense."},
{num: 1150, line1: "கண்ணெதிரே கள்ளமாய் நோக்கும் கயவர்போல்", line2: "நண்ணிய காமம் தரும்.", eng: "They think their unkind talk will make me abandon him; they do not know that gossip merely glues my heart to his forever."},

{num: 1151, line1: "செல்லாமை வேண்டும் சிறியென் உறைவிடம்", line2: "சொல்லின்மன் சொல்லுக காண்.", eng: "If you have decided not to depart, tell me that sweet news; if you are speaking of separation, tell it to those who will survive it."},
{num: 1152, line1: "அமரகத்து ஆற்றாரும் அஞ்சும்கொல் அஞ்சா", line2: "தமரகத்து ஆற்றாரை விட்டு.", eng: "His brief presence was a joy to my eyes; the mere thought of his departure turns into a shaking terror within my chest."},
{num: 1153, line1: "விழைதகையான் வேண்டி யிருப்பர் கெழுதகையாற்", line2: "கேளாது நட்டார் செயின்.", eng: "If I must double up with pain at the mere mention of his travel, how can I hope to survive the long days of his actual absence?"},
{num: 1154, line1: "பிரிவுரைக்கும் வன்பொறை யாயின் பிரிவொன்றும்", line2: "காதலர் கைவிட் டவள்.", eng: "If he leaves me now after promising constant love, the fault belongs entirely to the cruel fate that tears our lives apart."},
{num: 1155, line1: "கண்ணோட்டம் உள்ளொழித்து வாழ்தலின் அந்நிலையே", line2: "புண்ணோட்டம் இல்லா நெறி.", eng: "If I can restrain my tears and watch him pack for his journey, my heart must be woven of thick stone, not tender flesh."},
{num: 1156, line1: "பிரிவுரைத்துப் பின்னை வாழாரோ பிரிவொன்றும்", line2: "காதலர் கைவிட் டவள்.", eng: "Does he believe that a human heart can survive separation? His declaration of travel is a death sentence delivered with a smile."},
{num: 1157, line1: "உறங்குவது போலும் சாக்காடு உறங்கி", line2: "விழிப்பது போலும் பிறப்பு.", eng: "My bracelets have already sensed his departure; they have slipped from my thinning wrists before he has even crossed the threshold."},
{num: 1158, line1: "நட்பிற்கு உறுப்புக்கெழு தகைமை அவணின்றே", line2: "பெட்பு அறிவுடை யார்.", eng: "It is painful to live in a village where no one understands your sorrow; it is far worse when the beloved himself turns away to travel."},
{num: 1159, line1: "பிரிவுரைக்கும் வன்பொறை யாயின் பிரிவொன்றும்", line2: "காதலர் கைவிட் டவள்.", eng: "The fire of separation is more cruel than physical flame; physical flame burns what it touches, but separation burns the heart from afar."},
{num: 1160, line1: "இன்பம் உவகை தருமே இரப்பவர்க்கு", line2: "ஈவோர் உவகை எனின்.", eng: "If I can survive the dark night of his departure, I shall never again fear any adversity that fortune can throw at me."},

{num: 1161, line1: "மறைப்பேன்மன் யானிஃதோ நோயை இறைப்பவர்க்கு", line2: "ஊற்றுநீர் போல மிகும்.", eng: "I resolve to hide this love-sickness deep inside; but like an underground spring, it gushes out the more I try to suppress it."},
{num: 1162, line1: "கரப்பிலா நெஞ்சினாரைக் காணின் இரப்பாரே", line2: "இரப்பும் ஒருவகை ஏர்.", eng: "I can neither conceal this crushing agony from the town nor find the strength to bear it silently within my breaking heart."},
{num: 1163, line1: "காமமும் நாணும் உயிர்காவாத் தூங்குமென்", line2: "தோள்மரம் பூண்ட உறை.", eng: "My physical frame is balanced precariously between two forces: love-longing pulls at one side, and womanly reserve pulls at the other."},
{num: 1164, line1: "கடலன்ன காமம் உழந்தும் மடலேறாப்", line2: "பெண்ணிற் பெருந்தக்கது இல்.", eng: "This ocean of love-longing belongs entirely to me; but where is the sturdy ship that can help me cross its storm-tossed waves?"},
{num: 1165, line1: "அறஞ்சாரா நல்குரவு ஈன்றாBlock தானும்", line2: "பிறன்போல நோக்கப் படும்.", eng: "If my love acts like an enemy during his absence, what comfort can I hope to find from strangers who know nothing of my soul?"},
{num: 1166, line1: "இன்பம் கடல்மற்றுக் காமம் அஃதடுங்கால்", line2: "துன்பம் அதனின் பெரிது.", eng: "The joy found in his presence was as vast as the ocean; the agony of his absence is a thousand times larger than that ocean."},
{num: 1167, line1: "காமக் கடும்பூசல் தாங்காது நாணென்னும்", line2: "ஏமக் கலமுறிந்த தற்று.", eng: "I am swimming helplessly in this wild, dark sea of love-longing; why did he abandon me to the current without a single spar?"},
{num: 1168, line1: "நெருப்பினுள் துஞ்சலும் ஆகும் நிரப்பினuள்", line2: "யாதொன்றும் கண்பாடு அரிது.", eng: "The dark night acts like a cruel executioner; it extends the hours of my torment until every minute feels like a lifetime."},
{num: 1169, line1: "மண்புகு மாய்வது மண்போல்வர் மக்கள", line2: "பண்பிலார் பண்புகெட்டு அற்று.", eng: "Every single creature finds rest when the sun sets; my love-sickness alone wakes up to torment me with fresh fury."},
{num: 1170, line1: "உள்ளுள் உவகை மிகும்.", line2: "கண்ணெதிரே கள்ளமாய் நோக்கும்.", eng: "My eyes are searching for him through the darkness; they refuse to close, weeping fountains of hot tears for his return."},

{num: 1171, line1: "கண்விதுப் புற்றுக் கலிழ்வதோ காதலன்", line2: "புணராமை முந்துற் றென.", eng: "Why do my eyes weep and blur with tears today? It was their own rash choice to look upon him and invite this endless sorrow."},
{num: 1172, line1: "நோக்கினாள் நோக்கெதிர் நோக்குதல் தாக்குணங்கு", line2: "தானைக்கொண் டன்ன துடைத்து.", eng: "My eyes showed him to my heart without asking; now that the heart is burning with love, why do they weep in self-pity?"},
{num: 1173, line1: "கண்டார் உயிருண்ணும் தோற்றத்தால் பெண்மடந்தை", line2: "பண்போல் பணைத்தோ ளவள்.", eng: "They chose to look upon him with eager desire; it is only just that they now pay the price by weeping through the sleepless night."},
{num: 1174, line1: "நோக்கினாள் நோக்கி இறைஞ்சினாள் அஃதவள்", line2: "யாக்கினுள் அன்புவளர்த் தற்று.", eng: "My eyes have turned into two streams of hot tears; they brought this sweet disaster upon me, and now they are washing away my beauty."},
{num: 1175, line1: "யான்நோக்கும் காலை நிலன்நோக்கும் நோக்காக்கால்", line2: "தான்நோக்கி மெல்ல நகும்.", eng: "The eyes that once looked upon him with unbridled joy have now become an unblinking source of sorrow that refuses to sleep."},
{num: 1176, line1: "குறிப்பொன்று கூறினாள் போலக் குவளை", line2: "நெறிப்பொன்று நோக்கி nின்றாள்.", eng: "The eyes that caused this deep affliction are now suffering themselves; it is a fitting punishment for their initial recklessness."},
{num: 1177, line1: "சொல்லொன்று மற்றuவர் செய்பொன்று மாண்பிலார்", line2: "புல்லென்னும் கேண்மை விடல்.", eng: "Let my eyes weep until they run completely dry; they are the ones who trapped my soul inside this cage of longing."},
{num: 1178, line1: "மாறுபாடு இல்லாத உண்டி மறுத்துண்ணின்", line2: "ஊறுபாடு இல்லை உயிர்க்கு.", eng: "He is not beside me, yet my eyes refuse to look at anything else; they remain fixed on the path where he vanished."},
{num: 1179, line1: "அசைஇயற் குண்டோ ரோர் ஆண்பாலார்க் கென்னோ", line2: "பசையியற் பாராட்டுங் கீழ்.", eng: "When he was near, they could not look enough; now that he has gone, they look for him through the darkness until they blur."},
{num: 1180, line1: "கண்ணொடு கண்ணிணை நோக்குஒக்கின் வாய்ச்சொற்கள்", line2: "என்ன பயனும் இல.", eng: "It is easy for the villagers to say, 'Cease weeping'; they do not know that my eyes are merely searching for their lost light."},

{num: 1181, line1: "பசப்புறு பருவரல் தீர்க்குமோ காதலன்", line2: "பிரிவுரைக்கும் வன்பொறை யாயின்.", eng: "I agreed to his departure with a brave face; now this pale hue of separation has arrived to mock my false courage."},
{num: 1182, line1: "அமரகத்து ஆற்றாரும் அஞ்சும்கொல் அஞ்சா", line2: "தமரகத்து ஆற்றாரை விட்டு.", eng: "This pale color of separation crept over my skin like a thief, stealing away the natural brightness of my beauty."},
{num: 1183, line1: "விழைதகையான் வேண்டி யிருப்பர் கெழுதகையாற்", line2: "கேளாது நட்டார் செயின்.", eng: "He took away my beauty and joy when he departed; now this pale hue has arrived to occupy the vacant space."},
{num: 1184, line1: "பிரிவுரைக்கும் வன்பொறை யாயின் பிரிவொன்றும்", line2: "காதலர் கைவிட் டவள்.", eng: "My skin is turning pale as I brood over his absent form; it is a silent map of the sorrow that fills my mind."},
{num: 1185, line1: "கண்ணோட்டம் உள்ளொழித்து வாழ்தலின் அந்நிலையே", line2: "புண்ணோட்டம் இல்லா நெறி.", eng: "If he could see how this pallor has overspread my shoulders, his heart would break and he would return this very hour."},
{num: 1186, line1: "பிரிவுரைத்துப் பின்னை வாழாரோ பிரிவொன்றும்", line2: "காதலர் கைவிட் டவள்.", eng: "My shoulders are losing their fullness and my skin is fading; this is the harvest that love reaps during absence."},
{num: 1187, line1: "உறங்குவது போலும் சாக்காடு உறங்கி", line2: "விழிப்பது போலும் பிறப்பு.", eng: "This pale color is spreading over my entire body; it looks like a shadow cast by the cloud of my love-longing."},
{num: 1188, line1: "நட்பிற்கு உறுப்புக்கெழு தகைமை அவணின்றே", line2: "பெட்பு அறிவுடை யார்.", eng: "The villagers point at my pale skin and whisper among themselves; they do not know it is the hallmark of true love."},
{num: 1189, line1: "பிரிவுரைக்கும் வன்பொறை யாயின் பிரிவொன்றும்", line2: "காதலர் கைவிட் டவள்.", eng: "Let my body turn as pale as it wills; if he returns safely to my arms, my original brightness will flash back instantly."},
{num: 1190, line1: "இன்பம் உவகை தருமே இரப்பவர்க்கு", line2: "ஈவோர் உவகை எனின்.", eng: "The pallor of my skin is a badge of honor; it proves to the world that my heart belongs entirely to one who is absent."},

{num: 1191, line1: "கண்டுகேட்டு உண்டுயிர்த்து உற்றுஅறியும் ஐம்புலனும்", line2: "ஒண்தொடி கண்ணே உள.", eng: "The sweet fruit of love is delicious when shared by two; it turns into a bitter poison when tasted alone in absence."},
{num: 1192, line1: "பிணிக்கு மருந்து பிறமன் அணியிழை", line2: "தன்பிணிக்குத் தானே மருந்து.", eng: "The torrent of my solitary longing is rising like a flood; it threatens to submerge the last standing walls of my reserve."},
{num: 1193, line1: "தாம்வீழ்வார் மென்தோள் துயிலின் இனிதுகொல்", line2: "தாமரைக் கண்ணான் உலகு.", eng: "I am living on the mere hope of his return; if that single hope is broken, my life-breath will slip away effortlessly."},
{num: 1194, line1: "நீங்கின் தெறூஉம் குறுகின் குளிர்காயும்", line2: "தீயாண்டுப் பெற்றாள் இவள்.", eng: "He is far away, yet his memory stays beside me to torment my soul; this solitary longing has no mercy on my heart."},
{num: 1195, line1: "வேட்டப் பொழுதின் அவையவை போலுமே", line2: "தோட்டார்பூண் மென்தோள் துயில.", eng: "My eyes are weary of watching the road; my mind is exhausted from counting the slow hours of this solitary exile."},
{num: 1196, line1: "உறுதோறு உயிர் தளிர்ப்பத் தீண்டலால் பேதைக்கு", line2: "அமிழ்தின் இயன்றன தோள்.", eng: "The love that brought such intense joy when he was near has now turned into a sharp knife that cuts my spirit in solitude."},
{num: 1197, line1: "தம்மில் இருந்து தமதுபாத்து உண்பாரும்", line2: "அம்மான் மென்தோள் புணர்ச்சி நேர்.", eng: "I am drowning in this ocean of solitary sorrow; why does he delay his return when he knows I cannot survive alone?"},
{num: 1198, line1: "வீழுஇருவர்க்கு இனிதே புணர்ச்சி முயக்கம்", line2: "இடையீடுபடின் ஆற்றாமை உடைத்து.", eng: "True love does not look at distance; though he is across the mountains, his image fills every corner of my empty chamber."},
{num: 1199, line1: "ஊடலும் உத்தரவும் ஒப்புரவும் என்றுஇந்நான்", line2: "கூடலின் இன்பம் தரும்.", eng: "Every passing minute of this solitary longing feels like a year of torment; my soul is wearing thin under the strain."},
{num: 1200, line1: "அறிதோறும் அறியாமை கண்டற்றால் காமம்", line2: "செறிதோறும் சேயிழை மாட்டு.", eng: "Let my solitary longing rise to its peak; when he returns and embraces me, all this agony will vanish like a bad dream."},

{num: 1201, line1: "நன்னீரை வாழி அனிச்சமே நின்னினும்", line2: "மென்னீரள் யாம்வீழ் பவள்.", eng: "Every time I think of the joy we shared, my heart fills with a sweet pain that makes my eyes overflow with tears."},
{num: 1202, line1: "மலர்காணின் மையாத்தி நெஞ்சே இவள்கண்", line2: "பலர்காணும் பூவொக்கும் என்று.", eng: "His memory is the only thing that keeps me alive; yet that very memory is what inflicts this burning torment upon me."},
{num: 1203, line1: "முறிமேனி முத்தம் முறுவல் வெறிநாற்றம்", line2: "வேல்வடிவ கண்இவள் மாட்டு.", eng: "I try to banish his form from my mind to find rest; but like a stubborn ghost, his image refuses to leave my thoughts."},
{num: 1204, line1: "காணின் குவளை கவிழ்ந்துநிலன் நோக்கும்", line2: "மாணிழை கண்ஒவ்வேம் என்று.", eng: "My heart is a battleground where his past words of affection fight against the harsh reality of his long absence."},
{num: 1205, line1: "அனிச்சப்பூக் கால்களையாள் பெய்தாள் நுசுப்பிற்கு", line2: "நல்ல பறைபடா தற்று.", eng: "Did he truly mean those promises of undying love? Remembrance brings a sharp doubt that pierces my breaking heart."},
{num: 1206, line1: "விண்மகிழ் தீம்பால் விழுமியாள் மேனிக்கு", line2: "மண்மகிழ் மல்லல் அணைத்து.", eng: "The memory of his touch is so vivid that my skin tenses with anticipation; then I open my eyes to find an empty room."},
{num: 1207, line1: "மாதர் முகந்தானே சந்திரனாயின் இவள்", line2: "மேனிக்கு மாறும்உண்டோ இல்.", eng: "I am grateful for these memories; they are the only sparks of light left in the deep darkness of my solitary exile."},
{num: 1208, line1: "மாதர் முகம்போல் ஒளிவிட வல்லையாயின்", line2: "காதலை நீயும் மதி.", eng: "He has forgotten me, else he would have returned long ago; yet my foolish mind refuses to cease its constant remembrance."},
{num: 1209, line1: "மலரன்ன கண்ணாள் முகம்ஒப்பின் ஞாயிBlock", line2: "எல்லாரும் காணும் நிலத்து.", eng: "Let the world fade away; as long as my mind can hold onto the image of his smiling face, I am not entirely alone."},
{num: 1210, line1: "அனிச்சமும் அன்னத்தின் தூவியும் மாதர்", line2: "அடிக்கு நெருஞ்சிப் பழம்.", eng: "Remembrance is both my tormentor and my savior; it kills my peace today and promises resurrection tomorrow."},

{num: 1211, line1: "பாலோடு தேன்கலந்து அற்றே பாலகன்", line2: "வாலெயிற்று ஊறிய நீர்.", eng: "I welcome the dark night because it brings the gift of dreams; in that shadowy land, my lover returns to my arms."},
{num: 1212, line1: "உடம்போடு உயிரிடை நட்புப்போல் என்றும்", line2: "உடன்பாடு இல்லாதார் நட்பு.", eng: "I am in love with my sleep; it is the only state where the miles between us vanish and we are unified once more."},
{num: 1213, line1: "கண்ணுள்ளார் காத லவராகக் கண்ணும்கொல்", line2: "எழுதியக் கண்ணும் கெடின்.", eng: "Even in my dreams, his embrace is so real that I wake up with a smile, only to find the cold dawn mocking my joy."},
{num: 1214, line1: "நெஞ்சார் காத லவராக எஞ்சாBlock", line2: "உண்பான்கண் வேம்பா வது.", eng: "Why should I fear the long days? I look forward to the night when my dreams will rewrite the harsh reality of absence."},
{num: 1215, line1: "கண்ணுள்ளார் காத லவராகக் கண்ணும்கொல்", line2: "எழுதியக் கண்ணும் கெடின்.", eng: "In my dreams, he speaks those words of love that my ears are starving to hear; waking up is a fresh exile for my soul."},
{num: 1216, line1: "நெஞ்சத்தார் காத லவராக எஞ்சாBlock", line2: "உண்பான்கண் வேம்பா வது.", eng: "If the day would only resemble my dreams, my love-sickness would vanish and my heart would be permanently at peace."},
{num: 1217, line1: "நெஞ்சத்தார் காத லவராக எஞ்சாBlock", line2: "உண்பான்கண் வேம்பா வது.", eng: "The cruel dawn breaks my dream-union every single morning; it behaves like an enemy who envies my brief happiness."},
{num: 1218, line1: "நெஞ்சத்தார் காத லவராக எஞ்சாBlock", line2: "உண்பான்கண் வேம்பா வது.", eng: "In the land of dreams, he never departs; why can I not close my eyes forever and dwell in that beautiful country?"},
{num: 1219, line1: "நெஞ்சத்தார் காத லவராக எஞ்சாBlock", line2: "உண்பான்கண் வேம்பா வது.", eng: "Those who do not know the joy of dream-meetings will never understand why I prefer the darkness of sleep to the bright sun."},
{num: 1220, line1: "நெஞ்சத்தார் காத லவராக எஞ்சாBlock", line2: "உண்பான்கண் வேம்பா வது.", eng: "Let my dreams continue to bring his form to my sight; it is the only medicine that keeps my fragile life from breaking."},

{num: 1221, line1: "காமம் உழந்து வருந்தினார்க்கு ஏமமாய்", line2: "மடலல்லது இல்லை வழி.", eng: "O evening twilight! You were once a time of soft joy when he was near; now you arrive like a cruel weapon to pierce my soul."},
{num: 1222, line1: "நாணொடு நல்லாண்மை விட்டு வழிவந்த", line2: "மடலூர்வன் மாண்புடை யார்.", eng: "The twilight sky is stained with a deep red glow; it looks exactly like the blood flowing from my wounded heart."},
{num: 1223, line1: "நாணொடு நல்லாண்மை உடையேன்மற்று ஆங்கு", line2: "நாணொடு நல்லாண்மை விட்டு.", eng: "The evening hour comes marching over the hills like a cold, relentless enemy who knows my lover is not here to shield me."},
{num: 1224, line1: "காமக் கடும்பூசல் தாங்காது நாணென்னும்", line2: "ஏமக் கலமுறிந்த தற்று.", eng: "When the sun sets, my love-sickness wakes up with fresh fury; the night offers no rest, only an expanded torment for my mind."},
{num: 1225, line1: "தொடங்கிய கைகொடுத்து மாண்டார் வினைத்திட்பம்", line2: "வேந்தன்கண் ஊறெய்தி உள்ளப் படும்.", eng: "The morning brought a small hope that sustained me through the day; the evening arrives to crush that hope into dead dust."},
{num: 1226, line1: "மடலூர்தல் யாமத்தும செய்யுமென் நெஞ்சம்", line2: "மடலூர்தல் மாலை யவள்.", eng: "How can I survive this twilight hour? The silence of the fading light merely amplifies the cries of my solitary longing."},
{num: 1227, line1: "கடலன்ன காமம் உழந்தும் மடலேறாப்", line2: "பெண்ணிற் பெருந்தக்கது இல்.", eng: "My love-longing behaves like a wild beast that sleeps during the day and wakes up at sunset to devour my peace."},
{num: 1228, line1: "நிறையரியர் மன்பேதை யென்னாது காமம்", line2: "மறையிறந்து மன்று படும்.", eng: "The evening breeze that should be cool and refreshing feels like a blast of hot desert air upon my fading skin."},
{num: 1229, line1: "அறம்பொருள் இன்பம் உயிரச்சம் நான்கின்", line2: "திறம்தெரிந்து தேறப் படும்.", eng: "This twilight hour has no mercy; it strikes down my strength and leaves me weeping through the initial hours of darkness."},
{num: 1230, line1: "கண்ணெதிரே கள்ளமாய் நோக்கும் கயவர்போல்", line2: "நண்ணிய காமம் தரும்.", eng: "Let the night descend quickly; the twilight hour is too painful to behold during the absence of the one I love."},

{num: 1231, line1: "அலரெழ ஆருயிர் நிற்கும் அதனைப்", line2: "பலரறியார் பாக்கியத் தால்.", eng: "My eyes have lost their original brightness and luster; they have spent too many nights weeping for his distant form."},
{num: 1232, line1: "அலரென்னும் அற்புதம் அறியாதார் நெஞ்சத்து", line2: "அலரெழ ஆருயிர் உறும்.", eng: "My arms that were once full and beautiful are now wearing thin; my bangles slip away because my flesh is wasting with grief."},
{num: 1233, line1: "அலரெழ ஆருயிர் நிற்கும் அதனைப்", line2: "பலரறியார் பாக்கியத் தால்.", eng: "This pale hue of separation has occupied my entire face; it is a visible signature of the sorrow that resides within."},
{num: 1234, line1: "அலரினால் காமம் வளரும் அதனைப்", line2: "பலரறியார் பாக்கியத் தால்.", eng: "The natural fragrance of my skin has vanished; it has been replaced by the dry texture of constant love-longing."},
{num: 1235, line1: "நெருப்பினுள் நெய்பெய்து அணைப்பலென் றற்றால்", line2: "அலரினால் காமமடக்கல்.", eng: "My shoulders have lost their majestic curve; they look like the drooping branches of a tree in a drought-stricken land."},
{num: 1236, line1: "திங்கள் அரவுண்ணக் கண்டுமற்று அக்குடை", line2: "திங்கள் அரவுண்ணு மாறு.", eng: "The beauty that once drew his praise has deserted me completely; it has followed him across the mountains into his exile."},
{num: 1237, line1: "ஊரவர் சொல்லும் உரையொன்றும் காமத்து", line2: "ஊரவர் சொல்லும் உரை.", eng: "My mirror shows me a stranger's face; the pale color of absence has erased the features he loved to behold."},
{num: 1238, line1: "அலரெழ ஆருயிர் நிற்கும் அதனைப்", line2: "பலரறியார் பாக்கியத் தால்.", eng: "Let my physical frame decline as it will; if my soul can hold onto his image, the body's beauty is of small consequence."},
{num: 1239, line1: "ஊரவர் கவ்வை எருவாக அன்னைசொல்", line2: "நீராக வப்பயிரும் காமம்.", eng: "Every single part of my body is participating in this grief; the decline of my beauty is a silent testimony of my devotion."},
{num: 1240, line1: "கண்ணெதிரே கள்ளமாய் நோக்கும் கயவர்போல்", line2: "நண்ணிய காமம் தரும்.", eng: "When he returns and folds me in his close embrace, my original fullness and brightness will return in a single hour."},

{num: 1241, line1: "செல்லாமை வேண்டும் சிறியென் உறைவிடம்", line2: "சொல்லின்மன் சொல்லுக காண்.", eng: "O my heart, why do you continue to brood over him when he has departed without a single thought for your survival?"},
{num: 1242, line1: "அமரகத்து ஆற்றாரும் அஞ்சும்கொல் அஞ்சா", line2: "தமரகத்து ஆற்றாரை விட்டு.", eng: "You behave like an enemy within my own breast; you always choose to run to his side, leaving me alone with my tears."},
{num: 1243, line1: "விழைதகையான் வேண்டி யிருப்பர் கெழுதகையாற்", line2: "கேளாது நட்டார் செயின்.", eng: "Why are you so partial to the one who caused this torment? You refuse to back my dignity or support my womanly reserve."},
{num: 1244, line1: "பிரிவுரைக்கும் வன்பொறை யாயின் பிரிவொன்றும்", line2: "காதலர் கைவிட் டவள்.", eng: "We resolved to show a firm, indifferent face upon his return; yet the moment his image arises, you melt into complete submission."},
{num: 1245, line1: "கண்ணோட்டம் உள்ளொழித்து வாழ்தலின் அந்நிலையே", line2: "புண்ணோட்டம் இல்லா நெறி.", eng: "I try to lock the gates of my thoughts to exclude his form; but you keep the keys and open the doors behind my back."},
{num: 1246, line1: "பிரிவுரைத்துப் பின்னை வாழாரோ பிரிவொன்றும்", line2: "காதலர் கைவிட் டவள்.", eng: "O my heart, are you woven of tender straw that you catch fire at the mere mention of his name? Stand firm for once!"},
{num: 1247, line1: "உறங்குவது போலும் சாக்காடு உறங்கி", line2: "விழிப்பது போலும் பிறப்பு.", eng: "You refuse to listen to my voice or follow my reason; you are obsessed with tracking his footsteps across the distant lands."},
{num: 1248, line1: "நட்பிற்கு உறுப்புக்கெழு தகைமை அவணின்றே", line2: "பெட்பு அறிவுடை யார்.", eng: "It is a waste of breath to scold you; your very nature is to dwell inside his heart, even while my body starves here."},
{num: 1249, line1: "பிரிவுரைக்கும் வன்பொறை யாயின் பிரிவொன்றும்", line2: "காதலர் கைவிட் டவள்.", eng: "Let us go together to his country; it is better to stand before him in our grief than to pine away in this empty house."},
{num: 1250, line1: "இன்பம் உவகை தருமே இரப்பவர்க்கு", line2: "ஈவோர் உவகை எனின்.", eng: "If we continue this internal dispute, the villagers will soon discover our madness; let us find a quiet peace in his memory."},

{num: 1251, line1: "மறைப்பேன்மன் யானிஃதோ நோயை இறைப்பவர்க்கு", line2: "ஊற்றுநீர் போல மிகும்.", eng: "My conventional reserve was once a strong lock upon the door of my thoughts; the key of love-longing has broken it open."},
{num: 1252, line1: "கரப்பிலா நெஞ்சினாரைக் காணின் இரப்பாரே", line2: "இரப்பும் ஒருவகை ஏர்.", eng: "The modesty that should protect a woman's heart has left me; it has fled before the fierce charge of my passion."},
{num: 1253, line1: "காமமும் நாணும் உயிர்காவாத் தூங்குமென்", line2: "தோள்மரம் பூண்ட உறை.", eng: "I tried to hide this love-sickness behind a pleasant smile; but my tears have betrayed my secret to the entire household."},
{num: 1254, line1: "கடலன்ன காமம் உழந்தும் மடலேறாப்", line2: "பெண்ணிற் பெருந்தக்கது இல்.", eng: "My self-control was like a solid dam built against a river; the flood of his memory has swept it away without a trace."},
{num: 1255, line1: "அறஞ்சாரா நல்குரவு ஈன்றாBlock தானும்", line2: "பிறன்போல நோக்கப் படும்.", eng: "The small pride I held has dissolved completely; it has turned into a willing slave that bows before his absent image."},
{num: 1256, line1: "இன்பம் கடல்மற்றுக் காமம் அஃதடுங்கால்", line2: "துன்பம் அதனின் பெரிது.", eng: "I can no longer play the part of an indifferent woman; my love-longing has stepped out into the open daylight of my life."},
{num: 1257, line1: "காமக் கடும்பூசல் தாங்காது நாணென்னும்", line2: "ஏமக் கலமுறிந்த தற்று.", eng: "My dignity has surrendered its keys to the enemy; it offers no resistance when his form arrives to occupy my thoughts."},
{num: 1258, line1: "நெருப்பினுள் துஞ்சலும் ஆகும் நிரப்பினuள்", line2: "யாதொன்றும் கண்பாடு அரிது.", eng: "The sweet words he whispered when we were unified have broken through the last barriers of my womanly reserve today."},
{num: 1259, line1: "மண்புகு மாய்வது மண்போல்வர் மக்கள", line2: "பண்பிலார் பண்புகெட்டு அற்று.", eng: "I thought my heart was a secure fortress; I did not know that love could enter through a tiny crevice of remembrance."},
{num: 1260, line1: "உள்ளுள் உவகை மிகும்.", line2: "கண்ணெதிரே கள்ளமாய் நோக்கும்.", eng: "Let the world look and judge my lack of restraint; when passion rises to this peak, conventional rules lose all meaning."},

{num: 1261, line1: "கண்விதுப் புற்றுக் கலிழ்வதோ காதலன்", line2: "புணராமை முந்துற் றென.", eng: "My eyes are searching the horizon for a cloud of dust that signals his chariot; they refuse to look at anything else."},
{num: 1262, line1: "நோக்கினாள் நோக்கெதிர் நோக்குதல் தாக்குணங்கு", line2: "தானைக்கொண் டன்ன துடைத்து.", eng: "Every sound of footsteps outside my gate makes my heart leap with the hope that he has cut short his long travel."},
{num: 1263, line1: "கண்டார் உயிருண்ணும் தோற்றத்தால் பெண்மடந்தை", line2: "பண்போல் பணைத்தோ ளவள்.", eng: "O moon, ride swiftly across the sky and bring the night to an end; my soul cannot endure another hour of his absence."},
{num: 1264, line1: "நோக்கினாள் நோக்கி இறைஞ்சினாள் அஃதவள்", line2: "யாக்கினுள் அன்புவளர்த் தற்று.", eng: "My skin is burning with the desire for his embrace; this long waiting has turned into an active torture for my flesh."},
{num: 1265, line1: "யான்நோக்கும் காலை நிலன்நோக்கும் நோக்காக்கால்", line2: "தான்நோக்கி மெல்ல நகும்.", eng: "I am counting the lines on the wall to track the days he promised; my fingers are weary from the constant calculation."},
{num: 1266, line1: "குறிப்பொன்று கூறினாள் போலக் குவளை", line2: "நெறிப்பொன்று நோக்கி nின்றாள்.", eng: "If he does not return before this week ends, he will find nothing but an empty house and a forgotten mound of earth."},
{num: 1267, line1: "சொல்லொன்று மற்றuவர் செய்பொன்று மாண்பிலார்", line2: "புல்லென்னும் கேண்மை விடல்.", eng: "My bracelets are falling away like autumn leaves; tell him to hasten his journey before all my beauty is entirely gone."},
{num: 1268, line1: "மாறுபாடு இல்லாத உண்டி மறுத்துண்ணின்", line2: "ஊறுபாடு இல்லை உயிர்க்கு.", eng: "The hope of his arrival is the only thread that holds my life-breath inside this physical body from morning till night."},
{num: 1269, line1: "அசைஇயற் குண்டோ ரோர் ஆண்பாலார்க் கென்னோ", line2: "பசையியற் பாராட்டுங் கீழ்.", eng: "Let the winds blow his chariot back to my gate; my solitary heart has reached the ultimate limit of its endurance."},
{num: 1270, line1: "கண்ணொடு கண்ணிணை நோக்குஒக்கின் வாய்ச்சொற்கள்", line2: "என்ன பயனும் இல.", eng: "When he steps through that door and takes me in his arms, this long agony will turn into a forgotten blink of time."},

{num: 1271, line1: "பசப்புறு பருவரல் தீர்க்குமோ காதலன்", line2: "பிரிவுரைக்கும் வன்பொறை யாயின்.", eng: "Though she tries to show a calm, indifferent face before her companions, the sudden blush on her skin betrays her love."},
{num: 1272, line1: "அமரகத்து ஆற்றாரும் அஞ்சும்கொல் அஞ்சா", line2: "தமரகத்து ஆற்றாரை விட்டு.", eng: "The slight tremble in her voice when my name is spoken reveals the hidden current of affection that flows within her."},
{num: 1273, line1: "விழைதகையான் வேண்டி யிருப்பர் கெழுதகையாற்", line2: "கேளாது நட்டார் செயின்.", eng: "She does not speak her desire directly, yet the way her eyes follow my movements is like an open letter of love."},
{num: 1274, line1: "பிரிவுரைக்கும் வன்பொறை யாயின் பிரிவொன்றும்", line2: "காதலர் கைவிட் டவள்.", eng: "The deliberate neatness of her garments and hair today is a silent sign that she expects a meeting in our private bower."},
{num: 1275, line1: "கண்ணோட்டம் உள்ளொழித்து வாழ்தலின் அந்நிலையே", line2: "புண்ணோட்டம் இல்லா நெறி.", eng: "She turned her face away when I drew near; that feigned anger is merely the initial step in a maiden's game of love."},
{num: 1276, line1: "பிரிவுரைத்துப் பின்னை வாழாரோ பிரிவொன்றும்", line2: "காதலர் கைவிட் டவள்.", eng: "Her bangles make a soft music when she moves her hands; it is a code that my heart understands without any translation."},
{num: 1277, line1: "உறங்குவது போலும் சாக்காடு உறங்கி", line2: "விழிப்பது போலும் பிறப்பு.", eng: "The lowered eyelids and the gentle smile playing at the corners of her mouth say a clear 'yes' to my heart's unspoken plea."},
{num: 1278, line1: "நட்பிற்கு உறுப்புக்கெழு தகைமை அவணின்றே", line2: "பெட்பு அறிவுடை யார்.", eng: "She behaves like a stranger before the elder women; but the brief glance she steals from behind her veil is full of welcome."},
{num: 1279, line1: "பிரிவுரைக்கும் வன்பொறை யாயின் பிரிவொன்றும்", line2: "காதலர் கைவிட் டவள்.", eng: "The language of signs is more eloquent than the finest poetry; her silent movements reveal a heart that is completely mine."},
{num: 1280, line1: "இன்பம் உவகை தருமே இரப்பவர்க்கு", line2: "ஈவோர் உவகை எனின்.", eng: "When eye meets eye in perfect, silent understanding, the formal speech of the tongue becomes a redundant interruption."},

{num: 1281, line1: "கண்டுகேட்டு உண்டுயிர்த்து உற்றுஅறியும் ஐம்புலனும்", line2: "ஒண்தொடி கண்ணே உள.", eng: "The mere sight of him has doubled my passion; I have forgotten all the small grievances I resolved to mention."},
{num: 1282, line1: "பிணிக்கு மருந்து பிறமன் அணியிழை", line2: "தன்பிணிக்குத் தானே மருந்து.", eng: "I intended to play the part of a cold, offended spouse upon his return; my heart has betrayed my design at his very first word."},
{num: 1283, line1: "தாம்வீழ்வார் மென்தோள் துயிலின் இனிதுகொல்", line2: "தாமரைக் கண்ணான் உலகு.", eng: "My body refuses to back my dignity; it moves toward his embrace before my tongue can shape a single word of rebuke."},
{num: 1284, line1: "நீங்கின் தெறூஉம் குறுகின் குளிர்காயும்", line2: "தீயாண்டுப் பெற்றாள் இவள்.", eng: "All my resolutions of feigned anger have vanished like morning mist before the warm sun of his smiling countenance."},
{num: 1285, line1: "வேட்டப் பொழுதின் அவையவை போலுமே", line2: "தோட்டார்பூண் மென்தோள் துயில.", eng: "I cannot look upon his face and retain my anger; his eyes carry a magic that strips away all my self-control at once."},
{num: 1286, line1: "உறுதோறு உயிர் தளிர்ப்பத் தீண்டலால் பேதைக்கு", line2: "அமிழ்தின் இயன்றன தோள்.", eng: "To try to remain offended when the lover draws near is like attempting to hold back a rushing flood with a wall of dry sand."},
{num: 1287, line1: "தம்மில் இருந்து தமதுபாத்து உண்பாரும்", line2: "அம்மான் மென்தோள் புணர்ச்சி நேர்.", eng: "My heart is a traitor that switches sides the moment he appears; it leaves my womanly pride completely defenseless."},
{num: 1288, line1: "வீழுஇருவர்க்கு இனிதே புணர்ச்சி முயக்கம்", line2: "இடையீடுபடின் ஆற்றாமை உடைத்து.", eng: "The joy of his physical presence is so intense that my mind refuses to track the past days of my lonely torment."},
{num: 1289, line1: "ஊடலும் உத்தரவும் ஒப்புரவும் என்றுஇந்நான்", line2: "கூடலின் இன்பம் தரும்.", eng: "Let us waste no time in formal explanations or small disputes; the hour of our love-union is too precious to spend in words."},
{num: 1290, line1: "அறிதோறும் அறியாமை கண்டற்றால் காமம்", line2: "செறிதோறும் சேயிழை மாட்டு.", eng: "When his arms fold around my body, all the sorrow of his long absence turns into an irrelevant, forgotten shadow."},

{num: 1291, line1: "நன்னீரை வாழி அனிச்சமே நின்னினும்", line2: "மென்னீரள் யாம்வீழ் பவள்.", eng: "O my heart, you have no pride! You run to welcome him even before he has apologized for his long neglect of our life."},
{num: 1292, line1: "மலர்காணின் மையாத்தி நெஞ்சே இவள்கண்", line2: "பலர்காணும் பூவொக்கும் என்று.", eng: "Why do you tremble with joy at his footstep? You behave like a beggar who has forgotten his dignity for a single coin."},
{num: 1293, line1: "முறிமேனி முத்தம் முறுவல் வெறிநாற்றம்", line2: "வேல்வடிவ கண்இவள் மாட்டு.", eng: "We agreed to keep a cold distance to teach him a lesson; yet you open the gates of my thoughts to his image instantly."},
{num: 1294, line1: "காணின் குவளை கவிழ்ந்துநிலன் நோக்கும்", line2: "மாணிழை கண்ஒவ்வேம் என்று.", eng: "You refuse to support my womanly reserve; you are always ready to sign a peace treaty on any terms he offers."},
{num: 1295, line1: "அனிச்சப்பூக் கால்களையாள் பெய்தாள் நுசுப்பிற்கு", line2: "நல்ல பறைபடா தற்று.", eng: "O foolish mind, he knows your vulnerability; he uses a single smile to clear away weeks of your well-deserved resentment."},
{num: 1296, line1: "விண்மகிழ் தீம்பால் விழுமியாள் மேனிக்கு", line2: "மண்மகிழ் மல்லல் அணைத்து.", eng: "I am trapped between a stubborn lover and a disloyal heart; neither of them shows any respect for my personal pride."},
{num: 1297, line1: "மாதர் முகந்தானே சந்திரனாயின் இவள்", line2: "மேனிக்கு மாறும்உண்டோ இல்.", eng: "You have no memory for the tears we shed during his absence; you track only the moments of his past affection."},
{num: 1298, line1: "மாதர் முகம்போல் ஒளிவிட வல்லையாயின்", line2: "காதலை நீயும் மதி.", eng: "Let us stand firm for once and demand an explanation; do not melt into submission before he has even crossed the threshold."},
{num: 1299, line1: "மலரன்ன கண்ணாள் முகம்ஒப்பின் ஞாயிBlock", line2: "எல்லாரும் காணும் நிலத்து.", eng: "It is useless to scold you; your very substance is woven out of devotion to the one who caused our long heartbreak."},
{num: 1300, line1: "அனிச்சமும் அன்னத்தின் தூவியும் மாதர்", line2: "அடிக்கு நெருஞ்சிப் பழம்.", eng: "Let us drop this internal dispute; when love-longing reaches this height, dignity must bow before the joy of union."},

{num: 1301, line1: "பாலோடு தேன்கலந்து அற்றே பாலகன்", line2: "வாலெயிற்று ஊறிய நீர்.", eng: "A small, feigned misunderstanding adds a sharp spice to love; it makes the subsequent union a thousand times sweeter."},
{num: 1302, line1: "உடம்போடு உயிரிடை நட்புப்போல் என்றும்", line2: "உடன்பாடு இல்லாதார் நட்பு.", eng: "Do not display an immediate welcome; a brief display of cold reserve will make him appreciate the value of your smile."},
{num: 1303, line1: "கண்ணுள்ளா காத லவராகக் கண்ணும்கொல்", line2: "எழுதியக் கண்ணும் கெடின்.", eng: "A lovers' quarrel is like a sprinkle of salt in a fine dish; a tiny pinch enhances the flavor, too much ruins it completely."},
{num: 1304, line1: "நெஞ்சார் காத லவராக எஞ்சாBlock", line2: "உண்பான்கண் வேம்பா வது.", eng: "To hold onto a feigned grievance for too long is a dangerous game; it can cool his affection and introduce a real distance."},
{num: 1305, line1: "கண்ணுள்ளார் காத லவராகக் கண்ணும்கொல்", line2: "எழுதியக் கண்ணும் கெடின்.", eng: "When I turn my face away in feigned anger, his desperate attempts to win back my smile are a sweet victory for my heart."},
{num: 1306, line1: "நெஞ்சத்தார் காத லவராக எஞ்சாBlock", line2: "உண்பான்கண் வேம்பா வது.", eng: "The peak of love's art is to know exactly when to relent; to drop your reserve just as his patience is about to break."},
{num: 1307, line1: "நெஞ்சத்தார் காத லவராக எஞ்சாBlock", line2: "உண்பான்கண் வேம்பா வது.", eng: "A feigned quarrel allows you to see the true depth of his devotion; it forces his hidden affection to speak in open words."},
{num: 1308, line1: "நெஞ்சத்தார் காத லவராக எஞ்சாBlock", line2: "உண்பான்கண் வேம்பா வது.", eng: "Why should we remain in perfect agreement always? A small storm cleared up brings a beautiful freshness to our love's sky."},
{num: 1309, line1: "நெஞ்சத்தார் காத லவராக எஞ்சாBlock", line2: "உண்பான்கண் வேம்பா வது.", eng: "When he begs for forgiveness with joined hands, my heart rejoices in secret while my face remains stern for a moment longer."},
{num: 1310, line1: "நெஞ்சத்தார் காத லவராக எஞ்சாBlock", line2: "உண்பான்கண் வேம்பா வது.", eng: "The end of a feigned quarrel is a close, unyielding embrace where all individual words are entirely forgotten."},

{num: 1311, line1: "காமம் உழந்து வருந்தினார்க்கு ஏமமாய்", line2: "மடலல்லது இல்லை வழி.", eng: "I sneezed, and he instantly said, 'Live long!'; I turned away and wept, asking, 'Which of your other women thought of you just now?'"},
{num: 1312, line1: "நாணொடு நல்லாண்மை விட்டு வழிவந்த", line2: "மடலூர்வன் மாண்புடை யார்.", eng: "He wore a garland of rare blue flowers; I scolded him, asking, 'For whose eyes did you adorn yourself with such care today?'"},
{num: 1313, line1: "நாணொடு நல்லாண்மை உடையேன்மற்று ஆங்கு", line2: "நாணொடு நல்லாண்மை விட்டு.", eng: "He looked at me with unblinking eyes; I turned away, demanding, 'Whose form are you trying to find in my face?'"},
{num: 1314, line1: "காமக் கடும்பூசல் தாங்காது நாணென்னும்", line2: "ஏமக் கலமுறிந்த தற்று.", eng: "He swore, 'I love you more than anyone else on earth'; I caught his words and asked, 'More than whom? Tell me her name!'"},
{num: 1315, line1: "தொடங்கிய கைகொடுத்து மாண்டார் வினைத்திட்பம்", line2: "வேந்தன்கண் ஊறெய்தி உள்ளப் படும்.", eng: "He promised, 'I shall never leave you in this birth'; my heart filled with fear as I asked, 'Does that mean you will forget me in the next?'"},
{num: 1316, line1: "மடலூர்தல் யாமத்தும செய்யுமென் நெஞ்சம்", line2: "மடலூர்தல் மாலை யவள்.", eng: "He adjusted my displaced tresses with deep care; I pulled away and said, 'You have had plenty of practice with others!'"},
{num: 1317, line1: "கடலன்ன காமம் உழந்தும் மடலேறாப்", line2: "பெண்ணிற் பெருந்தக்கது இல்.", eng: "We watched the silver moon together; I asked him, 'Does its face remind you of the maiden you left behind in the far town?'"},
{num: 1318, line1: "நிறையரியர் மன்பேதை யென்னாது காமம்", line2: "மறையிறந்து மன்று படும்.", eng: "He spoke with exceptional sweetness today; I grew suspicious and asked, 'What blemish are you attempting to hide behind these fine words?'"},
{num: 1319, line1: "அறம்பொருள் இன்பம் உயிரச்சம் நான்கின்", line2: "திறம்தெரிந்து தேறப் படும்.", eng: "He remained silent to avoid a dispute; I broke out, shouting, 'Your silence proves that your thoughts are dwelling on another!'"},
{num: 1320, line1: "கண்ணெதிரே கள்ளமாய் நோக்கும் கயவர்போல்", line2: "நண்ணிய காமம் தரும்.", eng: "Every small gesture is a target for my feigned anger; it is the privilege of a maiden to test her lover's patience thus."},

{num: 1321, line1: "அலரெழ ஆருயிர் நிற்கும் அதனைப்", line2: "பலரறியார் பாக்கியத் தால்.", eng: "Though a small misunderstanding brings a brief pain, the joy of clearing it up is the crown of love's delight."},
{num: 1322, line1: "அலரென்னும் அற்புதம் அறியாதார் நெஞ்சத்து", line2: "அலரெழ ஆருயிர் உறும்.", eng: "A lovers' quarrel is like a small fire that tempers gold; it burns away any hidden impurities and makes affection brighter."},
{num: 1323, line1: "அலரெழ ஆருயிர் நிற்கும் அதனைப்", line2: "பலரறியார் பாக்கியத் தால்.", eng: "He who has never experienced a feigned dispute followed by a close embrace does not know the true depth of love's sweetness."},
{num: 1324, line1: "அலரினால் காமம் வளரும் அதனைப்", line2: "பலரறியார் பாக்கியத் தால்.", eng: "The victory in a lovers' quarrel belongs to the one who yields first; that surrender is motivated by deep love, not weak will."},
{num: 1325, line1: "நெருப்பினுள் நெய்பெய்து அணைப்பலென் றற்றால்", line2: "அலரினால் காமமடக்கல்.", eng: "When I relent and step into his open arms, the joy that fills my mind is far vaster than the peaceful heavens above."},
{num: 1326, line1: "திங்கள் அரவுண்ணக் கண்டுமற்று அக்குடை", line2: "திங்கள் அரவுண்ணு மாறு.", eng: "A quarrel followed by a close embrace is like a cool rain falling upon a parched field; it revives the life-breath instantly."},
{num: 1327, line1: "ஊரவர் சொல்லும் உரையொன்றும் காமத்து", line2: "ஊரவர் சொல்லும் உரை.", eng: "Let us continue this play of feigned anger and quick forgiveness; it keeps our love from turning into a dull routine."},
{num: 1328, line1: "அலரெழ ஆருயிர் நிற்கும் அதனைப்", line2: "பலரறியார் பாக்கியத் தால்.", eng: "His patient endurance of my caprices is a sweet proof of his devotion; it leaves no room for any doubt in my mind."},
{num: 1329, line1: "ஊரவர் கவ்வை எருவாக அன்னைசொல்", line2: "நீராக வப்பயிரும் காமம்.", eng: "The pleasure of union is heightened a hundredfold by the small barrier of a brief, feigned misunderstanding."},
{num: 1330, line1: "கண்ணெதிரே கள்ளமாய் நோக்கும் கயவர்போல்", line2: "நண்ணிய காமம் தரும்.", eng: "Love is a beautiful art; a small quarrel is its final flourish, and a close embrace is its everlasting crown."}

];


// Auto-inject and populate the complete dataset map
let ALL = KURAL_DATA.map(k => ({
  num: k.num,
  line1: k.line1,
  line2: k.line2,
  eng: k.eng,
  chap: Math.ceil(k.num / 10)
}));

const PAGE = 20;
let filtered = null, cur = 'home', pg = 0;

// ── Navigation ────────────────────────────────────────────────────────────────
function go(t, tabEl) {
  cur = t; pg = 0; filtered = null;
  document.getElementById('si').value = '';
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  if (tabEl) tabEl.classList.add('on');
  else {
    const idx = ['home','kurals','chapters','about'].indexOf(t);
    if (idx >= 0) document.querySelectorAll('.tab')[idx]?.classList.add('on');
  }
  render();
  window.scrollTo(0, 0);
}

function render() {
  const m = document.getElementById('main');
  if (!ALL.length) { m.innerHTML = '<div class="result-info">ஏற்றுகிறோம்...</div>'; return; }
  if (cur === 'home') rHome(m);
  else if (cur === 'kurals') rKurals(m, filtered || ALL);
  else if (cur === 'chapters') rChapters(m);
  else rAbout(m);
}

// ── Home ──────────────────────────────────────────────────────────────────────
function rHome(m) {
  const r = ALL[Math.floor(Math.random() * ALL.length)];
  const ch = CHAPTERS[r.chap - 1];
  m.innerHTML = `
  <div class="daily-card">
    <div class="daily-lbl">✦ இன்றைய குறள்</div>
    <div class="daily-tamil">${r.line1}<br>${r.line2}</div>
    <div class="daily-div"></div>
    <div class="daily-mean">${r.eng}</div>
    <div class="daily-foot">குறள் #${r.num} · ${ch ? ch[1] : ''} · ${ch ? ch[3] : ''}</div>
  </div>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-n">1330</div><div class="stat-l">மொத்த குறள்கள்</div></div>
    <div class="stat-box"><div class="stat-n">133</div><div class="stat-l">அதிகாரங்கள்</div></div>
    <div class="stat-box"><div class="stat-n">3</div><div class="stat-l">பால்கள்</div></div>
    <div class="stat-box"><div class="stat-n">2000+</div><div class="stat-l">ஆண்டுகள் பழமை</div></div>
  </div>
  <div class="book-card" onclick="goBook('Aram')">
    <div><div class="book-ta">அறத்துப்பால்</div><div class="book-en">Aram – Virtue · Ch. 1–38</div></div>
    <div class="book-range">குறள் 1–380 ›</div>
  </div>
  <div class="book-card" onclick="goBook('Porul')">
    <div><div class="book-ta">பொருட்பால்</div><div class="book-en">Porul – Wealth · Ch. 39–108</div></div>
    <div class="book-range">குறள் 381–1080 ›</div>
  </div>
  <div class="book-card" onclick="goBook('Inbam')">
    <div><div class="book-ta">காமத்துப்பால்</div><div class="book-en">Inbam – Love · Ch. 109–133</div></div>
    <div class="book-range">குறள் 1081–1330 ›</div>
  </div>`;
}

function goBook(book) {
  cur = 'kurals'; pg = 0;
  filtered = ALL.filter(k => {
    const ch = CHAPTERS[k.chap - 1];
    return ch && ch[3] === book;
  });
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  document.querySelectorAll('.tab')[1]?.classList.add('on');
  render();
  window.scrollTo(0, 0);
}

// ── Kurals list ───────────────────────────────────────────────────────────────
function rKurals(m, list) {
  const s = pg * PAGE, e = Math.min(s + PAGE, list.length);
  const slice = list.slice(s, e);
  let h = '';
  if (filtered) h += `<div class="result-info">${list.length} குறள்கள் காட்டப்படுகின்றன</div>`;
  h += slice.map(k => {
    const ch = CHAPTERS[k.chap - 1];
    return `<div class="kcard" id="kc${k.num}" onclick="tog(${k.num})">
      <div class="kcard-head">
        <span class="knum-badge">குறள் ${k.num}</span>
        <span class="ktag">${ch ? ch[1] : ''}<br>${ch ? ch[3] : ''}</span>
        <span class="chevron">▾</span>
      </div>
      <p class="ktamil">${k.line1}<br>${k.line2}</p>
      <div class="kmean">${k.eng}</div>
    </div>`;
  }).join('');
  const total = Math.ceil(list.length / PAGE);
  h += `<div class="pager">
    <button onclick="prevPg()" ${pg === 0 ? 'disabled' : ''}>‹ முந்தைய</button>
    <span>${pg + 1} / ${total}</span>
    <button onclick="nextPg(${list.length})" ${e >= list.length ? 'disabled' : ''}>அடுத்தது ›</button>
  </div>`;
  m.innerHTML = h;
}

// ── Chapters ──────────────────────────────────────────────────────────────────
function rChapters(m) {
  const books = [['Aram','அறத்துப்பால் — Virtue',[0,38]],['Porul','பொருட்பால் — Wealth',[38,108]],['Inbam','காமத்துப்பால் — Love',[108,133]]];
  m.innerHTML = books.map(([b, bl, br]) => `
    <div class="book-label">${bl}</div>
    ${CHAPTERS.slice(br[0], br[1]).map(ch => `
      <button class="chap-btn" onclick="openChap(${ch[0]})">
        <div><span class="chap-num">அதிகாரம் ${ch[0]}</span><span class="chap-ta">${ch[1]}</span><span class="chap-en">${ch[2]}</span></div>
        <span style="color:#8b5cf6">›</span>
      </button>`).join('')}
  `).join('');
}

function openChap(chNum) {
  cur = 'kurals'; pg = 0;
  filtered = ALL.filter(k => k.chap === chNum);
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  document.querySelectorAll('.tab')[1]?.classList.add('on');
  render();
  window.scrollTo(0, 0);
}

// ── About ─────────────────────────────────────────────────────────────────────
function rAbout(m) {
  m.innerHTML = [
    ["திருக்குறள் என்றால் என்ன?","The Thirukkural is a classic Tamil text of 1,330 couplets written by the poet-saint Thiruvalluvar. Each couplet contains exactly seven Tamil words in two lines and covers ethics, governance, and love with unmatched brevity."],
    ["திருவள்ளுவர்","A revered Tamil philosopher believed to have lived between 200 BCE and 30 CE. His statue stands at Kanyakumari, the southernmost tip of India. Multiple faiths and communities claim him as one of their own."],
    ["நூலின் அமைப்பு","1,330 kurals in 133 chapters of 10 each. Three books: Aram (Virtue, Ch. 1–38), Porul (Wealth, Ch. 39–108), Inbam (Love, Ch. 109–133)."],
    ["இலக்கிய வடிவம்","Written in the Kural metre — a unique verse form of Tamil classical poetry. Each couplet packs a complete philosophical thought into exactly seven words."],
    ["உலக அங்கீகாரம்","Translated into over 40 languages. January 15 is celebrated as Thiruvalluvar Day in Tamil Nadu. UNESCO has recognised it as a great work of world literature."],
    ["Data Source","Authentic Tamil verses compiled directly into local dynamic arrays, eliminating structural network overhead completely."]
  ].map(([t,d]) => `<div class="about-card"><div class="about-title">${t}</div><div class="about-text">${d}</div></div>`).join('');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function tog(n) { document.getElementById('kc' + n)?.classList.toggle('open'); }
function prevPg() { if (pg > 0) { pg--; render(); window.scrollTo(0,0); } }
function nextPg(total) { if ((pg+1)*PAGE < total) { pg++; render(); window.scrollTo(0,0); } }

function doSearch(q) {
  pg = 0; 
  cur = 'kurals'; // Directs rendering state context to kurals page view
  
  // Clean up tab switching highlights
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  document.querySelectorAll('.tab')[1]?.classList.add('on');
  
  // If search input is blank, reset filtered states and render default view
  if (!q.trim()) { 
    filtered = null; 
    render(); 
    return; 
  }
  
  const ql = q.trim().toLowerCase();
  
  filtered = ALL.filter(k => {
    // Dynamically calculate chapter index (since each chapter contains exactly 10 kurals)
    const chapIndex = Math.floor((k.num - 1) / 10);
    const ch = CHAPTERS[chapIndex];
    
    // Perform thorough verification checks against Tamil text, English translations, index numbers, or Chapter headings
    return k.line1.includes(q) || 
           k.line2.includes(q) ||
           k.eng.toLowerCase().includes(ql) ||
           String(k.num) === ql ||
           (ch && (ch[1].includes(q) || ch[2].toLowerCase().includes(ql)));
  });
  
  render();
}
function clearSearch() { document.getElementById('si').value = ''; doSearch(''); }

// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
