  {num: 7, line1: "தனக்குவமை இல்லாதான் தாள்சேர்ந்தார்க்கு அல்லால்", line2: "மனக்கவலை மாற்றல் அரிது.", eng: "Anxiety of mind cannot be removed, except from those who are united to the feet of Him who has no equal."},
  {num: 8, line1: "அறவாழி அந்தணன் தாள்சேர்ந்தார்க்கு அல்லால்", line2: "பிறவாழி நீந்தல் அரிது.", eng: "None can swim the sea of births, but those who are united to the feet of that righteous Ocean, the Brahmin."},
  {num: 9, line1: "கோளில் பொறியின் குணமிலவே எண்குணத்தான்", line2: "தாளை வணங்காத் தலை.", eng: "The head that bows not before the feet of Him who possesses eight attributes, is useless, like a sense devoid of sensation."},
  {num: 10, line1: "பிறவிப் பெருங்கடல் நீந்துவர் நீந்தார்", line2: "இறைவன் அடிசேரா தார்.", eng: "They who are united to the feet of God will swim the great sea of births; but those who are not united to them will not."},
  // Add entries 11 through 1330 following this exact structural signature
  {num: 11, line1: "வானின்று உலகம் வழங்கி வருதலால்", line2: "தான்அமிழ்தம் என்றுணரற் பாற்று.", eng: "Since rain maintains the world, it should be regarded as the true nectar of life."},
  {num: 12, line1: "துப்பார்க்குத் துப்பாய துப்பாக்கித் துப்பார்க்குத்", line2: "துப்பாய தூஉம் மழை.", eng: "Rain produces good food for those who eat, and itself becomes food for them."},
  {num: 13, line1: "விண்இன்று பொய்ப்பின் விரிநீர் வியனுலகத்து", line2: "உள்நின்று உடற்றும் பசி.", eng: "If rain fails, hunger will torment this wide world surrounded by the vast sea."},
  {num: 14, line1: "ஏரின் உழாஅர் உழவர் புயல்என்னும்", line2: "வாரி வளங்குன்றிக் கால்.", eng: "Ploughmen will not till the land if the abundance of rain diminishes."},
  {num: 15, line1: "கெடுப்பதூஉம் கெட்டார்க்குச் சார்வாய்மற்று ஆங்கே", line2: "எடுப்பதூஉம் எல்லாம் மழை.", eng: "Rain ruins lives by withholding itself, and as a helper, restores those it has ruined."},
  {num: 16, line1: "விசும்பின் துளிவீழின் அல்லால்மற்று ஆங்கே", line2: "பசும்புல் தலைகாண்பு அரிது.", eng: "Unless drops fall from the sky, it is rare to see even the tip of green grass."},
  {num: 17, line1: "நெடுங்கடலும் தன்நீர்மை குன்றும் தடிந்தெழிலி", line2: "தான்நல்கா தாகி விடின்.", eng: "Even the vast ocean's wealth will diminish if the clouds do not return its waters in rain."},
  {num: 18, line1: "சிறப்பொடு பூசனை செல்லாது வானம்", line2: "வறக்குமேல் வானோர்க்கும் ஈண்டு.", eng: "If the heavens dry up, neither festivals nor daily worship will be offered to the gods."},
  {num: 19, line1: "தானம் தவம்இரண்டும் தங்கா வியன்உலகம்", line2: "வானம் வழங்கா தெனின்.", eng: "Neither charity nor austerity will endure in this wide world if rain does not fall."},
  {num: 20, line1: "நீரின்று அமையாது உலகெனின் யார்யார்க்கும்", line2: "வானின்று அமையாது ஒழுக்கு.", eng: "If the world cannot exist without water, virtuous conduct cannot exist without rain."},
  
  {num: 21, line1: "ஒழுக்கத்து நீத்தார் பெருமை விழுப்பத்து", line2: "வேண்டும் பனுவல் துணிவு.", eng: "The pinnacle of all scriptures is to extol the greatness of those who live in righteous renunciation."},
  {num: 22, line1: "துறந்தார் பெருமை துணைக்கூறின் வையத்து", line2: "இறந்தாரை எண்ணிக்கொண் டற்று.", eng: "Attempting to count the greatness of those who have renounced desires is like trying to count all the dead in the world."},
{num: 23, line1: "இருமை வகைதெரிந்து ஈண்டுஅறம் பூண்டார்", line2: "பெருமை பிறங்கிற்று உலகு.", eng: "The greatness of those who understand both states of existence and embrace virtue shines supreme in this world."},
{num: 24, line1: "உரனென்னும் தோட்டியான் ஓரைந்தும் காப்பான்", line2: "வரனென்னும் வைப்பிற்கோர் வித்து.", eng: "He who controls his five senses with the hook of wisdom is a seed destined for the heavenly realm."},
{num: 25, line1: "ஐந்தவித்தான் ஆற்றல் அகல்விசும்பு ளார்கோமான்", line2: "இந்திரனே சாலுங் கரி.", eng: "Indra, the king of the vast heavens, is himself witness to the immense power of one who has conquered the five senses."},
{num: 26, line1: "செயற்கரிய செய்வார் பெரியர் சிறியர்", line2: "செயற்கரிய செய்கலா தார்.", eng: "The great are those who can achieve rare and difficult deeds; the small are those who cannot."},
{num: 27, line1: "சுவைஒளி ஊறுஓசை நாற்றமென்று ஐந்தின்", line2: "வகைதெரிவான் கட்டே உலகு.", eng: "The world lies within the grasp of the one who understands the true nature of taste, sight, touch, sound, and smell."},
{num: 28, line1: "நிறைமொழி மாந்தர் பெருமை நிலத்து", line2: "மறைமொழி காட்டி விடும்.", eng: "The hidden power of the words spoken by sublime, truth-speaking sages reveals their true greatness on earth."},
{num: 29, line1: "குணம்என்னும் குன்றேறி நின்றார் வெகுளி", line2: "கணமேயும் காத்தல் அரிது.", eng: "The anger of those who have ascended the mountain of virtue lasts but a single moment, yet it is impossible to withstand."},
{num: 30, line1: "அந்தணர் என்போர் அறவோர்மற்று எவ்வுயிர்க்கும்", line2: "செந்தண்மை பூண்டொழுக லான்.", eng: "The righteous are truly called 'Andhanar', for they look upon every living being with compassion and loving-kindness."},

{num: 31, line1: "சிறப்புஈனும் செல்வமும் ஈனும் அறத்தினூங்கு", line2: "ஆக்கம் எவனோ உயிர்க்கு.", eng: "Virtue yields both glory and wealth; what greater gain can there be for human life?"},
{num: 32, line1: "அறத்தினூங்கு ஆக்கமும் இல்லை அதனை", line2: "மறத்தலின் ஊங்கில்லை கேடு.", eng: "There is no higher gain than virtue, and no greater ruin than forgetting it."},
{num: 33, line1: "ஒல்லும் வகையான் அறவினை ஓவாதே", line2: "செல்லும்வாய் எல்லாஞ் செயல்.", eng: "Perform virtuous deeds wherever possible, continuously, to the best of your ability."},
{num: 34, line1: "மனத்துக்கண் மாசிலன் ஆதல் அனைத்துஅறன்", line2: "ஆகுல நீர பிற.", eng: "To be spotless in mind is the essence of virtue; all else is mere empty show."},
{num: 35, line1: "அழுக்காறு அவாவெகுளி இன்னாச்சொல் நான்கும்", line2: "இழுக்கா இயன்றது அறம்.", eng: "Virtue is that conduct which flows smoothly by avoiding envy, desire, anger, and harsh words."},
{num: 36, line1: "அன்றறிவாம் என்னாது அறஞ்செய்க மற்றுஅது", line2: "பொன்றுங்கால் பொன்றாத் துணை.", eng: "Do not delay virtue saying, 'We will see later'; it will remain an undying companion at the hour of death."},
{num: 37, line1: "அறத்தாறு இதுவென வேண்டா சிவிகை", line2: "பொறுத்தானோடு ஊர்ந்தான் இடை.", eng: "No need to explain the fruits of virtue; just look at the bearer of the palanquin and the rider within."},
{num: 38, line1: "வீழ்நாள் படாஅமை நன்றாற்றின் அஃதொருவன்", line2: "வாழ்நாள் வழிஅடைக்கும் கல்.", eng: "If a person lets no day pass without doing good, it becomes a stone to block the path to rebirth."},
{num: 39, line1: "அறத்தான் வருவதே இன்பம்மற்று எல்லாம்", line2: "புறத்த புகழும் இல.", eng: "Only that pleasure which springs from virtue is true happiness; all other pleasures lead to sorrow and lack glory."},
{num: 40, line1: "செயற்பால தோரும் அறனே ஒருவற்கு", line2: "உயற்பால தோரும் பழி.", eng: "Virtue is that which ought to be practiced; vice is that which ought to be shunned."},

{num: 41, line1: "இல்வாழ்வான் என்பான் இயல்புடைய மூவர்க்கும்", line2: "நல்லாற்றின் நின்ற துணை.", eng: "The ideal householder is a steady pillar of support for the three orders of life in their righteous paths."},
{num: 42, line1: "துறந்தார்க்கும் துவ்வாத வர்க்கும் இறந்தார்க்கும்", line2: "இல்வாழ்வான் என்பான் துணை.", eng: "The householder is a helper to those who have renounced the world, the destitute, and the departed."},
{num: 43, line1: "தென்புலத்தார் தெய்வம் விருந்துஒக்கல் தான்என்றாங்கு", line2: "ஐம்புலத்தாறு ஓம்பல் தலை.", eng: "The highest duty of a householder is to serve the ancestors, gods, guests, relatives, and oneself."},
{num: 44, line1: "பழியஞ்சிப் பாத்தூண் உடைத்தாயின் வாழ்க்கை", line2: "வழியஞ்சல் எஞ்ஞான்றும் இல்.", eng: "A life lived fearing sin and sharing food with others will never see its lineage fail."},
{num: 45, line1: "அன்பும் அறமும் உடைத்தாயின் இல்வாழ்க்கை", line2: "பண்பும் பயனும் அது.", eng: "If domestic life is filled with love and virtue, that itself constitutes its beauty and true reward."},
{num: 46, line1: "அறத்தாற்றின் இல்வாழ்க்கை ஆற்றின் புறத்தாற்றின்", line2: "போய்ப் பெறுவது எவன்.", eng: "If domestic life is maintained in the path of virtue, what is there to be gained by entering other paths?"},
{num: 47, line1: "இயல்பினான் இல்வாழ்க்கை வாழ்பவன் என்பான்", line2: "முயல்வாருள் எல்லாம் தலை.", eng: "He who lives a domestic life in its true spirit is the foremost among all who strive for spiritual heights."},
{num: 48, line1: "ஆற்றின் ஒழுக்கி அறனிழுக்கா இல்வாழ்க்கை", line2: "நோற்பாரின் நோன்மை உடைத்து.", eng: "A householder who guides others in righteousness and strays not from virtue excels the penance of ascetics."},
{num: 49, line1: "அறனெனப் பட்டதே இல்வாழ்க்கை அஃதும்", line2: "பிறன்பழிப்பது இல்லாயின் நன்று.", eng: "Domestic life is itself declared to be virtue; and it is especially good if free from the reproach of others."},
{num: 50, line1: "வையத்துள் வாழ்வாங்கு வாழ்பவன் வான்உளயும்", line2: "தெய்வத்துள் வைக்கப் படும்.", eng: "He who lives on earth as he ought to live will be counted among the gods who dwell in heaven."},

{num: 51, line1: "மனைத்தக்க மாண்புடையள் ஆகித்தற் கொண்டான்", line2: "வளத்தக்காள் வாழ்க்கைத் துணை.", eng: "She is a true life-companion who possesses the virtues of a home and spends within her husband's means."},
{num: 52, line1: "மனைமாட்சி இல்லாள்கண் இல்லாயின் வாழ்க்கை", line2: "எனைமாட்சித் தாயினும் இல்.", eng: "If the wife lacks the excellence of domestic virtues, home life is nothing, no matter how great its other splendors."},
{num: 53, line1: "இல்லதென் இல்லவள் மாண்பானால் உள்ளதென்", line2: "இல்லவள் மாணாக் கடை.", eng: "What is lacking if the wife is virtuous? What is possessed if the wife lacks worth?"},
{num: 54, line1: "பெண்ணின் பெருந்தக்க யாவுள கற்பென்னும்", line2: "திண்மைஉண்டாகப் பெறின்.", eng: "What is more precious than a woman who possesses the firm strength of fidelity?"},
{num: 55, line1: "தெய்வம் தொழாஅள் கொழுநன் தொழுதெழுவாள்", line2: "பெய்யெனப் பெய்யும் மழை.", eng: "She who worships not God but wakes up bowing to her husband can command the rain to fall, and it will fall."},
{num: 56, line1: "தற்காத்துத் தற்கொண்டாற் பேணித் தகைசான்ற", line2: "சொற்காத்துச் சோர்விலாள் பெண்.", eng: "A true woman protects her virtue, cares for her husband, maintains the family's reputation, and remains untiring."},
{num: 57, line1: "சிறைகாக்கும் காப்புஎவன் செய்யும் மகளிர்", line2: "நிறைகாக்கும் காப்பே தலை.", eng: "What can a confining prison do for women? Their own self-restraint and chastity is their best protection."},
{num: 58, line1: "பெற்றான் பெறின்பெறுவர் பெண்டிர் பெருஞ்சிறப்புப்", line2: "புத்தேளிர் வாழும் உலகு.", eng: "If a wife wins the heart of her husband, she will be highly honored in the world where the gods dwell."},
{num: 59, line1: "புகழ்புரிந்த இல்லிலோர்க்கு இல்லை இகழ்வார்முன்", line2: "ஏறுபோல் பீடு நடை.", eng: "The husband whose home lacks a praised and virtuous wife cannot walk like a proud lion before his mockers."},
{num: 60, line1: "மங்கலம் என்ப மனைமாட்சி மற்றுஅதன்", line2: "நன்கலம் நன்மக்கட் பேறு.", eng: "The excellence of a wife is the auspicious beauty of a home; good children are its precious jewels."},

{num: 61, line1: "பெறுமவற்றுள் யாமறிவது இல்லை அறிவறிந்த", line2: "மக்கட்பேறு அல்ல பிற.", eng: "Among all the blessings one can acquire, we know of none greater than the birth of intelligent, wise children."},
{num: 62, line1: "எழுபிறப்பும் தீயவை தீண்டா பழிபிறங்கா", line2: "பண்புடை மக்கள் பெறின்.", eng: "If one is blessed with children of flawless character, the evils of the sevenfold births will never touch them."},
{num: 63, line1: "தம்ப்பொருள் என்பதம் மக்கள் அவப்பொருள்", line2: "தம்தம் வினையான் வரும்.", eng: "Men call their children their wealth; and that wealth comes to them through their own past deeds."},
{num: 64, line1: "அமிழ்தினும் ஆற்ற இனிதேதம் மக்கள்", line2: "சிறுகை அளாவிய கூழ்.", eng: "Even simple porridge stirred by the tiny hands of one's own children is far sweeter than nectar."},
{num: 65, line1: "மக்கள்மெய் தீண்டல் உடற்கின்பம் மற்றுஅவர்", line2: "சொற்கேட்டல் இன்பம் செவிக்கு.", eng: "To touch the bodies of one's children brings joy to the body; to hear their sweet words brings joy to the ear."},
{num: 66, line1: "குழல்இனிது யாழ்இனிது என்பதம் மக்கள்", line2: "மழலைச்சொல் கேளா தவர்.", eng: "Only those who have not heard the lisping speech of their own children will say that the flute and the lute are sweet."},
{num: 67, line1: "தந்தை மகற்குஆற்றும் நன்றி அவையத்து", line2: "முந்தி யிருப்பச் செயல்.", eng: "The greatest benefit a father can bestow upon his son is to make him stand foremost in the assembly of the wise."},
{num: 68, line1: "தம்மின்தம் மக்கள் அறிவுடைமை மாநிலத்து", line2: "மன்னுயிர்க் கெல்லாம் இனிது.", eng: "That their children are wiser than themselves is a source of joy for all living beings upon this vast earth."},
{num: 69, line1: "ஈன்ற பொழுதின் பெரிதுவக்கும் தன்மகனைச்", line2: "சான்றோன் எனக்கேட்ட தாய்.", eng: "The mother who hears her son praised as a wise and noble man rejoices even more than she did at the hour of his birth."},
{num: 70, line1: "மகன் தந்தைக்கு ஆற்றும் உதவி இவன் தந்தை", line2: "என்நோற்றான் கொல் எனும் சொல்.", eng: "The finest return a son can make to his father is to make the world ask, 'What great penance did his father do to merit such a son?'"},

{num: 71, line1: "அன்பிற்கும் உண்டோ அடைக்கும்தாழ் ஆர்வலர்", line2: "புன்கண் நீர் பூசல் தரும்.", eng: "Is there any bolt that can lock up love? The trickling tears of affectionate hearts will easily proclaim it."},
{num: 72, line1: "அன்பிலார் எல்லாம் தமக்குரியர் அன்புடையார்", line2: "என்பும் உரியர் பிறர்க்கு.", eng: "Those who are destitute of love keep everything for themselves; those filled with love give even their very bones to others."},
{num: 73, line1: "அன்போடு இயைந்த வழக்கென்ப ஆருயிர்க்கு", line2: "என்போடு இயைந்த தொடர்பு.", eng: "They say that the soul's connection with the body is the fruit of a life lived in harmony with love."},
{num: 74, line1: "அன்புஈனும் ஆர்வம் உடைமை அதுஈனும்", line2: "நண்பென்னும் நாடாச் சிறப்பு.", eng: "Love generates a yearning desire for fellowship, and that yearning yields the priceless excellence of universal friendship."},
{num: 75, line1: "அன்புற்று அமர்ந்த வழக்கென்ப வையகத்து", line2: "இன்புற்றார் எய்தும் சிறப்பு.", eng: "The great happiness enjoyed by the blessed in this world is said to be the reward of a life rooted in love."},
{num: 76, line1: "அறத்திற்கே அன்புசார் பென்பர் அறிவிலார்", line2: "மறத்திற்கும் அஃதே துணை.", eng: "The ignorant say that love is an ally only to virtue; but it is also the ultimate remedy against evil and hostility."},
{num: 77, line1: "என்பிலதனை வெயில்போலக் காயுமே", line2: "அன்பிலதனை அறம்.", eng: "Just as the scorching sun burns up boneless creatures, so does virtue wither away those who are devoid of love."},
{num: 78, line1: "அன்பகத்து இல்லா உயிர்வாழ்க்கை வன்பாற்கண்", line2: "வற்றல் மரந்தளிர்த் தற்று.", eng: "To live a domestic life without love in the heart is like a withered tree trying to blossom in a barren desert."},
{num: 79, line1: "புறத்துறுப்பு எல்லாம் எவன்செய்யும் யாக்கை", line2: "அகத்துறுப்பு அன்புஇல் லவர்க்கு.", eng: "Of what use are external bodily features to those whose internal organ, the heart, is empty of love?"},
{num: 80, line1: "அன்பின் வழியது உயிர்நிலை அஃதிலார்க்கு", line2: "என்புதோல் போர்த்த உடம்பு.", eng: "A life informed by love is truly a living soul; those who lack it are merely dry bones covered with skin."},

{num: 81, line1: "இருந்தோம்பி இல்வாழ்வ தெல்லாம் விருந்தோம்பி", line2: "வேளாண்மை செய்தற் பொருட்டு.", eng: "The sole purpose of earning wealth and maintaining a home is to cherish guests and extend hospitality to them."},
{num: 82, line1: "விருந்து புறத்ததாத் தானுண்டல் சாவா", line2: "மருந்தெனினும் வேண்டற்பாற் றன்று.", eng: "Even if it were the nectar of immortality, it is not right to eat it alone while a guest is waiting outside."},
{num: 83, line1: "வருவிருந்து வைகலும் ஓம்புவான் வாழ்க்கை", line2: "பருவந்து பாழ்படுதல் இன்று.", eng: "The life of one who daily welcomes and cherishes arriving guests will never fall into ruin or poverty."},
{num: 84, line1: "அகனமர்ந்து செய்யாள் உறையும் முகனமர்ந்து", line2: "நல்விருந்து ஓம்புவான் இல்.", eng: "Lakshmi, the goddess of fortune, will joyfully reside in the house of one who welcomes noble guests with a smiling face."},
{num: 85, line1: "வித்தும் இடல்வேண்டும் கொல்லோ விருந்தோம்பி", line2: "மிச்சில் மிசைவான் புலம்.", eng: "Does the field of one who feeds his guests first and eats only the remnants even need to be sown with seeds?"},
{num: 86, line1: "செல்விருந்து ஓம்பி வருவிருந்து பார்த்திருப்பான்", line2: "நல்விருந்து வானத் தவர்க்கு.", eng: "He who speeds his departing guests and waits expectantly for new ones will be a welcomed guest to the gods in heaven."},
{num: 87, line1: "இனைத்துணைத் தென்பதொன் றில்லை விருந்தின்", line2: "துணைத்துணை வேள்விப் பயன்.", eng: "The merit of hospitality cannot be measured in size; its value is determined entirely by the worth of the guest."},
{num: 88, line1: "பரிந்தோம்பிப் பற்றற்றேம் என்பர் விருந்தோம்பி", line2: "வேள்வி தலைப்படா தார்.", eng: "Those who fail to practice hospitality will later lament, 'We hoarded wealth with great care, yet now we are helpless and alone.'"},
{num: 89, line1: "உடமையுள் இன்மை விருந்தோம்பல் ஓம்பா", line2: "மடமை மடவார்கண் உண்டு.", eng: "To be wealthy yet refuse to cherish guests is poverty in the midst of abundance; it is a folly found only in the ignorant."},
{num: 90, line1: "மோப்பக் குழையும் அனிச்சம் முகந்திரிந்து", line2: "நோக்கக் குழையும் விருந்து.", eng: "The Anicham flower withers when merely smelt; but a guest withers at a single cold, averted look."},

{num: 91, line1: "இன்சொலால் ஈரம் அளைஇப் படிறிலவாம்", line2: "செம்பொருள் கண்டார்வாய்ச் சொல்.", eng: "Sweet words are those that flow with love and are free from deceit, spoken by those who have realized the ultimate truth."},
{num: 92, line1: "அகன்அமர்ந்து ஈதலின் நன்றே முகனமர்ந்து", line2: "இன்சொலன் ஆகப் பெறின்.", eng: "To speak sweet words with a cheerful countenance is even better than giving gifts with a joyous heart."},
{num: 93, line1: "முகத்தான் அமர்ந்து இனிதுநோக்கி அகத்தானாம்", line2: "இன்சொ லினதே அறம்.", eng: "To welcome with a pleasant look, gaze with love, and speak sweet words from the heart is the path of true virtue."},
{num: 94, line1: "துன்புறூஉம் துவ்வாமை இல்லாகும் யார்மாட்டும்", line2: "இன்புறூஉம் இன்சொ லவர்க்கு.", eng: "Poverty that causes grief will never come to those who speak pleasant and uplifting words to all men."},
{num: 95, line1: "பணிவுடையன் இன்சொலன் ஆதல் ஒருவற்கு", line2: "அணியல்ல மற்றுப் பிற.", eng: "Humility and sweet speech are a person's true ornaments; all other decorations are not worth counting."},
{num: 96, line1: "அல்லவை தேய அறம்பெருகும் நல்லவை", line2: "நாடி இனிய சொலின்.", eng: "If a person seeks to speak good and pleasant words, their sins will diminish and their virtue will increase."},
{num: 97, line1: "நயன்ஈன்று நன்றி பயக்கும் பயன்ஈன்று", line2: "பண்பின் தலைப்பிரியாச் சொல்.", eng: "Words that yield usefulness and do not stray from courtesy will bring righteousness and generate goodness."},
{num: 98, line1: "சிறுமையுள் நீங்கிய இன்சொல் மறுமையும்", line2: "இம்மையும் இன்பம் தரும்.", eng: "Sweet words that are free from meanness and cruelty will bring happiness both in this life and the life to come."},
{num: 99, line1: "இன்சொல் இனிதுஈன்றல் காண்பான் எவன்கொலோ", line2: "வண்சொல் வழங்கு வது.", eng: "Why does a person use harsh words when he sees the immense joy that sweet words bring to others?"},
{num: 100, line1: "இனிய உளவாக இன்னாத கூறல்", line2: "கனிஇருப்பக் காய்கவர்ந் தற்று.", eng: "To utter harsh words when pleasant ones are available is like plucking raw, bitter fruit when ripe, sweet fruit is right at hand."},

{num: 101, line1: "செய்யாமல் செய்த உதவிக்கு வையகமும்", line2: "வானகமும் ஆற்றல் அரிது.", eng: "The earth and the heavens are a poor return for a benefit conferred on one who had done no prior service."},
{num: 102, line1: "காலத்தினால் செய்த நன்றி சிறிதுஎனினும்", line2: "ஞாலத்தின் மாணப் பெரிது.", eng: "A timely favor, though small in itself, is wider and vaster than the world itself."},
{num: 103, line1: "பயன்தூக்கார் செய்த உதவி நயன்தூக்கின்", line2: "நன்மை கடலின் பெரிது.", eng: "If you weigh the excellence of a favor done without expecting anything in return, its goodness is greater than the sea."},
{num: 104, line1: "தினைத்துணை நன்றி செய்யினும் பனைத்துணையாக்கொள்வர்", line2: "பயன்தெரி வார்.", eng: "Though a benefit received be as small as a millet seed, those who understand its true utility will regard it as large as a palm tree."},
{num: 105, line1: "உதவி வரைத்தன்று உதவி உதவி", line2: "செயப்பட்டார் சால்பின் வரைத்து.", eng: "A favor is not to be measured by its commercial worth; its true measure lies in the nobility of the one who receives it."},
{num: 106, line1: "மறவற்க மாசற்றார் கேண்மை துறவற்க", line2: "துன்பத்துள் துப்பாயார் நட்பு.", eng: "Never forget the fellowship of the pure, and never abandon the friendship of those who stood by you in times of distress."},
{num: 107, line1: "எழுமை எழுபிறப்பும் உள்ளுவர் தம்கண்", line2: "விழுமம் துடைத்தவர் நட்பு.", eng: "The wise will remember through all seven lifetimes the friendship of those who wiped away their tears of affliction."},
{num: 108, line1: "நன்றி மறப்பது நன்றன்று நன்றல்லது", line2: "அன்றே மறப்பது நன்று.", eng: "It is not good to forget a benefit received; but it is best to forget an injury on the very day it is done."},
{num: 109, line1: "கொன்றன்ன இன்னா செயினும் அவர்செய்த", line2: "ஒன்றுநன்று உள்ளக் கெடும்.", eng: "Even if someone does you a deadly injury, the memory of a single good deed they did for you in the past will erase all their malice."},
{num: 110, line1: "எந்நன்றி கொன்றார்க்கும் உய்வுண்டாம் உய்வில்லை", line2: "செய்ந்நன்றி கொன்ற மகற்கு.", eng: "There is salvation for those who violate any great virtue; but there is no redemption for the one who kills gratitude."},

{num: 111, line1: "தகுதி எனவொன்று நன்றே பகுதியால்", line2: "பாற்பட்டு ஒழுகப் பெறின்.", eng: "That which is called impartiality is preeminently good, provided it acts without bias towards friends, enemies, or strangers."},
{num: 112, line1: "செப்பம் உடையவன் ஆக்கம் சிதைவின்றி", line2: "எச்சத்திற்கு ஏமாப்பு உடைத்து.", eng: "The wealth of an upright and impartial man will never diminish; it remains as a secure guard for his posterity."},
{num: 113, line1: "நன்றே தரினும் நடுவிகந்தாம் ஆக்கத்தை", line2: "அன்றே ஒழிய விடல்.", eng: "Even if it brings great prosperity, reject that wealth immediately if it is acquired by forsaking equity."},
{num: 114, line1: "தக்கார் தகவிலர் என்பது அவரவர்", line2: "எச்சத்தாற் காணப் படும்.", eng: "The righteous and the unrighteous may be known by the reputation and the condition of the descendants they leave behind."},
{num: 115, line1: "கேடும் பெருக்கமும் இல்லல்ல நெஞ்சத்துக்", line2: "கோடாமை சான்றோர்க் கணி.", eng: "Loss and gain come to all by destiny; but to keep the mind unbiased like a balance scale is the true ornament of the wise."},
{num: 116, line1: "கெடுவல்யான் என்பது அறிகதன் நெஞ்சம்", line2: "நடுவொரீஇ அல்ல செயின்.", eng: "Let a man know that his ruin is near if his heart turns away from justice and begins to practice inequity."},
{num: 117, line1: "கெடுவாக வையா துலகம் நடுவாகச்", line2: "செய்தவக் கணவஞ்சியான் கேடு.", eng: "The world does not view the poverty of an upright man as a misfortune; it honors his integrity above all."},
{num: 118, line1: "சமன்செய்து சீர்தூக்கும் கோல்போல் அமைந்தொருபால்", line2: "கோடாமை சான்றோர்க் கணி.", eng: "To stand unbendingly poised like the rod of a balance scale, leaning to neither side, is the crown of a noble man."},
{num: 119, line1: "சொற்கோட்டம் இல்லது செப்பம் ஒருதலையா", line2: "உட்கோட்டம் இன்மை பெறின்.", eng: "Freedom from bias in speech is true justice, provided the mind is completely free from hidden crookedness."},
{num: 120, line1: "வாணிகம் செய்வார்க்கு வாணிகம் பேணிப்", line2: "பிறவும் தமபோல் செயின்.", eng: "The true merit of merchants lies in guarding the goods of others as they would guard their own."},

{num: 121, line1: "அடக்கம் அமரருள் உய்க்கும் அடங்காமை", line2: "ஆரிருள் உய்த்து விடும்.", eng: "Self-restraint will guide a person among the gods; the lack of it will cast them into ultimate darkness."},
{num: 122, line1: "காக்க அடக்கத்தை ஆக்கமாக் காப்பார்", line2: "அதனினூங்கு இல்லை உயிர்.", eng: "Guard your self-restraint as a precious treasure; there is no greater wealth for human life."},
{num: 123, line1: "அறிவறிந்து ஆற்றின் அடங்கின் அறிவறிந்து", line2: "ஆன்றோர் சமன்பாடும் இல்.", eng: "Knowing what wisdom is, if a person walks in self-control, they will attain the highest honor among the noble."},
{num: 124, line1: "நிலையின் திரியாது அடங்கியான் தோற்றம்", line2: "மலையினும் மாணப் பெரிது.", eng: "The stature of one who stands firm in his duty and maintains self-restraint is loftier than a mountain."},
{num: 125, line1: "எல்லார்க்கும் நன்றாம் பணிதல் அவருள்ளும்", line2: "செல்வர்க்கே செல்வம் தகைத்து.", eng: "Humility is good for everyone; but in the wealthy, it shines as an added crown of riches."},
{num: 126, line1: "ஒருமையுள் ஆமைபோல் ஐந்துஅடக்கல் ஆற்றின்", line2: "எழுமையும் ஏமாப்பு உடைத்து.", eng: "If one can withdraw the five senses like a tortoise within its shell in a single birth, it will guard them through all seven."},
{num: 127, line1: "யாகாவார் ஆயினும் நாகாக்க காவாக்கால்", line2: "சோகாப்பர் சொல்லிழுக்குப் பட்டு.", eng: "Whatever else you fail to control, guard your tongue; if you fail, you will suffer under the weight of your own flawed words."},
{num: 128, line1: "ஒன்றானும் தீச்சொல் பொருட்பயன் ஆயின்", line2: "அன்றாகா தாகி விடும்.", eng: "If even a single word of spite slips out and causes injury, all the virtue of your other words will be ruined."},
{num: 129, line1: "தீயினாற் சுட்டபுண் உள்ளாறும் ஆறாதே", line2: "நாவினாற் சுட்ட வடு.", eng: "A wound burned by fire will heal from within; but a scar branded by a harsh, cruel tongue will never heal."},
{num: 130, line1: "கதம்காத்துக் கற்றறிந்து அடங்கியான் நெஞ்சம்", line2: "அறம்காயும் ஆற்றின் நுழைந்து.", eng: "Virtue will seek out and dwell in the heart of the one who controls anger, acquires wisdom, and lives in self-restraint."},

{num: 131, line1: "ஒழுக்கம் விழுப்பம் தரலான் ஒழுக்கம்", line2: "உயிரினும் ஓம்பப் படும்.", eng: "Right conduct brings supreme dignity; therefore, it must be guarded more preciously than life itself."},
{num: 132, line1: "பரிந்தோம்பிக் காக்க ஒழுக்கம் தெரிந்தோம்பித்", line2: "தேரினும் அஃதே துணை.", eng: "Guard right conduct with painful care; though you examine all other paths, this remains your ultimate ally."},
{num: 133, line1: "ஒழுக்கம் உடைமை குடிமை இழுக்கம்", line2: "இழிந்த பிறப்பாய் விடும்.", eng: "Right conduct is the hallmark of noble birth; a lack of it will degrade even the highest lineage to a low status."},
{num: 134, line1: "மறப்பினும் ஓத்துக் கொளலாகும் பார்ப்பான்", line2: "பிறப்பொழுக்கம் குன்றக் கெடும்.", eng: "An unlearned scholar can relearn the scriptures; but if he falls from right conduct, his high birth is lost forever."},
{num: 135, line1: "அழுக்காறு உடையான்கண் ஆக்கம் போன்றில்லை", line2: "ஒழுக்கம் இலான்கண் உயர்வு.", eng: "Just as prosperity cannot dwell with an envious man, so greatness cannot exist with one who lacks right conduct."},
{num: 136, line1: "ஒழுக்கத்தின் ஒல்கார் உரவோர் இழுக்கத்தின்", line2: "ஏதம் படுபா டறிந்து.", eng: "The firm-minded never shrink from right conduct, for they know the terrible miseries that flow from its absence."},
{num: 137, line1: "ஒழுக்கத்தின் எய்துவர் மேன்மை இழுக்கத்தின்", line2: "எய்துவர் எய்தாப் பழி.", eng: "From right conduct, men attain high honor; from a lack of it, they incur unbearable disgrace."},
{num: 138, line1: "நன்றிக்கு வித்தாகும் நல்லொழுக்கம் தீயொழுக்கம்", line2: "என்றும் இடும்பை தரும்.", eng: "Good conduct is the seed that harvests virtue; bad conduct brings endless sorrow and distress."},
{num: 139, line1: "ஒழுக்க முடையவர்க்கு ஒல்லாவே தீய", line2: "வழுக்கியும் வாயாற் சொலல்.", eng: "It is impossible for those of right conduct to utter evil words, even by a slip of the tongue."},
{num: 140, line1: "உலகத்தோடு ஒட்ட ஒழுகல் பலகற்றும்", line2: "அறிவிலார் கல்லா தவர்.", eng: "Though they have studied many rare books, those who have not learned to live in harmony with the world are ignorant."},

{num: 141, line1: "பிறன்பொருளாள் பெட்டொழுகும் பேதைமை ஞாலத்து", line2: "அறம்பொருள் கண்டார்கண் இல்.", eng: "The foolishness of desiring another's wife will never be found among those who understand virtue and wealth."},
{num: 142, line1: "அறன்கடை நின்றாருள் எல்லாம் பிறன்கடை", line2: "நின்றாரின் பேதையார் இல்.", eng: "Among all those who stand outside the path of virtue, there is no fool greater than he who covets his neighbor's gate."},
{num: 143, line1: "விளிந்தாரின் வேறல்லர் மன்ற தெளிந்தார்இல்", line2: "தீமை புரிந்துழுகு வார்.", eng: "Those who enter the home of a trusting friend to commit adultery are no better than walking corpses."},
{num: 144, line1: "எனைத்துணையர் ஆயினும் என்னாம் தினைத்துணையும்", line2: "தேரான் பிறனில் புகல்.", eng: "No matter how great a man's power may be, what does it avail if he enters another's house without a thought of sin?"},
{num: 145, line1: "எளிதென இல்லிறப்பான் எய்தும்எஞ் ஞான்றும்", line2: "விளியாது நிற்கும் பழி.", eng: "He who enters another's home thinking it an easy sin will incur a disgrace that will stand forever."},
{num: 146, line1: "பகைபாவம் அச்சம் பழியென நான்கும்", line2: "இகவாவாம் இல்லிறப்பான் கண்.", eng: "Hatred, sin, fear, and disgrace—these four evils will never leave the man who violates his neighbor's wife."},
{num: 147, line1: "அறன்இயலான் இல்வாழ்க்கை வாழ்பவன் என்பான்", line2: "பிறன்இயலாள் பெண்மை நயவா தவன்.", eng: "He is a true householder who lives righteously and looks not upon another's wife with lustful desire."},
{num: 148, line1: "பிறன்மனை நோக்காத பேராண்மை சான்றோர்க்கு", line2: "அறன்றோன்றா ஆன்ற ஒழுக்கு.", eng: "The noble strength that turns away from looking at another's wife is both virtue and the highest form of conduct."},
{num: 149, line1: "நலக்குரியார் யாரெனின் நாமநீர் வைப்பின்", line2: "பிறற்குரியார் தோள்தோயா தார்.", eng: "Who is entitled to the blessings of this world surrounded by the vast sea? Those who touch not the arms of another's wife."},
{num: 150, line1: "அறன்வரையான் அல்ல செயினும் பிறன்வரையாள்", line2: "பெண்மை நயவாமை நன்று.", eng: "Though a man transgresses all laws and commits every evil, it is still good if he refrains from lusting after another's wife."},

{num: 151, line1: "அகழ்வாரைத் தாங்கும் நிலம்போலத் தம்மை", line2: "இகழ்வார்ப் பொறுத்தல் தலை.", eng: "To bear with those who revile us, just as the earth bears up those who dig into it, is the highest virtue."},
{num: 152, line1: "பொறுத்தலிறந் ததனை எஞ்ஞான்றும் மறத்தல்", line2: "அதனினும் நன்றாற் சிறந்து.", eng: "It is always good to forgive an injury; but to forget it entirely is even better than forgiveness."},
{num: 153, line1: "இன்மையுள் இன்மை விருந்தொரால் வன்மையுள்", line2: "வன்மை மடவார்ப் பொறை.", eng: "The ultimate poverty is refusing hospitality to a guest; the ultimate strength is bearing with the insults of the ignorant."},
{num: 154, line1: "நிறையுடைமை நீங்காமை வேண்டின் பொறையுடைமை", line2: "போற்றி ஒழுகப் படும்.", eng: "If you desire that your noble character should never diminish, cultivate and guard the quality of forbearance."},
{num: 155, line1: "அறிவொண்ணார் செய்தவை தானும்அஃ தறிந்து", line2: "வெகுளார் பொறுப்பாரே மின்.", eng: "The wise will not seek vengeance against those who wrong them; they excel by patiently bearing with the offence."},
{num: 156, line1: "ஒறுத்தாரை ஒன்றாக வையார் பொறுத்தாரைப்", line2: "பொன்போல் பொதிந்து வைப்பர்.", eng: "The world does not remember those who seek revenge; but it treasures those who forgive, keeping them like precious gold."},
{num: 157, line1: "திறனல்ல தற்பிறர் செய்யினும் நோநொந்து", line2: "அறனல்ல செய்யாமை நன்று.", eng: "Though others do you severe and unjust wrongs, it is good to feel for their ignorance and refrain from doing them evil."},
{num: 158, line1: "மிகுதியான் மிக்கவை செய்தாரைத் தாம்தம்", line2: "தகுதியான் வென்று விடல்.", eng: "Let a man conquer by his own patient nobility those who have wronged him in the arrogance of their pride."},
{num: 159, line1: "துறந்தாரின் தூய்மையர் ஆவர் இறந்தார்வாய்", line2: "இன்னாச்சொல் நோற்கிற்பவர்.", eng: "Those who endure the bitter words of transgressors are even purer in spirit than ascetics who have renounced the world."},
{num: 160, line1: "உண்ணாது நோற்பார் பெரியர் பிறர்சொல்லும்", line2: "இன்னாச்சொல் நோற்பாரின் பின்.", eng: "Those who fast and perform severe penance are great; but they stand behind those who endure the harsh words of others."},

{num: 161, line1: "ஒழுக்காறாக் கொள்க ஒருவன்தன் நெஞ்சத்து", line2: "அழுக்காறு இலாத இயல்பு.", eng: "Let a man look upon a heart free from envy as his rule of life and his truest code of conduct."},
{num: 162, line1: "விழுப்பத்தின் விழுப்பது ஒன்றில்லை யாரோட்டும்", line2: "அழுக்காறு இலாத இயல்பு.", eng: "Among all blessings, there is none greater than a nature that knows no envy toward any living being."},
{num: 163, line1: "அறம்பொருள் கண்டான் அழுக்கறான் செவ்வியான்", line2: "ஞான்றொரீஇ அல்ல செயின்.", eng: "He who understands virtue and wealth will never be envious; he knows it ruins his own spiritual well-being."},
{num: 164, line1: "அழுக்காற்றின் அல்லவை செய்யார் இழுக்காற்றின்", line2: "ஏதம் படுபா டறிந்து.", eng: "The wise will never commit sinful deeds out of envy, for they know the destructive miseries that flow from it."},
{num: 165, line1: "அழுக்காறு உடையாற்கு அதுசாலும் ஒன்னார்", line2: "வழுக்கியும் கேடீன் பது.", eng: "An envious man needs no other enemy to ruin him; his own envy is enough to ensure his downfall."},
{num: 166, line1: "கொடுப்பது அழுக்கறுப்பான் சுற்றம் உடுப்பதூஉம்", line2: "உண்பதூஉம் இன்றிக் கெடும்.", eng: "He who envies a gift given to another will see his own family perish, destitute of both food and clothing."},
{num: 167, line1: "அவ்வித்து அழுக்காறு உடையானைச் செய்யவள்", line2: "தவ்வையைக் காட்டி விடும்.", eng: "Goddess Lakshmi will leave the envious man in disgust, handing him over to her sister, the goddess of misfortune."},
{num: 168, line1: "அழுக்காறு எனவொரு பாவி திருச்செற்றுத்", line2: "தீயுழி உய்த்து விடும்.", eng: "Envy is a deadly sin that destroys a man's prosperity and casts him into the fire of ultimate ruin."},
{num: 169, line1: "அவ்விய நெஞ்சத்தான் ஆக்கமும் செவ்வியான்", line2: "கேடும் நினைக்கப் படும்.", eng: "The wealth of an envious man and the poverty of an upright soul are anomalies that require deep thought."},
{num: 170, line1: "அழுக்கற்று அகன்றாரும் இல்லை அஃதிலார்", line2: "பெருக்கத்தில் தீர்ந்தாரும் இல்.", eng: "No one has ever prospered through envy; no one free from envy has ever been deprived of true greatness."},

{num: 171, line1: "நடுவின்றி நன்பொருள் வெஃகின் குடிபொன்றிக்", line2: "குற்றமும் ஆங்கே தரும்.", eng: "If a man departs from equity and covets another's property, his family will perish and guilt will overtake him."},
{num: 172, line1: "படுபயன் வெஃகிப் பழிப்படுவ செய்யார்", line2: "நடுவன்மை நாணு பவர்.", eng: "Those who blush at the thought of injustice will never commit shameful deeds to seize another's wealth."},
{num: 173, line1: "சிற்றின்பம் வெஃகி அறனல்ல செய்யாரே", line2: "மற்றின்பம் வேண்டு பவர்.", eng: "Those who seek the eternal joy of virtue will never commit unrighteous deeds for the fleeting pleasure of covetousness."},
{num: 174, line1: "இலமென்று வெஃகுதல் செய்யார் புலம்வென்ற", line2: "புன்மையில் காட்சி யவர்.", eng: "The wise who have conquered their senses will never covet another's goods, even if they are starving in deep poverty."},
{num: 175, line1: "அஃகிஅகன்ற அறிவென்னாம் யார்மாட்டும்", line2: "வெஃகி வெறியவ செய்யின்.", eng: "Of what avail is deep and vast wisdom if a man acts foolishly by coveting the possessions of others?"},
{num: 176, line1: "அருள்வெஃகி ஆற்றின்கண் நின்றான் பொருள்வெஃகி", line2: "பொல்லாத சூழக் கெடும்.", eng: "If a man who seeks grace and stands in the path of virtue covets wealth and plots evil, he will be utterly ruined."},
{num: 177, line1: "வேண்டற்க வெஃகிவந் தாக்கம் விளைவயின்", line2: "மாண்டற்க மாண்ட பயன்.", eng: "Do not desire the wealth that comes from covetousness; its fruit will bring bitter ruin in the day of harvest."},
{num: 178, line1: "அஃகாமை செல்வத்திற்கு யாதெனின் வெஃகாமை", line2: "வேண்டும் பிறன்பொருள் குன்று.", eng: "What is the secret to keeping your own wealth from diminishing? Refrain from coveting even a tiny fraction of another's goods."},
{num: 179, line1: "அறனறிந்து வெஃகா அறிவுடையாரைச்", line2: "சேரன்மைகண்டு அல்லல் தரும்.", eng: "Fortune will seek out and favor the wise man who understands justice and refuses to covet another's wealth."},
{num: 180, line1: "இறல்ஈனும் எண்ணாது வெஃகின் விறல்ஈனும்", line2: "வேண்டாமை என்னுஞ் செருக்கு.", eng: "Blind covetousness leads to destruction; the noble pride that desires nothing from others leads to victory."},

{num: 181, line1: "அறம்கூறான் அல்ல செயினும் ஒருவன்", line2: "புறம்கூறான் என்றல் இனிது.", eng: "Though a man speaks no virtue and commits every evil, it is still good if he does not backbite behind another's back."},
{num: 182, line1: "அறனழீஇ அல்லவை செய்தலின் தீதே", line2: "புறனழீஇப் பொய்த்து நகை.", eng: "To slander a friend behind his back while smiling deceitfully before his face is worse than destroying virtue and committing sin."},
{num: 183, line1: "புறங்கூறிப் பொய்த்துயிர் வாழ்தலின் சாதல்", line2: "அறங்கூறும் ஆக்கந் தரும்.", eng: "It is better for a man to die than to live a life of falsehood and slander; death will yield him better rewards."},
{num: 184, line1: "கண்ணின்று கண்ணறச் சொல்லினும் சொல்லற்க", line2: "முன்னின்று பின்நோக்காச் சொல்.", eng: "Say the harshest things directly to a person's face if you must, but never utter slanderous words behind his back."},
{num: 185, line1: "அறஞ்சொல்லும் நெஞ்சத்தான் அல்லன் புறஞ்சொல்லும்", line2: "புன்மையாற் காணப் படும்.", eng: "A man's empty heart is revealed by his mean habit of slandering others, proving he has no love for virtue."},
{num: 186, line1: "பிறன்பழி கூறுவான் தன்குற்றம் உள்ளும்", line2: "திறன்தெரிந்து கூறப் படும்.", eng: "He who broadcasts the faults of others will find his own flaws searched out and exposed with equal severity."},
{num: 187, line1: "பகச்சொல்லிப் பாத்திருப் பாரோடு நகச்சொல்லி", line2: "நட்பாடல் தேற்றாதவர்.", eng: "Those who know not how to maintain friendship with sweet words will alienate friends by their divisive slanders."},
{num: 188, line1: "துன்னியார் குற்றமும் தூற்றும் மரபினார்", line2: "என்னை கொல் ஏதிலார் மாட்டு.", eng: "If a person exposes the flaws of his own close friends, what mercy will he show to the faults of strangers?"},
{num: 189, line1: "அறன்நோக்கி ஆற்றும் கொல் வையம் புறன்நோக்கிப்", line2: "புன்சொல் உரைப்பான் பொறை.", eng: "The earth must bear him out of sheer duty, else it would sink under the weight of one who slanders others behind their backs."},
{num: 190, line1: "ஏதிலார் குற்றம்போல் தங்குற்றங் காண்கிற்பின்", line2: "தீதுண்டோ மன்னும் உயிர்க்கு.", eng: "If men could see their own faults as clearly as they see the flaws of others, what evil could ever touch human life?"},

{num: 191, line1: "பல்லார் முனியப் பயனில சொல்லுவான்", line2: "எல்லாரும் எள்ளப் படும்.", eng: "He who utters profitless words to the disgust of a wise assembly will be despised by everyone."},
{num: 192, line1: "பயனில பல்லார்முன் சொல்லல் நயனில", line2: "நட்டார்கண் செய்தலின் தீது.", eng: "To utter useless words before a large gathering is worse than doing a great injury to your closest friends."},
{num: 193, line1: "நயனிலன் என்பது சொல்லும் பயனில", line2: "பாரித்துப் பேசும் உரை.", eng: "A man's long, empty speeches proclaim to the world that he is entirely devoid of worth and wisdom."},
{num: 194, line1: "நயன்சாரா நன்மையின் நீக்கும் பயன்சாராப்", line2: "பண்பில்சொல் பல்லார் அகத்து.", eng: "Useless and discourteous words spoken before a multitude rob a man of his dignity and drive him away from virtue."},
{num: 195, line1: "சீர்மை சிறப்பொடு நீங்கும் பயன்இல", line2: "நீர்மை உடையார் சொலின்.", eng: "If even noble men speak profitless words, their luster and high glory will vanish instantly."},
{num: 196, line1: "பயனில்சொல் பாராட்டு வானை மகன்எனல்", line2: "மக்களுள் பதடி எனல்.", eng: "Do not call him a man who repeats empty, profitless words; call him the chaff among human beings."},
{num: 197, line1: "நயனில சொல்லினும் சொல்லுக சான்றோர்", line2: "பயனில சொல்லாமை நன்று.", eng: "Let the wise say harsh things if they must, but it is always best if they refrain from uttering useless words."},
{num: 198, line1: "அரும்பயன் ஆயும் அறிவினார் சொல்லார்", line2: "பெரும்பயன் இல்லாத சொல்.", eng: "The wise who seek after rare and precious truths will never utter words that lack profound meaning."},
{num: 199, line1: "பொருள்தீர்ந்த பொச்சாந்தும் சொல்லார் மருள்தீர்ந்த", line2: "மாசறு காட்சி யவர்.", eng: "Those of pure, flawless vision will not speak empty words, even by an oversight or a slip of memory."},
{num: 200, line1: "சொல்லுக சொல்லின் பயனுடைய சொல்லற்க", line2: "சொல்லின் பயனிலாச் சொல்.", eng: "Speak only those words that bear useful fruit; never waste breath on words that are empty of meaning."},

{num: 201, line1: "தீவினையார் அஞ்சார் விழுமியார் அஞ்சுவர்", line2: "தீவினை என்னும் செருக்கு.", eng: "The arrogant do not fear the sin of evil deeds; but noble souls dread it as a deadly poison."},
{num: 202, line1: "தீயவை தீய பயத்தலால் தீயவை", line2: "தீயினும் அஞ்சப் படும்.", eng: "Since evil deeds breed only bitter misery, one must dread evil even more than fire itself."},
{num: 203, line1: "அறிவினுள் எல்லாந் தலையென்ப தீய", line2: "செறுவார்க்கும் செய்யா விடல்.", eng: "The highest of all wisdom is to refrain from doing evil, even to those who harm and hate you."},
{num: 204, line1: "மறந்தும் பிறன்கேடு சூழற்க சூழின்", line2: "அறஞ்சூழும் சூழ்ந்தவன் கேடு.", eng: "Never plot the ruin of another even by an oversight; if you plot, virtue will plot your own downfall."},
{num: 205, line1: "இலன்என்று தீயவை செய்யற்க செய்யின்", line2: "இலனாகும் மற்றும் பெயர்த்து.", eng: "Do not commit evil deeds pleading poverty; if you do, you will only plunge into deeper and more wretched want."},
{num: 206, line1: "தீப்பால தான்அஞ்சல் வேண்டுமால் அன்பாரைச்", line2: "சீறும்பால் தீவினைச் செருக்கு.", eng: "Let him who desires freedom from sorrow refrain from doing evil deeds against anyone."},
{num: 207, line1: "எனைப்பகை உற்றாரும் உய்வர் வினைப்பகை", line2: "வீயாது பின்சென்று அடும்.", eng: "A man may escape from every other enemy, but his own evil deeds will pursue him and strike him down relentlessly."},
{num: 208, line1: "தீயவை செய்தார் கெடுதல் நிழல்தன்னை", line2: "வீயாது அடிஉறைந் தற்று.", eng: "The ruin of those who commit evil deeds is as certain as their shadow that follows close at their heels."},
{num: 209, line1: "தன்னைத்தான் காதலன் ஆயின் எனைத்தொன்றும்", line2: "துன்னற்க தீவினைப் பால்.", eng: "If a man truly loves his own soul, let him not do the slightest evil against any living being."},
{num: 210, line1: "அருங்கேடன் என்பது அறிக மருங்கோடித்", line2: "தீவினை செய்யான் எனின்.", eng: "Know that he is safe from all destruction who does not stray into the path of committing evil deeds."},

{num: 211, line1: "கைம்மாறு வேண்டா கடப்பாடு மாரிமாட்டு", line2: "என்னாற்றுங் கொல்லோ உலகு.", eng: "Benevolence seeks no reward; what return does the earth make to the clouds that rain upon it?"},
{num: 212, line1: "தாளாற்றித் தந்த பொருள்எல்லாம் தக்கார்க்கு", line2: "வேளாண்மை செய்தற் பொருட்டு.", eng: "All the wealth earned by diligent labor is meant to be spent in rendering timely service to the deserving."},
{num: 213, line1: "புத்தேள் உலகத்தும் ஈண்டும் பெறலரிதே", line2: "ஒப்புரவின் நல்ல பிற.", eng: "Neither in heaven nor on earth is there a blessing greater than a life lived in benevolent harmony with society."},
{num: 214, line1: "ஒப்பி லறியவன் வாழ்பவன் வாழாதான்", line2: "செத்தாருள் வைக்கப் படும்.", eng: "He who knows his duty to society truly lives; he who knows it not must be counted among the dead."},
{num: 215, line1: "ஊருணி உலகியவாப் பேரறிவாளன் திரு", line2: "உலகவாம் பேரறி வாளன்.", eng: "The wealth of a wise and benevolent man is like a village water tank filled to the brim for all to share."},
{num: 216, line1: "பயன்மரம் உள்ளூர்ப் பழுத்தற்றால் செல்வம்", line2: "நயனுடையான் கண் படின்.", eng: "Wealth falling into the hands of a generous soul is like a fruit tree ripening in the middle of a village."},
{num: 217, line1: "மருந்தாகித் தப்பா மரத்தற்றால் செல்வம்", line2: "பெருந்தகை யான்கண் படின்.", eng: "The wealth of a noble-hearted person is like a healing tree whose leaves, bark, and roots cure every ailment."},
{num: 218, line1: "இடனில் பருவத்தும் ஒப்புரவிற்கு ஒல்கார்", line2: "கடனறி காட்சி யவர்.", eng: "Even when overtaken by poverty, those who know their duty to society do not shrink from benevolence."},
{num: 219, line1: "நயனுடையான் நல்கூர்ந்தான் ஆதல் செயும்நீர", line2: "செய்யாது அமைகலா வாறு.", eng: "The only sorrow an upright man feels in poverty is his inability to help those who cry out to him for aid."},
{num: 220, line1: "ஒப்புரவினால் வரும் கேடெனின் அஃதொருவன்", line2: "விற்றுக்கோள் தக்கது உடைத்து.", eng: "If ruin comes through social benevolence, that ruin is worth buying even by selling oneself into slavery."},

{num: 221, line1: "வரியார்க்கொன்று ஈவதே ஈகைமற்று எல்லாம்", line2: "குறிஎதிர்ப்பை நீர துடைத்து.", eng: "To give to the helpless poor is true charity; all other gifts are investments made for a return."},
{num: 222, line1: "நல்லாறு எனினும் கொளல்தீது மேலுலகம்", line2: "இல்லெனினும் ஈதலே நன்று.", eng: "To beg is bad even if it leads to heaven; to give is good even if there were no higher world to reward it."},
{num: 223, line1: "இலன்என்னும் எவ்வம் உரையாமை ஈதல்", line2: "குலனுடையான் கண்ணே உளது.", eng: "To give before the poor man can utter his plea is the hallmark of a man of noble birth."},
{num: 224, line1: "இன்னாது இரக்கப் படுதல் இரந்தவர்", line2: "இன்முகங் காணும் அளவு.", eng: "The sight of a beggar is painful until one sees his face light up with joy upon receiving a gift."},
{num: 225, line1: "ஆற்றுவார் ஆற்றல் பசிஆற்றல் அப்பசியை", line2: "மாற்றுவார் ஆற்றலின் பின்.", eng: "The power of ascetics to endure hunger is great; but it stands behind the power of those who wipe away the hunger of others."},
{num: 226, line1: "அற்றார் அழிபசி தீர்த்தல் அஃதொருவன்", line2: "பெற்றான் பொருள்வைப் புழி.", eng: "To satisfy the gnawing hunger of the destitute is the best way for a wealthy man to store up his riches safely."},
{num: 227, line1: "பாத்தூண் மரீஇயவனைப் பசிஎன்னும்", line2: "தீப்பிணி தீண்டல் அரிது.", eng: "The fiery disease called hunger will never touch the householder who is accustomed to sharing his food with others."},
{num: 228, line1: "ஈத்துவக்கும் இன்பம் அறியார்கொல் தாமுடைமை", line2: "வைத்திழக்கும் வன்கணா வர்.", eng: "Do they not know the joy of giving, those hard-hearted men who hoard their wealth only to lose it all in the end?"},
{num: 229, line1: "இரத்தலின் இன்னாது மன்ற நிரப்பிய", line2: "தாமே தமியர் உணல்.", eng: "To hoard one's food and eat it all alone in greed is far more wretched than begging from others."},
{num: 230, line1: "சாதலின் இன்னாதது இல்லை இனிததூஉம்", line2: "ஈதல் இயையாக் கடை.", eng: "There is nothing more painful than death; yet even death becomes sweet if one is unable to give to the poor."},

{num: 231, line1: "ஈதல் இசைபட வாழ்தல் அதுவல்லது", line2: "ஊதியம் இல்லை உயிர்க்கு.", eng: "Give to the poor and live with glory; there is no greater gain than this for human life."},
{num: 232, line1: "உரைப்பார் உரைப்பவை எல்லாம் இரப்பார்க்கொன்று", line2: "ஈவார்மேல் நிற்கும் புகழ்.", eng: "Whatever praises are spoken on earth, they all belong to those who give charity to the pleading poor."},
{num: 233, line1: "ஒன்றா உலகத்து உயர்ந்த புகழல்லால்", line2: "பொன்றாது நிற்பதொன்று இல்.", eng: "Save for sublime and exalted glory, nothing else on this earth can endure forever without fading away."},
{num: 234, line1: "நிலவரை நீள்புகழ் ஆற்றின் புலவரைப்", line2: "போற்றாது புத்தேள் உலகு.", eng: "If a man wins lasting glory on this earth, the heavenly realm will cease praising its own sages to praise him."},
{num: 235, line1: "நத்தம்போல் கேடும் உளதாகும் சாக்காடும்", line2: "வித்தகர்க்கு அல்லால் அரிது.", eng: "Loss that yields prosperity and death that brings undying glory are achieved only by the truly wise."},
{num: 236, line1: "தோன்றின் புகழோடு தோன்றுக அஃதிலார்", line2: "தோன்றலின் தோன்றாமை நன்று.", eng: "If you are born into public life, shine with glory; else it is better not to appear on earth at all."},
{num: 237, line1: "புகழ்பட வாழாதார் தம்நோவார் தம்மை", line2: "இகழ்வாரை நோவது எவன்.", eng: "Those who do not live so as to win glory blame those who despise them; why do they not blame their own lack of virtue?"},
{num: 238, line1: "வசைஎன்ப வையத்தார்க் கெல்லாம் இசைஎன்னும்", line2: "எச்சம் பெறாஅ விடின்.", eng: "To leave behind no legacy of glory is considered a shameful disgrace for all men on earth."},
{num: 239, line1: "வசைஇலா வண்பயன் குன்றும் இசைஇலா", line2: "யாக்கை பொறுத்த நிலம்.", eng: "The very earth will diminish in its rich yield if it must bear the heavy weight of bodies devoid of glory."},
{num: 240, line1: "வசைஒழிய வாழ்வாரே வாழ்வார் இசைஒழிய", line2: "வாழ்வாரே வாழா தவர்.", eng: "Those who live free from blame are the ones who truly live; those who live without glory are counted among the dead."},

{num: 241, line1: "அருட்செல்வம் செல்வத்துள் செல்வம் பொருட்செல்வம்", line2: "பூரியார் கண்ணும் உள.", eng: "The wealth of compassion is the highest of all wealth; material wealth can be found even among the basest of men."},
{num: 242, line1: "நல்லாற்றான் நாடி அருளாள்க பல்லாற்றான்", line2: "தேரினும் அஃதே துணை.", eng: "Seek out the good path and cultivate compassion; though you examine all other ways, this remains your ultimate refuge."},
{num: 243, line1: "அருள்சேர்ந்த நெஞ்சினார்க் கில்லை இருள்சேர்ந்த", line2: "இன்னா உலகம் புகல்.", eng: "Those whose hearts are filled with compassion will never enter the dark world of misery and sorrow."},
{num: 244, line1: "மன்னுயிர் ஓம்பி அருளாள்வாற்கு இல்லென்ப", line2: "தன்னுயிர் அஞ்சும் வினை.", eng: "They say that those who guard all living creatures with compassion will never face the terrifying consequences of sin."},
{num: 245, line1: "அல்லல் அருளாள்வார்க்கு இல்லை வையகம்", line2: "மல்லல்மா ஞாலம் கரி.", eng: "Sorrow never touches those who treat others with compassion; this prosperous and vast earth is witness to this truth."},
{num: 246, line1: "பொருள்நீங்கிப் பொச்சாந்தார் என்பர் அருள்நீங்கி", line2: "அல்லவை செய்தொழுகு வார்.", eng: "Those who cast away compassion and commit cruel deeds have forgotten the very purpose of their existence."},
{num: 247, line1: "அருளிலார்க்கு அவ்வுலகம் இல்லை பொருளிலார்க்கு", line2: "இவ்வுலகம் இல்லாகி யாங்கு.", eng: "Just as this world is denied to those who have no wealth, the spiritual world is denied to those who have no compassion."},
{num: 248, line1: "பொருளற்றார் பூப்பர் ஒருகால் அருளற்றார்", line2: "அற்றார்மற்று ஆவதறிது.", eng: "Those who lose their material wealth may prosper once again; but those who lose compassion are utterly ruined forever."},
{num: 249, line1: "தெருளாதான் மெய்ப்பொருள் கண்டற்றால் தேரின்", line2: "அருளாதான் செய்யும் அறம்.", eng: "The virtuous deeds performed by a man without compassion are as worthless as a confused mind attempting to grasp supreme truth."},
{num: 250, line1: "வலியார்முன் தன்னை நினைக்கத்தான் தன்னின்", line2: "மெலியார்மேல் செல்லும் இடத்து.", eng: "When a man is about to oppress those who are weaker than himself, let him remember how he trembles before those who are stronger."},

{num: 251, line1: "தன்னூன் பெருக்கற்குக் தான்பிறிதூன் உண்பான்", line2: "எங்ஙனம் ஆளும் அருள்.", eng: "How can he possess compassion, who eats the flesh of other creatures to fatten his own flesh?"},
{num: 252, line1: "பொருளாட்சி போற்றாதார்க்கு இல்லை அருளாட்சி", line2: "ஆங்கில்லை ஊன்தின் பவர்க்கு.", eng: "Just as wealth cannot be managed by the careless, the kingdom of compassion cannot be entered by those who eat meat."},
{num: 253, line1: "படைப்பொருள் வைத்தாற்போல் நெஞ்சம்நெடிது ஊன்றின்", line2: "உண்பான்மற்று ஆவதறிது.", eng: "Like a man holding a weapon with intent to kill, the mind of one who loves the taste of flesh can never practice true grace."},
{num: 254, line1: "அருளல்லது யாதெனில் கொல்லாமை கோறல்", line2: "பொருளல்லது அவ்வூன் தினல்.", eng: "What is compassion? It is the refusal to kill. What is sin? It is killing, and eating that flesh is the ultimate consequence."},
{num: 255, line1: "உண்ணாமை வேண்டும் புலாஅல் பிறிதொன்றன்", line2: "புண்ணது உணர்வார்ப் பெறின்.", eng: "Refrain from eating meat when you realize that flesh is nothing but the unsightly wound of another living being."},
{num: 256, line1: "தினற்பொருட்டால் கொல்லாது உலகெனின் யாரும்", line2: "விலைப்பொருட்டால் ஊன்தருவார் இல்.", eng: "If the world refuses to eat flesh for the sake of taste, no one would kill animals to sell meat for profit."},
{num: 257, line1: "உண்ணாமை வேண்டும் புலாஅல் பிறிதொன்றன்", line2: "புண்ணின் புலாஅல் உணர் வார்ப்பெறின்.", eng: "Let men abstain from meat once they perceive that it is the dead tissue torn from a living body."},
{num: 258, line1: "செயிரின் தலைப்பிரிந்த காட்சியார் உண்ணார்", line2: "உயிரின் தலைப்பிரிந்த ஊன்.", eng: "Those whose minds are completely free from delusion will never consume the meat that has been severed from a living being."},
{num: 259, line1: "அவிசொரிந்து ஆயிரம் வேட்டலின் ஒன்றன்", line2: "உயிர்செகுத்து உண்ணாமை நன்று.", eng: "Refraining from killing a creature and eating its flesh is far better than offering a thousand sacrifices in sacred fires."},
{num: 260, line1: "கொல்லான் புலாலை மறுத்தானைக் கைகூப்பி", line2: "எல்லா உயிரும் தொழும்.", eng: "All living creatures will join their hands in reverent worship before the one who does not kill and rejects flesh."},

{num: 261, line1: "உற்றநோய் நோற்றல் உயிர்க்குறுகண் செய்யாமை", line2: "அற்றே தவத்திற்கு உரு.", eng: "To patiently endure the suffering that comes upon oneself, and to do no harm to any living soul—this is the true form of penance."},
{num: 262, line1: "தவமும் தவமுடையார்க்கு ஆகும் அவம்அதனை", line2: "அஃதிலார் மேற்கொள் வது.", eng: "Austerity belongs only to those who are disciplined in spirit; it is completely futile for the undisciplined to attempt it."},
{num: 263, line1: "துறந்தார்க்குத் துப்புரவு வேண்டி மறந்தார்கொல்", line2: "மற்றை யவர்கள் தவம்.", eng: "Have others forgotten penance because they are too busy providing food and comforts for those who have renounced the world?"},
{num: 264, line1: "ஒன்னார்த் தெறலும் உவந்தாரை ஆக்கலும்", line2: "எண்ணின் தவத்தான் வரும்.", eng: "The power to crush enemies and elevate loved ones comes naturally to those who have mastered severe penance."},
{num: 265, line1: "வேண்டிய வேண்டியாங்கு எய்தலால் செய்தவம்", line2: "ஈண்டு முயலப் படும்.", eng: "Because penance allows one to attain exactly what is desired, it ought to be practiced diligently in this life."},
{num: 266, line1: "தவம்செய்வார் தம்கருமம் செய்வார்மற்று அல்லார்", line2: "அவம்செய்வார் ஆசையுள் பட்டு.", eng: "Those who practice austerity are doing their true duty; all others waste their lives caught in the net of desires."},
{num: 267, line1: "சுடச்சுடரும் பொன்போல் ஒளிவிடும் துன்பம்", line2: "சுடச்சுட நோற்கிற் பவர்க்கு.", eng: "Just as gold shines brighter the more it is melted in fire, so the spirit shines purer the more it endures the heat of suffering."},
{num: 268, line1: "தன்னுயிர் தான்அறப் பெற்றானை ஏனைய", line2: "மன்னுயிர் எல்லாம் தொழும்.", eng: "He who has completely mastered his own soul through austerity will be reverently worshipped by all other living beings."},
{num: 269, line1: "கூற்றம் குதித்தலும் கைகூடும் நோற்றலின்", line2: "ஆற்றல் தலைப்பட் டவர்க்கு.", eng: "Even the power to conquer death itself is within the grasp of those who have reached the pinnacle of penance."},
{num: 270, line1: "இலர் பலர் ஆகிய காரணம் நோற்பார்", line2: "சிலர் பலர் நோலா தவர்.", eng: "The reason the destitute are many and the prosperous are few is that the former do no penance while the latter do."},

{num: 271, line1: "வஞ்ச மனத்தான் படிற்றுஒழுக்கம் பூதங்கள்", line2: "ஐந்தும் அகத்தே நகும்.", eng: "The five natural elements within the body will laugh in derision at the false conduct of a deceitful mind."},
{num: 272, line1: "வானுயர் தோற்றம் எவன்செய்யும் தன்னெஞ்சம்", line2: "தானறி குற்றப் படின்.", eng: "Of what use is a towering ascetic appearance if a man's own conscience is fully aware of his hidden sins?"},
{num: 273, line1: "வலியில் நிலைமையான் வல்லுருவம் பெற்றம்", line2: "புலியின்தோல் போர்த்துமேய்ந் தற்று.", eng: "An unholy man masquerading under a holy appearance is like a cow grazing on crops while covered in a tiger's skin."},
{num: 274, line1: "தவமறைந்து அல்லவை செய்தல் புதல்மறைந்து", line2: "வேட்டுவன் புள்சிமிழ்த் தற்று.", eng: "To commit sins under the guise of piety is like a hunter hiding in the bushes to trap innocent birds."},
{num: 275, line1: "பற்றற்றேம் என்பார் படிற்றுஒழுக்கம் எற்றெற்றென்று", line2: "ஏதம் பலவும் தரும்.", eng: "The false conduct of those who falsely claim, 'We have renounced all,' will plunge them into endless and agonizing miseries."},
{num: 276, line1: "நெஞ்சின் துறவார் துறந்தார்போல் வஞ்சித்து", line2: "வாழ்வாரின் வன்கணார் இல்.", eng: "There are none more cold-hearted than those who do not renounce desires in the heart, yet live by deceiving others with an ascetic appearance."},
{num: 277, line1: "புறம்குன்றி கண்டனையர் ஆயினும் எம்போல்", line2: "அகம்குன்றி மூக்கின் கரியார் உடைத்து.", eng: "There are men who look as bright red as a Kunri berry on the outside, yet are as pitch-black at heart as the berry's tip."},
{num: 278, line1: "மனத்தது மாசாக மாண்டார்நீர் ஆடிக்", line2: "மறைந்தொழுகு மாந்தர் பலர்.", eng: "Many are the hypocrites who bathe in holy waters to wash their bodies while keeping their minds completely stained with vice."},
{num: 279, line1: "கணைகொடிது யாழ்கோடு செவ்விதாங் கன்ன", line2: "வினைபடு பாலால் கொளல்.", eng: "The arrow is straight but deadly; the lute is curved but plays sweet music. Judge men by their actions, not by their outward appearances."},
{num: 280, line1: "மழித்தலும் நீட்டலும் வேண்டா உலகம்", line2: "பழித்தது ஒழித்து விடின்.", eng: "There is no need for a shaven head or long matted locks, provided you abstain from that which the world condemns as sinful."},

{num: 281, line1: "எள்ளாமை வேண்டுவான் என்பான் எனைத்தொன்றும்", line2: "கள்ளாமை காக்கதன் நெஞ்சு.", eng: "Let him who desires to live free from contempt guard his mind against the slightest thought of stealing another's goods."},
{num: 282, line1: "உள்ளத்தால் உள்ளலும் தீதே பிறன்பொருளைக்", line2: "கள்ளத்தால் கள்வேம் எனல்.", eng: "Even to covet another's property in the secrecy of the mind, thinking 'I will steal it,' is itself a grievous sin."},
{num: 283, line1: "களவினால் ஆகிய ஆக்கம் அளவிறந்து", line2: "ஆவது போலக் கெடும்.", eng: "The wealth acquired through theft may seem to grow rapidly, but it will vanish completely into utter ruin."},
{num: 284, line1: "களவின்கண் கன்றிய காதல் விளைவின்கண்", line2: "வீயா விழுமம் தரும்.", eng: "The insatiable desire for theft will yield nothing but endless and undying sorrow when the harvest time arrives."},
{num: 285, line1: "அருள்கருதி அன்புடையர் ஆதல் பொருள்கருதிப்", line2: "பொச்சாந்துஞ் செய்பவோ களவு.", eng: "Can those who seek spiritual grace and live with love in their hearts ever think of stealing for the sake of material wealth?"},
{num: 286, line1: "அளவின்கண் நின்றுஒழுகல் ஆற்றார் களவின்கண்", line2: "கன்றிய காத லவர்.", eng: "Those who are obsessed with theft can never walk in the balanced path of virtue or live according to righteousness."},
{num: 287, line1: "களவென்னும் காரறிவாண்மை புலம்என்னும்", line2: "போற்றாமை புன்மை தெரிந்து.", eng: "The dark, ignoble art of theft is never practiced by those who possess clear, flawless wisdom."},
{num: 288, line1: "அளவறிந்தார் நெஞ்சத்து அறம்போல நிற்குங்", line2: "களவறிந்தார் நெஞ்சில் கரவு.", eng: "Just as virtue resides permanently in the hearts of the righteous, deceit resides in the hearts of those who practice theft."},
{num: 289, line1: "அளவல்ல செய்தாங்கே வீவர் களவல்ல", line2: "மற்றேதும் தேற்றா தவர்.", eng: "Those who know nothing but theft will instantly perish when they attempt their unjust deeds."},
{num: 290, line1: "ஐந்தொன்றிச் சாவாரும் சாவார் களவொன்றிப்", line2: "பொய்ம்மறைந்து ஒழுகு வார்.", eng: "The soul may leave the body in death, but those who live by theft and falsehood are dead even while they walk the earth."},

{num: 291, line1: "வாய்மை எனப்படுவது யாதெனின் யாதொன்றும்", line2: "தீமை இலாத சொலல்.", eng: "What is called truthfulness? It is speech that is completely free from even the slightest harm to any living creature."},
{num: 292, line1: "பொய்ம்மையும் வாய்மை இடத்த புரைதீர்ந்த", line2: "நன்மை பயக்கும் எனின்.", eng: "Even a falsehood can take the place of truth if it results in pure and unblemished good to others."},
{num: 293, line1: "தன்நெஞ்சு அறிவது பொய்யற்க பொய்த்தபின்", line2: "தன்நெஞ்சே தன்னைச் சுடும்.", eng: "Never speak a lie against your own conscience; if you do, your own conscience will burn you with remorse."},
{num: 294, line1: "உள்ளத்தால் பொய்யாது ஒழுகின் உலகத்தார்", line2: "உள்ளத்துள் எல்லாம் உளன்.", eng: "He who lives without ever deceiving his own heart resides permanently in the hearts of all mankind."},
{num: 295, line1: "மனத்தொடு வாய்மை மொழியின் தவத்தொடு", line2: "தானஞ்செய் வாரின் தலை.", eng: "To speak the truth from the depth of the heart is greater than performing severe penance and giving boundless charity."},
{num: 296, line1: "பொய்யாமை அன்ன புகழில்லை எய்யாமை", line2: "எல்லா அறமும் தரும்.", eng: "There is no glory greater than refraining from falsehood; it yields every other virtue effortlessly."},
{num: 297, line1: "பொய்யாமை பொய்யாமை ஆற்றின் அறம்பிற", line2: "செய்யாமை செய்யாமை நன்று.", eng: "If you practice the single virtue of never lying, you need not practice any other code of virtue."},
{num: 298, line1: "புறந்தூய்மை நீரான் அமையும் அகந்தூய்மை", line2: "வாய்மையால் காணப் படும்.", eng: "External cleanliness is achieved by washing with water; internal purity is revealed only through truthfulness."},
{num: 299, line1: "எல்லா விளக்கும் விளக்கல்ல சான்றோர்க்குப்", line2: "பொய்யா விளக்கே விளக்கு.", eng: "All outward lamps are not true lamps; to the wise, the unblinking lamp of truth is the only true light."},
{num: 300, line1: "யாமெய்யாக் கண்டவற்றுள் இல்லை எனைத்தொன்றும்", line2: "வாய்மையின் நல்ல பிற.", eng: "Among all the truths we have searched out and verified, we know of none greater than the virtue of truthfulness."},

{num: 301, line1: "செல்லா இடத்துச் சினம் காப்பான் சினம்காப்பான்", line2: "செல்லா இடத்துஇல் எவன்.", eng: "He who controls his anger where it could do harm is a true master; of what use is control where it can harm no one?"},
{num: 302, line1: "செல்லா இடத்துச் சினம்தீது செல்லா", line2: "இடத்தும் அதனின் தீதுஇல்.", eng: "Anger is harmful where your power fails; but where your power prevails, it is worse, for it brings ultimate ruin."},
{num: 303, line1: "மறத்தல் வெகுளியை யார்மாட்டும் தீய", line2: "பிறப்பால் விளைந்து விடும்.", eng: "Forget anger toward everyone, for endless evils flow from a single moment of rage."},
{num: 304, line1: "நகையும் உவகையும் கொல்லும் சினத்தின்", line2: "பகையும் உளவோ பிற.", eng: "Anger kills both the pleasant smile and natural joy; is there any enemy more deadly than one's own rage?"},
{num: 305, line1: "தன்னைத்தான் காக்கின் சினம்காக்க காவாக்கால்", line2: "தன்னையே கொல்லும் சினம்.", eng: "If a man desires to protect himself, let him control his anger; if he fails, his anger will destroy him."},
{num: 306, line1: "சினமென்னும் சேர்ந்தாரைக் கொல்லி இனமென்னும்", line2: "ஏமப் புணையைச் சுடும்.", eng: "The fire of anger destroys the one who harbors it, and burns up the protective raft of his friends and family."},
{num: 307, line1: "சினத்தைப் பொருளென்று கொண்டாரும் கேடு", line2: "நிலத்தறைந்தான் கைபிழையா தற்று.", eng: "The ruin of the man who treasures his anger is as certain as the pain of one who strikes the ground with his bare hand."},
{num: 308, line1: "இணரெரி தோய்வன்ன இன்னா செயினும்", line2: "புணரின் வெகுளாமை நன்று.", eng: "Though someone does you a wrong as agonizing as a raging fire, it is best if you refrain from anger."},
{num: 309, line1: "உள்ளியதெல்லாம் உடனெய்தும் உள்ளத்தால்", line2: "உள்ளான் வெகுளி எனின்.", eng: "If a man keeps his mind completely free from anger, everything he wishes for can be attained instantly."},
{num: 310, line1: "இறந்தார் இறந்தார் அணையர் சினத்தைத்", line2: "துறந்தார் துறந்தார் அணைத்து.", eng: "Those who are consumed by anger are like the dead; those who have completely renounced it are like immortal sages."},

{num: 311, line1: "சிறப்பீனும் செல்வம் பெறினும் பிறர்க்குஇன்னா", line2: "செய்யாமை மாசற்றார் கோள்.", eng: "Even if it would yield supreme wealth and glory, it is the rule of the pure never to cause pain to others."},
{num: 312, line1: "கறுத்தின்னா செய்தவக் கண்ணும் மறுத்தின்னா", line2: "செய்யாமை மாசற்றார் கோள்.", eng: "Even when others wrong them out of deep hatred, the pure-hearted return no injury in response."},
{num: 313, line1: "செய்யாமல் செற்றார்க்கும் இன்னாத செய்தபின்", line2: "உய்யா விழுமம் தரும்.", eng: "If you cause injury even to those who wronged you unprovoked, it will bring unescapable and deep sorrow."},
{num: 314, line1: "இன்னாசெய் தாரை ஒறுத்தல் அவர்நாண", line2: "நன்னயம் செய்து விடல்.", eng: "The finest way to punish those who have wronged you is to shame them by doing them a beautiful, loving kindness."},
{num: 315, line1: "அறிவினால் ஆகுவது உண்டோ பிறிதின்நோய்", line2: "தன்நோய்போல் போற்றாக் கடை.", eng: "Of what use is human wisdom if one does not feel the pain of another creature as intimately as one's own?"},
{num: 316, line1: "இன்னா எனத்தான் அறிந்தவை துன்னாற்க", line2: "இனியாரும் யார்மாட்டும் ஞான்று.", eng: "What a man knows will cause pain to himself, let him never inflict upon any other soul at any time."},
{num: 317, line1: "எனைத்தானும் எஞ்ஞான்றும் யார்க்கும் மனத்தானாம்", line2: "மாணாசெய் யாமை தலை.", eng: "The highest virtue is to consciously refrain from causing even the smallest injury to any living being."},
{num: 318, line1: "தன்னுயிர்க்கு இன்னாமை தான்அறிவான் என்கொலோ", line2: "மன்னுயிர்க்கு இன்னா செயல்.", eng: "Why does a man inflict suffering upon other creatures when he knows firsthand the agony of his own pain?"},
{num: 319, line1: "இன்னாசெய் தார்க்கு இன்னா முற்பகல் செய்யின்", line2: "பிற்பகல் தாமே வரும்.", eng: "If a man inflicts injury upon others in the morning, sorrow will come visiting him uninvited in the afternoon."},
{num: 320, line1: "நோய்எல்லாம் நோய்செய்தார் மேலவாம் நோய்செய்யார்", line2: "நோயின்மை வேண்டு பவர்.", eng: "All miseries return to strike those who caused them; therefore, those who desire a life free from pain do no harm to others."},

{num: 321, line1: "அறவினை யாதுஎனின் கொல்லாமை கோறல்", line2: "அறவினை எல்லாம் தரும்.", eng: "What is the ultimate virtue? It is non-killing; for killing brings every other sin in its wake."},
{num: 322, line1: "பகுத்துண்டு பல்லுயிர் ஓம்புதல் நூலோர்", line2: "தொகுத்தவற்றுள் எல்லாம் தலை.", eng: "To share your food and protect all living creatures is the crown of all virtues compiled by ancient sages."},
{num: 323, line1: "கொல்லாமை தனித்து அறம்இனிது ஆயினும்", line2: "அஃதிலார் மேற்கொள் வது.", eng: "Non-killing is uniquely excellent; next stands the virtue of those who speak nothing but truth."},
{num: 324, line1: "நல்லாறு எனப்படுவது யாதெனின் யாதொன்றும்", line2: "கொல்லாமை சூழும் நெறி.", eng: "What is the best path to walk? It is the path that carefully plans never to take the life of any creature."},
{num: 325, line1: "நிலைஅஞ்சி நீத்தாருள் எல்லாம் கொலைஅஞ்சிக்", line2: "கொல்லாமை சூழ்வான் தலை.", eng: "Foremost among all who have renounced the world out of fear of rebirth is he who dreads the sin of killing."},
{num: 326, line1: "கொலைவினையார் ஆகாது உயிர்மேல் கூற்றுயிரை", line2: "உண்ணும் நிலைமை யவர்.", eng: "The destructive life of one who kills is cut short by death, for he becomes the victim of his own cruelty."},
{num: 327, line1: "தன்னுயிர் நீப்பினும் செய்யற்க தான்பிறிது", line2: "இன்னுயிர் நீக்கும் வினை.", eng: "Even if your own life is at stake, do not commit the sin of taking the precious life of another creature."},
{num: 328, line1: "நன்றாகும் ஆக்கம் பெரிதெனினும் சான்றோர்க்குக்", line2: "கொன்றாகும் ஆக்கம் கடை.", eng: "Though the gain from a sacrifice be immense, the wise look upon wealth acquired by killing as utterly base."},
{num: 329, line1: "கொலைவினையர் ஆகிய மாந்தர் புலைவினையர்", line2: "புன்மை தெரிவா ரகத்து.", eng: "Those who live by killing are regarded as outcasts by the wise who understand the gravity of taking a life."},
{num: 330, line1: "உயிர்உடம்பின் நீக்கியார் என்பர் செயிர்உடம்பின்", line2: "செல்லாத் தீப்பிணி யவர்.", eng: "Those who suffer from agonizing diseases are said to be experiencing the recoil of having torn souls from bodies in the past."},

{num: 331, line1: "இல்லாரை எல்லாரும் எள்ளுவர் செல்வரை", line2: "எல்லாரும் செய்வர் சிறப்பு.", eng: "To mistake transient things for permanent realities is the height of human ignorance and delusion."},
{num: 332, line1: "அளவறிந்து வாழாதான் வாழ்க்கை உளபோலத்", line2: "தோன்றி கெடும்.", eng: "The gathering of great wealth is like the crowding of an audience at a drama; its dispersion is like the empty theatre when the show ends."},
{num: 333, line1: "அற்கா இயல்பிற்று செல்வம் அதுபெற்றால்", line2: "அற்குப ஆங்கே செயல்.", eng: "Wealth is entirely transient by nature; if you acquire it, perform lasting deeds of virtue immediately while it remains."},
{num: 334, line1: "நாளென ஒன்றுபோல் காட்டி உயிர்ஈரும்", line2: "வாளதிது உணர்வார்ப் பெறின்.", eng: "Time appears to be a harmless sequence of days, but to the wise, it is a sharp saw that continuously cuts away life."},
{num: 335, line1: "நாச்செற்று விக்குமுன் நல்வினை மேற்செய்வ", line2: "கூற்றுவருங் கால்.", eng: "Perform noble deeds before your tongue falters and death arrives to seal your final breath."},
{num: 336, line1: "நெருநல் உளன்ஒருவன் இன்றுஇல்லை என்னும்", line2: "பெருமை உடைத்திவ் வுலகு.", eng: "The unique greatness of this world is that a man who was alive yesterday is gone and no more today."},
{num: 337, line1: "ஒருபொழுதும் வாழ்வது அறியார் கருதுப", line2: "கோடியும் அல்ல பல.", eng: "Men who do not even know if they will survive the next moment scheme a million futile plans."},
{num: 338, line1: "குடம்பை தனித்தொழியப் புள்பறந் தற்றே", line2: "உடம்போடு உயிரிடை நட்பு.", eng: "The relationship between the soul and the body is like a bird that flies away, leaving its broken shell behind."},
{num: 339, line1: "உறங்குவது போலும் சாக்காடு உறங்கி", line2: "விழிப்பது போலும் பிறப்பு.", eng: "Death is nothing but a deep, long sleep; birth is nothing but the awakening from that sleep."},
{num: 340, line1: "புக்கில் அமைந்தொன்று இலாத உயிர்க்கு", line2: "உடம்பில் நிலைமை யெவன்.", eng: "The soul has no permanent dwelling of its own; it is a wonder that it chooses to linger in this fragile body for so long."},

{num: 341, line1: "யாதனின் யாதனின் நீங்கியான் நோதல்", line2: "அதனின் அதனின் இலன்.", eng: "From whatever object a man detaches himself, from the sorrow of that very thing he is completely freed."},
{num: 342, line1: "வேண்டின் உணாஅகத் துறக்க துறந்தபின்", line2: "ஈண்டிய இயற்கை தரும்.", eng: "If you desire supreme bliss, renounce all pleasures; once renounced, multiple glorious rewards will follow."},
{num: 343, line1: "அடல்வேண்டும் ஐந்தன் புலத்தை விடல்வேண்டும்", line2: "அவற்றின் கண் உற்றான் துணிவு.", eng: "Conquer the five senses and cast away all attachments; this is the true resolution of a seeker."},
{num: 344, line1: "இயல்புடைய மூவர்க்கும் நல்லாற்றின் நின்ற", line2: "துணைஎன்ப தூயவன் கோள்.", eng: "To possess absolutely nothing is the rule of the ascetic; even a single attachment brings him back into bondage."},
{num: 345, line1: "மற்றும்தொடர்பாடு எவன்கொல் பிறப்பறுக்கல்", line2: "உற்றார்க்கு உடம்பும் மிகை.", eng: "For those who strive to sever the wheel of birth, even the maintenance of the body is felt to be a burden."},
{num: 346, line1: "யான்எனது என்னும் செருக்குஅறுப்பான் வானோர்க்கு", line2: "உயர்ந்த உலகம் புகும்.", eng: "He who completely uproots the twin pride of 'I' and 'Mine' will enter a spiritual realm far above the heavens."},
{num: 347, line1: "பற்றி விடாஅ இடும்பைகள் பற்றினைப்", line2: "பற்றி விடாஅ தவர்க்கு.", eng: "Sorrow will hold on tight and never release those who refuse to let go of their worldly attachments."},
{num: 348, line1: "தலைப்பட்டார் தீரத் துறந்தார் மயங்கி", line2: "வலைப்பட்டார் மற்றை யவர்.", eng: "Those who completely renounce all are liberated; all others remain entangled in the deceptive net of illusion."},
{num: 349, line1: "பற்றற்ற கண்ணே பிறப்பறுக்கும் மற்றுப்", line2: "பற்றின் உவற்பாற் றன்று.", eng: "The moment all attachments are severed, rebirth is broken; until then, one must continue to wander through unstable existence."},
{num: 350, line1: "பற்றுக பற்றற்றான் பற்றினை அப்பற்றைப்", line2: "பற்றுக பற்று விடற்கு.", eng: "Cling closely to the One who is free from all attachment; hold onto that attachment so that you may release your grip on all else."},

{num: 351, line1: "பொருளல்ல வற்றைப் பொருளென்று உணரும்", line2: "மருளானாம் மாணாப் பிறப்பு.", eng: "The delusion that mistakes unreal things for the ultimate reality leads to the misery of low and endless births."},
{num: 352, line1: "இருள்நீங்கி இன்பம் பயக்கும் மருள்நீங்கி", line2: "மாசறு காட்சி யவர்க்கு.", eng: "Darkness vanishes and eternal joy arrives for those who have cleared away delusion and attained flawless vision."},
{num: 353, line1: "ஐயத்தின் நீங்கித் தெளிந்தார் நெஞ்சத்து", line2: "வையத்தின் வானம் நணித்து.", eng: "To those who have cleared away all doubt and attained realization, heaven is closer than the earth itself."},
{num: 354, line1: "ஐயுணர்வு எய்தியக் கண்ணும் பயன்றின்றே", line2: "மெய்யுணர்வு இல்லாத வர்க்கு.", eng: "Though a man has mastered all his five senses, it profits him nothing if he lacks the supreme realization of truth."},
{num: 355, line1: "எப்பொருள் எத்தன்மைத் தாயினும் அப்பொருள்", line2: "மெய்ப்பொருள் காண்பது அறிவு.", eng: "Whatever thing it may be, and whatever its outward appearance, wisdom lies in seeing the core truth hidden within it."},
{num: 356, line1: "கற்றுஈண்டு மெய்ப்பொருள் கண்டார் தலைப்படுவர்", line2: "மற்றுஈண்டு வாரா நெறி.", eng: "Those who have thoroughly studied and realized the supreme reality will enter the path that never returns to rebirth."},
{num: 357, line1: "ஓர்த்துள்ளம் உள்ளவாறு உணரின் ஒருதலையா", line2: "பேர்த்துள்ள வேண்டா பிறப்பு.", eng: "If the mind examines and realizes the absolute truth, it needs to think no more of recurring births."},
{num: 358, line1: "பிறப்பென்னும் பேதைமை நீங்கச் சிறப்பென்னும்", line2: "செம்பொருள் காண்பது அறிவு.", eng: "To dispel the ignorance of recurring births, wisdom commands us to look upon the absolute, unchanging reality."},
{num: 359, line1: "சார்புணர்ந்து சார்பு கெடஒழுகின் மற்றும்கண்", line2: "சார்புராச் சார்கெடும் நோய்.", eng: "Realize your true support so that all dependencies vanish; if you live thus, the affliction of rebirth will never touch you again."},
{num: 360, line1: "காமம் வெகுளி மயக்கம் இவைமூன்றின்", line2: "நாமம் கெடக்கெடும் நோய்.", eng: "When desire, anger, and delusion—these three vices—are destroyed even by name, all suffering perishes instantly."},

{num: 361, line1: "அவாஎன்ப எல்லா உயிர்க்கும் எஞ்ஞான்றும்", line2: "தவாஅப் பிறப்பீனும் வித்து.", eng: "Desire is declared by the wise to be the undying seed that yields recurring births to all living souls through time."},
{num: 362, line1: "வேண்டுங்கால் வேண்டும் பிறவாமை அஃதொன்றன்", line2: "வேண்டாமை வேண்ட வரும்.", eng: "If you must desire anything, desire freedom from rebirth; that freedom is won by desiring absolutely nothing else."},
{num: 363, line1: "வேண்டாமை அன்ன விழுச்செல்வம் ஈண்டில்லை", line2: "ஆண்டும் அஃதொப்பது இல்.", eng: "There is no treasure on earth greater than a desireless heart; even in the heavenly realm, there is nothing equal to it."},
{num: 364, line1: "தூய்மை என்பது அவாவின்மை அஃதுஉண்மையின்", line2: "வாய்மை வேண்ட வரும்.", eng: "True purity is nothing but freedom from desire; that sublime state is attained by seeking after absolute truth."},
{num: 365, line1: "அற்றவர் என்பார் அவாஅற்றார் மற்றையார்", line2: "அற்றிலர் ஆதலால் இல்.", eng: "Those who are truly liberated are those who are free from desire; all others remain bound, no matter what they claim."},
{num: 366, line1: "அஞ்சுவது ஓம்பல் அறிவார் நெஞ்சத்து", line2: "அஞ்சாமை அஃதிலார் கண்.", eng: "Desire deceives a man and plunges him into sin; dread it, for it is the ultimate enemy of a wise soul."},
{num: 367, line1: "இன்பம் இடையறாது ஈண்டும் அவாவென்னும்", line2: "துன்பத்துள் துன்பம் கெடின்.", eng: "Eternal, uninterrupted joy will fill the heart once the supreme misery called desire is entirely destroyed."},
{num: 368, line1: "அவாவில்லார்க்கு இல்லாகும் துன்பம் அஃதுண்டேல்", line2: "தவாஅமை ஞான்று வரும்.", eng: "Sorrow never visits those who are free from desire; but where desire dwells, endless miseries follow close behind."},
{num: 369, line1: "அவாஅற்ற கண்நின்றே இன்பம் மிகுமற்றுக்", line2: "கண்ணும் அதனின் தீதுஇல்.", eng: "Even while living in this fragile body, supreme bliss is attained the very moment desire is completely eradicated."},
{num: 370, line1: "ஆரா இயற்கை அவாநீப்பின் அந்நிலையே", line2: "பேரா இயற்கை தரும்.", eng: "If a man casts away insatiable desire, that very moment he assumes his true, unshifting spiritual nature."},

{num: 371, line1: "ஆகூழால் தோன்றும் அசைவின்மை கைப்பொருள்", line2: "போகூழால் தோன்றும் மடி.", eng: "Prosperity comes through the decree of fate that brings wealth; ruin comes when fate brings ultimate laziness."},
{num: 372, line1: "பேதைமை ஊட்டும் பசிஅஃது அறிவுஅகற்றும்", line2: "ஆகூழ் உறும்பாற் படும்.", eng: "Destiny can turn a wise man into a fool, or it can sharpen the intellect of an unlearned soul to see deep truths."},
{num: 373, line1: "நுண்ணிய நூல்பல கற்பினும் மற்றும்தன்", line2: "உண்மை அறிவே மிகும்.", eng: "Though a man studies many profound and rare books, his innate wisdom dictated by fate will alone prevail."},
{num: 374, line1: "இருவேறு உலகத்து இயற்கை திருவேறு", line2: "தெள்ளியர் ஆதலும் வேறு.", eng: "The way of the world is twofold: the acquisition of wealth is one thing; the attainment of wisdom is entirely another."},
{num: 375, line1: "நல்லவை எல்லா அன்றாகும் தீயவை", line2: "நல்லவாம் செல்வமுற் கால்.", eng: "In the day of adverse fate, good plans turn to ruin; in the day of favoring fate, even errors yield prosperity."},
{num: 376, line1: "பரியினும் ஆகவாம் பால்அல்வ உய்த்துச்", line2: "சொரியினும் போகா தம.", eng: "That which is not yours by destiny will never stay, though guarded; that which is yours will not leave, though thrown away."},
{num: 377, line1: "வகுத்தான் வகுத்த வகையல்லால் கோடி", line2: "தொகுத்தார்க்கும் துய்த்தல் அரிது.", eng: "Except in the way ordained by the Creator, even those who hoard millions cannot enjoy their wealth."},
{num: 378, line1: "துறப்பார்மன் துப்புரவு இல்லார் உறற்பால", line2: "ஊட்டா கழியு மெனின்.", eng: "The destitute would easily renounce the world if only the sorrows of their destiny would leave them in peace."},
{num: 379, line1: "நன்றாங்கால் நல்லவாக் காண்பவர் அன்றாங்கால்", line2: "அல்லற்படுவது எவன்.", eng: "Why should those who rejoice when destiny brings good fortune lament when it brings bitter sorrow?"},
{num: 380, line1: "ஊழின் பெருவலி யாவுள மற்றொன்று", line2: "சூழினும் தான்முந் துறும்.", eng: "What power is greater than destiny? Even if you contrive a clever way to bypass it, fate will get there before you."},

{num: 381, line1: "அஞ்சாமை ஈகை அறிவூக்கம் இந்நான்கும்", line2: "எஞ்சாமை வேந்தற்கு இயல்பு.", eng: "Courage, generosity, wisdom, and untiring energy—these four are the essential qualities of a true ruler."},
{num: 382, line1: "தூங்காமை கல்வி துணிவுடைமை இம்மூன்றின்", line2: "நீங்கா நிலன்ஆள்ப வற்கு.", eng: "Alertness, learning, and decisive courage should never leave the soul of one who rules over the earth."},
