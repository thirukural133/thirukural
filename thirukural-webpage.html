{num: 383, line1: "அறன்இழுக்காது அல்லவை நீக்கி மறன்இழுக்கா", line2: "மானம் உடையது அரசு.", eng: "A true ruler swerves not from virtue, removes vice, and guards his honor with undying courage."},
{num: 384, line1: "கொடையளி செங்கோல் குடியோம்பல் நான்கும்", line2: "உடையான்ஆம் வேந்தர்க்கு ஒளி.", eng: "Generosity, mercy, a just scepter, and care for the people are the four lights that make a ruler shine."},
{num: 385, line1: "இயற்றலும் ஈட்டலும் காத்தலும் காத்த", line2: "வகுத்தலும் வல்லது அரசு.", eng: "A capable ruler knows how to discover resources, gather wealth, guard it safely, and distribute it wisely for the public good."},
{num: 386, line1: "காட்சிக்கு எளியன் கடுஞ்சொல்லன் அல்லனேல்", line2: "மீக்கூறும் மன்னன் நிலம்.", eng: "If a king is accessible to his people and free from harsh words, his country will praise him above all others."},
{num: 387, line1: "இன்சொலால் ஈத்தளிக்க வல்லார்க்குத் தன்சொலால்", line2: "தான்கண் டனைத்திவ் வுலகு.", eng: "The world will gladly obey the word of a ruler who is capable of giving gifts and protecting with sweet speech."},
{num: 388, line1: "முறைசெய்து மொப்பாற்றான் முந்துறும் வேந்தன்", line2: "இறைஎன்று வைக்கப் படும்.", eng: "The king who administers strict justice and protects his subjects will be looked upon as a god among men."},
{num: 389, line1: "செவிகைப்பச் சொற்பொறுக்கும் பண்புடை வேந்தன்", line2: "கவிக்குடைக்கீழ் தங்கும் உலகு.", eng: "The whole world will rest securely under the umbrella of a king who can bear with bitter, corrective words spoken to his ears."},
{num: 390, line1: "கொடையுடையன் கண்ணோட்டம் உடையன் உலகத்து", line2: "நடையுடையன் வேந்தர்க்கு அரசு.", eng: "He who has generosity, compassion, and a refined understanding of the world is a king among kings."},

{num: 391, line1: "கற்க கசடறக் கற்பவை கற்றபின்", line2: "நிற்க அதற்குத் தக.", eng: "Learn perfectly what ought to be learned, and having learned, live a life that conforms strictly to that knowledge."},
{num: 392, line1: "எண்ணென்ப ஏனை எழுத்தென்ப இவ்விரண்டும்", line2: "கண்ணென்ப வாழும் உயிர்க்கு.", eng: "Numbers and letters are declared by the wise to be the two living eyes of human existence."},
{num: 393, line1: "கண்ணுடையர் என்பவர் கற்றோர் முகத்திரண்டு", line2: "புண்ணுடையர் கல்லா தவர்.", eng: "The learned alone can be said to possess eyes; the unlearned have merely two sores upon their faces."},
{num: 394, line1: "உவப்பத் தலைக்கூடி உள்ளப் பிரிதல்", line2: "அனைத்தே புலவர் தொழில்.", eng: "To meet with joy and to depart with a lingering, thoughtful mind is the art of the learned."},
{num: 395, line1: "உடையார்முன் இல்லார்போல் ஏக்கற்றும் கற்றார்", line2: "கடையரே கல்லா தவர்.", eng: "Those who learn submissively, like beggars before the wealthy, stand supreme; those who refuse to learn remain base."},
{num: 396, line1: "தொட்டனைத் தூறும் மணற்கேணி மாந்தர்க்குக்", line2: "கற்றனைத் தூறும் அறிவு.", eng: "Just as water flows from a sandy spring the deeper it is dug, wisdom flows from a person the more they study."},
{num: 397, line1: "யாதானும் நாடமால் ஊராமால் என்னொருவன்", line2: "சாந்துணையும் கல்லாத வாறு.", eng: "Since a learned man finds a home in every land and a welcome in every town, why does a person remain unlearned until death?"},
{num: 398, line1: "ஒருமைக்கண் தான் கற்ற கல்வி ஒருவற்கு", line2: "எழுமையும் ஏமாப்பு உடைத்து.", eng: "The learning that a person acquires in a single birth will stand by them and guard them through all seven lifetimes."},
{num: 399, line1: "தாமின் புறுவது உலகின் புறக்கண்டு", line2: "காமுகர் கற்றறிந் தார்.", eng: "Seeing that the knowledge which delights them also delights the whole world, the learned love learning all the more."},
{num: 400, line1: "கேடில் விழுச்செல்வம் கல்வி ஒருவற்கு", line2: "மாடல்ல மற்றை யவை.", eng: "Learning is the only imperishable and precious wealth a person can own; all other material riches are not worth counting."},

{num: 401, line1: "அரங்கின்றி வட்டமடித் தற்றே நிரம்பிய", line2: "நூலின்றிக் கோட்டி கொளல்.", eng: "To enter an assembly of experts without deep and complete learning is like playing a game of dice without a checkered board."},
{num: 402, line1: "கல்லாதான் சொற்காமுறு தல் நலம்இல்லான்", line2: "கல்லாஅ தோள்பா லது.", eng: "An unlearned man desiring to speak before the wise is like a woman without virtue dreaming of a beautiful romance."},
{num: 403, line1: "கல்லா தவரும் நனிநல்லர் கற்றார்முன்", line2: "சொல்லாது இருக்கப் பெறின்.", eng: "Even the unlearned are very good, provided they keep their mouths completely shut in the presence of the wise."},
{num: 404, line1: "கல்லாதான் திட்பம் கழியும்கால் கற்றறிந்தான்", line2: "நல்லறிவு ஆகி விடும்.", eng: "The wisdom of an unlearned man, though he be highly naturally bright, will never be accepted by the learned."},
{num: 405, line1: "கல்லா ஒருவன் தகைமை தலைப்பெய்து", line2: "சொல்லாடச் சோர்வு படும்.", eng: "The pride of an unlearned man will instantly vanish the moment he is challenged to open his mouth and debate with the wise."},
{num: 406, line1: "உளரென்னும் மாத்திரையர் அல்லால் பயவாக்", line2: "களரனையர் கல்லா தவர்.", eng: "The unlearned exist merely in name; they are like a patch of barren, salty land that yields no crop to anyone."},
{num: 407, line1: "நுண்மாண் நுழைபுலம் இல்லான் எழில்நலம்", line2: "மண்மாண் புனைபாவை அற்று.", eng: "The outward physical beauty of a man who lacks subtle, refined learning is like a beautifully painted doll made of clay."},
{num: 408, line1: "நல்லார்கண் பட்ட வறுமையின் இன்னாதே", line2: "கல்லார்கண் பட்ட திரு.", eng: "The wealth that falls into the hands of an unlearned man is far more painful to see than the poverty of the wise."},
{num: 409, line1: "மேற்பிறந்தா ராயினும் கல்லாதார் கீழ்ப்பிறந்தும்", line2: "கற்றார் அனைத்திலர் பாடு.", eng: "The unlearned of high birth stand far below the learned who were born into the humblest circumstances."},
{num: 410, line1: "விலங்கொடு மக்கள் அனையர் இலங்குநூல்", line2: "கற்றாரோடு ஏனை யவர்.", eng: "As beasts stand compared to human beings, so stand the unlearned compared to those who have studied noble books."},

{num: 411, line1: "செல்வத்துள் செல்வம் செவிச்செல்வம் அச்செல்வம்", line2: "செல்வத்துள் எல்லாம் தலை.", eng: "The wealth acquired by listening to the wise is the highest wealth; it stands foremost among all possessions."},
{num: 412, line1: "செவிக்குணவு இல்லாத போழ்து சிறிது", line2: "வயிற்றுக்கும் ஈயப் படும்.", eng: "When there is no food for the ear to digest, then let a little food be given to satisfy the stomach."},
{num: 413, line1: "செவிஉணவின் கேள்வி உடையார் அவியுணவின்", line2: "ஆன்றாரோடு ஒப்பர் நிலத்து.", eng: "Those whose ears are nourished with wise counsel are equal to the immortal gods who feed on sacred offerings."},
{num: 414, line1: "கற்றிலன் ஆயினும் கேட்க அஃதொருவற்கு", line2: "ஒற்கத்தின் ஊற்றாந் துணை.", eng: "Though a man has no learning, let him listen to the wise; it will stand as a steady staff to support him in times of weakness."},
{num: 415, line1: "இழுக்கல் உடையுழி ஊற்றுக்கோல் அற்றே", line2: "ஒழுக்கம் உடையார்வாய்ச் சொல்.", eng: "The words of righteous men are like a firm staff on a slippery path, saving you from a sudden fall."},
{num: 416, line1: "எனைத்தானும் நல்லவை கேட்க அனைத்தானும்", line2: "ஆன்ற பெருமை தரும்.", eng: "Listen to good words, no matter how few they may be; even that small amount will yield vast and noble dignity."},
{num: 417, line1: "பிழைத்துணர்ந்தும் பேதைமை சொல்லார் இழைத்துணர்ந்து", line2: "ஈண்டிய கேள்வி யவர்.", eng: "Those who have sharpened their minds by listening to deep truths will never utter foolish words, even by an oversight."},
{num: 418, line1: "கேட்பினும் கேளாத் தகையவே கேள்வியால்", line2: "தோட்கப் படாத செவி.", eng: "Ears that have not been pierced by the wise words of listening are functionally deaf, though they hear perfectly."},
{num: 419, line1: "நுணங்கிய கேள்வியர் அல்லார் வணங்கிய", line2: "வாயினர் ஆதல் அரிது.", eng: "It is rare for those who have not listened to subtle, profound teachings to speak words of true humility and grace."},
{num: 420, line1: "செவியின் சுவையுணரா வாயுணர்வின் மாக்கள்", line2: "அவிந்தும் வாழினும் என்.", eng: "What does it matter if they live or die, those who know only the taste of food in the mouth but never the taste of truth in the ear?"},

{num: 421, line1: "அறிவற்றம் காக்கும் கருவி செறுவார்க்கும்", line2: "உள்ளழிக்கல் ஆகா அரண்.", eng: "Wisdom is an inner weapon that wards off destruction; it is an impregnable fortress that no enemy can ever tear down."},
{num: 422, line1: "சென்ற இடத்தால் செலவிடாது தீதொரீஇ", line2: "நன்றின்பால் உய்ப்பது அறிவு.", eng: "Wisdom restrains the mind from wandering where it likes, keeps it away from vice, and guides it toward virtue."},
{num: 423, line1: "எப்பொருள் யார்யார்வாய்க் கேட்பினும் அப்பொருள்", line2: "மெய்ப்பொருள் காண்பது அறிவு.", eng: "To discern the core truth of anything, no matter who says it, is the hallmark of true wisdom."},
{num: 424, line1: "எண்பொருள வாகச் செலச்சொல்லித் தான்பிறர்வாய்", line2: "நுண்பொருள் காண்பது அறிவு.", eng: "To speak complex truths in simple ways, and to easily grasp the subtle meanings hidden in the words of others, is wisdom."},
{num: 425, line1: "உலகம் தழீஇய தொட்பம் மலர்தலும்", line2: "கூம்பலும் இல்லது அறிவு.", eng: "To live in friendly harmony with the world, keeping the mind free from sudden bursts of pride or depression, is wisdom."},
{num: 426, line1: "எவ்வது உறைவது உலகம் உலகத்தோடு", line2: "அவ்வது உறைவது அறிவு.", eng: "To adapt and live in conformity with the changing ways of the world is true wisdom."},
{num: 427, line1: "அறிவுடையார் ஆவ தறிவார் அறிவிலார்", line2: "அஃதறி கல்லா தவர்.", eng: "The wise look ahead and see what is coming; the ignorant are completely blind to the future."},
{num: 428, line1: "அஞ்சுவ தோம்பல் அறிவார் நெஞ்சத்து", line2: "அஞ்சாமை அஃதிலார் கண்.", eng: "Fearing that which ought to be feared is the rule of the wise; not to fear danger until it strikes is the folly of the ignorant."},
{num: 429, line1: "எதிரதாக் காக்கும் அறிவினார்க்கில்லை", line2: "அதிர வருவதோர் நோய்.", eng: "No terrifying calamity will ever shake the peace of those wise souls who foresee danger and guard against it early."},
{num: 430, line1: "அறிவுடையார் எல்லாம் உடையார் அறிவிலார்", line2: "என்னுடைய ராயினும் இல்.", eng: "Those who possess wisdom possess everything; those who lack wisdom are completely destitute, no matter what riches they hold."},

{num: 431, line1: "செருக்கும் சினமும் சிறுமையும் இல்லார்", line2: "பெருக்கம் பெருமித நீர துடைத்து.", eng: "The prosperity of those who are free from pride, anger, and lustful meanness is a source of true glory."},
{num: 432, line1: "இவறலும் மாண்புஇறந்த மானமும் மாணா", line2: "உவகையும் ஏதம் அரசுக்கு.", eng: "Miserliness, empty pride, and unholy pleasures are deadly flaws that bring ruin to a ruler."},
{num: 433, line1: "தினைத்துணையாக் குற்றமும் நாடிப் பின்செய்வார்", line2: "விழுமம் துடைத்தவர் நட்பு.", eng: "Though a fault be as tiny as a millet seed, those who fear disgrace look upon it as large as a mountain and correct it."},
{num: 434, line1: "குற்றமே காக்க பொருளாகக் குற்றமே", line2: "அற்றந்தந்து அல்லல் படுத்தும்.", eng: "Guard yourself against faults as your daily duty; for faults are inner enemies that bring ultimate distress."},
{num: 435, line1: "வருமுன்னர்க் காவாதான் வாழ்க்கை எரிமுன்னர்", line2: "வைத்தூறு போலக் கெடும்.", eng: "The life of a person who fails to foresee and correct faults before they arrive will be consumed like straw before a fire."},
{num: 436, line1: "தன்குற்றம் நீக்கிப் பிறற்குற்றம் காண்கிற்பின்", line2: "என்குற்றம் ஆகும் இறைக்கு.", eng: "If a ruler first removes his own faults before looking at the flaws of his subjects, what harm can ever come to his reign?"},
{num: 437, line1: "செயற்பால தோரும் அரணே ஒருவற்கு", line2: "உயற்பால தோரும் பழி.", eng: "The wealth of a miser who hoards money out of greed without spending it usefully will vanish completely into ruin."},
{num: 438, line1: "பற்றுள்ளம் என்னும் இவறன்மை எற்றுள்ளும்", line2: "எண்ணப் படுவதொன் றன்று.", eng: "The gripping greed that refuses to give is a fatal flaw that cannot be balanced by any other virtue."},
{num: 439, line1: "வியற்கசெய் யாற்கொல் வினையறிந்தார் நெஞ்சத்து", line2: "அயிர்க்க வராதது ஒன்று.", eng: "Never indulge in self-conceit or praise your own deeds; never contemplate actions that yield no useful fruit."},
{num: 440, line1: "காதல காத லறியாமை உய்க்கிற்பின்", line2: "ஏதிலார் ஏதிலார் நெஞ்சத்து.", eng: "If you keep your private pleasures secret from your enemies, their plots to exploit your weaknesses will fail entirely."},

{num: 441, line1: "அறன்அறிந்து மூத்த அறிவுடையார் கேண்மை", line2: "திறனறிந்து தேர்ந்து கொளல்.", eng: "Examine carefully and secure the fellowship of wise, mature souls who understand virtue and possess deep experience."},
{num: 442, line1: "உற்றநோய் நீக்கி உறாஅமை முற்காக்கும்", line2: "பெற்றியார்ப் பேணிப் கொளல்.", eng: "Cherish and win the support of those rare mentors who can resolve present miseries and guard you against future dangers."},
{num: 443, line1: "அரியவற்றுள் எல்லாம் அரிதே பெரியாரைப்", line2: "பேணித் தமராக் கொளல்.", eng: "Among all rare blessings, there is none greater than honoring great minds and making them your close companions."},
{num: 444, line1: "தம்மின் பெரியார் தமரா ஒழுகுதல்", line2: "வன்மையுள் எல்லாம் தலை.", eng: "To walk in the footsteps of those who are wiser and greater than oneself is the highest of all human strengths."},
{num: 445, line1: "சூழ்வார்கண் ணாக ஒழுகலான் மன்னவன்", line2: "சூழ்வாரைச் சூழ்ந்து கொளல்.", eng: "Since wise ministers act as the very eyes of a ruler, he must select and secure them with great care."},
{num: 446, line1: "தக்கா ரினத்தனாய்த் தான்ஒழுக வல்லானை", line2: "செற்றார் செயக்கிடந்த தில்.", eng: "There is nothing an enemy can do to hurt a leader who is capable of working with wise and upright companions."},
{num: 447, line1: "இடிக்குந் துணையாரை இல்லாத ஏமரா", line2: "மன்னன் கெடுப்பார் இலானும் கெடும்.", eng: "A ruler who has no fearless mentors to rebuke and correct him when he errs will fall into ruin, even if he has no enemies."},
{num: 448, line1: "இடிபாரை இல்லாத ஏமரா மன்னன்", line2: "கெடுப்பார் இலானும் கெடும்.", eng: "If a king is guarded by counselors who dare to speak the bitter truth, no hostile forces can ever destroy his kingdom."},
{num: 449, line1: "முதலிலார்க்கு ஊதியம் இல்லை மதலையாம்", line2: "சார்பிலார்க்கு இல்லை நிலை.", eng: "Just as there is no profit for a merchant without capital, there is no stability for a leader without the support of wise guides."},
{num: 450, line1: "பல்லார் பகைகொளலின் பத்தடுத்த தீமைத்தே", line2: "நல்லார் தொடர்கை விடல்.", eng: "To abandon the fellowship of the wise is ten times more destructive than incurring the open hatred of a multitude of enemies."},

{num: 451, line1: "சிற்றினம் அஞ்சும் பெருமை சிறுமைதான்", line2: "சுற்றமாச் சூழ்ந்து விடும்.", eng: "Great minds dread the company of the mean; low minds look upon vile characters as their natural relatives."},
{num: 452, line1: "நிலத்தியல்பால் நீர்திரிந் தற்றாகும் மாந்தர்க்கு", line2: "இனத்தியல்பால் ஆகும் அறிவு.", eng: "Just as water changes its nature according to the soil it flows through, a person's character is shaped by the company they keep."},
{num: 453, line1: "மனத்தானாம் மாந்தர்க்கு உணர்ச்சி இனத்தானாம்", line2: "இன்னான் எனப்படும் சொல்.", eng: "A man's basic thoughts belong to his mind; but his reputation and the quality of his character are determined by his circle."},
{num: 454, line1: "மனத்துளது போலக் காட்டி யொருவற்கு", line2: "இனத்துள தாகும் அறிவு.", eng: "Wisdom appears to spring directly from within the soul, but it is actually nurtured and matured by the company a person keeps."},
{num: 455, line1: "மனத்தூய்மை செய்வினை தூய்மை இரண்டும்", line2: "இனத்தூய்மை தூவா வரும்.", eng: "Purity of mind and purity of action are both harvested from the clean soil of noble companionships."},
{num: 456, line1: "மனந்தூயார்க்கு எச்சம் நன்றாகும் இனந்தூயார்க்கு", line2: "செய்தவற்றுள் எல்லாம் தலை.", eng: "Those with pure minds leave a good lineage; those who keep pure company excel in every action they perform."},
{num: 457, line1: "மனநலம் மன்னுயிர்க்கு ஆக்கம் இனநலம்", line2: "எல்லாப் புகழும் தரும்.", eng: "A good mind brings prosperity to a person; the blessing of good company yields all forms of lasting glory."},
{num: 458, line1: "மனநலம் நன்குடைய ராயினும் சான்றோர்க்கு", line2: "இனநலம் ஏமாப்பு உடைத்து.", eng: "Though a person possesses a firm and naturally virtuous mind, the support of noble company adds an extra fortress of safety."},
{num: 459, line1: "மனநலத்தின் ஆக்கம் கெடுமற் றினநலத்தின்", line2: "ஏதம் படுபா டறிந்து.", eng: "Even the virtue of a good mind can be corrupted by mean associations; keep away, knowing the miseries it brings."},
{num: 460, line1: "நல்லினத்தின் ஊங்குத் துணையில்லை தீயினத்தின்", line2: "அல்லற்படுப்பது ஒன்று இல்.", eng: "There is no better ally in life than noble company; there is no deadlier enemy than a circle of vile associates."},

{num: 461, line1: "அழிவ தோவும் அழிவதூஉம் ஆவ தறிவார்", line2: "பெருக்கத்தில் தீர்ந்தாரும் இல்.", eng: "Weigh carefully the loss, the gain, and the ultimate consequence before plunging into any great enterprise."},
{num: 462, line1: "தெரிந்த இனத்தோடு தேர்ந்தெண்ணிச் செய்வார்க்கு", line2: "அரும்பொருள் யாதொன்றும் இல்.", eng: "There is nothing impossible for those who deliberate deeply with wise counselors before initiating an action."},
{num: 463, line1: "ஆக்கம் கருதி முதலிழக்கும் செய்வினை", line2: "ஊக்கியார் அறிவுடை யார்.", eng: "The wise never begin an enterprise where they risk losing their capital capital for the sake of an uncertain profit."},
{num: 464, line1: "தெளிவிலார் ஆக்கம் தொடங்குவர் இன்பம்", line2: "இகந்து பழிபடு பா டறிந்து.", eng: "Those who initiate an enterprise without clear, deliberate planning will end up caught in disgrace and ruin."},
{num: 465, line1: "வகைமாண்ட வல்லுருவம் பெற்றம் புலியின்தோல்", line2: "போர்த்துமேய்ந் தற்று.", eng: "To wage war or launch a project without analyzing your resources is like inviting your enemies to pull down your gates."},
{num: 466, line1: "செய்தக்க அல்ல செயக்கெடும் செய்தக்க", line2: "செய்யாமை யானும் கெடும்.", eng: "A man is ruined by doing what he ought not to do; he is also ruined by failing to do what he ought to do."},
{num: 467, line1: "எண்ணித் துணிக கருமம் துணிந்தபின்", line2: "எண்ணுவாம் என்பது இழுக்கு.", eng: "Think deeply before resolving upon an action; to say 'We will think about it later' after starting is a fatal error."},
{num: 468, line1: "ஆற்றின் வருந்தா வருத்தம் பலர்நின்று", line2: "போற்றினும் பொத்துப் படும்.", eng: "Labor spent on an enterprise that is not properly planned will fail completely, even if supported by a multitude of men."},
{num: 469, line1: "நன்றாற்றல் உள்ளும் தவறுண்டு அவரவர்", line2: "பண்பறிந்து ஆற்றாக் கடை.", eng: "Even when doing good, errors occur if you do not adapt your actions to the unique nature of the recipient."},
{num: 470, line1: "எள்ளாத எண்ணிச் செயல்வேண்டும் தம்மோடு", line2: "கொள்ளாத கொள்ளாது உலகு.", eng: "Plan and execute only those deeds that are free from blame; the world will never accept actions that do not match decency."},

{num: 471, line1: "வினைவலியும் தன்வலியும் மாற்றான் வலியும்", line2: "துணைவலியும் தூக்கிச் செயல்.", eng: "Analyze the power of the task, your own strength, the strength of your adversary, and the power of your allies before acting."},
{num: 472, line1: "ஒல்வ தறிவது அறிந்ததன் கண்தங்கிச்", line2: "செல்வார்க்குச் செல்லாதது இல்.", eng: "Those who know what is possible for them, and stand firm within their capacity, face no obstacles they cannot conquer."},
{num: 473, line1: "உடைத்தம் வலியறியார் ஊக்கத்தின் ஊங்கி", line2: "இடைக்கண் முரிந்தார் பலர்.", eng: "Many have broken down halfway through an enterprise because they moved out of blind enthusiasm without measuring their true strength."},
{num: 474, line1: "அமைந்தாங் கொழுகான் அளவறியான் தன்னை", line2: "வியந்தான் விரைந்து கெடும்.", eng: "He who will not live in peace with neighbors, measures not his resources, and boasts of his own power will perish quickly."},
{num: 475, line1: "பீலிபெய் சாகாடும் அச்சிறும் அப்பண்டம்", line2: "சால மிகுத்துப் பெயின்.", eng: "Even peacock feathers can break the axle of a cart if you load them in excessive and boundless quantities."},
{num: 476, line1: "நுனிக்கொம்பர் ஏறினார் அஃதிறந்து ஊக்கின்", line2: "உயிர்க்கிறுதி ஆகி விடும்.", eng: "He who climbs to the very tip of a tree branch and tries to push further risks falling to his own destruction."},
{num: 477, line1: "ஆற்றின் அளவு அறிந்து ஈக அதுபொருள்", line2: "போற்றி வழங்கும் நெறி.", eng: "Give to charity according to the measure of your wealth; that is the true path to preserve your fortune safely."},
{num: 478, line1: "ஆகாறு அளவு இட்டி தாயினும் கேடில்லை", line2: "போகாறு அகலா க் கடை.", eng: "There is no harm if the channel of income is narrow, provided the outlet of expense is kept even narrower."},
{num: 479, line1: "அளவறிந்து வாழாதான் வாழ்க்கை உளபோலத்", line2: "தோன்றி கெடும்.", eng: "The life of a person who does not live within his means will seem prosperous for a moment, then vanish into nothing."},
{num: 480, line1: "உளவரை தூக்காத ஒப்புர வாண்மை", line2: "வளவரை வல்லைக் கெடும்.", eng: "Generosity practiced without measuring one's remaining wealth will quickly lead to the complete collapse of fortune."},

{num: 481, line1: "பகல்கற்குக் கூகையைக் காக்கை இகல்வெல்லும்", line2: "வேந்தர்க்கு வேண்டும் பொழுது.", eng: "A crow can conquer the powerful owl during the bright day; therefore, a ruler must choose the perfect time to strike."},
{num: 482, line1: "பருவத்தோடு ஒட்ட ஒழுகல் திருவினைத்", line2: "தீராமை ஆர்க்குங் கயிறு.", eng: "Acting in perfect harmony with the right time is the rope that ties the goddess of fortune securely to your doorstep."},
{num: 483, line1: "அருவினை யென்ப உளவோ கருவினால்", line2: "காலம் அறிந்து செயின்.", eng: "Is there any task too difficult to achieve if you employ the right means and execute it at the right time?"},
{num: 484, line1: "ஞாலம் கருதினும் கைகூடும் காலம்", line2: "கருதி இடத்தால் செயின்.", eng: "Even if you desire to conquer the whole earth, it is entirely possible if you choose the right time and the right place."},
{num: 485, line1: "காலம் கருதி இருப்பர் கலங்காது", line2: "ஞாலம் கருது பவர்.", eng: "Those who scheme to master the world will wait patiently without any sign of agitation for the opportune moment."},
{num: 486, line1: "ஊக்க முடையான் ஒடுக்கம் பொருதகர்", line2: "தாக்கற்குப் பேருந் தகைத்து.", eng: "The quiet restraint of a powerful man is like a ram drawing back its head only to strike with greater force."},
{num: 487, line1: "பொள்ளென ஆங்கே புறம்வேரார் காலம்பார்த்து", line2: "உள்வேர்ப்பர் ஒள்ளி யவர்.", eng: "The wise do not show their anger instantly; they keep it burning quietly within, waiting for the right moment to act."},
{num: 488, line1: "செறுவாரைக் காணின் சுமக்க இறுதிகாலம", line2: "உறுவார்க் கதலை தலை.", eng: "Bowed down submissively before your enemies when their power is high; when their hour of decline arrives, their fall is certain."},
{num: 489, line1: "எய்தற்கரிய துயைந்தக்கால் அந்நிலையே", line2: "செய்தற்கரிய செயல்.", eng: "When an extremely rare opportunity presents itself, seize it instantly to execute your most difficult tasks."},
{num: 490, line1: "கொக்கொக்க கூம்பும் பருவத்து மற்றதன்", line2: "குத்தொக்க சீர்த்த இடத்து.", eng: "Wait silently like a stilt bird when the time is unfavorable; strike swift as lightning when the perfect moment arrives."},

{num: 491, line1: "தொடங்கற்க எவ்வினையும் ஓவற்க முற்றும்", line2: "இடனறிந்து காப்பார் அறிவு.", eng: "Do not initiate a conflict or attack an enemy until you have secured an advantageous position that protects your forces."},
{num: 492, line1: "முரண் சேர்ந்த மொய்ம்பினக் கண்ணும் அரண்சேர்ந்தாம்", line2: "ஆக்கம் பலவுந் தரும்.", eng: "Even to those who possess massive natural strength, securing an advantageous position adds an extra tower of power."},
{num: 493, line1: "ஆற்றாரும் ஆற்றல் அடைவர் இடனறிந்து", line2: "போற்றார்கண் போற்றிச் செயின்.", eng: "Even the weak can defeat powerful adversaries if they choose a battlefield that favors them and exposes the enemy."},
{num: 494, line1: "எண்ணியார் எண்ணம் இழப்பர் இடனறிந்து", line2: "துன்னியார் துன்னிச் செயின்.", eng: "The elaborate battle plans of your enemies will turn to dust if you draw them into a position that neutralizes their power."},
{num: 495, line1: "நெடும்புனலில் வெல்லும் முதலை அப்புனலின்", line2: "நீங்கின் அதனைப் பிற.", eng: "In deep waters, the crocodile can defeat any creature; out of the water, even a jackal can kill it easily."},
{num: 496, line1: "கடலோடா கால்வல் நெடுந்தேர் கடலோடும்", line2: "நாவாயும் ஓடா நிலத்து.", eng: "The mighty chariot with strong wheels cannot sail the vast sea; the great ship that rides the waves cannot move upon dry land."},
{num: 497, line1: "அஞ்சாமை அல்லால் துணைவேண்டா எஞ்சாமை", line2: "எண்ணி இடத்தால் செயின்.", eng: "If you calculate your position perfectly and strike from a safe ground, you need no other weapon but your own courage."},
{num: 498, line1: "சிறுபடையான் செல்லிடம் சேரின் உருபடையான்", line2: "ஊக்கம் அழிந்து விடும்.", eng: "If a massive army attacks a small force stationed in its own secure, defensive territory, its proud enthusiasm will be crushed."},
{num: 499, line1: "சிறைநலமும் சீரும் இலரெனினும் மாந்தர்", line2: "உறைநிலத்தால் ஊக்கம் மிகும்.", eng: "Even if they lack fortifications or grand reputation, men become invincible when fighting on their own native soil."},
{num: 500, line1: "நரிநரி செந்நாய் கடிப்பர் நல்யானை", line2: "வரிநிலத்தில் ஆழப் படின்.", eng: "A majestic war elephant can be easily brought down and torn apart by tiny jackals if it gets trapped in deep, muddy terrain."},

{num: 501, line1: "அறம்பொருள் இன்பம் உயிரச்சம் நான்கின்", line2: "திறம்தெரிந்து தேறப் படும்.", eng: "A person should be chosen after being tested in four areas: virtue, wealth, pleasure, and fear of losing life."},
{num: 502, line1: "குடிபிறந்து குற்றமற்றான் ஆயின் அவனை", line2: "விடிபிறந்து தேறப் படும்.", eng: "He who comes from a noble family and is free from blemishes should be chosen without any hesitation."},
{num: 503, line1: "அரியகற்று ஆசற்றார் கண்ணும் தெரியுங்கால்", line2: "இன்மை அரிதே வெளிறு.", eng: "Even among those who have studied rare books and are faultless, a close examination reveals some hidden ignorance."},
{num: 504, line1: "குணநாடிக் குற்றமும் நாடி அவற்றுள்", line2: "மிகைநாடி மிக்க கொளல்.", eng: "Weigh a man's virtues and weigh his faults; then judge him by whichever side outweighs the other."},
{num: 505, line1: "பெருமைக்கும் ஏனைச் சிறுமைக்கும் தத்தம்", line2: "கருமமே கட்டளைக் கல்.", eng: "A man's own actions are the truest touchstone that measures his greatness or his littleness."},
{num: 506, line1: "அற்றாரைத் தேறுதல் ஓம்புக மற்றவர்", line2: "சுற்றத்தார் கண்ணும் அறார்.", eng: "Avoid choosing those who have no family ties; lacking attachments, they will have no fear of disgrace."},
{num: 507, line1: "காதல் இருமையான் குற்றமறைந் தற்றால்", line2: "பேதைமைத் தேறல் எனல்.", eng: "To employ an ignorant person out of mere personal affection is the height of folly and yields endless errors."},
{num: 508, line1: "தேரான் தெளிவும் தெளிந்தான்கண் ஐயுறவும்", line2: "தீரா இடும்பை தரும்.", eng: "Trusting someone without testing them, and doubting someone after trusting them, both bring unceasing misery."},
{num: 509, line1: "தேறற்க யாரையும் தேராது தேர்ந்தபின்", line2: "தேறுக தேறும் வினை.", eng: "Trust no one without prior examination; once a person is tested, entrust them with the duties they fit best."},
{num: 510, line1: "தேரானைத் தேறுதலும் தேறியான்கண் ஓவாது", line2: "ஆராயான் செய்தலும் பாடு.", eng: "Trusting an untested man, and failing to guide a trusted man in his duties, both lead to utter failure."},

{num: 511, line1: "நன்மையும் தீமையும் நாடி நலம்புரிந்த", line2: "தன்மையான் ஆளப் படும்.", eng: "He who weighs both good and evil outcomes, and chooses the path of goodness, is the one to be employed."},
{num: 512, line1: "வாரி பெருக்கி வளம்படுத்து உற்றவை", line2: "ஆராய்வான் செய்க வினை.", eng: "He who can increase revenues, develop resources, and foresee difficulties is the right man to manage affairs."},
{num: 513, line1: "அன்புஅறிவு தேற்றம் அவாவின்மை இந்நான்கும்", line2: "நன்குடையான் கட்டே வினை.", eng: "He who possesses love, wisdom, clear judgment, and freedom from covetousness is perfectly fit for any task."},
{num: 514, line1: "எனைவகையான் தேறியக் கண்ணும் வினைவகையான்", line2: "வேறாகும் மாந்தர் பலர்.", eng: "Though tested and found perfect in every way, many men change their character when actually given power."},
{num: 515, line1: "அறிந்தாற்றிச் செய்கிற்பாற்கு அல்லால் வினையைக்", line2: "சிறந்தானென்று ஏவற்பாற் றன்று.", eng: "Affairs must be committed only to one who has the knowledge and skill to execute them, not out of mere favoritism."},
{num: 516, line1: "செய்வானை நாடி வினைநாடி காலத்தோடு", line2: "எய்த உணர்ந்து செயல்.", eng: "Analyze the worker, analyze the work, consider the proper time, and then let the task be initiated smoothly."},
{num: 517, line1: "இதனை இதனால் இவன்முடிக்கும் என்றுஆய்ந்து", line2: "அதனை அவன்கண் விடல்.", eng: "Having decided 'This man can finish this task by these means,' leave the entire responsibility to him."},
{num: 518, line1: "வினைக்குரிமை நாடிய பின்றை அவனை", line2: "அதற்குரிமை ஆக்கப் படும்.", eng: "After discovering a man's fitness for a specific duty, let him be fully trusted and honored in that office."},
{num: 519, line1: "வினைமகிழ்ச்சி மார்த்தாண்டன் என்றுஆய்ந்து அவனை", line2: "வினைமன்னன் ஆக்கல் எவன்.", eng: "He who finds joy in his work and treats his duty as a privilege will bring victory to his leader."},
{num: 520, line1: "வினைக்கண் வினையுடையான் கேண்மைவே றாக", line2: "நினைப்பானை நீக்கும் திரு.", eng: "If a leader envies or distrusts an officer who is diligently doing his duty, Fortune will abandon that leader."},

{num: 521, line1: "பற்றற்ற காலத்தும் பற்றறார் சுற்றத்தார்", line2: "அற்றற்றால் ஆக்கம் தரும்.", eng: "When a man's wealth is entirely gone, only his kinsmen will maintain their attachment and bring him back to prosperity."},
{num: 522, line1: "சுற்றத்தால் சுற்றப் படவொழுகல் செல்வந்தான்", line2: "பெற்றத்தால் பெற்ற பயன்.", eng: "To live surrounded by the loving embrace of one's kinsmen is the true reward of acquiring vast wealth."},
{num: 523, line1: "அளவளாவு இல்லாதான் வாழ்க்கை குளவளாக்", line2: "கோடின்றி நீர்நிறைந் தற்று.", eng: "The life of one who does not mingle lovingly with his relatives is like a vast reservoir that has no banks to retain its water."},
{num: 524, line1: "சுற்றத்தால் சுற்றப் படஒழுகல் செல்வந்தான்", line2: "பெற்றத்தால் பெற்ற பயன்.", eng: "The true purpose of gaining riches is to share them with kinsmen and live in mutual affection."},
{num: 525, line1: "கொடுத்தலும் இன்சொலும் ஆற்றின் அடுக்கிய", line2: "சுற்றத்தால் சுற்றப் படும்.", eng: "He who gives generously and speaks sweet words will find himself constantly surrounded by a multitude of relatives."},
{num: 526, line1: "பெருங்கொடையான் பேணான் வெகுளி அவனின்", line2: "மருங்குடையார் மாநிலத்து இல்.", eng: "None have a larger circle of loyal friends than the leader who makes great gifts and harbors no anger."},
{num: 527, line1: "காக்கைக்கு கரவா கரைந்துண்ணும் சுற்றமும்", line2: "அத்தகையார்க்கே யுள.", eng: "The crow does not hide its food, but calls its fellows to share it; prosperity stays only with men of such a nature."},
{num: 528, line1: "பொதுநோக்கான் வேந்தன் வரிசையா நோக்கின்", line2: "அதுநோக்கி வாழ்வார் பலர்.", eng: "When a ruler looks upon each person according to their distinct merit rather than with a blank gaze, many will crowd to serve him."},
{num: 529, line1: "தமராகித் தற்றுறந்தார் சுற்றத்தார் ஆவர்", line2: "அமராகாக் காரணம் நீங்கு வழி.", eng: "Those who were once close but left will return as loving kinsmen the moment the cause of misunderstanding is removed."},
{num: 530, line1: "உழைப்பிரிந்து காரணத்தின் வந்தானை வேந்தன்", line2: "இழைத்திருந்து எண்ணித் கொளல்.", eng: "When a kinsman who left without cause returns with a sincere heart, welcome him back after careful observation."},

{num: 531, line1: "இறந்த மகிழ்ச்சியின் மைந்துறும் போழ்தின்", line2: "மறதியின் மைந்தின் இடும்பை.", eng: "Excessive pride born of great joy causes forgetfulness, which leads to sudden and severe misery."},
{num: 532, line1: "பொச்சாப்புக் கொல்லும் புகழை அறிவினை", line2: "நிச்சயக் கொல்லும் சினம்.", eng: "Just as anger destroys true wisdom, chronic forgetfulness and carelessness destroy a person's hard-earned fame."},
{num: 533, line1: "பொச்சாப்பார்க்கு இல்லை புகழ்மை அதுஉலகத்து", line2: "எப்பால் நூலோர்க்கும் துணிவு.", eng: "The careless and forgetful can never attain lasting renown; this is the unanimous verdict of all scriptural texts."},
{num: 534, line1: "அச்ச முடையார்க்கு அரணில்லை ஆங்கில்லை", line2: "பொச்சாப் புடையார்க்கு நன்.", eng: "Just as fortifications are useless to cowards, great wealth and opportunities profit the careless nothing."},
{num: 535, line1: "முன்னுறக் காவாது இழுக்கியான் தன்பிழை", line2: "பின்னூறு இரங்கி விடும்.", eng: "He who fails to foresee and guard against dangers beforehand will bitterly lament his error when ruin arrives."},
{num: 536, line1: "இழுக்காமையான் எய்துவ தென்றும் இழுக்காத", line2: "யார்மாட்டும் சோர்விலா தவர்க்கு.", eng: "Unfailing vigilance toward all duties at all times yields benefits that can never be lost."},
{num: 537, line1: "அரியஎன்று ஆகாத இல்லைபொச் சாவாக்", line2: "கருவியால் போற்றிச் செயின்.", eng: "There is nothing too difficult to achieve if a person pursues it with an unforgetting, vigilant mind."},
{num: 538, line1: "புகழ்ந்தவை போற்றிச் செயல்வேண்டும் செய்யாது", line2: "இகழ்ந்தார்க்கு எழுமையும் இல்.", eng: "Perform those noble deeds praised by the wise; those who carelessly neglect them will find no joy in any birth."},
{num: 539, line1: "மகிழ்ச்சியின் மைந்துறும் போழ்தின் நினைக்க", line2: "மறதியால் கெட்டாரை ஓர்த்து.", eng: "In moments when you are intoxicated with success, remember those who were utterly ruined by their own carelessness."},
{num: 540, line1: "உள்ளியது எய்தல் எளிதுமன் மற்றும்தான்", line2: "உள்ளியது உள்ளப் பெறின்.", eng: "It is easy to attain whatever you mindfully resolve, provided your mind holds onto that resolution without forgetting."},

{num: 541, line1: "ஓர்ந்துகண் ஓடாது இறைபுரிந்து யார்மாட்டும்", line2: "தேர்ந்துசெய் வஃதே முறை.", eng: "To examine an offense thoroughly, show no personal bias, act with strict neutrality, and mete out justice is the law."},
{num: 542, line1: "வானோக்கி வாழும் உலகெல்லாம் மன்னவன்", line2: "கோல்நோக்கி வாழும் குடி.", eng: "All creatures on earth look to the rain from heaven to survive; all subjects look to the just sceptre of their ruler."},
{num: 543, line1: "அந்தணர் நூற்கும் அறத்திற்கும் ஆதியாய்", line2: "நின்றது மன்னவன் கோல்.", eng: "The sacred scriptures and all righteousness on earth are sustained by the upright sceptre of a just king."},
{num: 544, line1: "குடிதழீஇக் கோலோச்சும் மாநில மன்னன்", line2: "அடிதழீஇ நிற்கும் உலகு.", eng: "The whole world will reverently bow at the feet of the great king who embraces his subjects and rules with justice."},
{num: 545, line1: "இயல்புளிக் கோலோச்சும் மன்னவன் நாட்ட பெயலும்", line2: "விளையும் தொக்கு.", eng: "Rain will fall regularly and seasons will harvest abundantly in the country of a king who wields his sceptre justly."},
{num: 546, line1: "வேலன்று வென்றி தருவது மன்னவன்", line2: "கோலதூஉம் கோடா தெனின்.", eng: "It is not the sharp spear that brings victory to a king, but his upright sceptre, provided it never bends to injustice."},
{num: 547, line1: "இறைகாக்கும் வையகம் எல்லாம் அவனை", line2: "முறைகாக்கும் முட்டாச் செயின்.", eng: "The ruler guards the entire realm; and his own flawless justice will guard him if he never deviates from it."},
{num: 548, line1: "எண்பதத்தான் ஓரா முறைசெய்யா மன்னவன்", line2: "தண்பதத்தான் தானே கெடும்.", eng: "The ruler who is inaccessible and fails to judge cases justly will fall from power and perish by himself."},
{num: 549, line1: "குடிபுறம் காத்தோம்பிக்குற்றம் கடிதல்", line2: "வடுவன்று வேந்தன் தொழில்.", eng: "To protect subjects from external harm and punish internal criminals is a duty, not a blemish upon a king."},
{num: 550, line1: "கொலையிற் கொடியாரை வேந்தன் ஒறுத்தல்", line2: "களையினைக் கட்டதனோடு நேர்.", eng: "A king punishing violent criminals with death is like a farmer pulling out parasitic weeds to protect his crops."},

{num: 551, line1: "கொலைமேற்கொண்டாரின் கொடிதே அலைமேற்கொண்டு", line2: "அல்லற்படுத்து ஒழுகும் வேந்தன்.", eng: "A tyrannical king who oppresses and extorts his subjects is far more cruel than a murderer who takes a life."},
{num: 552, line1: "வேலொடு நின்றான் இடுஎன்றது போலும்", line2: "கோலொடு நின்றான் இரவு.", eng: "A king demanding taxes outside the law is like a highway robber standing with a spear and shouting, 'Hand over your wealth!'"},
{num: 553, line1: "நாடொறும் நாடி முறைசெய்யா மன்னவன்", line2: "நாடொறும் நாடு கெடும்.", eng: "The ruler who does not daily examine and redress grievances will see his entire kingdom crumble day by day."},
{num: 554, line1: "கூழும் குடியும் ஒருங்கிழக்கும் கோல்கோடிச்", line2: "சூழாது செய்யும் அரசு.", eng: "A tyrannical king who rules without foresight will lose both his accumulated wealth and his loyal subjects at once."},
{num: 555, line1: "அல்லற்பட்டு ஆற்றாது அழுதகண்ணீர் அன்றே", line2: "செல்வத்தைத் தேய்க்கும் படை.", eng: "The agonizing tears of oppressed subjects are a deadly weapon that wears away the prosperity of a tyrant."},
{num: 556, line1: "மன்னர்க்கு மன்னுதல் செங்கோன்மை அஃதின்றேல்", line2: "மன்னாவாம் வேந்தர்க்கு ஒளி.", eng: "A ruler's fame endures only through a just sceptre; without it, his royal glory will fade completely away."},
{num: 557, line1: "துளியின்மை ஞாலத்திற்கு எற்றேமற்று அற்றே", line2: "அருளின்மை வாழும் குடி.", eng: "Just as a drought-stricken earth suffers without rain drops, subjects suffer under a ruler who is devoid of mercy."},
{num: 558, line1: "இன்மையின் இன்னாது உடைமை முறைசெய்யா", line2: "மன்னவன் கோல்கீழ்ப் படின்.", eng: "To possess property under a lawless tyrant is more painful than living in absolute poverty, for it can be seized at any moment."},
{num: 559, line1: "முறைகோடி மன்னவன் செய்யின் உறைகோடி", line2: "வானம் வழங்காது விடும்.", eng: "If the ruler deviates from justice, the clouds will deviate from their path and refuse to yield rain to the land."},
{num: 560, line1: "ஆபயன் குன்றும் அறுதொழிலோர் நூல்மறப்பர்", line2: "காவலன் காவான் எனின்.", eng: "The yield of cows will diminish and scholars will forget their wisdom if the guardian of the land fails to protect justly."},

{num: 561, line1: "தக்காங்கு நாடித் தலைச்செல்லா வண்ணத்தால்", line2: "ஒத்தாங்கு ஒறுப்பது வேந்து.", eng: "A true king examines an offense justly and punishes it with enough proportion to ensure it is never repeated."},
{num: 562, line1: "கடுமொழியும் கையிகந்த தண்டமும் வேந்தன்", line2: "அடுமுரண் தேய்க்கும் அரம்.", eng: "Harsh words and excessive punishments are a file that wears away a ruler's conquering power."},
{num: 563, line1: "செருவந்த காலத்துச் சிதைவிடன் ஓம்பின்", line2: "வெருவந்த செய்தல் ஒழி.", eng: "If a ruler desires to avoid ruin when war arrives, let him abstain from terrorizing his own people."},
{num: 564, line1: "கடுஞ்செங்கோன் என்றுஏசப் பட்டாற்றான் வேந்தன்", line2: "நெடுங்காலம் நீடித்தல் இல்.", eng: "The king who is branded by his people as a cruel tyrant will see his lifespan and his reign cut short."},
{num: 565, line1: "அரும்பெறல் ஆக்கம் இழந்தும் இகழ்ந்தும்", line2: "வெருவந்த செய்தொழுகு வார்.", eng: "Those who terrify their subjects will lose their hard-earned wealth and be remembered only with contempt."},
{num: 566, line1: "கடுமொழியன் கையிகந்த தண்டத்தன் ஆயின்", line2: "நெடுமொழி நீடாது கெடும்.", eng: "If a ruler uses cruel words and inflicts excessive punishments, his widespread glory will vanish in an instant."},
{num: 567, line1: "இறைகடியன் என்றுஉரைக்கும் இன்னாச்சொல் வேந்தன்", line2: "உறைகடியொடு ஒல்லைக் கெடும்.", eng: "The bitter words of people saying 'Our king is cruel' will act as a curse that brings down his empire quickly."},
{num: 568, line1: "செல்லா இடத்துச் சினம்காப்பான் சினம்காப்பான்", line2: "செல்லா இடத்துஇல் எவன்.", eng: "A ruler who does not build consensus but rules by fear will find his allies abandoning him at the hour of trial."},
{num: 569, line1: "அரணின்றேல் ஆற்றல் இகழும் அரணின்றேல்", line2: "அஞ்சும்கொல் அஞ்சா தவர்.", eng: "If a ruler fails to build inner fortifications of love, even those who are brave will tremble in insecurity under him."},
{num: 570, line1: "வெருவந்த செய்தொழுகும் வெங்கோலன் ஆயின்", line2: "ஒருவந்தம் ஆள்வினை இல்.", eng: "The cruel tyrant who rules by spreading terror will never find diligent and creative energy among his advisors."},

{num: 571, line1: "கண்ணோட்டம் என்னும் கழிபெருங் காரிகை", line2: "உண்மையான் உண்டுஇவ் வுலகு.", eng: "The world continues to exist smoothly because of the beautiful quality called benign considerateness."},
{num: 572, line1: "கண்ணோட்டத்து உள்ளது உலகியல் அஃதிலார்", line2: "மண்ணாள்வது மண்ணின் பாரம்.", eng: "The harmonious course of the world relies on considerateness; those who lack it are a mere burden to the earth."},
{num: 573, line1: "பாடல்சான்ற பண்பின் அமைந்தக் கண்ணும்", line2: "கண்ணோட்டம் இல்லாத கண் எவன்.", eng: "Of what use is a melody if it cannot be sung? Of what use are eyes if they lack the light of kind considerateness?"},
{num: 574, line1: "கண்அளவோடு உள்ளதே கண்ணோட்டம் அஃதிலார்", line2: "கண்அளவோடு உளர்என்று கொளல்.", eng: "True eyes are those that shine with kind considerateness; without it, eyes are mere sores upon the face."},
{num: 575, line1: "கண்ணிற்கு அணிகலம் கண்ணோட்டம் அஃதின்றேல்", line2: "புண்ணென்று உணரப் படும்.", eng: "The true ornament of the eye is its look of benignity; without it, eyes are nothing but open wounds."},
{num: 576, line1: "மண்ணோடு இயைந்த மரம்போல்வர் கண்ணோடு", line2: "இயைந்து கண்ஓடா தவர்.", eng: "Those whose eyes never melt with considerateness are like dead trees rooted blindly in the dirt."},
{num: 577, line1: "கண்ணோட்டம் இல்லவர் கண்இலார் கண்உடையார்", line2: "கண்ணோட்டம் இன்மையார் இல்.", eng: "Those who lack a kind and considerate look are truly blind; those who truly see can never be devoid of courtesy."},
{num: 578, line1: "கருமம் சிதையாமல் கண்ணோட வல்லார்க்கு", line2: "உரிமை உடைத்திவ் வுலகு.", eng: "The world belongs entirely to those who can show kind considerateness without letting their official duties suffer."},
{num: 579, line1: "ஒறுத்தக்கண் ஓடி விழுமமச் செய்தாரும்", line2: "பொறுத்தல் சான்றோர்க்கு அறிவு.", eng: "To show patience and benignity even toward those who have caused you severe injuries is the height of wisdom."},
{num: 580, line1: "பெயக்கண்டும் நஞ்சுண்டு அமைவர் நயத்தக்க", line2: "நாகரிகம் வேண்டு பவர்.", eng: "Those who desire the beauty of supreme courtesy will calmly drink down poison, even when served it openly before their eyes."},

{num: 581, line1: "ஒற்றும் உரைசான்ற நூலும் இவைஇரண்டும்", line2: "தெற்றென்க மன்னவன் கண்.", eng: "The trusted spy and the authoritative codes of law—these two must a ruler look upon as his own eyes."},
{num: 582, line1: "எல்லார்க்கும் எல்லாம் நிகழ்பவை எஞ்ஞான்றும்", line2: "வல்லறிதல் வேந்தன் தொழில்.", eng: "It is the essential duty of a ruler to know everything that happens to everyone, every single day."},
{num: 583, line1: "ஒற்றினான் ஒற்றிப் பொருள்வகை செய்யாதான்", line2: "கொற்றமற்று ஆவதறிது.", eng: "He who does not gather intelligence through spies and analyze it carefully can never secure victory for his state."},
{num: 584, line1: "வினைசெய்வார் தம்சுற்றம் வேண்டாதார் என்றாங்கு", line2: "அனைவரையும் ஆராய்வது ஒற்று.", eng: "A spy must observe everyone: public servants, close kinsmen, and open enemies alike."},
{num: 585, line1: "கடாஅ உருவொடு கண்அஞ்சாது யாண்டும்", line2: "உகாஅமை வல்லதே ஒற்று.", eng: "A true spy assumes an unsuspicious disguise, fears no man's gaze, and never reveals his secret purpose."},
{num: 586, line1: "துறந்தார் படிவத்தர் ஆகி இறந்தாராய்ந்து", line2: "என்செயினும் சோர்விலது ஒற்று.", eng: "Disguised as an ascetic or a monk, a spy enters every secret place, gathers data, and never falters under any trial."},
{num: 587, line1: "மறைந்தவை கேட்கும் மறைபொருளாள் ஒற்று", line2: "அறிந்தவை அறியாமை வேண்டு.", eng: "A spy must extract hidden secrets easily, yet act as if he knows absolutely nothing of the matter."},
{num: 588, line1: "ஒற்றினான் ஒற்றி அறிந்ததுவும் மற்றுமோர்", line2: "ஒற்றினான் ஒற்றிப் கொளல்.", eng: "The intelligence brought by one spy must always be verified through the independent report of a second spy."},
{num: 589, line1: "ஒற்றுஒற்று உணராமை ஆளுக மூவகை", line2: "ஒற்றுஒத்த பின்றைத் தேறல்.", eng: "Manage spies so that they do not know each other; accept a report as true only when three separate spies agree fully."},
{num: 590, line1: "சிறப்பொடு பூசனை செய்யற்க ஒற்றுக்கு", line2: "மறப்பொதிந்து வைப்பாரோடு நேர்.", eng: "Never reward a spy in public; to do so is to expose your own hidden operations to the enemy."},

{num: 591, line1: "உடையர் எனப்படுவது ஊக்கம் அஃதிலார்", line2: "உடையது உடையரோ மற்று.", eng: "True possession is the possession of inner energy; if a man lacks drive, does he really own anything else?"},
{num: 592, line1: "உள்ளம் இலாதவர் எய்தார் உலகத்து", line2: "வள்ளன்மை என்னும் செருக்கு.", eng: "Those who lack inner energy can never enjoy the proud privilege of being a generous benefactor to society."},
{num: 593, line1: "ஆக்கம் இழந்தேமென்று அல்லற்படார் ஊக்கம்", line2: "ஆக்கமுடையான் மாண்பு.", eng: "Those who possess an unyielding drive never lament, 'We have lost our wealth'; they know energy will rebuild it."},
{num: 594, line1: "ஆக்கம் அதர்வினாய்ச் செல்லும் அசைவிலா", line2: "ஊக்க முடையான் உழை.", eng: "Wealth will ask its own way and march straight toward the man who possesses steady, unflagging drive."},
{num: 595, line1: "வெள்ளத் தனைய மலர்நீட்டம் மாந்தர்தம்", line2: "உள்ளத் தனையது உயர்வு.", eng: "The length of a lotus stem is determined by the depth of the water; a man's height in life is determined by his inner energy."},
{num: 596, line1: "உள்ளுவது எல்லாம் உயர்வுள்ளல் மற்றுஅது", line2: "தள்ளினும் தள்ளாமை நீர்த்து.", eng: "Let all your thoughts be aimed at lofty heights; even if your goal is not reached, the mind's grandeur is never lost."},
{num: 597, line1: "சிதைவிடத்து ஒல்கார் உரவோர் புதையம்பிற்", line2: "பட்டுப்பா டூன்றும் களிறு.", eng: "The energetic do not lose heart when struck by failure, just as a war elephant stands firm when showered with arrows."},
{num: 598, line1: "உள்ளம் இலாதவர் எய்தார் உலகத்து", line2: "வள்ளன்மை என்னும் செருக்கு.", eng: "Those who are devoid of inner drive will never enjoy the joy of achieving rare and great deeds on earth."},
{num: 599, line1: "பரியது கூர்ங்கோட்டது ஆயினும் யானை", line2: "வெரூஉம் புலிதாக் குறின்.", eng: "The elephant is massive and has sharp tusks, yet it trembles in fear when attacked by a spirited tiger."},
{num: 600, line1: "உரமொருவற்கு உள்ள வெறுக்கை அஃதிலார்", line2: "மரமக்கள் ஆதலே வேறு.", eng: "A person's true strength is their inner drive; those who lack it are merely trees shaped like human beings."},

{num: 601, line1: "மடிமடிக் கொண்டுஒழுகும் மாண்பிலார்க் கில்லை", line2: "குடிமடிக் கொண்டு கெடும்.", eng: "The bright lamp of a family lineage will flicker and die out if it is overtaken by the dark shadow of sloth."},
{num: 602, line1: "மடியை மடியாஒழுகல் குடிமடியாக்", line2: "கொளல்வேண்டும் தன்மடி வேண்டு பவர்.", eng: "Let him who desires his family to flourish treat laziness as a deadly enemy and slay it immediately."},
{num: 603, line1: "மடிமடிக் கொண்டுஒழுகும் மாண்பிலார்க் கில்லை", line2: "அடிமடிக் கொண்டு கெடும்.", eng: "The foolish person who harbors sloth within his heart will see his life and house fall into deep ruin."},
{num: 604, line1: "நெடுநீர் மறவி மடிதுயில் நான்கும்", line2: "கெடுநீர்மை காமக் கலன்.", eng: "Procrastination, forgetfulness, laziness, and excessive sleep are the fatal vessels that carry a man to destruction."},
{num: 605, line1: "இன்பம் இடும்பை இகந்தானைக் கைகூப்பி", line2: "மன்பதைக் கெல்லாம் இனிது.", eng: "A small boat of sloth will quickly sink in the vast sea of trouble when a person fails to row with diligence."},
{num: 606, line1: "மடிமடிக் கொண்டுஒழுகும் மாண்பிலார்க் கில்லை", line2: "படியாண்மை யென்னும் செருக்கு.", eng: "Those who are enslaved by laziness can never enjoy the proud privilege of leading others or governing affairs."},
{num: 607, line1: "இடிபுரிந்து எள்ளும்சொல் கேட்பர் மடிபுரிந்து", line2: "மாண்ட உவகை யவர்.", eng: "Those who choose laziness over labor will be forced to listen to the mocking reproaches of their neighbors."},
{num: 608, line1: "மடிமை புகுந்தவக் கண்ணும் குடியை", line2: "முடிமை புகுத்து விடும்.", eng: "If sloth is allowed to dwell within a family, it will drag down even the most glorious lineage into bondage."},
{num: 609, line1: "குடிமைக்கண் குற்றத்தைக் குன்றாக்கும் ஒருவன்", line2: "மடிமைக்கண் மாண்டொழுகா தார.", eng: "The blemishes on a family lineage will completely vanish the moment a person shakes off sloth and begins to labor."},
{num: 610, line1: "மடியிலா மன்னவன் எய்தும் அடியளந்தான்", line2: "தாஅயது எல்லாம் ஒருங்கு.", eng: "The ruler who is completely free from laziness will effortlessly inherit all the domains measured by the steps of God."},

{num: 611, line1: "அருமை உடைத்தென்று அசவாமை வேண்டும்", line2: "பெருமை முயற்சி தரும்.", eng: "Never yield to despair saying, 'This task is too difficult'; diligent effort will yield the greatness of success."},
{num: 612, line1: "வினைக்கண் வினையுடையான் கேண்மைவே றாக", line2: "நினைப்பானை நீக்கும் திரு.", eng: "Beware of leaving a task half-done; the world will ruthlessly abandon those who abandon their work midway."},
{num: 613, line1: "தாளாண்மை என்னும் தகைமைக்கண் தங்கிற்றே", line2: "வேளாண்மை என்னும் செருக்கு.", eng: "The noble pride of helping society stands firm only upon the secure foundation of tireless, manful effort."},
{num: 614, line1: "தாளாண்மை இல்லாதான் வேளாண்மை பேணல்", line2: "வாளாண்மை மற்றவன் கை.", eng: "A lazy man boasting of his benevolence is like a coward waving a sharp sword with weak, trembling hands."},
{num: 615, line1: "இன்பம் விழையான் வினைவிழைவான் தன்குடி", line2: "துன்பம் துடைத்தூன்றும் தூண்.", eng: "He who seeks no personal pleasure but loves his work becomes a strong pillar, lifting his family out of distress."},
{num: 616, line1: "முயற்சி திருவினை ஆக்கும் முயலாமை", line2: "இன்மை புகுத்தி விடும்.", eng: "Diligence harvests prosperity and wealth; the lack of effort plunges a person into desperate poverty."},
{num: 617, line1: "மடியுளான் மாமுகடி வைகும் மடியிலான்", line2: "தாளுளான் தாமரையினாள்.", eng: "Misfortune dwells in the home of the lazy man; Goddess Lakshmi resides in the tireless stride of the diligent soul."},
{num: 618, line1: "பொறியின்மை யார்க்கும் பழியன்று அறிவறிந்து", line2: "ஆள்வினை இன்மை பழி.", eng: "To be denied good fortune by destiny is no blemish; to refuse to labor with wisdom and diligence is a true disgrace."},
{num: 619, line1: "தெய்வத்தால் ஆகாது எனினும் முயற்சிதன்", line2: "மெய்வருத்தக் கூலி தரும்.", eng: "Even if fate decrees that the goal cannot be won, honest labor will always yield its reward in proportion to the sweat spent."},
{num: 620, line1: "பொறியின்மை யார்க்கும் பழியன்று அறிவறிந்து", line2: "ஆள்வினை இன்மை பழி.", eng: "Those who labor with unyielding persistence can see even their cruel destiny turning around and fleeing before them."},

{num: 621, line1: "இடுக்கண் வருங்கால் நகுக அதனை", line2: "அடுத்தூர்வது அஃதொப்பது இல்.", eng: "Smile when troubles confront you; there is no weapon equal to a joyful heart to trample down adversity."},
{num: 622, line1: "வெள்ளத் தனைய இடும்பை அறிவுடையான்", line2: "உள்ளத்தின் உள்ளக் கெடும்.", eng: "A whole flood of troubles will completely vanish when a wise man collects his thoughts and faces them calmly."},
{num: 623, line1: "இடும்பைக்கு இடும்பை படுப்பர் இடும்பைக்கு", line2: "இடும்பை படாஅ தவர்.", eng: "Those who refuse to let trouble trouble their minds will find that they have troubled and driven trouble away."},
{num: 624, line1: "மடுத்தவாய் எல்லாம் இடும்பை யொடுக்கும்", line2: "கடுத்தவாய் வையாது அறிவு.", eng: "Like a strong bull that draws a cart through deep mud, the wise man pushes forward, overcoming every obstacle."},
{num: 625, line1: "அடுக்கி வரினும் அழிவிலான் உற்ற", line2: "இடுக்கண் இடுக்கண் படும்.", eng: "Though afflictions crowd one upon another in layers, they will suffer defeat before a man of undaunted spirit."},
{num: 626, line1: "அற்றேமென்று அல்லற்படார் ஊக்கம்", line2: "ஆக்கமுடையான் மாண்பு.", eng: "Those who never boasted in times of wealth will never weep or cry out in despair when overtaken by poverty."},
{num: 627, line1: "இலக்கம் உடம்புஇடும்பைக் கென்றுஅறிந்து ஞானி", line2: "கலக்கக் கணவஞ்சியான் கேடு.", eng: "Knowing that this body is the natural target for pain, the wise man never loses his inner peace when trouble strikes."},
{num: 628, line1: "இன்பம் விழையான் இடும்பை இயல்பென்பான்", line2: "துன்பம் உறுதல் இலன்.", eng: "He who seeks no fleeting pleasure and accepts trouble as a natural part of life will never be crushed by sorrow."},
{num: 629, line1: "இன்பத்துள் இன்பம் விழையாதான் துன்பத்துள்", line2: "துன்பம் உறுதல் இலன்.", eng: "He who does not lose his head in moments of joy will never lose his footing in times of deep distress."},
{num: 630, line1: "இன்னாமை இன்பம் எனக்கொளின் ஆகுந்தன்", line2: "ஒன்னார் விழையும் சிறப்பு.", eng: "He who welcomes hardship as if it were a joy will win a glory that his very enemies will look upon with envy."},

{num: 631, line1: "கருவியும் காலமும் செய்கையும் செய்யும்", line2: "அருவினையும் மாண்டது அமைச்சு.", eng: "He is a true minister who can choose the right means, select the fit time, and execute difficult deeds with mastery."},
{num: 632, line1: "அஞ்சாமை ஈகை அறிவுஊக்கம் இந்நான்கும்", line2: "எஞ்சாமை காப்பது அமைச்சு.", eng: "A minister must possess five qualities: courage, generosity, wisdom, constant drive, and vigilant protection of the people."},
{num: 633, line1: "பிரித்தலும் பேணிக் கொளலும் பிரிந்தாரைப்", line2: "பொருத்தலும் வல்லது அமைச்சு.", eng: "A true statesman knows how to divide enemies, cherish allies, and win back those who have strayed away."},
{num: 634, line1: "தெரிதலும் தேர்ந்து செயலும் ஒருதலையாச்", line2: "சொல்லுதலும் வல்லது அமைச்சு.", eng: "To examine cases thoroughly, choose the right course, and deliver advice with absolute clarity is the statesman's art."},
{num: 635, line1: "அறனறிந்து ஆன்றமைந்த சொல்லான்எஞ் ஞான்றும்", line2: "திறனறிந்தான் தேறப் படும்.", eng: "He who understands justice, speaks with refined wisdom, and knows human nature makes the perfect counselor."},
{num: 636, line1: "மதிநுட்பம் நூலோடு உடையார்க்கு உறுதிநிற்பார்", line2: "முன்னிற்கப் பாயும் எவன்.", eng: "When a sharp natural intellect is matched with deep study of text, what subtle plot can stand against such a minister?"},
{num: 637, line1: "செயற்கை அறிந்தக் கடைத்தும் உலகத்து", line2: "இயற்கை அறிந்து செயல்.", eng: "Though you have learned the theoretical rules from books, act only after understanding the practical ways of the world."},
{num: 638, line1: "அறிகொன்று அறியான் எனினும் உறுதி", line2: "நெறியினால் கூறல் கடன்.", eng: "Even if the ruler is ignorant and rejects sound advice, it is the sacred duty of the minister to state the truth clearly."},
{num: 639, line1: "பழுதொண்ணும் மந்திரியின் பக்கத்துள் தெவ்வெண்", line2: "எழுபது கோடி உறும்.", eng: "A treacherous minister plotting beside a ruler is far more dangerous than seventy crores of open enemies outside."},
{num: 640, line1: "முறையுறழ்ந்து மொய்ம்பிலார் ஆயினும் ஆற்றும்", line2: "திறனுடையார் தேறப் படும்.", eng: "To design a task perfectly but lack the power to execute it is the sign of an incompetent counselor."},

{num: 641, line1: "நாநலம் என்னும் நலனுடைமை அந்நலம்", line2: "யாநலத்து உள்ளதூஉம் அன்று.", eng: "The possession of eloquence is a unique blessing; it is an excellence that stands far above all other talents."},
{num: 642, line1: "ஆக்கமும் கேடும் அதனால் வருதலால்", line2: "காத்தோம்பல் சொல்லின்கண் சோர்வு.", eng: "Since wealth and ruin both flow from the words you utter, guard your tongue against any careless slip."},
{num: 643, line1: "கேட்டார்ப் பிணிக்கும் தகையவாய்க் கேளாரும்", line2: "வேட்ப மொழிவதாம் சொல்.", eng: "True eloquence binds friends fast with its beauty, and wins over enemies by making them listen with desire."},
{num: 644, line1: "திறனறிந்து சொல்லுக சொல்லை அறனும்", line2: "பொருளும் அதனின்ஊங்கு இல்.", eng: "Utter your words after analyzing the context and the listeners; there is no higher virtue or profit than this."},
{num: 645, line1: "சொல்லுக சொல்லைப் பிறிதோர்சொல் அச்சொல்லை", line2: "வெல்லுஞ்சொல் இன்மை அறிந்து.", eng: "Speak your words in such a flawless manner that no opponent can find another word to conquer what you said."},
{num: 646, line1: "வேட்பத்தாம் சொல்லிப் பிறர்சொல் பயன்கோடல்", line2: "மாட்சியற்றார் மாசற்றார் கோள்.", eng: "To speak so that others listen with delight, and to harvest the core truth from the speeches of others, is the rule of the pure."},
{num: 647, line1: "சொலல்வல்லன் சோர்விலன் அஞ்சான் அவனை", line2: "இகல்வெல்லல் யார்க்கும் அரிது.", eng: "He who is eloquent, free from confusion, and knows no fear can never be conquered by anyone in debate."},
{num: 648, line1: "விரைந்து தொழில் கேட்கும் ஞாலம் நிரந்தினிது", line2: "சொல்லுதல் வல்லார்ப் பெறின்.", eng: "The entire world will listen and execute orders quickly if it finds a leader who can deliver sweet and orderly speeches."},
{num: 649, line1: "பலசொல்லக் காமுறுவர் ஆற்றாமை யுள்ளுந்", line2: "சிலசொல்லல் தேற்றா தவர்.", eng: "Those who do not know how to state a truth in a few flawless words are obsessed with using a flood of empty speech."},
{num: 650, line1: "இணரெரி தோய்வன்ன இன்னா செயினும்", line2: "புணரின் வெகுளாமை நன்று.", eng: "They are like blind men trying to describe a flower—those who speak before an assembly without mastering eloquence."},

{num: 651, line1: "துணைநலம் ஆக்கம் தரூஉம் வினைநலம்", line2: "வேண்டிய எல்லாம் தரும்.", eng: "The support of good friends brings prosperity; but purity of action yields everything a heart can desire."},
{num: 652, line1: "என்றும் ஒருவுதல் வேண்டும் புகழொடு", line2: "நன்றி பயவா வினை.", eng: "Always abstain from those actions that do not build lasting renown or yield righteousness to society."},
{num: 653, line1: "ஓஒதல் வேண்டும் ஒளிமாழ்கும் செய்வினை", line2: "ஆஅதும் என்னுமவர்.", eng: "Those who resolve to rise higher in life must reject any action that dims the brilliant light of their reputation."},
{num: 654, line1: "சலத்தால் பொருள்செய்து ஏமார்த்தல் பசுமண்", line2: "கலத்துள்நீர் பெய்துவெளீஇ யற்று.", eng: "Amassing wealth through deceitful and impure actions is like storing water in an unbaked clay pot; it dissolves instantly."},
{num: 655, line1: "இற்றென் இரங்குவ செய்யற்க செய்வானேல்", line2: "மற்றன்ன செய்யாமை நன்று.", eng: "Never perform an action that will make you weep with remorse later; if you err, resolve never to repeat it."},
{num: 656, line1: "ஈன்றாள் பசிகாண்பான் ஆயினும் செய்யற்க", line2: "சான்றோர் பழிக்கும் வினை.", eng: "Even if you must stand and watch your own mother starve, commit no action that the wise condemn as sinful."},
{num: 657, line1: "பழிமலைந்து எய்திய ஆக்கத்தின் சான்றோர்", line2: "கழிநல் குரவே தலை.", eng: "The utter poverty of a noble man who refuses to sin is far greater than the wealth amassed through disgrace."},
{num: 658, line1: "கடிந்த கடிந்தொரார் செய்தவக் கண்ணும்", line2: "முடிந்தாங்கு இடும்பை தரும்.", eng: "Those who ignore warnings and commit forbidden deeds will find their achievements turning into instruments of pain."},
{num: 659, line1: "அழக்கொண்ட எல்லாம் அழப்போம் இழப்பினும்", line2: "பிற்பயக்கும் நற்பால் வைப்பு.", eng: "Wealth acquired by making others weep will leave you with tears; what is gained through pure actions will endure and yield joy."},
{num: 660, line1: "சலத்தால் பொருள்செய்து ஏமார்த்தல் பசுமண்", line2: "கலத்துள்நீர் பெய்துவெளீஇ யற்று.", eng: "To hoard wealth through unrighteous means is like attempting to carry water in a sieve; it leaves you empty in the end."},

{num: 661, line1: "வினைத்திட்பம் என்பது ஒருவன் மனத்திட்பம்", line2: "மற்றைய எல்லாம் பிற.", eng: "Firmness in action is nothing but the absolute firmness of the mind; all other resources are secondary."},
{num: 662, line1: "ஊறொரால் உற்றபின் ஒல்காமை இவ்விரண்டின்", line2: "ஆறென்பர் ஆய்ந்தவர் நூல்.", eng: "To avoid foreseeable failures and to stand unshaken when obstacles arrive—this is the path defined by the wise."},
{num: 663, line1: "கடைக்கொட்கச் செய்தக்கது ஆண்மை இடைக்கொட்கின்", line2: "எற்றா விழுமந் தரும்.", eng: "To reveal an operation only when it is completed is mastery; revealing it midway brings unexpected ruin."},
{num: 664, line1: "சொல்லுதல் யார்க்கும் எளிய அரியவாம்", line2: "சொல்லிய வண்ணம் செயல்.", eng: "To boast of a plan in words is easy for anyone; to execute it exactly as promised is rare and difficult."},
{num: 665, line1: "வீறெய்தி மாண்டார் வினைத்திட்பம் வேந்தன்கண்", line2: "ஊறெய்தி உள்ளப் படும்.", eng: "The firm and flawless actions of an officer will win the trust and high esteem of his leader."},
{num: 666, line1: "எண்ணிய எண்ணியாங்கு எய்துப எண்ணியார்", line2: "திண்ணியர் ஆகப் பெறின்.", eng: "Men can achieve exactly what they planned, provided their minds hold onto the goal with absolute firmness."},
{num: 667, line1: "உருவுகண்டு எள்ளாமை வேண்டும் உருள்பெருந்தேர்க்கு", line2: "அச்சாணி அன்னார் உடைத்து.", eng: "Never mock a person because of their small stature; remember that the massive chariot relies on a tiny linchpin to move."},
{num: 668, line1: "கலங்காது கண்டவிஃது ஒல்வகை வினையைத்", line2: "துளங்காது தூக்கிச் செயல்.", eng: "Once a plan is clearly resolved without confusion, let it be executed without any hesitation or delay."},
{num: 669, line1: "துன்பம் உறவரினும் செய்க துணிவாற்றி", line2: "இன்பம் பயக்கும் வினை.", eng: "Though it brings acute pain during execution, press forward with courage to finish the work that yields lasting joy."},
{num: 670, line1: "எனைத்திட்பம் எய்தியக் கண்ணும் வினைத்திட்பம்", line2: "வேண்டாரை வேண்டாது உலகு.", eng: "Whatever other strengths a man may display, the world ignores him if he lacks firmness in action."},

{num: 671, line1: "சூழ்ச்சி முடிவு துணிவெய்தல் அத்துணிவு", line2: "தாழ்ச்சியுள் தங்குதல் தீது.", eng: "The end of deliberation is to arrive at a firm resolution; to delay executing that resolution is fatal."},
{num: 672, line1: "தூங்குக தூங்கிச் செயற்பால தூங்கற்க", line2: "தூங்காது செய்யும் வினை.", eng: "Take your time over tasks that require slow deliberation; strike instantly without delay where speed is vital."},
{num: 673, line1: "ஒல்லும்வா யெல்லாம் வினையதே செல்லுமவாய்", line2: "எல்லாம் செயற்குஅவகை நேர்.", eng: "Whenever possible, let an action be completed directly; where it fails, adapt your means to achieve the goal."},
{num: 674, line1: "வினையான் வினையாக்கிக் கோடல் நனைகவுள்", line2: "யானையால் யானையாத் தற்று.", eng: "Using one completed task to execute another is like using a wild elephant to trap another wild elephant."},
{num: 675, line1: "பகைப்பொருள் வெஃகிப் பழிப்படுவ செய்யார்", line2: "நடுவன்மை நாணு பவர்.", eng: "Before taking action, ensure you have won over allies, balanced resources, and cleared away internal conflicts."},
{num: 676, line1: "ஆய்ந்தாய்ந்து கொள்ளாதான் ஜாலம் கடைமுறை", line2: "தான்அழிந்து அல்லல் தரும்.", eng: "He who rushes into action without evaluating risks will see his efforts turn into instruments of self-destruction."},
{num: 677, line1: "செயற்கை அறிந்தக் கடைத்தும் உலகத்து", line2: "இயற்கை அறிந்து செயல்.", eng: "The method of executing a task must fit the nature of the people involved, or the work will fail despite your skills."},
{num: 678, line1: "வினையினானே வென்றாரை வெல்லல் அரிது", line2: "துனையினார் துன்னார் எனின்.", eng: "It is impossible to defeat a leader who executes tasks perfectly and keeps his inner strategies completely hidden."},
{num: 679, line1: "நட்டாரை ஆக்கல் நயமிலாரைத் தேற்றுதல்", line2: "எல்லாந் தொழிலின் வகை.", eng: "To secure allies, pacify neutrals, and outmaneuver enemies are all essential strategies in the art of execution."},
{num: 680, line1: "சிறியரென்று எள்ளாராய் செய்வர் பெரியார்", line2: "சிறியாரும் சீர்மை பெறின்.", eng: "The wise do not overlook small errors or minor details, for they know small leaks can sink a great ship."},

{num: 681, line1: "அன்புஅறிவு ஆராய்ந்த சொல்வன்மை தூதுரைப்பார்க்கு", line2: "இன்றி யமையாத மூன்று.", eng: "Loyalty to the state, sharp wisdom, and a powerful, expressive tongue are three absolute prerequisites for an envoy."},
{num: 682, line1: "அன்புஅறிந்து ஆன்றமைந்த சொல்லான்எஞ் ஞான்றும்", line2: "வேந்தற்கு உறுதியுரைப்பான் தூதன்.", eng: "He who knows how to state things beautifully and delivers timely counsel to foreign courts is a true diplomat."},
{num: 683, line1: "நூலாருள் நூல்வல்லன் ஆகுதல் வேந்தர்க்கு", line2: "தூதுரைக்கும் மாண்பின் அறிவு.", eng: "An envoy must be a master of laws and political texts, so he can answer any challenge raised by foreign scholars."},
{num: 684, line1: "மதிநுட்பம் நூலோடு உடையார்க்கு உறுதிநிற்பார்", line2: "முன்னிற்கப் பாயும் எவன்.", eng: "Possessing a sharp natural intellect combined with extensive studies makes an envoy completely invincible in foreign courts."},
{num: 685, line1: "தொகைச்சொல்லித் தூவாத நீக்கி நகச்சொல்லி", line2: "நன்றி பயப்பதாம் தூது.", eng: "An envoy states facts concisely, omits harsh details, speaks pleasantly, and harvests benefits for his state."},
{num: 686, line1: "கற்றுக்கண் அஞ்சான் செலச்சொல்லி காலத்தால்", line2: "தக்க தறிவதாம் தூது.", eng: "An envoy is highly educated, fears no ruler, delivers his message effectively, and acts according to the fluid context."},
{num: 687, line1: "கருமம் சிதையாமல் கண்ணோட வல்லார்க்கு", line2: "உரிமை உடைத்திவ் வுலகு.", eng: "He knows the proper protocol, chooses the perfect hour, and states his master's intent without letting his dignity slide."},
{num: 688, line1: "தூய்மை துணைமை துணிவுடைமை இந்மூன்றின்", line2: "வாய்மை வழியுரைப்பான் தூதன்.", eng: "Purity of character, loyal allies, and undaunted courage are the hallmarks of an envoy who speaks the core truth."},
{num: 689, line1: "விடுமாற்றம் வேந்தர்க்கு உரைப்பான் வடுமாற்றம்", line2: "நெஞ்சில் கரவான் எனின்.", eng: "The messenger who carries an official statement must possess a mind that never wavers or gets confused under threats."},
{num: 690, line1: "இறுதி பயப்பினும் எஞ்சாது இறைவற்கு", line2: "உறுதி உரைப்பதே தூது.", eng: "An envoy will speak what is beneficial to his state even if it brings death upon his own head."},

{num: 691, line1: "அகலாது அணுகாது தீக்காய்வார் போல்க", line2: "இகழ்வேந்தர்ச் சேர்ந்தழுகு வார்.", eng: "Live before rulers like men warming themselves at a fire: stand not too close, and stay not too far away."},
{num: 692, line1: "மன்னர் விழைபவத் தான்விழைதல் மன்னவனால்", line2: "மன்னிய ஆக்கம் தரும்.", eng: "Refrain from desiring those things that the ruler desires; doing so will yield secure and lasting honors."},
{num: 693, line1: "போற்றின் அரியவை போற்றல் கடுத்தபின்", line2: "தேற்றுதல் யார்க்கும் அரிது.", eng: "If you want to survive, guard against serious errors; once a ruler suspects your loyalty, it is impossible to change his mind."},
{num: 694, line1: "செவிச்சொல்லும் சேர்ந்த நகையும் அவியொழுகல்", line2: "ஆன்ற பெரியார் அகத்து.", eng: "Avoid whispering to others or laughing loudly when standing in the presence of an exalted ruler."},
{num: 695, line1: "மறைப்பொருள் கேட்கவே வேண்டா எப்பொருளும்", line2: "இறைப்பொருள் ஏவினால் கேட்டு.", eng: "Never eavesdrop on secret conversations; wait calmly until the ruler chooses to reveal the matter to you."},
{num: 696, line1: "குறிப்பறிந்து காலம் கருதிக் வெறுப்பில", line2: "வேண்டுவ கூறல் கடன்.", eng: "Read the ruler's mood, select the perfect hour, and state your points pleasantly without causing any irritation."},
{num: 697, line1: "மன்னர்க்கு மன்னுதல் செங்கோன்மை அஃதின்றேல்", line2: "மன்னாவாம் வேந்தர்க்கு ஒளி.", eng: "Speak only of useful and serious matters; skip trivial tales even if the ruler listens with interest."},
{num: 698, line1: "இளையர் இனமுறையர் என்றிகழார் நின்ற", line2: "ஒளியோடு ஒழுகப் படும்.", eng: "Never treat a ruler lightly because he is young or a relative; bow before the sovereign light that he embodies."},
{num: 699, line1: "மதியுடையாம் என்றுஆய்ந்து மாண்பில செய்யின்", line2: "விதிநுட்பம் இல்லாரைக் கெடும்.", eng: "Those who boast of their intellect and commit unseemly deeds will be cast away by the ruler into utter ruin."},
{num: 700, line1: "பழையம் எனக்கருதிப் பண்பல்ல செய்யும்", line2: "கெழுதகைமை கேடு தரும்.", eng: "Presuming upon long intimacy and doing discourteous things will bring down swift destruction upon an officer."},

{num: 701, line1: "கூறாமல் நோக்கிக் குறிப்பறிவான் எஞ்ஞான்றும்", line2: "மாறா உலகிற்கு அணி.", eng: "He who can read the inner thoughts of another by merely looking at their face is an ornament to the world."},
{num: 702, line1: "ஐயத்தின் நீங்கித் தெளிந்தார் நெஞ்சத்து", line2: "வையத்தின் வானம் நணித்து.", eng: "He who can discern thoughts without doubt should be counted as equal to a god among men."},
{num: 703, line1: "குறிப்பின் குறிப்புணர் வாரை உறுப்பினுள்", line2: "யாது கொடுத்துங் கொளல்.", eng: "At any cost, secure as an officer the person who can read the mind's intent through outward expressions."},
{num: 704, line1: "கூறாமை நோக்கிக் குறிப்பறி வாரோடு", line2: "ஏனைமாந்து உளர்என்று கொளல்.", eng: "Those who can read thoughts without words stand apart; others are merely human in bodily shape alone."},
{num: 705, line1: "கண்ணோட்டம் என்னுங் கழிபெருங் காரிகை", line2: "உண்மையான் உண்டுஇவ் வுலகு.", eng: "Of what use is the eye if it cannot read the inner feelings of another person through its gaze?"},
{num: 706, line1: "அடுத்தது காட்டும் பளிங்குபோல் நெஞ்சம்", line2: "கடுத்தது காட்டும் முகம்.", eng: "Just as a clear mirror reflects adjacent objects, the face reflects the true state of the hidden heart."},
{num: 707, line1: "முகத்தின் முதுக்குறைந்தது உண்டோ உவப்பினும்", line2: "காயினும் தான்முந் துறும்.", eng: "Is there anything wiser than the face? Whether the mind is filled with love or anger, the face proclaims it first."},
{num: 708, line1: "முகம்நோக்கி நிற்க அமையுமே நெஞ்சம்", line2: "இனம்நோக்கி நிற்கும் அறிவு.", eng: "To understand an assembly, it is enough to stand and observe their faces; the wise find all clues there."},
{num: 709, line1: "பகைமையும் கேண்மையும் கண்ணுரைக்கும் கண்ணின்", line2: "வகைமை உணர்வார்ப் பெறின்.", eng: "The eyes reveal both hidden hostility and deep friendship to those who know how to decode their expressions."},
{num: 710, line1: "நுண்ணியம் என்பார் அளக்குங்கோல் காணுங்கால்", line2: "கண்ணல்லது இல்லை வேறு.", eng: "The absolute measuring rod of those who claim to possess a subtle intellect is nothing but the eye itself."},

{num: 711, line1: "சொல்வகை அறிந்து சொலல்வேண்டும் சொல்லிய", line2: "வண்ணம் செயல்அறிவு நேர்.", eng: "Analyze the nature of the assembly and speak your words with care; this is the rule of flawless eloquence."},
{num: 712, line1: "அவையறிந்து ஆராய்ந்து சொல்லுக சொல்லை", line2: "நெறியறிந்த மாசற்றார் கோள்.", eng: "Let him who knows how to use words study the assembly first, and then speak with pure confidence."},
{num: 713, line1: "அவைகாணின் அஞ்சுவான் கல்வி பலகற்றும்", line2: "கல்லா அறிவிலார் நேர்.", eng: "To speak wisely before a wise gathering is great; to speak simply before an unlearned gathering is equally wise."},
{num: 714, line1: "ஒளியார்முன் ஒள்ளியர் ஆதல் வெளியார்முன்", line2: "வெண்முத்துப் பூணாரோடு நேர்.", eng: "Shine with brilliant wisdom before the wise; but remain simple and quiet before those who are ignorant."},
{num: 715, line1: "நன்றாய்ந்த ஞானத்துள் எய்தும் அவையறிந்து", line2: "நன்கு உரைப்பார் வாய்ச்சொல்.", eng: "The words spoken by one who adapts his speech to the nature of the assembly shine out as pure virtue."},
{num: 716, line1: "கற்றார்முன் கற்ற செலச்சொல்லித் தாம் கற்ற", line2: "மிக்காருள் மிக்க கொளல்.", eng: "Deliver your learning effectively before the wise; and gather rare new insights from those who know more than you."},
{num: 717, line1: "சொலல்வல்லன் சோர்விலன் அஞ்சான் அவனை", line2: "இகல்வெல்லல் யார்க்கும் அரிது.", eng: "Debating before an assembly requires both a clear mind and a deep knowledge of the listeners' nature."},
{num: 718, line1: "வகைஅறிந்து வல்லவை வாய்சோரார் மாண்ட", line2: "அகையறிந்து ஆய்ந்த அறிவு.", eng: "The wise never allow an incorrect word to escape their lips when speaking before a refined audience."},
{num: 719, line1: "புல்லறிவாளர் முன் சொல்லல் நயனில", line2: "நட்டார்கண் செய்தலின் தீது.", eng: "To waste eloquent speeches before a foolish audience is like dropping precious pearls into a muddy gutter."},
{num: 720, line1: "அங்கண் விசும்பின் விளக்குஅன்னார் ஆயினும்", line2: "மங்கண் அவையார்முன் இல்.", eng: "Never pour out your heart's wisdom before an audience that is hostile or entirely devoid of understanding."},

{num: 721, line1: "வகையறிந்து வல்லவை வாய்சோரார் மாண்ட", line2: "அகையறிந்து ஆய்ந்த அறிவு.", eng: "Those who are completely free from fear can speak their refined thoughts before any wise assembly smoothly."},
{num: 722, line1: "கற்றார்முன் கற்ற செலச்சொல்லித் தாம் கற்ற", line2: "மிக்காருள் மிக்க கொளல்.", eng: "To state your learning with confidence before scholars proves you have truly digested your education."},
{num: 723, line1: "அவைகாணின் அஞ்சுவான் கல்வி பலகற்றும்", line2: "கல்லா அறிவிலார் நேர்.", eng: "Many are brave enough to die fighting on battlefields, but few can stand and speak before a wise assembly without trembling."},
{num: 724, line1: "ஒளியார்முன் ஒள்ளியர் ஆதல் வெளியார்முன்", line2: "வெண்முத்துப் பூணாரோடு நேர்.", eng: "Deliver your facts clearly to the wise, and defend your positions with courage without any panic."},
{num: 725, line1: "அஞ்சாமை ஒன்றே தனித்துஆற்றல் சான்றோர்க்குப்", line2: "பொய்யா விளக்கே விளக்கு.", eng: "The strength of fearlessness before an assembly is the finest quality that crowns a scholar's learning."},
{num: 726, line1: "வாளொடு என் வன்கண்ணர் அல்லார்க்கு நூலொடு என்", line2: "நுண்ணவை அஞ்சு பவர்க்கு.", eng: "Of what use is a sword to a coward? Of what use is deep learning to someone who trembles before an assembly?"},
{num: 727, line1: "பகையகத்துச் சாவார் பலராவார் அவையகத்து", line2: "அஞ்சாது நிற்பார் சிலர்.", eng: "The learning of a person who panics before an audience is like a sharp weapon held by a weak, trembling hand."},
{num: 728, line1: "பலகற்றும் தேறாதார் கல்வி அவையகத்து", line2: "அஞ்சுவான் கற்ற நூல்.", eng: "Though they have read multiple volumes, those who lack courage before an assembly profit nothing from their studies."},
{num: 729, line1: "அவையாண்மை இல்லாதான் கல்வி அவையகத்து", line2: "அஞ்சுவான் கற்ற நூல்.", eng: "The world looks upon a fearful scholar as a dead soul; his voice carries no weight or influence among men."},
{num: 730, line1: "உளரெனினும் இல்லாரோடு ஒப்பர் அவையகத்து", line2: "அஞ்சுவான் கற்ற நூல்.", eng: "Those who are too terrified to speak their knowledge before their peers are dead even while they live."},

{num: 731, line1: "தள்ளா விளையுளும் தக்காரும் தாழ்விலாச்", line2: "செல்வரும் சேர்வது நாடு.", eng: "An ideal country is that which has unfailing harvests, noble sages, and wealthy citizens who share their riches."},
{num: 732, line1: "பெரும்பொருளால் பெட்டக்க தாகி அருங்கேட்டான்", line2: "ஆற்ற விளைவது நாடு.", eng: "A great country attracts immigrants by its deep resources, and remains free from devastating plagues."},
{num: 733, line1: "பொறையொருங்கு மேல்வருங்கால் தாங்கி இறைவற்கு", line2: "இறையொருங்கு நேர்வது நாடு.", eng: "It can bear any sudden burden of refugees easily, and pays its state revenues without any strain."},
{num: 734, line1: "உறுபசியும் ஓவாப் பிணியும் செறுபகையும்", line2: "சேராது நீங்குவது நாடு.", eng: "Freedom from grinding hunger, chronic diseases, and destructive foreign invasion is the hallmark of a great country."},
{num: 735, line1: "பல்குழுவும் பாழ்செய்யும் உட்பகையும் வேந்தலைக்கும்", line2: "கொல்குறும்பும் இல்லது நாடு.", eng: "An ideal territory is free from warring factions, hidden internal traitors, and violent border bandits."},
{num: 736, line1: "கேடறியாக் கெட்ட இடத்தும் வளங்குன்றா", line2: "நாடென்ப நாட்டின் தலை.", eng: "The foremost of all countries is that which has never been ruined, and recovers its full prosperity quickly if hit by disaster."},
{num: 737, line1: "இருபுனலும் வாய்ந்த மலையும் வருபுனலும்", line2: "வல்லரணும் நாட்டுக்கு உறுப்பு.", eng: "Two water sources (rain and springs), majestic mountains, flowing rivers, and a secure fortress are the limbs of a country."},
{num: 738, line1: "பிணியின்மை செல்வம் விளைவுஇன்பம் ஏமம்", line2: "அணிஎன்ப நாட்டிற்கு இந் ஐந்து.", eng: "Health, wealth, abundant harvests, public joy, and safety—these five are the ornaments of a land."},
{num: 739, line1: "நாடென்ப நாடா வளத்தன நாடல்ல", line2: "நாட வளம் தரும் நாடு.", eng: "A true country yields wealth naturally without painful labor; a land that requires constant toil to produce food is secondary."},
{num: 740, line1: "ஆங்கமைந்த எல்லாமும் ஆயினும் வேந்தன்", line2: "காப்பமைந்து இல்லா நாடு.", eng: "Though blessed with all these natural resources, a country is nothing if it lacks a leader who guards it with vigilance."},

{num: 741, line1: "ஆற்று பவர்க்கும் அரண்பொருள் அஞ்சித்தற்", line2: "போற்று பவர்க்கும் பொருள்.", eng: "A fortress is vital for offensive forces marching to war, and serves as a secure shield for defensive forces guarding the state."},
{num: 742, line1: "மணிநீரும் மண்ணும் மலையும் அணிநிழற்", line2: "காடும் உடையது அரண்.", eng: "A clear moat, vast open fields, towering mountains, and a dense, protective forest constitute a natural fortress."},
{num: 743, line1: "உயரம் அகலம் திண்மை அருமை", line2: "அந்நான்கின் அமைந்தது அரண்.", eng: "Towering height, massive width, solid durability, and inaccessibility are the four criteria for a defensive wall."},
{num: 744, line1: "சிறுகாப்பின் பேரிடத்த தாகி உறுபகை", line2: "ஊக்கம் அழிப்பது அரண்.", eng: "A great fort requires few defenders to hold, covers a large area inside, and destroys the attacking spirit of enemies."},
{num: 745, line1: "கொளற்கரிதாய்க் கொண்டகண் டஞ்சாது உட்பங்கிற்கு", line2: "உளற்கரிதாய் நின்றது அரண்.", eng: "It is impossible to capture by siege, has abundant provisions stored inside, and is secure against covert saboteurs."},
{num: 746, line1: "எல்லாப் பொருளும் உடைத்தாய் இடத்துதவும்", line2: "நல்லாள் உடையது அரண்.", eng: "A true fortress contains all necessary weapons and supplies, and houses brave soldiers ready to stand and fight."},
{num: 747, line1: "முற்றலாலும் முற்றி எறிதலாலும் உள்ளிருந்தார்", line2: "செய்வினையான் வெல்லற்பாற் றன்று.", eng: "It cannot be overtaken by a prolonged blockade, a direct assault, or mining operations from beneath the ground."},
{num: 748, line1: "முற்றியும் முற்றாது எறிந்தும் அறைகூவும்", line2: "பற்றாரைப் பற்றுறுப்பது அரண்.", eng: "The fort allows defenders to successfully hold their ground and defeat attackers who outnumber them heavily."},
{num: 749, line1: "முனைமுகத்து மாற்றலர் சாய வினைமுகத்து", line2: "வீறெய்தி மாண்டது அரண்.", eng: "A fortress achieves supreme glory by enabling a small band of heroes to shatter the invading army at the gate."},
{num: 750, line1: "எனைமாட்சித் தாகியக் கண்ணும் வினைமாட்சி", line2: "இல்லார்கண் இல்லது அரண்.", eng: "Though built with flawless engineering and majestic strength, a fortress is nothing if the soldiers defending it lack courage."},

{num: 751, line1: "பொருளல் லவரைப் பொருளாகச் செய்யும்", line2: "பொருளல்ல தில்லை பொருள்.", eng: "There is nothing else on earth that can turn a person of no consequence into a person of worth like wealth."},
{num: 752, line1: "இல்லாரை எல்லாரும் எள்ளுவர் செல்வரை", line2: "எல்லாரும் செய்வர் சிறப்பு.", eng: "Those who have no wealth are despised by all; those who possess riches are honored and exalted by everyone."},
{num: 753, line1: "பொருளென்னும் பொய்யா விளக்கம் இருளறுக்கும்", line2: "எண்ணிய தேயத்துச் சென்று.", eng: "The unblinking lamp called wealth moves into any chosen land and completely dispels the darkness of adversity."},
{num: 754, line1: "அறன்ஈனும் இன்பமும் ஈனும் திறன்அறிந்து", line2: "தீதின்றி வந்த பொருள்.", eng: "Wealth acquired through honest, blameless means and handled with wisdom yields both virtue and pure joy."},
