{num: 755, line1: "அருளொடும் அன்பொடும் வாராப் பொருளாக்கம்", line2: "புல்லார் புரள விடல்.", eng: "Reject and cast away any wealth that does not flow from mercy and deep love for humanity."},
{num: 756, line1: "உறுபொருளும் உல்கு பொருளும் தன்ஒன்னார்த்", line2: "தெறுபொருளும் வேந்தன் பொருள்.", eng: "Unclaimed properties, customs duties, and tributes won from defeated enemies constitute the legitimate revenue of a ruler."},
{num: 757, line1: "அருளென்னும் அன்பீன் குழவி பொருளென்னும்", line2: "செல்வச் செவிலியால் உண்டு.", eng: "The infant called Mercy, born of Love, is nourished and sustained by the wealthy foster-mother called Material Abundance."},
{num: 758, line1: "குன்றேறி யானைப்போர் கண்டற்றால் தன்கைத்தொன்", line2: "துண்டாகச் செய்வான் வினை.", eng: "Executing an enterprise with one's own capital is like standing safely on a hilltop to watch an elephant fight below."},
{num: 759, line1: "செய்க பொருளைச் செறுநர் செருக்கறுக்கும்", line2: "எஃகதனின் கூரியது இல்.", eng: "Accumulate wealth; there is no sharper weapon than riches to cut down the arrogant pride of your enemies."},
{num: 760, line1: "ஒண்பொருள் காழ்ப்ப இயற்றியார்க்கு எண்பொருள்", line2: "ஏனை இரண்டும் ஒருங்கு.", eng: "He who has flawlessly acquired vast wealth can effortlessly secure both virtue and worldly pleasure at once."},

{num: 761, line1: "உறுப்புஅமைந்து ஊறுஅஞ்சா வெல்படை வேந்தன்", line2: "வெறுக்கையுள் எல்லாம் தலை.", eng: "A well-organized army that fears no injury and wins victories is the crown of all a ruler's possessions."},
{num: 762, line1: "உலைவிடத்து ஊறுஅஞ்சா வன்கண் தொலைவிடத்துத்", line2: "தொல்படைக் கல்லால் அரிது.", eng: "To stand unshaken during defeats and fear no wounds belongs only to a hereditary army of long lineage."},
{num: 763, line1: "அழிவன்று அறைகூவும் ஆழ்கடல் போன்ற", line2: "வழிவந்தது வான்படை யென்று.", eng: "Like the roaring ocean, a veteran army stands its ground even when the enemy forces crush them with superior numbers."},
{num: 764, line1: "நிலைமக்கள் சால உடைத்தெனினும் தானை", line2: "தலைமக்கள் இல்வழி இல்.", eng: "Though consisting of countless brave soldiers, an army is nothing if it lacks brilliant, strategic commanders."},
{num: 765, line1: "ஒடலவிழ்ந்த வன்கண் உடைத்தாயினும் தானை", line2: "முன்னிற்கப் பாயும் எவன்.", eng: "An army may possess raw courage, but its true strength lies in its ability to resist the enemy's sudden, fierce charges."},
{num: 766, line1: "மறமானம் மாண்ட வழிச்செலவு தேற்றம்", line2: "எனநான்கே ஏமம் படைக்கு.", eng: "Valor, honor, loyalty to traditions, and trustworthiness—these four qualities are the armor of an army."},
{num: 767, line1: "திறனறிந்து தேர்ந்துசெய் வஃதே முறைசெய்து", line2: "மறனறிந்து வாரா படை.", eng: "An army should know how to charge effectively, withstand sieges, and follow the rules of honorable warfare."},
{num: 768, line1: "அடல்தகையும் ஆற்றலும் இல்லெனினும் தானை", line2: "படைத்தகையால் பாடு பெறும்.", eng: "Even if it lacks aggressive striking power, an army wins respect by its flawless alignment and imposing appearance."},
{num: 769, line1: "சிறுமையும் செல்லா இடமும் இகழும்", line2: "உறுபகை யில்லா படை.", eng: "An army will win if it is free from desertion, internal mutiny, grinding poverty, and burning animosity toward its leaders."},
{num: 770, line1: "நிலைமக்கள் சால உடைத்தெனினும் தானை", line2: "தலைமக்கள் இல்வழி இல்.", eng: "Even if it has numbers, a force without discipline and unity will dissolve before a small, determined enemy."},

{num: 771, line1: "என்னைமுன் நில்லன்மின் தெவ்விர் பலரென்னை", line2: "முன்னின்று கல்நின்ற வர்.", eng: "O enemies, stand not before my commander! Many who stood before him now stand as hero-stones on the battlefield."},
{num: 772, line1: "கான முயலெய்த அம்பினில் யானை", line2: "பிழைத்தவேல் ஏந்தல் இனிது.", eng: "It is far nobler to hold a spear that missed a massive elephant than to hold an arrow that effortlessly pierced a woodland rabbit."},
{num: 773, line1: "பேராண்மை என்ப தறுகண்ஒன்று உற்றக்கால்", line2: "ஊராண்மை மற்றதன் எஃகு.", eng: "Fierce valor in battle is true manhood; but showing mercy to a fallen enemy is the sharpest edge of that manhood."},
{num: 774, line1: "கைவேல் களிற்றொடு போக்கி வருபவன்", line2: "மெய்வேல் பறியா நகும்.", eng: "Having hurled his spear at a charging elephant, the hero spots a fresh spear embedded in his own flesh, plucks it out, and smiles."},
{num: 775, line1: "விழித்தக்கண் வேல்கொண்டெறிய அழித்திமைப்பின்", line2: "ஒட்டன்றோ வன்க ணவர்க்கு.", eng: "If a warrior merely blinks his eyes when a spear is hurled at his face, the wise count it as a shameful retreat."},
{num: 776, line1: "விழுப்புண் படாதநா ளெல்லாம் வழுக்கினுள்", line2: "வைக்கும்தன் நாளை எடுத்து.", eng: "A true hero counts all those days in his life as utterly wasted on which he received no glorious wounds upon his chest."},
{num: 777, line1: "சுழலும் இசைவேண்டி வேண்டா உயிரார்", line2: "கழல்யாப்புக் காரிகை யுடைத்து.", eng: "The sounding anklet worn by those who disregard their lives for the sake of lasting glory is beautiful to behold."},
{num: 778, line1: "உறங்குவது போலும் சாக்காடு உறங்கி", line2: "விழிப்பது போலும் பிறப்பு.", eng: "Those heroes who fear no loss of life in battle do not lose their martial spirit even when the leader commands a retreat."},
{num: 779, line1: "இழைத்தாரும் வைதாரும் செய்கிற்பார் யாரே", line2: "பிழைத்தார்தாங் கூறிய சொற்.", eng: "Who can blame a hero for failing to achieve a goal, when he willingly lays down his life trying to fulfill his oath?"},
{num: 780, line1: "புரந்தார்கண் நீர்மல்கச் சாகிற்பின் சாக்காடு", line2: "இரந்துகோள் தக்கது உடைத்து.", eng: "If a warrior can die causing his ruler to weep tears of gratitude, such a death is worth begging fortune to give."},

{num: 781, line1: "செயற்கரிய யாவுள நட்பின் அதுபோல்", line2: "வினைக்கரிய யாவுள காப்பு.", eng: "What is more difficult to acquire than true friendship? What shield offers greater defense against adversity?"},
{num: 782, line1: "நிறைநீர நீரவர் கேண்மை பிறைமதிப்", line2: "பின்நீர பேதையார் நட்பு.", eng: "The friendship of the wise grows like the crescent moon; the attachment of fools fades away like the waning moon."},
{num: 783, line1: "நவில்தொறும் நூல்நயம் போலும் பயில்தொறும்", line2: "பண்புடை யாளர் தொடர்பு.", eng: "Like the deep beauty revealed by repeated reading of a classic text, the friendship of the refined yields more joy the longer it lasts."},
{num: 784, line1: "நகுதற் பொருட்டன்று நட்பு மிகுதிக்கண்", line2: "மேற்சென்று இடித்தற் பொருட்டு.", eng: "Friendship is not formed for mere laughing and merrymaking; it exists to step forward and sharply rebuke a friend when they err."},
{num: 785, line1: "புணர்ச்சி பழகுதல் வேண்டா உணர்ச்சிதான்", line2: "நட்பாங் கிழமை தரும்.", eng: "Frequent physical meetings or long familiarity are not needed; a shared, identity of feeling alone seals true friendship."},
{num: 786, line1: "முகநக நட்பது நட்பன்று நெஞ்சத்து", line2: "அகநக நட்பது நட்பு.", eng: "Friendship does not reside in a pleasant smile on the face; it is a profound affection where the inner heart rejoices."},
{num: 787, line1: "அழிவிந் நீக்கி ஆறுய்த்து அழிவின்கண்", line2: "அல்லல் உழப்பதாம் நட்பு.", eng: "To turn a friend away from evil paths, direct them toward virtue, and share their burdens during ruin is true friendship."},
{num: 788, line1: "உடுக்கை இழந்தவன் கைபோல ஆங்கே", line2: "இடுக்கண் களைவதாம் நட்பு.", eng: "True friendship acts like the hand of a man whose garment suddenly slips; it moves instantly to remedy distress without delay."},
{num: 789, line1: "நட்பிற்கு வீற்றிருக்கை யாதெனில் கொட்பின்றி", line2: "ஒல்லும்வாய் ஊன்றும் நிலை.", eng: "Where is the throne of true friendship? It sits where two souls support each other unswervingly with all their power."},
{num: 790, line1: "இனையர் இவரெமக்கு இன்னம்யாம் என்று", line2: "புனையினும் புல்லென்னும் நட்பு.", eng: "To boast, 'He is so close to me, and I am so close to him,' strips friendship of its natural dignity and beauty."},

{num: 791, line1: "நாடாது நட்டலின் கேடில்லை நட்டபின்", line2: "வீடில்லை நட்பாள் பவர்க்கு.", eng: "There is no greater harm than forming a friendship without testing; once formed, it is impossible to break ties easily."},
{num: 792, line1: "ஆய்ந்தாய்ந்து கொள்ளாதான் கேண்மை கடைமுறை", line2: "தான்அழிந்து அல்லல் தரும்.", eng: "He who forms an alliance without repeatedly checking character will find that friendship leading him into deep ruin."},
{num: 793, line1: "குணனும் குடிமையும் குற்றமும் குன்றா", line2: "இனனும் அறிந்துயார்க் குநட்பு.", eng: "Check a man's character, his lineage, his natural faults, and his choice of associates before making him your friend."},
{num: 794, line1: "குடிபிறந்து குற்றமற் றானைப்பொருள் கொடுத்துங்", line2: "கொள்ளற்பாற் சூழ்ந்து நெறி.", eng: "At any cost, secure the friendship of a person who comes from a noble family and is ashamed of committing a blemish."},
{num: 795, line1: "அழச்சொல்லி அல்லதிடித்து வழக்கறியா", line2: "நம்மோடு நட்டார்க்கு நல்.", eng: "Choose friends who will make you weep for your errors, sharply restrain your vices, and guide you toward virtue."},
{num: 796, line1: "கேட்டினும் உண்டுஓர் உறுதி கிளைஞரை", line2: "நீட்டி அளப்பதோர் கோல்.", eng: "Even adversity holds a hidden blessing; it acts as a precise measuring rod that shows the true depth of a friend's loyalty."},
{num: 797, line1: "ஊதியம் என்பது ஒருவற்குப் பேதையார்", line2: "கேண்மை ஒரீஇ விடல்.", eng: "The greatest profit a person can win in life is to completely cut off ties with ignorant and worthless fools."},
{num: 798, line1: "உள்ளற்க உள்ளம் சிறுகுவ கொள்ளற்க", line2: "அல்லற்கண் ஆற்றார்தம் நட்பு.", eng: "Never let your thoughts aim at small goals; never accept the friendship of those who abandon you in the hour of distress."},
{num: 799, line1: "இடுக்கண் வருங்கால் நகுக அதனை", line2: "அடுத்தூர்வது அஃதொப்பது இல்.", eng: "The friendship of those who walk away when fortune fades is a recurring wound that inflicts deep sorrow upon the mind."},
{num: 800, line1: "மருவுக மாசற்றார் கேண்மைஒன்று ஆற்றின்", line2: "ஒருவுக ஒப்பில்லார் நட்பு.", eng: "Hold fast to the friendship of faultless men; quietly slip away from the alliance of those who lack basic virtue."},

{num: 801, line1: "பழைமை எனப்படுவது யாதெனின் யாதொன்றும்", line2: "கிழமையைக் கீழ்வழியா நெறி.", eng: "What is called intimate friendship? It is a state where a friend's free actions are accepted without any offense taken."},
{num: 802, line1: "நட்பிற்கு உறுப்புக்கெழு தகைமை அவணின்றே", line2: "பெட்பு அறிவுடை யார்.", eng: "The essential limb of long-standing friendship is freedom of familiarity; the wise welcome such intimacy with love."},
{num: 803, line1: "பழையம்கண் நோற்றுப் பழகிற்றேல் வேந்தன்", line2: "கிழமை சிதையாமல் காப்பார்.", eng: "When a friend presumes upon long intimacy and takes liberties, the wise accept it smoothly as a right of affection."},
{num: 804, line1: "விழைதகையான் வேண்டி யிருப்பர் கெழுதகையாற்", line2: "கேளாது நட்டார் செயின்.", eng: "If close friends execute an action on your behalf without asking, welcome it with joy because of their loving familiarity."},
{num: 805, line1: "பேதைமைத் தேறல் எனல்வேண்டா நட்டார்கண்", line2: "ஏதம் பலவும் தரும்.", eng: "If an intimate friend does something that causes you pain, view it either as ignorance or as a special privilege of love."},
{num: 806, line1: "எல்லை கடவார் பழைமையார் எவ்வகையான்", line2: "தொல்லைத் தொடர்புடை யார்.", eng: "Those who possess the true spirit of long-standing friendship will never break their loyalty, even if they suffer damage."},
{num: 807, line1: "அழிவந்த செய்யினும் அன்பறார் அன்பின்", line2: "வழிவந்த கேண்மை யவர்.", eng: "Those bound by hereditary friendship do not cast away their love, even when a friend acts to their ultimate detriment."},
{num: 808, line1: "கேளிழுக்கம் கேளாக் தகைமையார் நட்பினை", line2: "நாளிழுக்கம் வாரா துலகு.", eng: "The world will never see the decline of those noble friends who refuse to listen to reproaches against their comrades."},
{num: 809, line1: "கெடாஅ வழிவந்த கேண்மையார் கேண்மை", line2: "விடாஅர் விழையும் உலகு.", eng: "The whole world loves those who hold fast to undying, ancestral friendships that have never been broken by time."},
{num: 810, line1: "பழையம்கண் நோற்றுப் பழகிற்றேல் வேந்தன்", line2: "கிழமை சிதையாமல் காப்பார்.", eng: "Even enemies admire the loyalty of a person who never allows long-standing, intimate ties to be damaged by a single error."},

{num: 811, line1: "பருகுவார் போலினும் பண்பிலார் கேண்மை", line2: "பெருகலின் குன்றல் இனிது.", eng: "Though their affection seems so intense that they could swallow you, it is better if the friendship of the unrefined diminishes."},
{num: 812, line1: "உறின்நட்டு அறின்ஒரூஉம் ஒப்பிலார் கேண்மை", line2: "பெறினும் இழப்பினும் என்.", eng: "What do you gain or lose by ending an alliance with those who fawn over you in prosperity and abandon you in adversity?"},
{num: 813, line1: "உறுவது சீர்தூக்கும் நட்பும் பெறுவது", line2: "கொள்வாரும் கள்வரும் நேர்.", eng: "Friends who constantly calculate personal profit, mercenaries who serve for gain, and thieves are all identical in nature."},
{num: 814, line1: "அமரகத்து ஆற்றாரும் அஞ்சும்கொல் அஞ்சா", line2: "தமரகத்து ஆற்றாரை விட்டு.", eng: "A false friend who deserts you on the field of crisis is far more dangerous than an open enemy fighting before you."},
{num: 815, line1: "செய்தேமமச் செய்யாது சிதைக்கும் பகைவர்போல்", line2: "மையல் அறிவார் நட்பு.", eng: "The attachment of low, ignoble minds who break promises is like a hidden snare; never let your heart trust them."},
{num: 816, line1: "பேதையார் நட்பின் அறிவுடையார் ஏமுற்ற", line2: "பகைமை எழுமை உறும்.", eng: "The open hostility of a wise man yields far better results than the close, intimate alliance of an ignorant fool."},
{num: 817, line1: "நகைவகையான் ஆகுவது உண்டோ பிறிதின்நோய்", line2: "தன்நோய்போல் போற்றாக் கடை.", eng: "The enmity of an opponent brings far more growth than a friendship that offers nothing but empty laughter and jokes."},
{num: 818, line1: "ஒல்லும் கருமம் உடன்படா தாரைவிட்", line2: "டொல்லும்வா யெல்லாம் விட்டிடல்.", eng: "If a friend quietly undermines a task while pretending to support it, drop their alliance without any hesitation."},
{num: 819, line1: "சொல்லொன்று மற்றுஅவர் செய்பொன்று மாண்பிலார்", line2: "புல்லென்னும் கேண்மை விடல்.", eng: "The alliance of hypocrites whose words state one thing while their actions execute another will bring nothing but deep pain."},
{num: 820, line1: "இணரெரி தோய்வன்ன இன்னா செயினும்", line2: "புணரின் வெகுளாமை நன்று.", eng: "Avoid those who look like friends in public but plot your downfall in private; their intimacy is a deadly poison."},

{num: 821, line1: "சீரிடத்துக் கானின் எறியும் பகைவர்கேண்", line2: "கூடாநின்று உட்பகை யாய்க் கொளல்.", eng: "The alliance of an opponent who merely waits for the perfect hour to strike is like a hidden internal cancer."},
{num: 822, line1: "மனத்தின் அமையாது மைந்துறும் போழ்தின்", line2: "இனத்தின் அமையா தவர்.", eng: "The words of those who are not unified with you at heart will change the moment their personal interests are satisfied."},
{num: 823, line1: "சொல்லினால் நல்வகை காட்டிச் செயல்வகையான்", line2: "அல்லவை செய்யாரை விட்டு.", eng: "Beware of opponents who speak with scriptural sweetness while their hands prepare a trap; reject them completely."},
{num: 824, line1: "தொழுதகை யுள்ளும் படையொடுங்கும் ஒன்னார்", line2: "அழுதகண்ணீரும் அனைத்து.", eng: "A hidden weapon can be concealed within an enemy's joined hands of worship; even his weeping tears are part of a plot."},
{num: 825, line1: "மிகச்செய்து தம்நெஞ்சம் நட்பிலாரை வேந்தன்", line2: "மிகச்செய்து மாண்பின் விடல்.", eng: "When those who hate you display excessive, unnatural affection, return that courtesy in words but keep them at a distance."},
{num: 826, line1: "பகைநட்பாம் காலம் வருங்கால் முகம்நட்டு", line2: "அகம்நட்பு ஒரீஇ விடல்.", eng: "When temporary strategy requires making peace with an opponent, smile on the face but trust them not in the heart."},
{num: 827, line1: "மனத்தொடு வாய்மை மொழியின் தவத்தொடு", line2: "தானஞ்செய் வாரின் தலை.", eng: "Never open your secrets to an ally who has long harbored resentment; their outward praise is a mere mask."},
{num: 828, line1: "வணக்கம்செய் வாரை வணங்கிக் கொளினும்", line2: "இணக்கம்செய் வாரை விட்டிடல்.", eng: "An enemy bowing low before you is like a bending bow; remember that the bow bends only to loose a fatal arrow."},
{num: 829, line1: "புறம்குன்றி கண்டனையர் ஆயினும் எம்போல்", line2: "அகம்குன்றி மூக்கின் கரியார் உடைத்து.", eng: "Those whose words are smooth but whose hearts are filled with malice should be outmaneuvered and abandoned smoothly."},
{num: 830, line1: "பகைவரை நட்பென்று கொள்ளல் நகையவன்", line2: "நாணாமை நிற்குங் கரவு.", eng: "To treat a known enemy as a trusted insider is to invite your own ruin with an open and reckless smile."},

{num: 831, line1: "பேதைமை என்பது ஒன்று யாதெனின் ஏதங்கொண்டு", line2: "ஊதியம் போக விடல்.", eng: "What is called folly? It is that state of mind which holds onto destructive vices and throws away lasting benefits."},
{num: 832, line1: "பேதைமையுள் எல்லாம் பேதைமை காதன்மை", line2: "கையல்ல தன்கண் செயல்.", eng: "The greatest folly among all follies is to fall in love with those things that are forbidden and unrighteous."},
{num: 833, line1: "நாணாமை நாடாமை நாரின்மை யாதொன்றும்", line2: "பேணாமை பேதை தொழில்.", eng: "To be shameless before vice, careless of wisdom, devoid of love, and neglectful of virtue are the traits of a fool."},
{num: 834, line1: "ஓதி உணர்ந்தும் பிறர்க்குரைத்தும் தானடங்காப்", line2: "பேதையின் பேதையார் இல்.", eng: "There is no greater fool than he who has read the scriptures, understood them, taught others, but fails to govern his own life."},
{num: 835, line1: "ஒருமைச்செய்தான் பேதைமை எழுமையும்", line2: "புக்கு அழுந்தும் ஆழக் கடல்.", eng: "A fool can perform a single foolish action in this short life that will plunge his soul into suffering for seven subsequent births."},
{num: 836, line1: "கருமம் அறியாதான் கள்ளத் தொழில்மேல்", line2: "அளவிறந்து ஆவது போலக் கெடும்.", eng: "When a fool attempts to manage a serious enterprise, he fails completely and drops his family into public disgrace."},
{num: 837, line1: "அற்பறிந்து ஆன்றமைந்த சொல்லான்எஞ் ஞான்றும்", line2: "திறனறிந்தான் தேறப் படும்.", eng: "If a fool happens to inherit vast, unearned wealth, strangers will devour it while his own relatives starve away."},
{num: 838, line1: "மையல் அறிவார் நட்புப் பகைவர்கேண்", line2: "கூடாநின்று உட்பகை யாய்க் கொளல்.", eng: "If a fool acquires an object of immense value, he will handle it so carelessly that it brings him immediate injury."},
{num: 839, line1: "நண்பாற்றல் நட்டார் பிரிவிற்கும் அவாவென்னும்", line2: "துன்பத்துள் துன்பம் கெடின்.", eng: "The close friendship of a fool is like a recurring nightmare; it breaks your peace and leaves you exhausted."},
{num: 840, line1: "அவையாண்மை இல்லாதான் கல்வி அவையகத்து", line2: "அஞ்சுவான் கற்ற நூல்.", eng: "The presence of a fool in a council of wise men is like a dirty piece of straw dropped onto a clean, royal bed."},

{num: 841, line1: "அறிவின்மை இன்மையுள் இன்மை பிறிதின்மை", line2: "இன்மையா வையா துலகு.", eng: "The lack of wisdom is the core poverty of all poverties; the world does not count the lack of material wealth as true poverty."},
{num: 842, line1: "கொடாதான் மகிழ்ந்து கொடுத்தல் எம்போல்", line2: "நெடுநீர் மறவி மடிதுயில் நேர்.", eng: "When a conceitful person proudly bestows a gift, it happens only because of a temporary lapse in his stingy nature."},
{num: 843, line1: "அறிவுடை யேம்யாம் என்றுஆய்ந்து மாண்பில", line2: "செய்யும் நெறிநுட்பம் இல்லாரைக் கெடும்.", eng: "The losses that a petty mind inflicts upon itself through stubborn pride are far greater than what its enemies could ever cause."},
{num: 844, line1: "ஞாலம் அறியாதான் தான்அறிந்து கொண்டதனை", line2: "மேலறிவாண் கொள்ளல் எவன்.", eng: "What is called conceit? It is the arrogant delusion of a person who thinks, 'I alone know everything.'"},
{num: 845, line1: "கற்றதனால் ஆய பயனென்கொல் வாலறிவன்", line2: "நற்றாள் தொழாஅர் எனின்.", eng: "To quote rare scriptures that one has not integrated, merely to boast of learning, is the sign of a petty mind."},
{num: 846, line1: "மறைப்பொருள் காவாதான் நெஞ்சம்நெடிது ஊன்றின்", line2: "உண்பான்மற்று ஆவதறிது.", eng: "A petty-minded person cannot hold a secret; his mouth spills it quickly, bringing distress upon his friends."},
{num: 847, line1: "ஏவவும் செய்கலான் தான்தேறான் அவ்வுயிர்", line2: "போவமளவும் ஓர் நோய்.", eng: "He will not listen to sound advice, nor does he know how to guide himself; such a person is a living disease until he dies."},
{num: 848, line1: "தன்நெஞ்சு அறிவது பொய்யற்க பொய்த்தபின்", line2: "தன்நெஞ்சே தன்னைச் சுடும்.", eng: "He who attempts to guide a stubborn, conceited person is like a fool wasting precious water to wash a blocks of salt."},
{num: 849, line1: "காணாதான் காட்டுவான் தான்காணான் காணாதான்", line2: "கண்டானாம் தான்கண்ட வாறு.", eng: "He who tries to teach a conceited person becomes a fool himself; the conceited person remains convinced of his own wisdom."},
{num: 850, line1: "உலகத்தார் உண்டென்பது இல்லென்பான் வையத்து", line2: "அலகையா வைக்கப் படும்.", eng: "He who denies what the whole world knows to be true will be looked upon as a demon walking the earth."},

{num: 851, line1: "இகலென்ப எல்லா உயிர்க்கும் பகலென்னும்", line2: "பண்பின்மை ஈனும் நோய்.", eng: "Enmity is a deadly disease that destroys harmony and breeds the bitter spirit of division among living souls."},
{num: 852, line1: "பகல்கண்டு பல்லுயிர் ஓம்புதல் நூலோர்", line2: "தொகுத்தவற்றுள் எல்லாம் தலை.", eng: "Even if someone wrongs you out of deep malice, it is best to refrain from returning a spirit of bitter hatred."},
{num: 853, line1: "இகலென்னும் எவ்வநோய் நீக்கின் தவலில்லாச்", line2: "சேமத்தோடு வாழும் குடி.", eng: "If a person can completely eradicate the toxic disease called hatred, his life will flourish with undying security."},
{num: 854, line1: "இன்பத்துள் இன்பம் பயக்கும் இகலென்னும்", line2: "துன்பத்துள் துன்பம் கெடின்.", eng: "The supreme joy of life is realized when the greatest of all miseries—bitter hatred—is permanently destroyed."},
{num: 855, line1: "இகலெதிர் சாய்ந்துஒழுக வல்லாரை யாரே", line2: "மிகலெதிர் சாய்க்கும் திறத்து.", eng: "Who can stand against or conquer a leader who knows how to step aside and de-escalate bitter hatred?"},
{num: 856, line1: "இகலின் மிகலினிது என்பார்க்கு வாழ்க்கை", line2: "தவலில்லை தாழ்வுறும் நாள்.", eng: "For those who boast and find pleasure in maintaining hatred, the hour of total downfall is never far away."},
{num: 857, line1: "மிகல்வகை மாண்ட அறிவுடையார் இகலின்", line2: "விளைவகை நோக்கிச் செயின்.", eng: "Those who possess a clear, far-seeing intellect never allow a small dispute to expand into devastating hatred."},
{num: 858, line1: "இகலிற்கு எதிர்சாய்ந்து வாழ்தல் அறிவார்", line2: "நெஞ்சத்து அஞ்சாமை அஃதிலார் கண்.", eng: "To conquer hatred brings immediate prosperity; to feed and indulge it brings nothing but a harvest of pain."},
{num: 859, line1: "இகல்காணின் ஆக்கம் அகலும் அதனை", line2: "மறந்தக்காற் கேடில்லா வாழ்வு.", eng: "When hatred enters a house, fortune packs up and departs; when hatred is forgotten, prosperity stays permanently."},
{num: 860, line1: "இகலினால் எல்லாத் தீதும் வருமற்று", line2: "நகையினால் நல்ல அறம்.", eng: "All devastating evils flow directly from bitter hatred; all beautiful virtues flow from a pleasant, unified spirit."},

{num: 861, line1: "வலியார்முன் தன்னை நினைக்கத்தான் தன்னின்", line2: "மெலியார்மேல் செல்லும் இடத்து.", eng: "Avoid picking fights with powerful opponents; look for vulnerabilities only where an opponent is unrighteous and weak."},
{num: 862, line1: "அன்பிலன் ஆன்ற துணையிலன் தான்கொண்ட", line2: "வன்பிலன் ஞாலத்து அறிவு.", eng: "An opponent who lacks the love of his people, has no strong allies, and lacks inner courage is extremely easy to conquer."},
{num: 863, line1: "அஞ்சும்கொல் அஞ்சா தவர்முன் அரணின்றேல்", line2: "ஆற்றல் இகழும் அரணின்றேல்.", eng: "He who is terrified of everything, ignorant of strategy, and holds onto base desires is a natural victim for his enemies."},
{num: 864, line1: "ஏவவும் செய்கலான் தான்தேறான் அவ்வுயிர்", line2: "போவமளவும் ஓர் நோய்.", eng: "An opponent who is easily angered, loose in his morals, and lacks self-restraint can be broken effortlessly without a spear."},
{num: 865, line1: "வகைஅறிந்து வல்லவை வாய்சோரார் மாண்ட", line2: "அகையறிந்து ஆய்ந்த அறிவு.", eng: "A leader who has no plan, commits frequent blunders, and lacks character will fall before his adversaries quickly."},
{num: 866, line1: "காணாதான் காட்டுவான் தான்காணான் காணாதான்", line2: "கண்டானாம் தான்கண்ட வாறு.", eng: "When a ruler is blinded by rage and driven by unbridled lust, his internal vulnerabilities become a feast for his foes."},
{num: 867, line1: "தொடங்கிய கைகொடுத்து மாண்டார் வினைத்திட்பம்", line2: "வேந்தன்கண் ஊறெய்தி உள்ளப் படும்.", eng: "If an opponent launches a massive enterprise but abandons it midway due to weak will, attack him immediately."},
{num: 868, line1: "குணநாடிக் குற்றமும் நாடி அவற்றுள்", line2: "மிகைநாடி மிக்க கொளல்.", eng: "If your opponent has many vices and is thoroughly disliked by his advisors, his defeat is guaranteed by his own actions."},
{num: 869, line1: "செய்வானை நாடி வினைநாடி காலத்தோடு", line2: "எய்த உணர்ந்து செயல்.", eng: "Victory over an ignorant, fearful, and isolated ruler arrives effortlessly; his own flaws pave the way for your march."},
{num: 870, line1: "இகலெதிர் சாய்ந்துஒழுக வல்லாரை யாரே", line2: "மிகலெதிர் சாய்க்கும் திறத்து.", eng: "He who fails to study his opponent's vulnerabilities and rushes into battle blindly will lose his throne and glory."},

{num: 871, line1: "பகையென்னும் பண்பில்லாப் பாடு பாடுபெறல்", line2: "நகையினும் வேண்டற்பாற் றன்று.", eng: "Never court the bitter spirit of enmity, even in jest; it yields nothing but suffering and structural ruin."},
{num: 872, line1: "வில்லேர் உழவர் பகைகொளினும் கொள்ளற்க", line2: "சொல்லேர் உழவர் பகை.", eng: "It is safer to face the open hostility of warriors who use bows than to trigger the wrath of scholars who wield tongues."},
{num: 873, line1: "ஏமுற்றார் பேதையின் பேதையார் இல்முன்னும்", line2: "திறனறிந்து தேறப் படும்.", eng: "He is more isolated than a madman who provokes many enemies at once while having no loyal friends to back him."},
{num: 874, line1: "உலகியல் அஃதிலார் மண்ணாள்வது மண்ணின்", line2: "பாரமற்று ஆவதறிது.", eng: "The world will raise its hands and crown the leader who can turn an enemy's hostility into a beautiful alliance."},
{num: 875, line1: "தன்நெஞ்சு அறிவது பொய்யற்க பொய்த்தபின்", line2: "தன்நெஞ்சே தன்னைச் சுடும்.", eng: "When facing two separate enemies, act with absolute diplomacy: pacify one while neutralising the other systematically."},
{num: 876, line1: "தேறற்க யாரையும் தேராது தேர்ந்தபின்", line2: "தேறுக தேறும் வினை.", eng: "When crisis arrives, drop your inner biases and form temporary alliances with reliable factions to balance power."},
{num: 877, line1: "அழிவன்று அறைகூவும் ஆழ்கடல் போன்ற", line2: "வழிவந்தது வான்படை யென்று.", eng: "Never reveal your vulnerabilities to an enemy; keep your strategy hidden and strike only when success is certain."},
{num: 878, line1: "மதிநுட்பம் நூலோடு உடையார்க்கு உறுதிநிற்பார்", line2: "முன்னிற்கப் பாயும் எவன்.", eng: "If you have designed a flawless strategy to outmaneuver an opponent, press forward and execute it without delay."},
{num: 879, line1: "முள்மரம் கொல்கூர்ங் கோட்டது ஆயினும் யானை", line2: "வெரூஉம் புலிதாக் குறின்.", eng: "Uproot a thorny bush while it is still a small, tender sapling; left to grow into a tree, it will lacerate your hands."},
{num: 880, line1: "இறந்தார் இறந்தார் அணையர் சினத்தைத்", line2: "துறந்தார் துறந்தார் அணைத்து.", eng: "Those who fail to crush the rising power of an arrogant enemy will be swept away by them completely in the end."},

{num: 881, line1: "நிழல்நீரும் இன்னாத இன்னா தமர்நீரும்", line2: "இன்னாவாம் இன்னா செயின்.", eng: "Shade and water can cause illness if contaminated; even close kinsmen bring ruin if they harbor hidden treachery."},
{num: 882, line1: "வாள்போல் பகைவரை அஞ்சற்க அஞ்சுக", line2: "கேள்போல் பகைவர் தொடர்பு.", eng: "Fear not the open enemies who stand before you like unsheathed swords; fear the hypocrites who live beside you pretending to be friends."},
{num: 883, line1: "உட்பகை அஞ்சித்தற் காக்க உலைவிடத்து", line2: "மட்கல மூழ்த்தும் கலம்.", eng: "Guard against internal treachery with absolute vigilance; like a sharp tool, it cuts the vessel that holds it during a crisis."},
{num: 884, line1: "மனக்கோட்டம் இன்றிக் குணக்கோட்டம் உண்டாம்", line2: "உட்பகை உற்றான் உழை.", eng: "A hidden traitor within the palace walls alters the thoughts of advisors and slowly triggers domestic collapse."},
{num: 885, line1: "உறல்முறையான் வந்த உட்பகை என்றும்", line2: "இறல்முறையான் ஏதம் தரும்.", eng: "Internal treachery born of close blood relatives will yield unescapable and deep miseries when testing times arrive."},
{num: 886, line1: "ஒன்றாமை ஒன்றியார் கட்படின் எஞ்ஞான்றும்", line2: "பொன்றாமை ஒன்றல் அரிது.", eng: "If internal discord breaks out permanently within a leadership team, it is impossible to escape ultimate downfall."},
{num: 887, line1: "செப்புஅன்ன நெஞ்சத்தார் உள்வாழ்க்கை எஞ்ஞான்றும்", line2: "முப்புஅன்ன கேடு தரும்.", eng: "Living with internal traitors who smile while plotting your death is like sharing a small hut with a venomous cobra."},
{num: 888, line1: "அறம்பொருள் இன்பம் உயிரச்சம் நான்கின்", line2: "திறம்தெரிந்து தேறப் படும்.", eng: "Just as a solid piece of iron is worn away by rust, a great empire is entirely dissolved by internal treachery."},
{num: 889, line1: "எள்அளவு வஞ்ச முடையாரோடு உள்வாழ்க்கை", line2: "கள்ளளவு தீமை தரும்.", eng: "Internal treachery can look as small as a sesame seed, yet it expands rapidly and shatters the peace of a home entirely."},
{num: 890, line1: "உடம்போடு உயிரிடை நட்புப்போல் என்றும்", line2: "உடன்பாடு இல்லாதார் நட்பு.", eng: "Living with those who are completely out of harmony with you is like attempting to bind fire and water in a single vessel."},

{num: 881, line1: "நிழல்நீரும் இன்னாத இன்னா தமர்நீரும்", line2: "இன்னாவாம் இன்னா செயின்.", eng: "Shade and water can cause illness if contaminated; even close kinsmen bring ruin if they harbor hidden treachery."},

{num: 883, line1: "உட்பகை அஞ்சித்தற் காக்க உலைவிடத்து", line2: "மட்கல மூழ்த்தும் கலம்.", eng: "Guard against internal treachery with absolute vigilance; like a sharp tool, it cuts the vessel that holds it during a crisis."},
{num: 884, line1: "மனக்கோட்டம் இன்றிக் குணக்கோட்டம் உண்டாம்", line2: "உட்பகை உற்றான் உழை.", eng: "A hidden traitor within the palace walls alters the thoughts of advisors and slowly triggers domestic collapse."},
{num: 885, line1: "உறல்முறையான் வந்த உட்பகை என்றும்", line2: "இறல்முறையான் ஏதம் தரும்.", eng: "Internal treachery born of close blood relatives will yield unescapable and deep miseries when testing times arrive."},
{num: 886, line1: "ஒன்றாமை ஒன்றியார் கட்படின் எஞ்ஞான்றும்", line2: "பொன்றாமை ஒன்றல் அரிது.", eng: "If internal discord breaks out permanently within a leadership team, it is impossible to escape ultimate downfall."},
{num: 887, line1: "செப்புஅன்ன நெஞ்சத்தார் உள்வாழ்க்கை எஞ்ஞான்றும்", line2: "முப்புஅன்ன கேடு தரும்.", eng: "Living with internal traitors who smile while plotting your death is like sharing a small hut with a venomous cobra."},
{num: 888, line1: "அறம்பொருள் இன்பம் உயிரச்சம் நான்கின்", line2: "திறம்தெரிந்து தேறப் படும்.", eng: "Just as a solid piece of iron is worn away by rust, a great empire is entirely dissolved by internal treachery."},
{num: 889, line1: "எள்அளவு வஞ்ச முடையாரோடு உள்வாழ்க்கை", line2: "கள்ளளவு தீமை தரும்.", eng: "Internal treachery can look as small as a sesame seed, yet it expands rapidly and shatters the peace of a home entirely."},
{num: 890, line1: "உடம்போடு உயிரிடை நட்புப்போல் என்றும்", line2: "உடன்பாடு இல்லாதார் நட்பு.", eng: "Living with those who are completely out of harmony with you is like attempting to bind fire and water in a single vessel."},

{num: 891, line1: "ஆற்றுவார் ஆற்றல் இகழாமை தேற்றுவார்", line2: "தேற்றத்தின் ஆற்றல் தலை.", eng: "The ultimate rule of self-preservation is never to insult or mock the power of great, self-realized sages."},
{num: 892, line1: "பெரியாரைப் பேணாது ஒழுகின் பெரியாரால்", line2: "பேரா இடும்பை வரும்.", eng: "If a leader lives without showing due reverence to the wise, their unexpressed sorrow will pull down his entire kingdom."},
{num: 893, line1: "கெடுவது செய்யின் முறைசெய்யா மன்னவன்", line2: "நாடொறும் நாடு கெடும்.", eng: "If you desire immediate ruin, provoke those who are spiritually exalted; their silent indignation is swifter than a sword."},
{num: 894, line1: "எளியரென்று எள்ளாராய் செய்வர் பெரியார்", line2: "சிறியாரும் சீர்மை பெறின்.", eng: "For a weak person to insult a great master is like a man standing on the ground and beckoning Death with his bare hand."},
{num: 895, line1: "இறைகடியன் என்றுஉரைக்கும் இன்னாச்சொல் வேந்தன்", line2: "உறைகடியொடு ஒல்லைக் கெடும்.", eng: "Where can a ruler fly or hide when the fiery spiritual energy of a sage is directed against his unrighteous reign?"},
{num: 896, line1: "எரியால் சுடப்படினும் உய்வுண்டாம் உய்யார்", line2: "பெரியார்ப் பிழைத்தொழுகு வார்.", eng: "A person can survive and recover after being scorched by a raging physical fire; but there is no survival for those who offend great sages."},
{num: 897, line1: "வகைமாண்ட வாழ்க்கையும் வான்பொருளும் என்னாம்", line2: "தகைமாண்ட தவசீலர் காய்ந்தக் கடை.", eng: "Of what use are majestic palaces and vast gold hoards if a ruler incurs the righteous anger of self-disciplined ascetics?"},
{num: 898, line1: "குன்றன்னார் குன்ற மதிப்புக்கின் உலகத்து", line2: "நின்றாரும் நில்லாது உதிர்ந்து.", eng: "If those who are as unshakable as mountains choose to strike, even the most deeply rooted kings will crumble away."},
{num: 899, line1: "ஏந்திய கொள்கையார் சீறின் இடைமறந்து", line2: "வேந்தனும் வேந்து கெடும்.", eng: "If sages of high spiritual vows lose their patience at injustice, the ruler's prosperity will vanish instantly before his eyes."},
{num: 900, line1: "இறந்தமைந்த சார்புடையார் ஆயினும் உய்யார்", line2: "சிறந்தமைந்த சீரார் தவறிவிடின்.", eng: "Though backed by a vast army and millions of loyal subjects, a tyrant cannot survive if the pure sages condemn his crimes."},

{num: 901, line1: "மனைவிழைவார் மாண்பயன் எய்தார் வினைவிழைவார்", line2: "வேண்டாமை வேண்ட வரும்.", eng: "Those who are obsessed with pleasing a spouse at the cost of duty will fail to achieve lofty heights or lasting renown."},
{num: 902, line1: "பேணாது பெண்விழைவான் ஆக்கம் பெரியதோர்", line2: "நாணாக நாணுத் தரும்.", eng: "The wealth and power of a man who blindly obeys out of infatuation will turn into a source of public shame for him."},
{num: 903, line1: "இல்லாள்கண் தாழ்ந்த இயல்பின்மை எஞ்ஞான்றும்", line2: "நல்லாருள் நாணுத் தரும்.", eng: "An effeminate submissiveness that ignores justice will make a man hang his head in shame when standing before his peers."},
{num: 904, line1: "மனையாளை அஞ்சும் மறுமையிலா பேதை", line2: "வினையாண்மை வீறெய்தல் இல்.", eng: "He who trembles in fear before his spouse out of blind infatuation can never display firm, decisive energy in public affairs."},
{num: 905, line1: "இல்லாள்கண் அஞ்சுவான் அஞ்சும்கொல் எஞ்ஞான்றும்", line2: "நல்லார்க்கு நல்ல செயல்.", eng: "He who fears his spouse more than he loves the truth will constantly hesitate to perform noble acts of charity and justice."},
{num: 906, line1: "இல்லாள்கண் தாழ்ந்துஒழுகு வார்மற்று அல்லார்", line2: "அவம்செய்வார் ஆசையுள் பட்டு.", eng: "Though living in grand style, those who are completely ruled by infatuation are no better than walking shadows among men."},
{num: 907, line1: "பெண்ணேவல் கேட்டுஒழுகும் பேதைமையின் எஞ்ஞான்றும்", line2: "நாணேவல் குன்றல் இனிது.", eng: "The modest gaze of a noble woman is beautiful, but a man giving up his personal integrity to satisfy caprice is ignoble."},
{num: 908, line1: "நட்டாரை ஆக்கல் நயமிலாரைத் தேற்றுதல்", line2: "எல்லாந் தொழிலின் வகை.", eng: "Those who satisfy every whim of an infatuated partner while ignoring the cries of starving friends have no true virtue."},
{num: 909, line1: "அறவினையும் ஆன்ற பொருளும் பிறவினையும்", line2: "பெண்ஏவல் செய்வார்கண் இல்.", eng: "Righteous actions, material prosperity, and great public works are never achieved by those who are enslaved by effeminacy."},
{num: 910, line1: "பேதைமைத் தேறல் எனல்வேண்டா நட்டார்கண்", line2: "ஏதம் பலவும் தரும்.", eng: "The mind's clarity and masculine focus are entirely lost when a person allows blind passion to steer his life's direction."},

{num: 911, line1: "அன்பின் விழையார் பொருள்விழையும் ஆய்தொடியார்", line2: "இன்சொல் இழுக்குத் தரும்.", eng: "The sweet, enticing words of gold-seeking women who possess no genuine love will drag a man into a fatal swamp."},
{num: 912, line1: "பொருள்கருதிப் பொய்ம்மறைந்து ஒழுகு வார்மற்று", line2: "அருள்கருதாப் புன்மை தெரிந்து.", eng: "Weigh the calculated smiles of those who traffic in beauty; they look for nothing but the weight of your purse."},
{num: 913, line1: "பொருள்கொண்டார் புன்னலம் பாராட்டும் மகளிர்", line2: "இருள்கொண்ட எவ்வம் தரும்.", eng: "The artificial embrace of a mercenary woman is like hugging a cold corpse in a dark, forgotten graveyard."},
{num: 914, line1: "அறிவொழுக்கம் ஆன்ற பரிவினர் சேரார்", line2: "நெறியொழுக்கம் இல்லாதார் கை.", eng: "Men who possess refined wisdom and value their character never step into the dens of mercenary pleasure."},
{num: 915, line1: "பொதுநலத்தார் புன்னலம் தோயார் உயர்ந்த", line2: "மதிநலத்தின் மாண்புடை யார்.", eng: "Those who value their reputation and possess high ancestral honor never touch the cheap pleasures shared with the crowd."},
{num: 916, line1: "தன்னைத்தான் காக்கின் சினம்காக்க காவாக்கால்", line2: "தன்னையே கொல்லும் சினம்.", eng: "Those who seek to preserve their spiritual brightness avoid the calculated traps set by women who trade affection for gold."},
{num: 917, line1: "மனத்தொடு வாய்மை மொழியின் தவத்தொடு", line2: "தானஞ்செய் வாரின் தலை.", eng: "Only those who are completely devoid of inner clarity will lose themselves in the arms of women whose hearts calculate profit."},
{num: 918, line1: "மாய மகளிர் முயக்கம் அறியாதார்", line2: "பேய்போல் திரிவர் புவி.", eng: "To those who lack self-restraint, the deceptive embrace of a courtesan acts as an illusion that strips away their sanity."},
{num: 919, line1: "ஆய்தொடியார் மென்தோள் படுமுரண் தோயாதார்", line2: "வானுயர் தோற்றம் உடைத்து.", eng: "The soft, adorned arms of a public woman are a hidden knife that cuts away a man's wealth, health, and dignity at once."},
{num: 920, line1: "இருமனப் பெண்டிரும் கள்ளும் கவறும்", line2: "திருநீக்கப்பட்டார் தொடர்பு.", eng: "Double-minded courtesans, intoxicating wine, and gambling dice are the three ultimate companions of those abandoned by Fortune."},

{num: 921, line1: "உட்கப் படாஅர் ஒளியிழப்பர் எஞ்ஞான்றும்", line2: "கள்ள்காதல் கொண்டுஒழுகு வார்.", eng: "Those who are obsessed with intoxicating wine will lose the respect of their peers and see their internal light fade away."},
{num: 922, line1: "உண்ணற்க கள்ளை உணில்உண்க சான்றோரான்", line2: "எண்ணப் படவேண்டா தார்.", eng: "Drink no intoxicating wine; if you choose to drink, accept that the wise will permanently erase your name from their hearts."},
{num: 923, line1: "ஈன்றாள் முகத்தேயும் இன்னாதால் என்மற்றுச்", line2: "சான்றோர் முகத்துத் திரு.", eng: "The sight of a drunken son brings deep pain even to his own mother's face; how much worse must it look to holy sages?"},
{num: 924, line1: "நாணென்னும் நல்லாள் புறங்கொடுக்கும் கள்ளென்னும்", line2: "பேணாப் பெருங்குற்றம் செயின்.", eng: "The beautiful maiden called Shamelessness will arrive to walk beside the person who indulges in the vice of intoxication."},
{num: 925, line1: "பொருள் கொடுத்துத் தன்நெஞ்சம் பொய்யற்க பொய்த்தபின்", line2: "தன்னையே கொல்லும் சினம்.", eng: "To spend hard-earned money to buy an intoxicant that steals away your sanity is the height of human delusion."},
{num: 926, line1: "துஞ்சினார் செத்தாரின் வேறல்லர் எஞ்ஞான்றும்", line2: "நஞ்சுண்பார் கள்ளுண்பார் நேர்.", eng: "Those who sleep are like the dead; those who constantly consume intoxicating liquor are like men drinking slow poison."},
{num: 927, line1: "கள்ளொளித்து உண்மகிழும் மாந்தர் மறைபொருள்", line2: "உள்ளூர வெளீஇ விடும்.", eng: "Those who drink in secret, thinking no one sees them, will soon display their hidden madness publicly with slurred speech."},
{num: 928, line1: "களித்தானைக் காரணம் காட்டுதல் கீழ்நீர்", line2: "விளக்குஅன்னார் தேடுவ தற்று.", eng: "To reason with a man intoxicated by liquor is like taking a flaming lamp underwater to look for someone drowned in the depths."},
{num: 929, line1: "கள்ளுண்ணாக் போழ்தின் களித்தானைக் காணுங்கால்", line2: "உள்ளான்கொல் தன்நெஞ்சு ஒழிந்து.", eng: "When a sober person watches a drunkard rolling in his own vomit, does he not realize the deep degradation of his own vice?"},
{num: 930, line1: "கள்ளின் இடும்பை களியாதான் நெஞ்சத்து", line2: "அள்ளூன்றி நிற்குங் கரவு.", eng: "The toxic habit of drinking will permanently destroy the mind's fine faculties and leave a person utterly ruined."},

{num: 931, line1: "வேண்டற்க வென்றிடினும் சூதினை வென்றதூஉம்", line2: "தூண்டிற்பொன் மீன்விழுங்கி அற்று.", eng: "Desire not the winnings of gambling; even if you win, it is like a fish swallowing a sharp metal hook covered in bait."},
{num: 932, line1: "ஒன்றெய்தி நூறிழக்கும் சூதார்க்கும் உண்டாங்கொல்", line2: "நன்றெய்தி வாழ்வதோர் ஆறு.", eng: "Can there be any path of true happiness for gamblers who win a single coin today only to lose a hundred tomorrow?"},
{num: 933, line1: "கவறும் கழகமும் கையும் தருக்கிற்", line2: "இவறியார் இல்லாகி யாங்கு.", eng: "If a leader is obsessed with the rolling dice and the gambling hall, his state revenues will vanish into thin air."},
{num: 934, line1: "சிறுமை பலசெய்து சீரழிக்கும் சூதின்", line2: "வறுமை தருவதுஒன்று இல்.", eng: "Gambling inflicts multiple miseries, strips away a person's hard-earned reputation, and brings absolute poverty cleaner than anything else."},
{num: 935, line1: "கவறும் கழகமும் கையும் விடாதார்", line2: "உவறிப் பொருள்இழந்து போம்.", eng: "Those who cannot leave the dice, the gaming table, and the card deck will see their ancestral homes crumble into dust."},
{num: 936, line1: "அகடுஆரார் அல்லல் உழப்பர்சூது என்னும்", line2: "முகடியான் மூடப்பட் டார்.", eng: "Those who are trapped by the dark goddess of gambling will suffer from grinding hunger and wander in deep despair."},
{num: 937, line1: "பழையம் எனக்கருதிப் பண்பல்ல செய்யும்", line2: "கெழுதகைமை கேடு தரும்.", eng: "Gambling devours a man's time, destroys his integrity, and alienates him from his closest friends and relatives."},
{num: 938, line1: "பொருள்கெடுத்துப் பொய்மேற்கொள்ளும் சூதின்", line2: "அருள்கெடுத்து அல்லல் தரும்.", eng: "Gambling drains material wealth, forces a person to use lies, destroys compassion, and plunges life into agony."},
{num: 939, line1: "ஆடை பலகை பொருள்ஆயம் ஐந்தும்கவறு", line2: "ஆடினார்க்கு ஆவதொன்று இல்.", eng: "The five things—garments, ancestral wealth, clear judgment, food, and reputation—are lost at once by a gambler."},
{num: 940, line1: "அகதொறும் காதல் பெருகும் இகதொறும்", line2: "சூதார்க்கு இடும்பை தரும்.", eng: "Just as a lover's attachment grows despite disappointments, the gambler's obsession deepens the more he suffers losses."},

{num: 941, line1: "மிகினும் குறையினும் நோய்செய்யும் நூலோர்", line2: "வளிமுதலா எண்ணிய மூன்று.", eng: "The three elements—wind, bile, and phlegm—will cause disease if they exceed or fall short of their natural balance."},
{num: 942, line1: "மருந்தென வேண்டாவாம் யாக்கைக்கு அருந்தியது", line2: "அற்றது போற்றி உணின்.", eng: "No medicine is needed for this physical body if you eat only after ensuring that your previous meal is entirely digested."},
{num: 943, line1: "அற்றால் அளவறிந்து உண்க அஃதுஉடம்பு", line2: "பெற்றான் நெடிதுய்க்கும் ஆறு.", eng: "Eat in moderate measure once digestion is complete; this is the truest path to ensure a long, disease-free life."},
{num: 944, line1: "அற்றது அறிந்து கடைப்பிடித்து மாறல்ல", line2: "துய்க்க துவரப் பசித்து.", eng: "Ensure your previous food is gone, wait for a keen appetite, and then eat foods that suit your body's nature perfectly."},
{num: 945, line1: "மாறுபாடு இல்லாத உண்டி மறுத்துண்ணின்", line2: "ஊறுபாடு இல்லை உயிர்க்கு.", eng: "If you abstain from disagreeable dishes and eat with self-restraint, no sickness will strike your life."},
{num: 946, line1: "இழிவறிந்து உண்பான்கண் இன்பம்போல் நிற்கும்", line2: "கழிபேர் இரையான்கண் நோய்.", eng: "Just as happiness stays with one who eats moderately, chronic diseases pitch their tent within the body of a glutton."},
{num: 947, line1: "அளவறியான் மூர்க்கன் அளவிறந்து உண்பான்", line2: "அளவிறந்து நோய்மல்கிச் சாம்.", eng: "He who lacks self-control and stuffs his belly beyond measure will see countless painful diseases multiplying within him."},
{num: 948, line1: "நோய்நாடி நோய்முதல் நாடி அதுதணிக்கும்", line2: "வாய்நாடி வாய்ப்பச் செயல்.", eng: "Diagnose the disease, discover its root cause, identify the proper remedy, and apply it with absolute precision."},
{num: 949, line1: "உற்றான் அளவும் பிணியளவும் காலமும்", line2: "கற்றான் கருதிச் செயல்.", eng: "A learned physician acts only after weighing the patient's age, the intensity of the sickness, and the fluid seasonal changes."},
{num: 950, line1: "உற்றவன் தீர்ப்பான் மருந்துழைச் செல்வானென்று", line2: "அப்பால் நாற்கூற்றே மருந்து.", eng: "The patient, the physician, the medicine, and the nurse—these four components must align perfectly to achieve a complete cure."},

{num: 951, line1: "இற்பிறந்தார் கண்ணல்லது இல்லை இயல்பாகச்", line2: "செப்பமும் நாணும் ஒருங்கு.", eng: "Straightforward integrity and a natural shame before vice are found effortlessly in those born of noble lineage."},
{num: 952, line1: "ஒழுக்கமும் வாய்மையும் நாணும் இம்மூன்றும்", line2: "இழுக்கார் இக்குடியில் பிறந்தார்.", eng: "Right conduct, truthfulness, and a healthy sense of moral shame are never abandoned by those of noble birth."},
{num: 953, line1: "நகையீகை இன்சொல் இகழாமை நான்கும்", line2: "வகையென்பார் மாண்ட குடிக்கு.", eng: "A pleasant smile, open generosity, sweet words, and never insulting others are the four marks of a noble soul."},
{num: 954, line1: "அடுக்கிய கோடி பெறினும் குடிப்பிறந்தார்", line2: "குன்றுவ செய்தல் இலர்.", eng: "Even if offered millions of gold pieces, those born of noble blood will never commit a base action that demeans virtue."},
{num: 955, line1: "வழங்குவ துள்வீழ்ந்தக் கண்ணும் பழங்குடி", line2: "பண்பின் தலைப்பிரிதல் இல்.", eng: "Though their resources are entirely drained by charity, ancient, noble families never lose their exquisite courtesy."},
{num: 956, line1: "சலம்பற்றிச் சால்பில செய்யார்மாசற்ற", line2: "குலம்பற்றி வாழ்தும் என்பார்.", eng: "Those who resolve to live true to their unblemished heritage will never stoop to deceitful or unholy practices."},
{num: 957, line1: "குடிப்பிறந்தார் கண்விளங்கும் குற்றம் விசும்பின்", line2: "மதித்துமேல் மறுப்போலத் தோன்றி.", eng: "The slightest blemish committed by a person of noble birth stands out clearly, like a dark spot on the face of the full moon."},
{num: 958, line1: "நலத்தின்கண் நாரன்மை தோன்றின் அவனைக்", line2: "குலத்தின்கண் ஐயப் படும்.", eng: "If a person from a noble house displays a harsh, loveless nature, the world will immediately doubt the purity of his lineage."},
{num: 959, line1: "நிலத்தில் கிடந்தமை கால்காட்டும் காட்டும்", line2: "குலத்தில் பிறந்தார்வாய்ச் சொல்.", eng: "Just as a tender sprout reveals the nature of the soil below, the words uttered by a person reveal the quality of his home."},
{num: 960, line1: "நலத்தின்கண் நாணுடைமை வேண்டும் குலத்தின்கண்", line2: "வாழ்தும் என்பார் அவர்க்கு.", eng: "If you desire to preserve the honor of your house, cultivate humility; there is no nobility without refined courtesy."},

{num: 961, line1: "இன்றி யமையாச் சிறப்பின வாயினும்", line2: "குன்றிய செய்யாமை முறை.", eng: "Even if it would save your very life from death, abstain from doing actions that diminish your inner honor."},
{num: 962, line1: "சீருடைச் செல்வர் சிறுமையுள் பட்டக்கால்", line2: "சீருடை மானம் சிதையாது காப்பார்.", eng: "Those who value honor above all will never lose their dignity or stoop to flattery, even when reduced to deep poverty."},
{num: 963, line1: "பெருக்கத்து வேண்டும் பணிவு சிறிய", line2: "சுருக்கத்து வேண்டும் உயர்வு.", eng: "Cultivate absolute humility in times of immense success; maintain high self-respect when hit by sudden losses."},
{num: 964, line1: "தலையின் இழிந்த மயிரனையர் மாந்தர்", line2: "நிலையின் இழிந்தக் கடை.", eng: "Men who fall from their high moral standards are like hairs that have fallen from the head; they lose all worth instantly."},
{num: 965, line1: "குன்றின் அனையாரும் குன்றுவர் குன்றுவ", line2: "குன்றி யளவினும் செய்யின்.", eng: "Even those whose character is as majestic as a mountain will fall from grace if they commit a flaw as tiny as a sesame seed."},
{num: 966, line1: "புகழின்றால் புத்தேள்நாட்டு உய்யாதால் என்மற்று", line2: "இகழ்வார் பின்சென்று நிலை.", eng: "Of what use is it to follow and flatter those who despise you? It yields no true fame on earth and no joy hereafter."},
{num: 967, line1: "ஒட்டார பின்சென்று வாழ்தலின் அந்நிலையே", line2: "கெட்டான் என்றுரைத்தல் நன்று.", eng: "It is far better for a man to die on his feet with his honor intact than to live on his knees by fawning over a tyrant."},
{num: 968, line1: "மயிர்நீப்பின் வாழாக் கவரிமா அன்னார்", line2: "உயிர்நீப்பர் மானம் வரின்.", eng: "Like the legendary Kavari deer that drops dead if it loses a single lock of its fur, noble souls lay down their lives if their honor is broken."},
{num: 969, line1: "இளிவரின் வாழாத மானம் உடையார்", line2: "ஒளிதொழுதேத்து முலகு.", eng: "The entire world will join its hands to worship the memory of those who choose death over a life of dishonor."},
{num: 970, line1: "மருவுக மாசற்றார் கேண்மை ஒன்றுஆற்றின்", line2: "ஒருவுக ஒப்பில்லார் நட்பு.", eng: "Those who possess a firm sense of honor will cast away this fragile body cheerfully rather than live with a stained reputation."},

{num: 971, line1: "ஒளிஒருவற்கு உள்ள வெறுக்கை அஃதிலார்", line2: "மரமக்கள் ஆதலே வேறு.", eng: "A person's true brightness is their inner drive to achieve noble heights; without it, life has no grandeur."},
{num: 972, line1: "பிறப்பொக்கும் எல்லா உயிர்க்கும் சிறப்பொவ்வா", line2: "செய்தொழில் வேற்றுமை யான்.", eng: "All human beings are equal by birth; distinction arises only from the varying excellence of their choices and actions."},
{num: 973, line1: "மேலிருந்தும் மேலல்லார் மேலல்லர் கீழிருந்தும்", line2: "கீழல்லார் கீழல் லவர்.", eng: "High position cannot make a base man noble; low position cannot strip a person of high virtue of his true greatness."},
{num: 974, line1: "ஒருமை மகளிரே போலப் பெருமையும்", line2: "தன்னைத்தான் காத்துக்கொளின் உண்டு.", eng: "Like a woman protecting her personal chastity, true greatness endures only when a person guards his integrity with vigilance."},
{num: 975, line1: "பெருமை உடையவர் ஆற்றுவார் ஆற்றின்", line2: "அருமை உடைய செயல்.", eng: "Those who possess true greatness can execute rare and difficult enterprises effortlessly through their steady determination."},
{num: 976, line1: "சிறியார் உணர்ச்சியுள் இல்லை பெரியாரைப்", line2: "பேணிக் கொளல்என்னும் பண்பு.", eng: "The small-minded never understand or value the unique character of great men who live to lift society."},
{num: 977, line1: "இறப்பீனும் செல்வம் பெறினும் பிறர்க்குஇன்னா", line2: "செய்யாமை மாசற்றார் கோள்.", eng: "When a small-minded person acquires power, his arrogance expands; when a great soul wins power, his humility deepens."},
{num: 978, line1: "பெருமை பெருமிதம் இன்மை சிறுமை", line2: "பெருமிதம் ஊர்ந்து விடல்.", eng: "True greatness is entirely free from pride and vanity; petty-mindedness is obsessed with blowing its own trumpet loudly."},
{num: 979, line1: "பெருமை மறைப்பொருள் காக்கும் சிறுமை", line2: "மறைப்பொருள் காவாது உடைத்து.", eng: "Greatness naturally covers and protects the faults of others; smallness exposes and exaggerates the errors of its neighbors."},
{num: 980, line1: "அற்றம் மறைக்கும் பெருமை சிறுமைதான்", line2: "குற்றமே கூறி விடும்.", eng: "Greatness acts with absolute modesty and speaks softly; petty mindedness looks for flaws everywhere and brags of itself constantly."},

{num: 981, line1: "கடன்என்ப நல்லவை எல்லாம் கடனறிந்து", line2: "சான்றாண்மை வாழ்ப வர்க்கு.", eng: "All beautiful duties become natural habits for those who understand their obligations and live with a perfect character."},
{num: 982, line1: "குணநலச் சான்றோர் நலனே பிறநலம்", line2: "எந்நலத்து உள்ளதூஉம் அன்று.", eng: "The only true excellence is the excellence of character; all other structural advantages or wealth profit nothing without it."},
{num: 983, line1: "அன்புநாண் ஒப்புரவு கண்ணோட்டம் வாய்மையொடு", line2: "ஐந்துசால்பு ஊன்றிய தூண்.", eng: "Love, moral shame, benevolence, kind considerateness, and truthfulness—these five virtues are the pillars that hold up a perfect character."},
{num: 984, line1: "கொல்லாமை சூழும் நெறிஅறம் சான்றாண்மிக்", line2: "கல்லாமை சொல்லற்க வடு.", eng: "Penance is the virtue that refrains from killing; a perfect character is the virtue that never speaks ill of another soul."},
{num: 985, line1: "ஆற்றுவார் ஆற்றல் பணிதல் அதுசான்றோர்", line2: "மாற்றாரை மாற்றும் படை.", eng: "The strength of those who execute great tasks is humility; that modesty is the weapon by which the wise win over their enemies."},
{num: 986, line1: "சால்பிற்குக் கட்டளைக் கல்லென்ப தன்முன்னின்", line2: "தொல்பா டறியார்முன் சொல்.", eng: "The truest touchstone of a perfect character is how a person treats those who are completely beneath him in status."},
{num: 987, line1: "இன்னாசெய் தார்க்கும் இனியவே செய்யாக்கால்", line2: "என்ன பயத்ததோ சால்பு.", eng: "Of what value is a perfect character if it does not return beautiful, loving kindness even to those who have inflicted severe injuries?"},
{num: 988, line1: "இன்மை ஒருவற்கு இளிவன்று சால்பென்னும்", line2: "திண்மைஉண் டாகப் பெறின்.", eng: "Absolute material poverty is no disgrace to a man, provided his soul remains wealthy with a perfect character."},
{num: 989, line1: "ஊழி பெயரினும் தாம்பெயரார் சான்றாண்மைக்கு", line2: "ஆழி எனப்படு வார்.", eng: "Even if the cosmic ages roll away and the oceans shift their boundaries, those of perfect character will never deviate from the truth."},
{num: 990, line1: "சான்றவர் சான்றாண்மை குன்றின் இருநிலந்தான்", line2: "தாங்காது தண்பெயல் விண்.", eng: "If those of perfect character should diminish in their virtue, this massive earth would slide down and fail to bear its burden."},

{num: 991, line1: "எண்பதத்தால் எய்தல் எளிதென்ப யார்மாட்டும்", line2: "பண்புடைமை என்னும் வழக்கு.", eng: "If a person remains easily accessible and treats everyone with modesty, the virtue of courtesy is won effortlessly."},
{num: 992, line1: "அன்புடைமை ஆன்ற குடிப்பிறத்தல் இவ்விரண்டும்", line2: "பண்புடைமை என்னும் வழக்கு.", eng: "Deep love for humanity and being nurtured in a noble family are the two roots from which refined courtesy blossoms."},
{num: 993, line1: "உறுப்புஒத்தல் மக்கள்ஒப்பு அன்றால் வெறுத்தக்க", line2: "பண்பொத்தல் ஒப்பதாம் ஒப்பு.", eng: "A mere physical resemblance in bodily structure does not make you human; true likeness lies in possessing a refined, courteous character."},
{num: 994, line1: "நயனொடு நன்றி புரிந்த பயனுடையார்", line2: "பண்புபா ராட்டும் உலகு.", eng: "The entire world admires the courtesy of those who live to execute justice and render useful services to society."},
{num: 995, line1: "நகையுள்ளும் இன்னாது இகழ்ச்சி பகையுள்ளும்", line2: "பண்புபா ராட்டும் உலகு.", eng: "An insult brings pain even if uttered in jest; the wise maintain their refined courtesy even toward their open enemies."},
{num: 996, line1: "பண்புடையார்ப் பட்டுண்டு உலகம் அதுஇன்றேல்", line2: "மண்புக்கு மாய்வது மண்.", eng: "The world continues to move smoothly because courteous souls dwell within it; without them, it would crumble into dead dust."},
{num: 997, line1: "அரம்போலும் கூர்மையர் ஆயினும் மரம்போல்வர்", line2: "மக்கள்பண்பு இல்லாத வர்.", eng: "Though their intellect is as sharp as a steel file, those who lack refined courtesy are no better than blocks of wood."},
{num: 998, line1: "நண்பாற்றல் நட்டார் பிரிவிற்கும் அவாவென்னும்", line2: "துன்பத்துள் துன்பம் கெடின்.", eng: "It is a true disgrace to act discourteously even toward an opponent; a noble mind handles disputes with refined manners."},
{num: 999, line1: "ஒளியார்முன் ஒள்ளியர் ஆதல் வெளியார்முன்", line2: "வெண்முத்துப் பூணாரோடு நேர்.", eng: "To those who lack courtesy, the whole world looks dark and hostile, even when surrounded by bright daylight and prosperity."},
{num: 1000, line1: "பண்பிலான் பெற்ற பெருஞ்செல்வம் நன்பால்", line2: "கலந்தீமையால் திரிந்தற்று.", eng: "The vast wealth acquired by a person devoid of courtesy is like pure milk poured into a dirty, contaminated vessel; it turns sour and useless."},

{num: 1001, line1: "வைத்தவண் டான்காப்பப் பூணெனின் வையத்து", line2: "வைப்பார் விடல்சூழ்ந்த மாண்பு.", eng: "He who hoards vast wealth without enjoying it or giving it away is like a dead man guarding a hidden treasure."},
{num: 1002, line1: "அளவறியான் மூர்க்கன் அளவிறந்து உண்பான்", line2: "அளவிறந்து நோய்மல்கிச் சாம்.", eng: "A miserly mind believes that material wealth is everything, failing to see that unshared riches lead to absolute spiritual poverty."},
{num: 1003, line1: "கல்லாதான் சொற்கா முறுதல் முலையிரண்டும்", line2: "இல்லாதான் பெண்காமுற் றற்று.", eng: "The burden of keeping vast riches without using them for noble charity brings nothing but an exhausting anxiety to the soul."},
{num: 1004, line1: "எச்சம் இலார்க்கும் இலியர்க்கும் இல்எனாது", line2: "அச்சம் இலாதான் பொருள்.", eng: "He who leaves no legacy of benevolence and hoards riches in greed will leave his wealth to be scattered by strangers."},
{num: 1005, line1: "அன்பிலன் ஆன்ற துணையிலன் தான்கொண்ட", line2: "வன்பிலன் ஞாலத்து அறிவு.", eng: "The immense hoards of a person who will neither feed the hungry nor help his own kin are a useless weight upon the earth."},
{num: 1006, line1: "ஏவவும் செய்கலான் தான்தேறான் அவ்வுயிர்", line2: "போவமளவும் ஓர் நோய்.", eng: "The wealth of a man who lacks the heart to give to the worthy is like a beautiful woman growing old alone in an empty house."},
{num: 1007, line1: "நச்சப் படாதவன் செல்வம் நடுவூருள்", line2: "நச்சு மரம்பழுத் தற்று.", eng: "The riches amassed by a man whom nobody loves are like a toxic tree bearing poisonous fruit right in the middle of a village."},
{num: 1008, line1: "அற்பறிந்து ஆன்றமைந்த சொல்லான்எஞ் ஞான்றும்", line2: "திறனறிந்தான் தேறப் படும்.", eng: "Those who bypass their duty to society to keep their gold safe will find their name erased from the registers of honor."},
{num: 1009, line1: "சீருடைச் செல்வர் சிறுமையுள் பட்டக்கால்", line2: "சீருடை மானம் சிதையாது காப்பார்.", eng: "When a generous house falls into poverty, it is a tragedy; when a miser retains his gold, it is a waste of the world's resources."},
{num: 1010, line1: "பண்பிலான் பெற்ற பெருஞ்செல்வம் நன்பால்", line2: "கலந்தீமையால் திரிந்தற்று.", eng: "The vast wealth acquired by a person devoid of human kindness is like pure milk poured into a dirty, contaminated vessel."},

{num: 1011, line1: "கருமத்தால் நாணுதல் நாணுத்தக் கவற்றுள்", line2: "பெருமை உடைத்துஅந் நெறி.", eng: "To shrink back from an unrighteous action out of internal moral shame is the truest mark of a noble soul."},
{num: 1012, line1: "ஊணுடையான் ஆடை உடையான் பிறர்செய்வ", line2: "நாணுடையான் நல்லான் எனல்.", eng: "Food and clothing are shared by all living beings; human excellence belongs uniquely to those who possess a sensitive conscience."},
{num: 1013, line1: "கண்ணோட்டம் உள்ளொழித்து வாழ்தலின் அந்நிலையே", line2: "புண்ணோட்டம் இல்லா நெறி.", eng: "All physical lives cling to a body; a perfect character clings uniquely to a deep sense of moral shame before vice."},
{num: 1014, line1: "அணியன்றோ நாணுடைமை சான்றோர்க்கு அஃதின்றேல்", line2: "பிணியன்றோ பீடு நடை.", eng: "Is not a sensitive conscience the crown jewel of the wise? Without it, a proud and haughty stride is a mere disease."},
{num: 1015, line1: "பிறர்பழியும் தம்பழியும் நாணுவார் நாணிற்கு", line2: "உறைவிடம் என்பார் உலகு.", eng: "The world calls that person the very home of virtue who feels shame for his own errors and blushes for the faults of others."},
{num: 1016, line1: "நாண்வேலி கொள்ளாது நாணழிந்து வாழ்பவர்", line2: "வாண்போல் பகைவர்கேண் நேர்.", eng: "The noble use a sensitive conscience as a protective hedge; they will sooner discard life than break through that barrier."},
{num: 1017, line1: "நாணால் உயிரைத் துறப்பர் உயிர்ப்பொருட்டால்", line2: "நாண்துறவார் நாணாள் பவர்.", eng: "Those who value integrity will cheerfully throw away their lives for honor; they never discard honor to save a fragile body."},
{num: 1018, line1: "பிறர்நாணத் தக்கது தான்நாணா னாயின்", line2: "அறம்நாணத் தக்கது உடைத்து.", eng: "If a person commits a vice that makes onlookers blush while he remains unbothered, Virtue herself will abandon him in disgust."},
{num: 1019, line1: "குலஞ்சுடும் கொள்கை பிழைப்பின் நலஞ்சுடும்", line2: "நாணின்மை நின்றக் கடை.", eng: "A single error can stain a lineage; a complete lack of moral shame burns down all personal virtues at once."},
{num: 1020, line1: "நாணகத் தில்லார் இயக்கம் மரப்பாவை", line2: "நாணால் உயிர்மருட்டி அற்று.", eng: "The movements of a person who lacks an internal conscience are like a wooden puppet pulled by strings, merely mimicking a living man."},

{num: 1021, line1: "கருமம் மடிவறச் செய்தல் தன்நாடிக்", line2: "கருமம் உயர்த்தி விடல்.", eng: "There is no higher dignity than to resolve, 'I will never cease working until I lift my family to noble heights.'"},
{num: 1022, line1: "ஆள்வினையும் ஆன்ற அறிவும் எனவிரண்டின்", line2: "நீள்வினையால் நீளும் குடி.", eng: "A house is raised and made illustrious by two key pillars: unyielding manly effort and a wide, practical intellect."},
{num: 1023, line1: "குடிசெய்வல் என்னும் ஒருவற்குத் தெய்வம்", line2: "மடிதற்றுத் தான்முந்துறும்.", eng: "When a person declares, 'I shall elevate my house,' Providence girds up its loins and steps forward to clear his path."},
{num: 1024, line1: "சூழாமல் தானே முடிவெய்தும் தம்குடியைத்", line2: "தாழாமல் செய்வான் வினை.", eng: "He who labors without procrastination to lift his family will find his enterprises succeeding effortlessly on their own."},
{num: 1025, line1: "குற்றம் இலனாய்க் குடிசெய்து வாழ்வானைச்", line2: "சுற்றமாச் சுற்றும் உலகு.", eng: "He who lives a blameless life while working tirelessly for his kin will be claimed by the whole world as a beloved relative."},
{num: 1026, line1: "நல்லாண்மை என்பது ஒருவற்குத் தான்பிறந்த", line2: "இல்லாண்மை ஆக்கிக் கொளல்.", eng: "True manhood consists in taking up the entire governance of one's house and steering it safely through adversity."},
{num: 1027, line1: "அமரகத்து ஆற்றாரும் அஞ்சும்கொல் அஞ்சா", line2: "தமரகத்து ஆற்றாரை விட்டு.", eng: "Like a battlefield that requires brave soldiers in the front line, a family relies on its strongest member to bear the heaviest burdens."},
{num: 1028, line1: "குடிசெய்வார்க்கு இல்லை பருவம் மடிசெய்து", line2: "மானம் கருதக் கெடும்.", eng: "Those determined to elevate their family have no time for seasons or false pride; to indulge in laziness is to invite structural ruin."},
{num: 1029, line1: "இடும்பைக்கே கொள்கலம் ஆம் கொல்லோ குடும்பத்தைக்", line2: "குற்ற மறைப்பான் உடம்பு.", eng: "Is the body of a man who shields his family from suffering a mere target for hardships? No, it is the armor of his house."},
{num: 1030, line1: "இடுக்கண் வருங்கால் நகுக அதனை", line2: "அடுத்தூர்வது அஃதொப்பது இல்.", eng: "If there is no capable leader to prop it up during a crisis, a great ancestral house will crash to the ground like a rotten tree."},

{num: 1031, line1: "சுழன்றும்ஏர்ப் பின்னது உலகம் அதனால்", line2: "உழந்தும் உழவே தலை.", eng: "Though the world spins through many professions, it must ultimately return to the tail of the plow; therefore, farming is supreme."},
{num: 1032, line1: "உழுவார் உலகத்தார்க்கு ஆணிஅஃ தாற்றாது", line2: "எழுவாரை யெல்லாம் பொறுத்து.", eng: "Farmers are the linchpin of the whole world; they sustain all those who pursue other arts and trades."},
{num: 1033, line1: "உழுதுண்டு வாழ்வாரே வாழ்வார்மற் றெல்லாம்", line2: "தொழுதுண்டு பின்செல் பவர்.", eng: "They alone live who live by tilling the soil; all others merely follow behind, eating the bread of dependence."},
{num: 1034, line1: "பலகுடை நீழலும் தம்குடைக்கீழ் காண்பர்", line2: "அலகுடை நீழலவர்.", eng: "Those who possess fields of waving grain will see the umbrellas of royal rulers bowing before their independent abundance."},
{num: 1035, line1: "இரவார் இரப்பார்க்கு ஒன்று ஈவர் கரவாது", line2: "கைசெய்து ஊண்மாலை யவர்.", eng: "Those whose nature is to work the earth with their hands beg from no one; they open their palms to relieve the hunger of others."},
{num: 1036, line1: "உழவினார் கைம்மடங்கின் இல்லை விழைவதூஉம்", line2: "விட்டேம் என்பார்க்கும் நிலை.", eng: "If the hands of the tillers are folded in inaction, even the self-controlled ascetics who have renounced the world cannot survive."},
{num: 1037, line1: "தொடிப்புழுதி கஃசா உணக்கின் பிடித்தெருவும்", line2: "வேண்டாது சாலப் படும்.", eng: "If a farmer dries his plowed soil until a single ounce of earth turns to dust, his crops will flourish without a single handful of manure."},
{num: 1038, line1: "ஏரினும் நன்றால் எருவிடுதல் கட்டபின்", line2: "நீரினும் நன்றதன் காப்பு.", eng: "Manuring a field is better than merely plowing it; but pulling out weeds and guarding the crop is far better than watering it."},
{num: 1039, line1: "செல்லான் கிழவன் இருப்பின் நிலம்புலந்து", line2: "இல்லாளின் ஊடி விடும்.", eng: "If the owner does not visit his fields daily, the land will turn away from him in anger like a neglected spouse."},
{num: 1040, line1: "இலம்என்று அசைஇ யிருப்பாரைக் காணின்", line2: "நிலமகள் பூமி நகும்.", eng: "When Mother Earth sees people sitting idly and complaining, 'We are poor,' she laughs out loud at their foolish laziness."},

{num: 1041, line1: "இன்மையின் இன்னாதது யாதெனில் இன்மையின்", line2: "இன்மையே இன்னாதது ஒன்று.", eng: "What is as terribly painful as grinding poverty? Nothing can match the sheer misery of poverty except poverty itself."},
{num: 1042, line1: "இன்மை எனுமொரு பாவி மறுமையும்", line2: "இம்மையும் இன்றித் தரும்.", eng: "The cruel demon called Poverty strips a person of his joy in this life and robs him of his rewards in the life to come."},
{num: 1043, line1: "தொல்வரவும் தோலும் கெடுக்கும் தொகையாக", line2: "நல்குரவு என்னும் நசை.", eng: "The burning desire born of poverty can destroy both ancestral pride and the natural nobility of a person's speech at once."},
{num: 1044, line1: "இற்பிறந்தார்க் கண்ணும் இகழ்வந் தெய்தும்", line2: "நல்குரவு என்னும் நசை.", eng: "Even in those born of the grandest lineage, poverty generates a state of desperation that brings public humiliation."},
{num: 1045, line1: "நல்குரவு என்னும் இடும்பையுள் பல்கரைத்", line2: "துன்பங்கள் சென்று படும்.", eng: "The single misery called poverty acts as a gateway through which a whole army of varied afflictions marches into a home."},
{num: 1046, line1: "நற்பொருள் நன்குணர்ந்து சொல்லினும் நல்கூர்ந்தார்", line2: "சொற்பொருள் சோர்வு படும்.", eng: "Though a poor man speaks words of profound wisdom with deep insight, the world will treat his speech as empty air."},
{num: 1047, line1: "அறஞ்சாரா நல்குரவு ஈன்றாBlock தானும்", line2: "பிறன்போல நோக்கப் படும்.", eng: "He who is wrapped in unrighteous poverty will be looked upon as a complete stranger even by the mother who gave him birth."},
{num: 1048, line1: "இன்றும் வருவதுகொல் இன்னாமை நேற்றுமன்னர்", line2: "என்னை நலிந்தது அணைத்து.", eng: "Will the bitter cold of poverty that tormented me yesterday return to crush my spirit again today?"},
{num: 1049, line1: "நெருப்பினுள் துஞ்சலும் ஆகும் நிரப்பினுள்", line2: "யாதொன்றும் கண்பாடு அரிது.", eng: "A desperate man might find it possible to fall asleep while surrounded by a blazing fire; but in the grip of poverty, no eye can close."},
{num: 1050, line1: "துப்பிலார் துப்புஅற்றார் ஆகித் துவரத்துறவார்", line2: "பிறர்மிசை வாழ்பவர் நேர்.", eng: "Those who do not possess the means to survive, yet refuse to renounce their desires, become a heavy, recurring burden upon their neighbors."},

{num: 1051, line1: "இரக்க இரத்தக்கார்க் காணின் கரப்பின்", line2: "அவர்பழி தம்பழி அன்று.", eng: "If you meet a person of noble wealth and generous heart, ask of him; if he denies your plea, the blemish is his, not yours."},
{num: 1052, line1: "இன்பம் உவகை தருமே இரப்பவர்க்கு", line2: "ஈவோர் உவகை எனின்.", eng: "Even asking for charity brings a strange joy if the person approached feels delight in giving without hesitation."},
{num: 1053, line1: "கரப்பிலா நெஞ்சின் கடனறிவார் முன்நின்று", line2: "இரப்பும் ஓர் ஏர் உடைத்து.", eng: "To stand before a righteous soul who understands his duty to humanity and ask for assistance holds its own modest dignity."},
{num: 1054, line1: "இரப்பாரும் ஈவார்க்குப் போன்றே கரப்பிலார்", line2: "கனவிலும் தேற்றாதார் நேர்.", eng: "There are noble souls who give so gracefully that they look like the ones receiving a favor; to ask of them is a pleasure."},
{num: 1055, line1: "இல்லாமை சொல்லி இரப்பாரும் ஈவார்க்குப்", line2: "பொல்லாமை யொன்றும் இலர்.", eng: "Because there are open-handed givers on earth, the poor can state their needs without fear of causing anger or irritation."},
{num: 1056, line1: "நல்குரவு என்னும் இடும்பை தீர்ப்பாரைக்", line2: "காணின் களித்துவிடும் நெஞ்சு.", eng: "When the eye spots a generous protector who can heal the disease of poverty, the heart of the destitute leaps with joy."},
{num: 1057, line1: "இகழ்ந்தெள்ளா தீவாரைக் காணின் மகிழ்ந்துள்ளம்", line2: "உள்ளுள் உவகை மிகும்.", eng: "When givers bestow charity without a trace of contempt or mocking words, the receiver's inner soul rejoices deeply."},
{num: 1058, line1: "இரப்பாரை இல்லாயின் ஈர்ங் கண்மா ஞாலம்", line2: "மரப்பாவை சென்றுவந் தற்று.", eng: "If there were no poor people to ask for charity, this vast earth would be nothing but a stage of cold wooden puppets moving around."},
{num: 1059, line1: "ஈவார்க்குப் பின்என் ஆம் இன்பம் இரப்பாரைத்", line2: "தாமுவப்பக் காணாக் கடை.", eng: "What glory or joy is left for wealthy givers if there are no destitute souls to receive their benevolence with smiling faces?"},
{num: 1060, line1: "இரப்பான் சினம்கொள்ளா தாகுக தன்முன்", line2: "கரப்பான் கழியக் கெடும்.", eng: "If a seeker faces a refusal, let him not break out in anger; the person who denies a genuine plea is already facing internal ruin."},

{num: 1061, line1: "கரப்பிலா நெஞ்சினாரைக் காணின் இரப்பாரே", line2: "இரப்பும் ஒருவகை ஏர்.", eng: "It is far nobler to satisfy your hunger with water alone than to win the finest dishes by fawning before a stingy miser."},
{num: 1062, line1: "இரந்தும் உயிர்வாழ்தல் வேண்டின் பரந்து", line2: "கெடுக உலகியற்றி யான்.", eng: "If the Creator of this world intended that human beings must survive only by begging, let Him wander and perish like a vagrant too."},
{num: 1063, line1: "இன்மையின் இன்னாதது யாதெனில் இன்மையின்", line2: "இன்மையே இன்னாதது ஒன்று.", eng: "There is no tougher steel than the resolution that declares, 'I shall never seek to cure my poverty by pleading for gifts.'"},
{num: 1064, line1: "இடமெல்லாம் கொள்ளாத் தகைத்தே இடமிலாக்", line2: "கண்ணும் இரவா நெறி.", eng: "The grandeur of a person who refuses to beg even in the darkest hour of destitution encompasses the entire universe."},
{num: 1065, line1: "அறஞ்சாரா நல்குரவு ஈன்றாBlock தானும்", line2: "பிறன்போல நோக்கப் படும்.", eng: "There is nothing sweeter than a simple meal earned by the sweat of your own brow, even if it consists of nothing but plain greens."},
{num: 1066, line1: "நெருப்பினுள் துஞ்சலும் ஆகும் நிரப்பினுள்", line2: "யாதொன்றும் கண்பாடு அரிது.", eng: "The tongue loses all its natural power and beauty the very moment it shapes itself to say, 'Please give me charity.'"},
{num: 1067, line1: "இரந்தும் உயிர்வாழ்தல் வேண்டின் பரந்து", line2: "கெடுக உலகியற்றி யான்.", eng: "Those who possess high self-respect prefer to see their physical body dissolve into dust rather than see it sustained by begging."},
{num: 1068, line1: "இகழ்ந்தெள்ளா தீவாரைக் காணின் மகிழ்ந்துள்ளம்", line2: "உள்ளுள் உவகை மிகும்.", eng: "To beg for assistance from a cold heart is a hidden weapon that pierces the soul and brings an unbearable inner humiliation."},
{num: 1069, line1: "கரப்பிலா நெஞ்சின் கடனறிவார் முன்நின்று", line2: "இரப்பும் ஓர் ஏர் உடைத்து.", eng: "The act of begging steals away a person's intelligence, crushes his dignity, and leaves his self-respect utterly dead."},
{num: 1070, line1: "கரப்பிலார் கனவிலும் தேற்றாதார் கேண்மை", line2: "இரப்பாரை இல்லாயின் என்.", eng: "The words of refusal from a miser act like a swift poison; they kill the seeker's spirit long before his body gives way."},

{num: 1071, line1: "மக்களே போல்வர் கயவர் அவரன்ன", line2: "ஒப்பாரி யாமுண்டது இல்.", eng: "The base look exactly like human beings in outward form; such a perfect counterfeit can nowhere else be found in nature."},
{num: 1072, line1: "நன்றறி வாரின் கயவர் திருவுடையர்", line2: "நெஞ்சத்து அவலம் இலர்.", eng: "The vile are far happier than the wise; their minds are never troubled by a heavy conscience or a sense of duty."},
{num: 1073, line1: "தேவரே போல்வர் கயவர் அவருந்தாம்", line2: "மேவன செய்துஒழுக லான்.", eng: "The vile resemble the heavenly gods in one unique way: they do whatever their unbridled desires dictate without any rules."},
{num: 1074, line1: "அகப்பட்டி ஆவாரைக் காணின் அவரிற்", line2: "மிகப்பட்டுச் செம்மாக்கும் கீழ்.", eng: "When a base person meets someone worse than himself, his arrogance expands and he treats them with absolute cruelty."},
{num: 1075, line1: "அச்சமே கீழ்களது ஆசாரம் எச்சம்", line2: "அவாவே உண்டேல் சிறிது.", eng: "Fear is the only law that a base person obeys; if fear is absent, a tiny spark of greed is the only thing that moves him."},
{num: 1076, line1: "அறைபறை யன்னர் கயவர்தாம் கேட்ட", line2: "மறைபிறர்க்கு உய்த்துரைத்த லான்.", eng: "The vile are like a beaten drum; the moment they hear a deep secret, they run to blab it out to the entire marketplace."},
{num: 1077, line1: "ஈர்ங்கை விதிரார் கயவர் கொடிறுடைக்கும்", line2: "கூன்கையர் அல்லா தவர்க்கு.", eng: "A base person will not shake a single wet grain of rice from his hand for charity, unless someone breaks his jaw with a fist."},
{num: 1078, line1: "சொல்லப் பயன்படுவர் சான்றோர் கரும்புபோல்", line2: "கொல்லப் பயன்படும் கீழ்.", eng: "The noble yield assistance the moment they are asked; the base yield profit only when crushed and squeezed like sugar cane."},
{num: 1079, line1: "உடுப்பதூஉம் உண்பதூஉம் காணின் பிறர்மேல்", line2: "வடுக்காண வற்றாகும் கீழ்.", eng: "If a base man sees his neighbor wearing fine clothes or eating good food, his heart fills with malice and he invents multiple slanders."},
{num: 1080, line1: "எற்றிற்கு உரியர் கயவரொன்று உற்றக்கால்", line2: "விற்றிற்கு உரியர் விரைந்து.", eng: "For what else are the vile fit in a time of serious crisis? They are fit only to sell themselves quickly to the highest bidder."},

{num: 1081, line1: "அணங்குகொல் ஆய்மயில் கொல்லோ கனங்குழை", line2: "மாதர்கொல் மாலும்என் நெஞ்சு.", eng: "Is this a celestial goddess, a graceful forest peacock, or a human maiden? My inner heart is utterly bewildered."},
{num: 1082, line1: "நோக்கினாள் நோக்கெதிர் நோக்குதல் தாக்குணங்கு", line2: "தானைக்கொண் டன்ன துடைத்து.", eng: "The fierce return glance of this adorned maiden is like an entire army marching to attack my defenseless heart."},
{num: 1083, line1: "மறப்பல் எனினும் மறவாது என்நெஞ்சம்", line2: "துறப்பல் எனினும் தொடர்ந்து.", eng: "I knew nothing of the god of death until I looked into the large, powerful eyes of this maiden who wears fine ornaments."},
{num: 1084, line1: "கண்டார் உயிருண்ணும் தோற்றத்தால் பெண்மடந்தை", line2: "பண்போல் பணைத்தோ ளவள்.", eng: "This maiden possesses a glance that seems to drink the very life-breath of those who dare look upon her beauty."},
{num: 1085, line1: "கூற்றமோ கண்ணோ பிணையோ மடவரல்", line2: "நோக்கமிம்மூன்றும் உடைத்து.", eng: "Is it the weapon of death, a soft deer's glance, or a human eye? Her swift look carries the power of all three at once."},
{num: 1086, line1: "கொடும்புருவம் கோடா மறைப்பின் நடுங்கஞர்", line2: "செய்யல மன் இந்நோக்கு.", eng: "If her curved eyebrows did not look like a bent bow, her beautiful eyes would not inflict this shaking torment upon me."},
{num: 1087, line1: "கடமான்று அஃதாற்றா தோளம்போல் நோக்கு", line2: "நடைமான்றாள் நல்கூர்ந்தார் மேல்.", eng: "The gaze that streams from behind her fine veil is like an arrow shot out from a hidden fortress to pierce a traveler."},
{num: 1088, line1: "அணங்குடை அரணில்லாள் என்றுஅஞ்சான் கொல்லோ", line2: "குணங்குடி கொள்ளாதான் நோக்கு.", eng: "Has the god of love no mercy? He continues to strike down my strength through the radiant face of this maiden."},
{num: 1089, line1: "சிறுமையும் செல்லா இடமும் இகழும்", line2: "உறுபகை யில்லா படை.", eng: "She looks like a tender sapling of rare beauty, yet her gentle smile has the power to disarm my entire manhood completely."},
{num: 1090, line1: "நெஞ்சத்தோடு ஒத்தாள் எனினும் அவளொடு", line2: "வெஞ்சொல் உரைத்தல் அரிது.", eng: "The sweetness of her appearance promises life, but the sharp flash of her brilliant eyes deals a lovely, welcome death."},

{num: 1091, line1: "இருநோக்கு இவளுண்கண் உள்ளது ஒருநோக்கு", line2: "நோய்நோக்கு ஒன்றுஅந்நோய் மருந்து.", eng: "Her darkened eyes possess a double glance: one look inflicts this sweet disease, and the other acts as its perfect medicine."},
{num: 1092, line1: "கண்விதுப் புற்றுக் கலிழ்வதோ காதலன்", line2: "புணராமை முந்துற் றென.", eng: "The brief, stolen look she casts when my eyes are turned away is more than half of the love-union I desire."},
{num: 1093, line1: "நோக்கினாள் நோக்கி இறைஞ்சினாள் அஃதவள்", line2: "யாக்கினுள் அன்புவளர்த் தற்று.", eng: "She looked at me, and then lowered her gaze to the ground; that gentle sign was like pouring water on a young plant of love."},
{num: 1094, line1: "யான்நோக்கும் காலை நிலன்நோக்கும் நோக்காக்கால்", line2: "தான்நோக்கி மெல்ல நகும்.", eng: "When I look at her, she fixes her gaze on the floor; the moment I look away, she watches me and smiles softly to herself."},
{num: 1095, line1: "குறிப்பொன்று கூறினாள் போலக் குவளை", line2: "நெறிப்பொன்று நோக்கி நின்றாள்.", eng: "She did not speak a single word, yet the slight slant of her head spoke volumes of hidden affection to my heart."},
{num: 1096, line1: "சொல்லொன்று மற்றுஅவர் செய்பொன்று மாண்பிலார்", line2: "புல்லென்னும் கேண்மை விடல்.", eng: "Though her words sounded cold and formal before her relatives, the soft light in her eyes signaled a deep, private welcome."},
{num: 1097, line1: "மாறுபாடு இல்லாத உண்டி மறுத்துண்ணின்", line2: "ஊறுபாடு இல்லை உயிர்க்கு.", eng: "The outward show of feigned indifference and lowered brows is a mask; her inner heart is already bound to mine."},
{num: 1098, line1: "அசைஇயற் குண்டோ ரோர் ஆண்பாலார்க் கென்னோ", line2: "பசையியற் பாராட்டுங் கீழ்.", eng: "When I stand near, she gently adjusts her garments and bangles; these are the silent signals of a maiden's turning heart."},
{num: 1099, line1: "ஏவவும் செய்கலான் தான்தேறான் அவ்வுயிர்", line2: "போவமளவும் ஓர் நோய்.", eng: "The unspoken understanding that flows between two lovers makes the formal speech of the tongue completely unnecessary."},
{num: 1100, line1: "கண்ணொடு கண்ணிணை நோக்குஒக்கின் வாய்ச்சொற்கள்", line2: "என்ன பயனும் இல.", eng: "When eye meets eye in perfect, silent agreement, the spoken words of the mouth lose all their purpose and value."},


{num: 1101, line1: "கண்டுகேட்டு உண்டுயிர்த்து உற்றுஅறியும் ஐம்புலனும்", line2: "ஒண்தொடி கண்ணே உள.", eng: "All five senses—sight, sound, taste, smell, and touch—find their ultimate, simultaneous fulfillment uniquely within this bright-bangled maiden."},
{num: 1102, line1: "பிணிக்கு மருந்து பிறமன் அணியிழை", line2: "தன்பிணிக்குத் தானே மருந்து.", eng: "The medicine for any common disease is found outside the body; but for the disease of love, the cause of the torment is herself the only cure."},
{num: 1103, line1: "தாம்வீழ்வார் மென்தோள் துயிலின் இனிதுகொல்", line2: "தாமரைக் கண்ணான் உலகு.", eng: "Is the celestial paradise of the lotus-eyed Lord sweeter than a peaceful sleep within the soft arms of one's beloved?"},
