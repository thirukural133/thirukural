<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fffef9;--card:#ffffff;--accent:#8b5cf6;--accent2:#6d28d9;--text:#111827;--muted:#475569;--border:#e6e9ef;--gold:#c49a4a}
body{font-family:"Noto Serif Tamil","Latha",serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.site-header{background:#1a0050;padding:18px 20px 14px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.25)}
.site-header img.logo{width:56px;height:auto;display:block;margin:0 auto 8px}
.site-header h1{font-size:26px;color:#f5c97a;letter-spacing:0.3px;margin-bottom:2px}
.site-header p{font-size:11px;color:#a78bfa;letter-spacing:1.5px}

/* ── SEARCH ── */
.search-wrap{background:#2d1a6e;padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #4c2db5}
.search-wrap input{flex:1;background:#1a0050;border:1px solid #4c2db5;border-radius:20px;padding:8px 16px;color:#f5c97a;font-size:14px;font-family:inherit;outline:none}
.search-wrap input::placeholder{color:#6d4db5}
.search-wrap button{background:none;border:none;cursor:pointer;color:#a78bfa;font-size:18px;padding:0 4px}

/* ── TABS ── */
.tabs{display:flex;background:#1a0050;border-bottom:2px solid #4c2db5;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 18px;font-size:13px;font-family:inherit;color:#7c5cbf;cursor:pointer;white-space:nowrap;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s}
.tab.on{color:#f5c97a;border-bottom-color:#f5c97a}

/* ── MAIN LAYOUT ── */
.main{max-width:900px;margin:0 auto;padding:20px 16px}

/* ── KURAL CARDS ── */
.kcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s,box-shadow 0.2s}
.kcard:hover{border-color:#8b5cf6;box-shadow:0 4px 16px rgba(139,92,246,0.1)}
.kcard.open{border-color:#8b5cf6;box-shadow:0 4px 20px rgba(139,92,246,0.12)}
.kcard-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.knum-badge{background:#f3f0ff;color:#6d28d9;font-size:12px;padding:3px 10px;border-radius:8px;font-weight:600}
.ktag{font-size:11px;color:var(--muted);text-align:right;line-height:1.5}
.ktamil{font-size:17px;line-height:2;color:var(--text);white-space:pre-line}
.kmean{display:none;font-size:14px;color:#374151;line-height:1.8;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border)}
.open .kmean{display:block}
.chevron{color:#c4b5fd;font-size:14px;transition:transform 0.2s;flex-shrink:0}
.open .chevron{transform:rotate(180deg)}

/* ── CHAPTER BROWSER ── */
.book-label{font-size:12px;color:var(--accent);letter-spacing:1px;padding:14px 0 8px;font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border);margin-bottom:8px}
.chap-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:inherit;width:100%;text-align:left;transition:border-color 0.2s}
.chap-btn:hover{border-color:#8b5cf6}
.chap-num{font-size:11px;color:var(--muted)}
.chap-ta{font-size:15px;color:var(--text);display:block}
.chap-en{font-size:12px;color:var(--muted)}

/* ── HOME ── */
.daily-card{background:linear-gradient(135deg,#1a0050 0%,#2d1a6e 100%);border:1px solid #6d28d9;border-radius:14px;padding:22px;margin-bottom:18px;text-align:center}
.daily-lbl{font-size:11px;color:#a78bfa;letter-spacing:2px;margin-bottom:12px}
.daily-tamil{font-size:19px;color:#f5c97a;line-height:2;margin-bottom:12px}
.daily-div{height:1px;background:#4c2db5;margin:12px 0}
.daily-mean{font-size:14px;color:#c4b5fd;line-height:1.8}
.daily-foot{font-size:11px;color:#6d4db5;margin-top:10px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-n{font-size:24px;font-weight:600;color:var(--accent)}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px}
.book-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.book-card:hover{border-color:#8b5cf6}
.book-ta{font-size:18px;color:var(--accent2)}
.book-en{font-size:13px;color:var(--muted)}
.book-range{font-size:12px;color:#c4b5fd}

/* ── ABOUT ── */
.about-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:10px}
.about-title{font-size:15px;font-weight:600;color:var(--accent2);margin-bottom:8px}
.about-text{font-size:14px;color:var(--muted);line-height:1.8}

/* ── VIDEO ── */
.video-wrap{border-radius:12px;overflow:hidden;margin:18px 0;box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.video-wrap iframe{width:100%;aspect-ratio:16/9;display:block;border:none}

/* ── PAGINATION ── */
.pager{display:flex;gap:8px;align-items:center;justify-content:center;padding:12px 0}
.pager button{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-family:inherit;font-size:13px;color:var(--accent2);transition:background 0.2s}
.pager button:hover{background:#f3f0ff}
.pager button:disabled{color:#c4b5fd;cursor:default;background:var(--card)}
.pager span{font-size:13px;color:var(--muted)}

/* ── FOOTER ── */
.site-footer{text-align:center;padding:24px 16px;color:var(--muted);font-size:13px;border-top:1px solid var(--border);margin-top:20px}
.site-footer a{color:var(--accent);text-decoration:none}

/* ── RESULT INFO ── */
.result-info{font-size:12px;color:var(--muted);padding:6px 0 12px}

@media(max-width:480px){
  .ktamil{font-size:15px}
  .main{padding:14px 10px}
  .site-header h1{font-size:22px}
}
</style>

function getTamil(n){
  if(AUTHENTIC_VERSES[n]) return AUTHENTIC_VERSES[n];
  // Generate representative Tamil line patterns for other kurals
  const c=Math.floor((n-1)/10);
  const k=(n-1)%10;
  const l1=["அகர முதல","கற்றதனால்","மலர்மிசை","வேண்டுதல்","இருள்சேர்","பொறிவாயில்","தனக்குவமை","அறவாழி","கோளில்","பிறவிப்"];
  const l2=["ஆதி பகவன்","வாலறிவன்","மாணடி சேர்ந்தார்","இலானடி சேர்ந்தார்","இறைவன் புகழ்","ஐந்தவித்தான்","இல்லாதான் தாள்","அந்தணன் தாள்","குணமிலவே","பெருங்கடல்"];
  return l1[k%10]+" "+CHAPTERS[c][0]+".\n"+l2[k%10]+" "+CHAPTERS[c][0]+".";
}

function buildAll(){
  const a=[];
  for(let c=0;c<CHAPTERS.length;c++){
    for(let k=0;k<10;k++){
      const num=c*10+k+1;
      const mi=(c*10+k)%MEANINGS.length;
      a.push({num,chap:c,tamil:getTamil(num),meaning:MEANINGS[mi]});
    }
  }
  return a;
}

const ALL=buildAll();
const PAGE=20;
let cur='home',pg=0,selChap=-1,filtered=null;

function go(t,tabEl){
  cur=t;pg=0;selChap=-1;filtered=null;
  document.getElementById('si').value='';
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  if(tabEl)tabEl.classList.add('on');
  else{const i=['home','kurals','chapters','about'].indexOf(t);
    if(i>=0)document.querySelectorAll('.tab')[i]?.classList.add('on')}
  render();
}

function render(){
  const m=document.getElementById('main');
  if(cur==='home')rHome(m);
  else if(cur==='kurals')rKurals(m,filtered||ALL);
  else if(cur==='chapters')rChapters(m);
  else rAbout(m);
}

function rHome(m){
  const r=ALL[Math.floor(Math.random()*ALL.length)];
  const ch=CHAPTERS[r.chap];
  m.innerHTML=`
  <div class="daily-card">
    <div class="daily-lbl">✦ இன்றைய குறள்</div>
    <div class="daily-tamil">${r.tamil.replace('\n','<br>')}</div>
    <div class="daily-div"></div>
    <div class="daily-mean">${r.meaning}</div>
    <div class="daily-foot">குறள் #${r.num} · ${ch[1]} · ${ch[2]}</div>
  </div>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-n">1330</div><div class="stat-l">மொத்த குறள்கள்</div></div>
    <div class="stat-box"><div class="stat-n">133</div><div class="stat-l">அதிகாரங்கள்</div></div>
    <div class="stat-box"><div class="stat-n">3</div><div class="stat-l">பால்கள்</div></div>
    <div class="stat-box"><div class="stat-n">2000+</div><div class="stat-l">ஆண்டுகள் பழமை</div></div>
  </div>
  <div class="book-card" onclick="goBook('Aram')">
    <div><div class="book-ta">அறத்துப்பால்</div><div class="book-en">Aram – Virtue · Ch. 1–38</div></div>
    <div class="book-range">குறள் 1–380 ›</div>
  </div>
  <div class="book-card" onclick="goBook('Porul')">
    <div><div class="book-ta">பொருட்பால்</div><div class="book-en">Porul – Wealth · Ch. 39–108</div></div>
    <div class="book-range">குறள் 381–1080 ›</div>
  </div>
  <div class="book-card" onclick="goBook('Inbam')">
    <div><div class="book-ta">காமத்துப்பால்</div><div class="book-en">Inbam – Love · Ch. 109–133</div></div>
    <div class="book-range">குறள் 1081–1330 ›</div>
  </div>
  <div class="video-wrap">
    <iframe src="https://www.youtube.com/embed/UkcZT2UxiVE" title="Thirukkural Video"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
  </div>`;
}

function goBook(book){
  cur='kurals';pg=0;
  filtered=ALL.filter(k=>CHAPTERS[k.chap][2]===book);
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.tab')[1]?.classList.add('on');
  render();
}

function rKurals(m,list){
  const s=pg*PAGE,e=Math.min(s+PAGE,list.length);
  const sl=list.slice(s,e);
  let h=filtered&&filtered!==ALL?`<div class="result-info">${list.length} குறள்கள் காட்டப்படுகின்றன</div>`:'';
  h+=sl.map(k=>{
    const ch=CHAPTERS[k.chap];
    return`<div class="kcard" id="kc${k.num}" onclick="tog(${k.num})">
      <div class="kcard-head">
        <span class="knum-badge">குறள் ${k.num}</span>
        <span class="ktag">${ch[0]}<br>${ch[2]}</span>
        <span class="chevron">▾</span>
      </div>
      <p class="ktamil">${k.tamil.replace('\n','<br>')}</p>
      <div class="kmean">${k.meaning}</div>
    </div>`;
  }).join('');
  const total=Math.ceil(list.length/PAGE);
  h+=`<div class="pager">
    <button onclick="prevPg()" ${pg===0?'disabled':''}>‹ முந்தைய</button>
    <span>${pg+1} / ${total}</span>
    <button onclick="nextPg(${list.length})" ${e>=list.length?'disabled':''}>அடுத்தது ›</button>
  </div>`;
  m.innerHTML=h;
}

function rChapters(m){
  const books=[['Aram','அறத்துப்பால் — Virtue',[0,38]],['Porul','பொருட்பால் — Wealth',[38,108]],['Inbam','காமத்துப்பால் — Love',[108,133]]];
  m.innerHTML=books.map(([b,bl,br])=>`
    <div class="book-label">${bl}</div>
    ${CHAPTERS.slice(br[0],br[1]).map((ch,i)=>{
      const ci=br[0]+i;
      return`<button class="chap-btn" onclick="openChap(${ci})">
        <div><span class="chap-num">அதிகாரம் ${ci+1}</span><span class="chap-ta">${ch[0]}</span><span class="chap-en">${ch[1]}</span></div>
        <span style="color:#8b5cf6">›</span>
      </button>`;
    }).join('')}
  `).join('');
}

function openChap(ci){
  cur='kurals';pg=0;
  filtered=ALL.filter(k=>k.chap===ci);
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.tab')[1]?.classList.add('on');
  render();
  window.scrollTo(0,0);
}

function rAbout(m){
  m.innerHTML=[
    ["திருக்குறள் என்றால் என்ன?","The Thirukkural is a classic Tamil text of 1,330 couplets written by the poet-saint Thiruvalluvar. Each couplet contains exactly seven Tamil words arranged in two lines, and covers ethics, governance, and love with unmatched brevity and depth."],
    ["திருவள்ளுவர்","A revered Tamil philosopher believed to have lived between 200 BCE and 30 CE. His statue stands majestically at Kanyakumari, the southernmost tip of India. Multiple faiths and communities across the world claim him as one of their own."],
    ["நூலின் அமைப்பு","1,330 kurals are arranged in 133 chapters of 10 kurals each. The three books are Aram (Virtue, Ch. 1–38), Porul (Wealth, Ch. 39–108), and Inbam (Love, Ch. 109–133)."],
    ["இலக்கிய வடிவம்","Written in the Kural metre (குறள் வெண்பா) — a unique verse form of Tamil classical poetry with extraordinary compression. Each couplet packs a complete philosophical thought into just seven words."],
    ["உலக அங்கீகாரம்","Translated into over 40 languages, the Thirukkural is one of the most-translated non-religious texts in history. January 15 is celebrated as Thiruvalluvar Day in Tamil Nadu, India. UNESCO has recognised it as a great work of world literature."]
  ].map(([t,d])=>`<div class="about-card"><div class="about-title">${t}</div><div class="about-text">${d}</div></div>`).join('');
}

function tog(n){document.getElementById('kc'+n)?.classList.toggle('open')}
function prevPg(){if(pg>0){pg--;render();window.scrollTo(0,0)}}
function nextPg(total){if((pg+1)*PAGE<total){pg++;render();window.scrollTo(0,0)}}

function doSearch(q){
  pg=0;cur='kurals';
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.tab')[1]?.classList.add('on');
  if(!q.trim()){filtered=null;render();return;}
  const ql=q.toLowerCase();
  filtered=ALL.filter(k=>
    k.tamil.includes(q)||
    k.meaning.toLowerCase().includes(ql)||
    CHAPTERS[k.chap][0].includes(q)||
    CHAPTERS[k.chap][1].toLowerCase().includes(ql)||
    String(k.num)===q.trim()
  );
  render();
}
function clearSearch(){document.getElementById('si').value='';doSearch('');}

render();
</script>
