
<style>
*{box-sizing:border-box;margin:0;padding:0}
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Tamil:wght@400;600;700&display=swap');

.vp{width:640px;margin:0 auto;font-family:'Noto Serif Tamil','Latha',serif;background:#111;border-radius:8px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.vp-screen{position:relative;width:640px;height:360px;overflow:hidden;background:#111}

/* ── SLIDE 1: Red intro ── */
.slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity 0.6s}
.slide.active{opacity:1}

.s-intro{background:#cc1a1a}
.s-intro::before{content:'';position:absolute;inset:0;background:
  repeating-linear-gradient(90deg,rgba(255,200,0,0.08) 0,rgba(255,200,0,0.08) 2px,transparent 2px,transparent 40px),
  repeating-linear-gradient(0deg,rgba(255,200,0,0.08) 0,rgba(255,200,0,0.08) 2px,transparent 2px,transparent 40px)}
.intro-border{position:absolute;inset:8px;border:3px solid #f5c040;border-radius:4px;pointer-events:none}
.intro-border::before{content:'';position:absolute;inset:4px;border:1px solid rgba(245,192,64,0.5);border-radius:2px}

.intro-img{width:90px;height:90px;margin-bottom:12px;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.4))}
.intro-title{font-size:26px;font-weight:700;color:#f5c97a;text-shadow:0 2px 4px rgba(0,0,0,0.5);margin-bottom:8px}
.intro-sub{font-size:14px;color:#ffe090;text-align:center;line-height:1.8}

/* ── SLIDE 2: White chapter info ── */
.s-chapter{background:#fff}
.chap-inner{text-align:center;padding:20px}
.chap-line{font-size:19px;color:#8b0000;font-weight:600;margin-bottom:10px;line-height:1.8}
.subscribe-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:18px;font-size:12px;color:#555}
.sub-btn{background:#ff0000;color:#fff;border:none;border-radius:4px;padding:4px 10px;font-size:12px;cursor:pointer}
.bell{color:#555;font-size:14px}

/* ── SLIDE 3+: Parchment kural slides ── */
.s-parchment{background:#f5edd0}
.parch-frame{position:absolute;inset:0;pointer-events:none}
.parch-top-bar{position:absolute;top:0;left:0;right:0;height:38px;background:linear-gradient(180deg,#3d1a00,#6b2e00);display:flex;align-items:center;justify-content:center;border-bottom:2px solid #c47c00}
.parch-top-title{font-size:16px;font-weight:700;color:#f5c97a;letter-spacing:1px}
.parch-border{position:absolute;top:38px;left:0;right:0;bottom:0;background:repeating-linear-gradient(180deg,rgba(139,69,0,0.06) 0,rgba(139,69,0,0.06) 1px,transparent 1px,transparent 32px)}

/* ornamental corners */
.corner{position:absolute;width:60px;height:60px;opacity:0.7}
.corner svg{width:60px;height:60px}
.tl{top:38px;left:0} .tr{top:38px;right:0;transform:scaleX(-1)}
.bl{bottom:0;left:0;transform:scaleY(-1)} .br{bottom:0;right:0;transform:scale(-1)}

.kural-content{position:absolute;top:48px;left:72px;right:72px;bottom:30px;overflow-y:auto;display:flex;flex-direction:column;justify-content:flex-start;padding-top:2px}
.kural-item{margin-bottom:6px;animation:fadeIn 0.5s ease}
.kural-num{font-size:10px;color:#8b2500;font-weight:700;margin-bottom:2px}
.kural-text{font-size:12px;color:#1a0800;line-height:1.5;white-space:pre-line}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── CONTROLS ── */
.controls{background:#1a1a1a;padding:10px 16px;display:flex;align-items:center;gap:10px}
.ctrl-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:22px;padding:4px 8px;border-radius:4px;transition:background 0.15s}
.ctrl-btn:hover{background:rgba(255,255,255,0.1)}
.progress-wrap{flex:1;height:4px;background:#444;border-radius:2px;cursor:pointer;position:relative}
.progress-fill{height:100%;background:#c00;border-radius:2px;transition:width 0.3s}
.time-lbl{font-size:12px;color:#aaa;min-width:60px;text-align:right}
.slide-counter{font-size:11px;color:#888;min-width:40px}

.chapter-selector{background:#2a2a2a;padding:8px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.chapter-selector::-webkit-scrollbar{display:none}
.chap-pill{background:#333;border:1px solid #555;color:#ccc;border:none;border-radius:4px;padding:5px 12px;font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background 0.2s}
.chap-pill.on{background:#8b0000;color:#f5c97a}
.chap-pill:hover{background:#444}
</style>

<script>
const SECTION_NAMES = ["கடவுள் வாழ்த்து", "வான்சிறப்பு", "நீத்தார் பெருமை", "அறன் வலியுறுத்தல்", "இல்வாழ்க்கை", "வாழ்க்கைத் துணைநலம்", "மக்கட்பேறு", "அன்புடைமை", "விருந்தோம்பல்", "இனியவை கூறல்", "செய்ந்நன்றியறிதல்", "நடுவு நிலைமை", "அடக்கம் உடைமை", "ஒழுக்கம் உடைமை", "பிறனில் விழையாமை", "பொறையுடைமை", "அழுக்காறாமை", "வெஃகாமை", "புறங்கூறாமை", "பயனில சொல்லாமை", "தீவினையச்சம்", "ஒப்புரவறிதல்", "ஈ.கை", "புகழ்", "அருளுடைமை", "புலால் மறுத்தல்", "தவம்", "கூடா ஒழுக்கம்", "கள்ளாமை", "வாய்மை", "வெகுளாமை", "இன்னா செய்யாமை", "கொல்லாமை", "நிலையாமை", "துறவு", "மெய்யுணர்தல்", "அவா அறுத்தல்", "ஊழ்", "இறைமாட்சி", "கல்வி", "கல்லாமை", "கேள்வி", "அறிவுடைமை", "குற்றங்கடிதல்", "பெரியாரைத் துணைக்கோடல்", "சிற்றினம் சேராமை", "தெரிந்து செயல்வகை", "வலியறிதல்", "காலமறிதல்", "இடனறிதல்", "தெரிந்து தெளிதல்", "தெரிந்து வினையாடல்", "சுற்றந் தழால்", "பொச்சாவாமை", "செங்கோன்மை", "கொடுங்கோன்மை", "வெருவந்த செய்யாமை", "கண்ணோட்டம்", "ஒற்றாடல்", "ஊக்கம் உடைமை", "மடி இன்மை", "ஆள்வினை உடைமை", "இடுக்கண் அழியாமை", "அமைச்சு", "சொல்வன்மை", "வினைத் தூய்மை", "வினைத்திட்பம்", "வினை செயல்வகை", "தூது", "மன்னரைச் சேர்ந்து ஒழுகல்", "குறிப்பறிதல்", "அவை அறிதல்", "அவை அஞ்சாமை", "நாடு", "அரண்", "பொருள் செயல்வகை", "படை மாட்சி", "படைச் செருக்கு", "நட்பு", "நட்பாராய்தல்", "பழைமை", "தீ நட்பு", "கூடா நட்பு", "பேதைமை", "புல்லறிவாண்மை", "இகல்", "பகை மாட்சி", "பகைத்திறம் தெரிதல்", "உட்பகை", "பெரியாரைப் பிழையாமை", "பெண்வழிச் சேறல்", "வரைவின் மகளிர்", "கள்ளுண்ணாமை", "சூது", "மருந்து", "குடிமை", "மானம்", "பெருமை", "சான்றாண்மை", "பண்புடைமை", "நன்றியில் செல்வம்", "நாணுடைமை", "குடிசெயல் வகை", "உழவு", "நல்குரவு", "இரவு", "இரவச்சம்", "கயமை", "தகை அணங்குறுத்தல்", "குறிப்பறிதல்", "புணர்ச்சி மகிழ்தல்", "நலம் புனைந்து உரைத்தல்", "காதற் சிறப்புரைத்தல்", "நாணுத் துறவுரைத்தல்", "அலர் அறிவுறுத்தல்", "பிரிவு ஆற்றாமை", "படர்மெலிந் திரங்கல்", "கண் விதுப்பழிதல்", "பசப்புறு பருவரல்", "தனிப்படர் மிகுதி", "நினைந்தவர் புலம்பல்", "கனவுநிலை உரைத்தல்", "பொழுதுகண்டு இரங்கல்", "உறுப்புநலன் அழிதல்", "நெஞ்சொடு கிளத்தல்", "நிறையழிதல்", "அவர்வயின் விதும்பல்", "குற   [3, "மலர்மிசை ஏகினான் மாணடி சேர்ந்தார்\nநிலமிசை நீடுவாழ் வார்"],

// Generate placeholder kurals for chapters 2-133

  const start = (ch - 1) * 10 + 1;
  const end = start + 9;
  const kurals = [];
  for(let j = start; j <= end; j++) {
    kurals.push([j, `Chapter ${ch} - Kural ${j}`]);
  }
  CHAPTER_KURALS[ch] = kurals;

  [11, "வானின் றுலகம் வழங்கி வருதலால்\nதானமிழ்தம் என்றுணரற் பாற்று"],
  [12, "துப்பார்க்குத் துப்பாய துப்பாக்கித் துப்பார்க்குத்\nதுப்பாய தூஉ மழை"],

  [14, "ஏரின் உழாஅர் உழவர் புயல்என்னும்\nவாரி வளங்குன்றிக் கால்"],

CHAPTER_KURALS[3] = [
  [21, "ஒழுக்கத்து நீத்தார் பெருமை விழுப்பத்து\nவேண்டும் பனுவல் துணிவு"],

 CHAPTER_KURALS[4] = [
  [31, "சிறப்புஈனும் செல்வமும் ஈனும் அறத்தினூங்கு\nஆக்கம் எவனோ உயிர்க்கு"],

 CHAPTER_KURALS[5] = [
  [41, "இல்வாழ்வான் என்பான் இயல்புடைய மூவர்க்கும்\nநல்லாற்றின் நின்ற துணை"],

  [49, "அறனெனப் பட்டதே இல்வாழ்க்கை அஃதும்\nபிறன்பழிப்பது இல்லாயின் நன்று"],
  [50, "வையத்துள் வாழ்வாங்கு வாழ்பவன் வான்உளயும்\nதெய்வத்துள் வைக்கப் படும்"]

 CHAPTER_KURALS[6] = [
  [51, "மனைத்தக்க மாண்புடையள் ஆகித்தற் கொண்டான்\nவளத்தக்காள் வாழ்க்கைத் துணை"],

  [60, "மங்கலம் என்ப மனைமாட்சி மற்றுஅதன்\nநன்கலம் நன்மக்கட் பேறு"]

 CHAPTER_KURALS[7] = [
  [61, "பெறுமவற்றுள் யாமறிவது இல்லை அறிவறிந்த\nமக்கட்பேறு அல்ல பிற"],

 CHAPTER_KURALS[8] = [
  [71, "அன்பிற்கும் உண்டோ அடைக்கும்தாழ் ஆர்வலர்\nபுன்கண் நீர் பூசல் தரும்"],

 CHAPTER_KURALS[9] = [
  [81, "இருந்தோம்பி இல்வாழ்வ தெல்லாம் விருந்தோம்பி\nவேளாண்மை செய்தற் பொருட்டு"],

 CHAPTER_KURALS[10] = [
  [91, "இன்சொலால் ஈரம் அளைஇப் படிறிலவாம்\nசெம்பொருள் கண்டார்வாய்ச் சொல்"],

  [95, "பணிவுடையன் இன்சொலன் ஆதல் ஒருவற்கு\nஅணியல்ல மற்றுப் பிற"],
  [96, "அல்லவை தேய அறம்பெருகும் நல்லவை\nநாடி இனிய சொலின்"],
  [97, "நயன்ஈன்று நன்றி பயக்கும் பயன்ஈன்று\nபண்பின் தலைப்பிரியாச் சொல்"],
  [98, "சிறுமையுள் நீங்கிய இன்சொல் மறுமையும்\nஇம்மையும் இன்பம் தரும்"],
  [99, "இன்சொல் இனிதுஈன்றல் காண்பான் எவன்கொலோ\nவண்சொல் வழங்கு வது"],
  [100, "இனிய உளவாக இன்னாத கூறல்\nகனிஇருப்பக் காய்கவர்ந் தற்று"]
];
 CHAPTER_KURALS[11] = [
  [101, "செய்யாமல் செய்த உதவிக்கு வையகமும்\nவானகமும் ஆற்றல் அரிது"],
  [102, "காலத்தினால் செய்த நன்றி சிறிதுஎனினும்\nஞாலத்தின் மாணப் பெரிது"],
  [103, "பயன்தூக்கார் செய்த உதவி நயன்தூக்கின்\nநன்மை கடலின் பெரிது"],
  [104, "தினைத்துணை நன்றி செய்யினும் பனைத்துணையாக்கொள்வர்\nபயன்தெரி வார்"],
  [105, "உதவி வரைத்தன்று உதவி உதவி\nசெயப்பட்டார் சால்பின் வரைத்து"],
  [106, "மறவற்க மாசற்றார் கேண்மை துறவற்க\nதுன்பத்துள் துப்பாயார் நட்பு"],
  [107, "எழுமை எழுபிறப்பும் உள்ளுவர் தம்கண்\nவிழுமம் துடைத்தவர் நட்பு"],
  [108, "நன்றி மறப்பது நன்றன்று நன்றல்லது\nஅன்றே மறப்பது நன்று"],
  [109, "கொன்றன்ன இன்னா செயினும் அவர்செய்த\nஒன்றுநன்று உள்ளக் கெடும்"],
  [110, "எந்நன்றி கொன்றார்க்கும் உய்வுண்டாம் உய்வில்லை\nசெய்ந்நன்றி கொன்ற மகற்கு"]
];
 CHAPTER_KURALS[12] = [
  [111, "தகுதி எனவொன்று நன்றே பகுதியால்\nபாற்பட்டு ஒழுகப் பெறின்"],
  [112, "செப்பம் உடையவன் ஆக்கம் சிதைவின்றி\nஎச்சத்திற்கு ஏமாப்பு உடைத்து"],
  [113, "நன்றே தரினும் நடுவிகந்தாம் ஆக்கத்தை\nஅன்றே ஒழிய விடல்"],
  [114, "தக்கார் தகவிலர் என்பது அவரவர்\nஎச்சத்தாற் காணப் படும்"],
  [115, "கேடும் பெருக்கமும் இல்லல்ல நெஞ்சத்துக்\nகோடாமை சான்றோர்க் கணி"],
  [116, "கெடுவல்யான் என்பது அறிகதன் நெஞ்சம்\nநடுவொரீஇ அல்ல செயின்"],
  [117, "கெடுவாக வையா துலகம் நடுவாகச்\nசெய்தவக் கணவஞ்சியான் கேடு"],
  [118, "சமன்செய்து சீர்தூக்கும் கோல்போல் அமைந்தொருபால்\nகோடாமை சான்றோர்க் கணி"],
  [119, "சொற்கோட்டம் இல்லது செப்பம் ஒருதலையா\nஉட்கோட்டம் இன்மை பெறின்"],
  [120, "வாணிகம் செய்வார்க்கு வாணிகம் பேணிப்\nபிறவும் தமபோல் செயின்"]

 CHAPTER_KURALS[13] = [
  [121, "அடக்கம் அமரருள் உய்க்கும் அடங்காமை\nஆரிருள் உய்த்து விடும்"],
  [122, "காக்க அடக்கத்தை ஆக்கமாக் காப்பார்\nஅதனினூங்கு இல்லை உயிர்"],
  [123, "அறிவறிந்து ஆற்றின் அடங்கின் அறிவறிந்து\nஆன்றோர் சமன்பாடும் இல்"],
  [124, "நிலையின் திரியாது அடங்கியான் தோற்றம்\nமலையினும் மாணப் பெரிது"],
  [125, "எல்லார்க்கும் நன்றாம் பணிதல் அவருள்ளும்\nசெல்வர்க்கே செல்வம் தகைத்து"],

  [127, "யாகாவார் ஆயினும் நாகாக்க காவாக்கால்\nசோகாப்பர் சொல்லிழுக்குப் பட்டு"],
  [128, "ஒன்றானும் தீச்சொல் பொருட்பயன் ஆயின்\nஅன்றாகா தாகி விடும்"],
  [129, "தீயினாற் சுட்டபுண் உள்ளாறும் ஆறாதே\nநாவினாற் சுட்ட வடு"],
  [130, "கதம்காத்துக் கற்றறிந்து அடங்கியான் நெஞ்சம்\nஅறம்காயும் ஆற்றின் நுழைந்து"]
];
 CHAPTER_KURALS[14] = [
  [131, "ஒழுக்கம் விழுப்பம் தரலான் ஒழுக்கம்\nஉயிரினும் ஓம்பப் படும்"],
  [132, "பரிந்தோம்பிக் காக்க ஒழுக்கம் தெரிந்தோம்பித்\nதேரினும் அஃதே துணை"],
  [133, "ஒழுக்கம் உடைமை குடிமை இழுக்கம்\nஇழிந்த பிறப்பாய் விடும்"],

  [138, "நன்றிக்கு வித்தாகும் நல்லொழுக்கம் தீயொழுக்கம்\nஎன்றும் இடும்பை தரும்"],
  [139, "ஒழுக்க முடையவர்க்கு ஒல்லாவே தீய\nவழுக்கியும் வாயாற் சொலல்"],
  [140, "உலகத்தோடு ஒட்ட ஒழுகல் பலகற்றும்\nஅறிவிலார் கல்லா தவர்"]
];
 CHAPTER_KURALS[15] = [
  [141, "பிறன்பொருளாள் பெட்டொழுகும் பேதைமை ஞாலத்து\nஅறம்பொருள் கண்டார்கண் இல்"],
  [142, "அறன்கடை நின்றாருள் எல்லாம் பிறன்கடை\nநின்றாரின் பேதையார் இல்"],
  [143, "விளிந்தாரின் வேறல்லர் மன்ற தெளிந்தார்இல்\nதீமை புரிந்துழுகு வார்"],
  [144, "எனைத்துணையர் ஆயினும் என்னாம் தினைத்துணையும்\nதேரான் பிறனில் புகல்"],
  [145, "எளிதென இல்லிறப்பான் எய்தும்எஞ் ஞான்றும்\nவிளியாது நிற்கும் பழி"],
  [146, "பகைபாவம் அச்சம் பழியென நான்கும்\nஇகவாவாம் இல்லிறப்பான் கண்"],
  [147, "அறன்இயலான் இல்வாழ்க்கை வாழ்பவன் என்பான்\nபிறன்இயலாள் பெண்மை நயவா தவன்"],
  [148, "பிறன்மனை நோக்காத பேராண்மை சான்றோர்க்கு\nஅறன்றோன்றா ஆன்ற ஒழுக்கு"],

];
 CHAPTER_KURALS[16] = [
  [151, "அகழ்வாரைத் தாங்கும் நிலம்போலத் தம்மை\nஇகழ்வார்ப் பொறுத்தல் தலை"],

  [159, "துறந்தாரின் தூய்மையர் ஆவர் இறந்தார்வாய்\nஇன்னாச்சொல் நோற்கிற்பவர்"],

 CHAPTER_KURALS[17] = [
  [161, "ஒழுக்காறாக் கொள்க ஒருவன்தன் நெஞ்சத்து\nஅழுக்காறு இலாத இயல்பு"],
  [162, "விழுப்பத்தின் விழுப்பது ஒன்றில்லை யாரோட்டும்\nஅழுக்காறு இலாத இயல்பு"],
  [163, "அறம்பொருள் கண்டான் அழுக்கறான் செவ்வியான்\nஞான்றொரீஇ அல்ல செயின்"],

  [165, "அழுக்காறு உடையாற்கு அதுசாலும் ஒன்னார்\nவழுக்கியும் கேடீன் பது"],
  [166, "கொடுப்பது அழுக்கறுப்பான் சுற்றம் உடுப்பதூஉம்\nஉண்பதூஉம் இன்றிக் கெடும்"],

  [168, "அழுக்காறு எனவொரு பாவி திருச்செற்றுத்\nதீயுழி உய்த்து விடும்"],
  [169, "அவ்விய நெஞ்சத்தான் ஆக்கமும் செவ்வியான்\nகேடும் நினைக்கப் படும்"],

];
 CHAPTER_KURALS[18] = [
  [171, "நடுவின்றி நன்பொருள் வெஃகின் குடிபொன்றிக்\nகுற்றமும் ஆங்கே தரும்"],
  [172, "படுபயன் வெஃகிப் பழிப்படுவ செய்யார்\nநடுவன்மை நாணு பவர்"],
  [173, "சிற்றின்பம் வெஃகி அறனல்ல செய்யாரே\nமற்றின்பம் வேண்டு பவர்"],
  [174, "இலமென்று வெஃகுதல் செய்யார் புலம்வென்ற\nபுன்மையில் காட்சி யவர்"],
  [175, "அஃகிஅகன்ற அறிவென்னாம் யார்மாட்டும்\nவெஃகி வெறியவ செய்யின்"],
  [176, "அருள்வெஃகி ஆற்றின்கண் நின்றான் பொருள்வெஃகி\nபொல்லாத சூழக் கெடும்"],
  [177, "வேண்டற்க வெஃகிவந் தாக்கம் விளைவயின்\nமாண்டற்க மாண்ட பயன்"],
  [178, "அஃகாமை செல்வத்திற்கு யாதெனின் வெஃகாமை\nவேண்டும் பிறன்பொருள் குன்று"],
  [179, "அறனறிந்து வெஃகா அறிவுடையாரைச்\nசேரன்மைகண்டு அல்லல் தரும்"],
  [180, "இறல்ஈனும் எண்ணாது வெஃகின் விறல்ஈனும்\nவேண்டாமை என்னுஞ் செருக்கு"]
];
 CHAPTER_KURALS[19] = [
  [181, "அறம்கூறான் அல்ல செயினும் ஒருவன்\nபுறம்கூறான் என்றல் இனிது"],
  [182, "அறனழீஇ அல்லவை செய்தலின் தீதே\nபுறனழீஇப் பொய்த்து நகை"],
  [183, "புறங்கூறிப் பொய்த்துயிர் வாழ்தலின் சாதல்\nஅறங்கூறும் ஆக்கந் தரும்"],
  [184, "கண்ணின்று கண்ணறச் சொல்லினும் சொல்லற்க\nமுன்னின்று பின்நோக்காச் சொல்"],
  [185, "அறஞ்சொல்லும் நெஞ்சத்தான் அல்லன் புறஞ்சொல்லும்\nபுன்மையாற் காணப் படும்"],
  [186, "பிறன்பழி கூறுவான் தன்குற்றம் உள்ளும்\nதிறன்தெரிந்து கூறப் படும்"],
  [187, "பகச்சொல்லிப் பாத்திருப் பாரோடு நகச்சொல்லி\nநட்பாடல் தேற்றாதவர்"],
  [188, "துன்னியார் குற்றமும் தூற்றும் மரபினார்\nஎன்னை கொல் ஏதிலார் மாட்டு"],
  [189, "அறன்நோக்கி ஆற்றும் கொல் வையம் புறன்நோக்கிப்\nபுன்சொல் உரைப்பான் பொறை"],
  [190, "ஏதிலார் குற்றம்போல் தங்குற்றங் காண்கிற்பின்\nதீதுண்டோ மன்னும் உயிர்க்கு"]
];
 CHAPTER_KURALS[20] = [
  [191, "பல்லார் முனியப் பயனில சொல்லுவான்\nஎல்லாரும் எள்ளப் படும்"],
  [192, "பயனில பல்லார்முன் சொல்லல் நயனில\nநட்டார்கண் செய்தலின் தீது"],
  [193, "நயனிலன் என்பது சொல்லும் பயனில\nபாரித்துப் பேசும் உரை"],
  [194, "நயன்சாரா நன்மையின் நீக்கும் பயன்சாராப்\nபண்பில்சொல் பல்லார் அகத்து"],
  [195, "சீர்மை சிறப்பொடு நீங்கும் பயன்இல\nநீர்மை உடையார் சொலின்"],
  [196, "பயனில்சொல் பாராட்டு வானை மகன்எனல்\nமக்களுள் பதடி எனல்"],
  [197, "நயனில சொல்லினும் சொல்லுக சான்றோர்\nபயனில சொல்லாமை நன்று"],
  [198, "அரும்பயன் ஆயும் அறிவினார் சொல்லார்\nபெரும்பயன் இல்லாத சொல்"],
  [199, "பொருள்தீர்ந்த பொச்சாந்தும் சொல்லார் மருள்தீர்ந்த\nமாசறு காட்சி யவர்"],
  [200, "சொல்லுக சொல்லின் பயனுடைய சொல்லற்க\nசொல்லின் பயனிலாச் சொல்"]
];
 CHAPTER_KURALS[21] = [
  [201, "தீவினையார் அஞ்சார் விழுமியார் அஞ்சுவர்\nதீவினை என்னும் செருக்கு"],
  [202, "தீயவை தீய பயத்தலால் தீயவை\nதீயினும் அஞ்சப் படும்"],
  [203, "அறிவினுள் எல்லாந் தலையென்ப தீய\nசெறுவார்க்கும் செய்யா விடல்"],
  [204, "மறந்தும் பிறன்கேடு சூழற்க சூழின்\nஅறஞ்சூழும் சூழ்ந்தவன் கேடு"],
  [205, "இலன்என்று தீயவை செய்யற்க செய்யின்\nஇலனாகும் மற்றும் பெயர்த்து"],
  [206, "தீப்பால தான்அஞ்சல் வேண்டுமால் அன்பாரைச்\nசீறும்பால் தீவினைச் செருக்கு"],
  [207, "எனைப்பகை உற்றாரும் உய்வர் வினைப்பகை\nவீயாது பின்சென்று அடும்"],
  [208, "தீயவை செய்தார் கெடுதல் நிழல்தன்னை\nவீயாது அடிஉறைந் தற்று"],
  [209, "தன்னைத்தான் காதலன் ஆயின் எனைத்தொன்றும்\nதுன்னற்க தீவினைப் பால்"],
  [210, "அருங்கேடன் என்பது அறிக மருங்கோடித்\nதீவினை செய்யான் எனின்"]
];
 CHAPTER_KURALS[22] = [
  [211, "கைம்மாறு வேண்டா கடப்பாடு மாரிமாட்டு\nஎன்னாற்றுங் கொல்லோ உலகு"],
  [212, "தாளாற்றித் தந்த பொருள்எல்லாம் தக்கார்க்கு\nவேளாண்மை செய்தற் பொருட்டு"],
  [213, "புத்தேள் உலகத்தும் ஈண்டும் பெறலரிதே\nஒப்புரவின் நல்ல பிற"],
  [214, "ஒப்பி லறியவன் வாழ்பவன் வாழாதான்\nசெத்தாருள் வைக்கப் படும்"],
  [215, "ஊருணி உலகியவாப் பேரறிவாளன் திரு\nஉலகவாம் பேரறி வாளன்"],
  [216, "பயன்மரம் உள்ளூர்ப் பழுத்தற்றால் செல்வம்\nநயனுடையான் கண் படின்"],
  [217, "மருந்தாகித் தப்பா மரத்தற்றால் செல்வம்\nபெருந்தகை யான்கண் படின்"],
  [218, "இடனில் பருவத்தும் ஒப்புரவிற்கு ஒல்கார்\nகடனறி காட்சி யவர்"],
  [219, "நயனுடையான் நல்கூர்ந்தான் ஆதல் செயும்நீர\nசெய்யாது அமைகலா வாறு"],
  [220, "ஒப்புரவினால் வரும் கேடெனின் அஃதொருவன்\nவிற்றுக்கோள் தக்கது உடைத்து"]
];
 CHAPTER_KURALS[23] = [
  [221, "வரியார்க்கொன்று ஈவதே ஈகைமற்று எல்லாம்\nகுறிஎதிர்ப்பை நீர துடைத்து"],
  [222, "நல்லாறு எனினும் கொளல்தீது மேலுலகம்\nஇல்லெனினும் ஈதலே நன்று"],
  [223, "இலன்என்னும் எவ்வம் உரையாமை ஈதல்\nகுலனுடையான் கண்ணே உளது"],
  [224, "இன்னாது இரக்கப் படுதல் இரந்தவர்\nஇன்முகங் காணும் அளவு"],
  [225, "ஆற்றுவார் ஆற்றல் பசிஆற்றல் அப்பசியை\nமாற்றுவார் ஆற்றலின் பின்"],
  [226, "அற்றார் அழிபசி தீர்த்தல் அஃதொருவன்\nபெற்றான் பொருள்வைப் புழி"],
  [227, "பாத்தூண் மரீஇயவனைப் பசிஎன்னும்\nதீப்பிணி தீண்டல் அரிது"],
  [228, "ஈத்துவக்கும் இன்பம் அறியார்கொல் தாமுடைமை\nவைத்திழக்கும் வன்கணா வர்"],
  [229, "இரத்தலின் இன்னாது மன்ற நிரப்பிய\nதாமே தமியர் உணல்"],
  [230, "சாதலின் இன்னாதது இல்லை இனிததூஉம்\nஈதல் இயையாக் கடை"]
];
 CHAPTER_KURALS[24] = [
  [231, "ஈதல் இசைபட வாழ்தல் அதுவல்லது\nஊதியம் இல்லை உயிர்க்கு"],
  [232, "உரைப்பார் உரைப்பவை எல்லாம் இரப்பார்க்கொன்று\nஈவார்மேல் நிற்கும் புகழ்"],
  [233, "ஒன்றா உலகத்து உயர்ந்த புகழல்லால்\nபொன்றாது நிற்பதொன்று இல்"],
  [234, "நிலவரை நீள்புகழ் ஆற்றின் புலவரைப்\nபோற்றாது புத்தேள் உலகு"],
  [235, "நத்தம்போல் கேடும் உளதாகும் சாக்காடும்\nவித்தகர்க்கு அல்லால் அரிது"],
  [236, "தோன்றின் புகழோடு தோன்றுக அஃதிலார்\nதோன்றலின் தோன்றாமை நன்று"],
  [237, "புகழ்பட வாழாதார் தம்நோவார் தம்மை\nஇகழ்வாரை நோவது எவன்"],
  [238, "வசைஎன்ப வையத்தார்க் கெல்லாம் இசைஎன்னும்\nஎச்சம் பெறாஅ விடின்"],
  [239, "வசைஇலா வண்பயன் குன்றும் இசைஇலா\nயாக்கை பொறுத்த நிலம்"],
  [240, "வசைஒழிய வாழ்வாரே வாழ்வார் இசைஒழிய\nவாழ்வாரே வாழா தவர்"]
];
 CHAPTER_KURALS[25] = [
  [241, "அருட்செல்வம் செல்வத்துள் செல்வம் பொருட்செல்வம்\nபூரியார் கண்ணும் உள"],
  [242, "நல்லாற்றான் நாடி அருளாள்க பல்லாற்றான்\nதேரினும் அஃதே துணை"],
  [243, "அருள்சேர்ந்த நெஞ்சினார்க் கில்லை இருள்சேர்ந்த\nஇன்னா உலகம் புகல்"],
  [244, "மன்னுயிர் ஓம்பி அருளாள்வாற்கு இல்லென்ப\nதன்னுயிர் அஞ்சும் வினை"],
  [245, "அல்லல் அருளாள்வார்க்கு இல்லை வையகம்\nமல்லல்மா ஞாலம் கரி"],
  [246, "பொருள்நீங்கிப் பொச்சாந்தார் என்பர் அருள்நீங்கி\nஅல்லவை செய்தொழுகு வார்"],
  [247, "அருளிலார்க்கு அவ்வுலகம் இல்லை பொருளிலார்க்கு\nஇவ்வுலகம் இல்லாகி யாங்கு"],
  [248, "பொருளற்றார் பூப்பர் ஒருகால் அருளற்றார்\nஅற்றார்மற்று ஆவதறிது"],
  [249, "தெருளாதான் மெய்ப்பொருள் கண்டற்றால் தேரின்\nஅருளாதான் செய்யும் அறம்"],
  [250, "வலியார்முன் தன்னை நினைக்கத்தான் தன்னின்\nமெலியார்மேல் செல்லும் இடத்து"]
];
 CHAPTER_KURALS[26] = [
  [251, "தன்னூன் பெருக்கற்குக் தான்பிறிதூன் உண்பான்\nஎங்ஙனம் ஆளும் அருள்"],
  [252, "பொருளாட்சி போற்றாதார்க்கு இல்லை அருளாட்சி\nஆங்கில்லை ஊன்தின் பவர்க்கு"],
  [253, "படைப்பொருள் வைத்தாற்போல் நெஞ்சம்நெடிது ஊன்றின்\nஉண்பான்மற்று ஆவதறிது"],
  [254, "அருளல்லது யாதெனில் கொல்லாமை கோறல்\nபொருளல்லது அவ்வூன் தினல்"],
  [255, "உண்ணாமை வேண்டும் புலாஅல் பிறிதொன்றன்\nபுண்ணது உணர்வார்ப் பெறின்"],
  [256, "தினற்பொருட்டால் கொல்லாது உலகெனின் யாரும்\nவிலைப்பொருட்டால் ஊன்தருவார் இல்"],
  [257, "உண்ணாமை வேண்டும் புலாஅல் பிறிதொன்றன்\nபுண்ணின் புலாஅல் உணர் வார்ப்பெறின்"],
  [258, "செயிரின் தலைப்பிரிந்த காட்சியார் உண்ணார்\nஉயிரின் தலைப்பிரிந்த ஊன்"],
  [259, "அவிசொரிந்து ஆயிரம் வேட்டலின் ஒன்றன்\nஉயிர்செகுத்து உண்ணாமை நன்று"],
  [260, "கொல்லான் புலாலை மறுத்தானைக் கைகூப்பி\nஎல்லா உயிரும் தொழும்"]
];
 CHAPTER_KURALS[27] = [
  [261, "உற்றநோய் நோற்றல் உயிர்க்குறுகண் செய்யாமை\nஅற்றே தவத்திற்கு உரு"],
  [262, "தவமும் தவமுடையார்க்கு ஆகும் அவம்அதனை\nஅஃதிலார் மேற்கொள் வது"],
  [263, "துறந்தார்க்குத் துப்புரவு வேண்டி மறந்தார்கொல்\nமற்றை யவர்கள் தவம்"],
  [264, "ஒன்னார்த் தெறலும் உவந்தாரை ஆக்கலும்\nஎண்ணின் தவத்தான் வரும்"],
  [265, "வேண்டிய வேண்டியாங்கு எய்தலால் செய்தவம்\nஈண்டு முயலப் படும்"],
  [266, "தவம்செய்வார் தம்கருமம் செய்வார்மற்று அல்லார்\nஅவம்செய்வார் ஆசையுள் பட்டு"],
  [267, "சுடச்சுடரும் பொன்போல் ஒளிவிடும் துன்பம்\nசுடச்சுட நோற்கிற் பவர்க்கு"],
  [268, "தன்னுயிர் தான்அறப் பெற்றானை ஏனைய\nமன்னுயிர் எல்லாம் தொழும்"],
  [269, "கூற்றம் குதித்தலும் கைகூடும் நோற்றலின்\nஆற்றல் தலைப்பட் டவர்க்கு"],
  [270, "இலர் பலர் ஆகிய காரணம் நோற்பார்\nசிலர் பலர் நோலா தவர்"]
];
 CHAPTER_KURALS[28] = [
  [271, "வஞ்ச மனத்தான் படிற்றுஒழுக்கம் பூதங்கள்\nஐந்தும் அகத்தே நகும்"],
  [272, "வானுயர் தோற்றம் எவன்செய்யும் தன்னெஞ்சம்\nதானறி குற்றப் படின்"],
  [273, "வலியில் நிலைமையான் வல்லுருவம் பெற்றம்\nபுலியின்தோல் போர்த்துமேய்ந் தற்று"],
  [274, "தவமறைந்து அல்லவை செய்தல் புதல்மறைந்து\nவேட்டுவன் புள்சிமிழ்த் தற்று"],
  [275, "பற்றற்றேம் என்பார் படிற்றுஒழுக்கம் எற்றெற்றென்று\nஏதம் பலவும் தரும்"],
  [276, "நெஞ்சின் துறவார் துறந்தார்போல் வஞ்சித்து\nவாழ்வாரின் வன்கணார் இல்"],
  [277, "புறம்குன்றி கண்டனையர் ஆயினும் எம்போல்\nஅகம்குன்றி மூக்கின் கரியார் உடைத்து"],
  [278, "மனத்தது மாசாக மாண்டார்நீர் ஆடிக்\nமறைந்தொழுகு மாந்தர் பலர்"],
  [279, "கணைகொடிது யாழ்கோடு செவ்விதாங் கன்ன\nவினைபடு பாலால் கொளல்"],
  [280, "மழித்தலும் நீட்டலும் வேண்டா உலகம்\nபழித்தது ஒழித்து விடின்"]
];
 CHAPTER_KURALS[29] = [
  [281, "எள்ளாமை வேண்டுவான் என்பான் எனைத்தொன்றும்\nகள்ளாமை காக்கதன் நெஞ்சு"],
  [282, "உள்ளத்தால் உள்ளலும் தீதே பிறன்பொருளைக்\nகள்ளத்தால் கள்வேம் எனல்"],
  [283, "களவினால் ஆகிய ஆக்கம் அளவிறந்து\nஆவது போலக் கெடும்"],
  [284, "களவின்கண் கன்றிய காதல் விளைவின்கண்\nவீயா விழுமம் தரும்"],
  [285, "அருள்கருதி அன்புடையர் ஆதல் பொருள்கருதிப்\nபொச்சாந்துஞ் செய்பவோ களவு"],
  [286, "அளவின்கண் நின்றுஒழுகல் ஆற்றார் களவின்கண்\nகன்றிய காத லவர்"],
  [287, "களவென்னும் காரறிவாண்மை புலம்என்னும்\nபோற்றாமை புன்மை தெரிந்து"],
  [288, "அளவறிந்தார் நெஞ்சத்து அறம்போல நிற்குங்\nகளவறிந்தார் நெஞ்சில் கரவு"],
  [289, "அளவல்ல செய்தாங்கே வீவர் களவல்ல\nமற்றேதும் தேற்றா தவர்"],
  [290, "ஐந்தொன்றிச் சாவாரும் சாவார் களவொன்றிப்\nபொய்ம்மறைந்து ஒழுகு வார்"]
];
 CHAPTER_KURALS[30] = [
  [291, "வாய்மை எனப்படுவது யாதெனின் யாதொன்றும்\nதீமை இலாத சொலல்"],
  [292, "பொய்ம்மையும் வாய்மை இடத்த புரைதீர்ந்த\nநன்மை பயக்கும் எனின்"],
  [293, "தன்நெஞ்சு அறிவது பொய்யற்க பொய்த்தபின்\nதன்நெஞ்சே தன்னைச் சுடும்"],
  [294, "உள்ளத்தால் பொய்யாது ஒழுகின் உலகத்தார்\nஉள்ளத்துள் எல்லாம் உளன்"],
  [295, "மனத்தொடு வாய்மை மொழியின் தவத்தொடு\nதானஞ்செய் வாரின் தலை"],
  [296, "பொய்யாமை அன்ன புகழில்லை எய்யாமை\nஎல்லா அறமும் தரும்"],
  [297, "பொய்யாமை பொய்யாமை ஆற்றின் அறம்பிற\nசெய்யாமை செய்யாமை நன்று"],
  [298, "புறந்தூய்மை நீரான் அமையும் அகந்தூய்மை\nவாய்மையால் காணப் படும்"],
  [299, "எல்லா விளக்கும் விளக்கல்ல சான்றோர்க்குப்\nபொய்யா விளக்கே விளக்கு"],
  [300, "யாமெய்யாக் கண்டவற்றுள் இல்லை எனைத்தொன்றும்\nவாய்மையின் நல்ல பிற"]
];
 CHAPTER_KURALS[31] = [
  [301, "செல்லா இடத்துச் சினம் காப்பான் சினம்காப்பான்\nசெல்லா இடத்துஇல் எவன்"],
  [302, "செல்லா இடத்துச் சினம்தீது செல்லா\nஇடத்தும் அதனின் தீதுஇல்"],
  [303, "மறத்தல் வெகுளியை யார்மாட்டும் தீய\nபிறப்பால் விளைந்து விடும்"],
  [304, "நகையும் உவகையும் கொல்லும் சினத்தின்\nபகையும் உளவோ பிற"],
  [305, "தன்னைத்தான் காக்கின் சினம்காக்க காவாக்கால்\nதன்னையே கொல்லும் சினம்"],
  [306, "சினமென்னும் சேர்ந்தாரைக் கொல்லி இனமென்னும்\nஏமப் புணையைச் சுடும்"],
  [307, "சினத்தைப் பொருளென்று கொண்டாரும் கேடு\nநிலத்தறைந்தான் கைபிழையா தற்று"],
  [308, "இணரெரி தோய்வன்ன இன்னா செயினும்\nபுணரின் வெகுளாமை நன்று"],
  [309, "உள்ளியதெல்லாம் உடனெய்தும் உள்ளத்தால்\nஉள்ளான் வெகுளி எனின்"],
  [310, "இறந்தார் இறந்தார் அணையர் சினத்தைத்\nதுறந்தார் துறந்தார் அணைத்து"]
];
 CHAPTER_KURALS[32] = [
  [311, "சிறப்பீனும் செல்வம் பெறினும் பிறர்க்குஇன்னா\nசெய்யாமை மாசற்றார் கோள்"],
  [312, "கறுத்தின்னா செய்தவக் கண்ணும் மறுத்தின்னா\nசெய்யாமை மாசற்றார் கோள்"],
  [313, "செய்யாமல் செற்றார்க்கும் இன்னாத செய்தபின்\nஉய்யா விழுமம் தரும்"],

  [315, "அறிவினால் ஆகுவது உண்டோ பிறிதின்நோய்\nதன்நோய்போல் போற்றாக் கடை"],
  [316, "இன்னா எனத்தான் அறிந்தவை துன்னாற்க\nஇனியாரும் யார்மாட்டும் ஞான்று"],
  [317, "எனைத்தானும் எஞ்ஞான்றும் யார்க்கும் மனத்தானாம்\nமாணாசெய் யாமை தலை"],
  [318, "தன்னுயிர்க்கு இன்னாமை தான்அறிவான் என்கொலோ\nமன்னுயிர்க்கு இன்னா செயல்"],
  [319, "இன்னாசெய் தார்க்கு இன்னா முற்பகல் செய்யின்\nபிற்பகல் தாமே வரும்"],
  [320, "நோய்எல்லாம் நோய்செய்தார் மேலவாம் நோய்செய்யார்\nநோயின்மை வேண்டு பவர்"]
];
 CHAPTER_KURALS[33] = [
  [321, "அறவினை யாதுஎனின் கொல்லாமை கோறல்\nஅறவினை எல்லாம் தரும்"],
  [322, "பகுத்துண்டு பல்லுயிர் ஓம்புதல் நூலோர்\nதொகுத்தவற்றுள் எல்லாம் தலை"],
  [323, "கொல்லாமை தனித்து அறம்இனிது ஆயினும்\nஅஃதிலார் மேற்கொள் வது"],
  [324, "நல்லாறு எனப்படுவது யாதெனின் யாதொன்றும்\nகொல்லாமை சூழும் நெறி"],
  [325, "நிலைஅஞ்சி நீத்தாருள் எல்லாம் கொலைஅஞ்சிக்\nகொல்லாமை சூழ்வான் தலை"],
  [326, "கொலைவினையார் ஆகாது உயிர்மேல் கூற்றுயிரை\nஉண்ணும் நிலைமை யவர்"],
  [327, "தன்னுயிர் நீப்பினும் செய்யற்க தான்பிறிது\nஇன்னுயிர் நீக்கும் வினை"],
  [328, "நன்றாகும் ஆக்கம் பெரிதெனினும் சான்றோர்க்குக்\nகொன்றாகும் ஆக்கம் கடை"],
  [329, "கொலைவினையர் ஆகிய மாந்தர் புலைவினையர்\nபுன்மை தெரிவா ரகத்து"],
  [330, "உயிர்உடம்பின் நீக்கியார் என்பர் செயிர்உடம்பின்\nசெல்லாத் தீப்பிணி யவர்"]

 CHAPTER_KURALS[34] = [
  [331, "இல்லாரை எல்லாரும் எள்ளுவர் செல்வரை\nஎல்லாரும் செய்வர் சிறப்பு"],
  [332, "அளவறிந்து வாழாதான் வாழ்க்கை உளபோலத்\nதோன்றி கெடும்"],
  [333, "அற்கா இயல்பிற்று செல்வம் அதுபெற்றால்\nஅற்குப ஆங்கே செயல்"],
  [334, "நாளென ஒன்றுபோல் காட்டி உயிர்ஈரும்\nவாளதிது உணர்வார்ப் பெறின்"],
  [335, "நாச்செற்று விக்குமுன் நல்வினை மேற்செய்வ\nகூற்றுவருங் கால்"],
  [336, "நெருநல் உளன்ஒருவன் இன்றுஇல்லை என்னும்\nபெருமை உடைத்திவ் வுலகு"],
  [337, "ஒருபொழுதும் வாழ்வது அறியார் கருதுப\nகோடியும் அல்ல பல"],
  [338, "குடம்பை தனித்தொழியப் புள்பறந் தற்றே\nஉடம்போடு உயிரிடை நட்பு"],
  [339, "உறங்குவது போலும் சாக்காடு உறங்கி\nவிழிப்பது போலும் பிறப்பு"],
  [340, "புக்கில் அமைந்தொன்று இலாத உயிர்க்கு\nஉடம்பில் நிலைமை யெவன்"]
];
 CHAPTER_KURALS[35] = [
  [341, "யாதனின் யாதனின் நீங்கியான் நோதல்\nஅதனின் அதனின் இலன்"],
  [342, "வேண்டின் உணாஅகத் துறக்க துறந்தபின்\nஈண்டிய இயற்கை தரும்"],
  [343, "அடல்வேண்டும் ஐந்தன் புலத்தை விடல்வேண்டும்\nஅவற்றின் கண் உற்றான் துணிவு"],
  [344, "இயல்புடைய மூவர்க்கும் நல்லாற்றின் நின்ற\nதுணைஎன்ப தூயவன் கோள்"],
  [345, "மற்றும்தொடர்பாடு எவன்கொல் பிறப்பறுக்கல்\nஉற்றார்க்கு உடம்பும் மிகை"],
  [346, "யான்எனது என்னும் செருக்குஅறுப்பான் வானோர்க்கு\nஉயர்ந்த உலகம் புகும்"],
  [347, "பற்றி விடாஅ இடும்பைகள் பற்றினைப்\nபற்றி விடாஅ தவர்க்கு"],
  [348, "தலைப்பட்டார் தீரத் துறந்தார் மயங்கி\nவலைப்பட்டார் மற்றை யவர்"],
  [349, "பற்றற்ற கண்ணே பிறப்பறுக்கும் மற்றுப்\nபற்றின் உவற்பாற் றன்று"],
  [350, "பற்றுக பற்றற்றான் பற்றினை அப்பற்றைப்\nபற்றுக பற்று விடற்கு"]
];
 CHAPTER_KURALS[36] = [
  [351, "பொருளல்ல வற்றைப் பொருளென்று உணரும்\nமருளானாம் மாணாப் பிறப்பு"],
  [352, "இருள்நீங்கி இன்பம் பயக்கும் மருள்நீங்கி\nமாசறு காட்சி யவர்க்கு"],
  [353, "ஐயத்தின் நீங்கித் தெளிந்தார் நெஞ்சத்து\nவையத்தின் வானம் நணித்து"],
  [354, "ஐயுணர்வு எய்தியக் கண்ணும் பயன்றின்றே\nமெய்யுணர்வு இல்லாத வர்க்கு"],
  [355, "எப்பொருள் எத்தன்மைத் தாயினும் அப்பொருள்\nமெய்ப்பொருள் காண்பது அறிவு"],
  [356, "கற்றுஈண்டு மெய்ப்பொருள் கண்டார் தலைப்படுவர்\nமற்றுஈண்டு வாரா நெறி"],
  [357, "ஓர்த்துள்ளம் உள்ளவாறு உணரின் ஒருதலையா\nபேர்த்துள்ள வேண்டா பிறப்பு"],
  [358, "பிறப்பென்னும் பேதைமை நீங்கச் சிறப்பென்னும்\nசெம்பொருள் காண்பது அறிவு"],
  [359, "சார்புணர்ந்து சார்பு கெடஒழுகின் மற்றும்கண்\nசார்புராச் சார்கெடும் நோய்"],
  [360, "காமம் வெகுளி மயக்கம் இவைமூன்றின்\nநாமம் கெடக்கெடும் நோய்"]
];
 CHAPTER_KURALS[37] = [
  [361, "அவாஎன்ப எல்லா உயிர்க்கும் எஞ்ஞான்றும்\nதவாஅப் பிறப்பீனும் வித்து"],
  [362, "வேண்டுங்கால் வேண்டும் பிறவாமை அஃதொன்றன்\nவேண்டாமை வேண்ட வரும்"],
  [363, "வேண்டாமை அன்ன விழுச்செல்வம் ஈண்டில்லை\nஆண்டும் அஃதொப்பது இல்"],
  [364, "தூய்மை என்பது அவாவின்மை அஃதுஉண்மையின்\nவாய்மை வேண்ட வரும்"],
  [365, "அற்றவர் என்பார் அவாஅற்றார் மற்றையார்\nஅற்றிலர் ஆதலால் இல்"],
  [366, "அஞ்சுவது ஓம்பல் அறிவார் நெஞ்சத்து\nஅஞ்சாமை அஃதிலார் கண்"],
  [367, "இன்பம் இடையறாது ஈண்டும் அவாவென்னும்\nதுன்பத்துள் துன்பம் கெடின்"],
  [368, "அவாவில்லார்க்கு இல்லாகும் துன்பம் அஃதுண்டேல்\nதவாஅமை ஞான்று வரும்"],
  [369, "அவாஅற்ற கண்நின்றே இன்பம் மிகுமற்றுக்\nகண்ணும் அதனின் தீதுஇல்"],
  [370, "ஆரா இயற்கை அவாநீப்பின் அந்நிலையே\nபேரா இயற்கை தரும்"]
];
 CHAPTER_KURALS[38] = [
  [371, "ஆகூழால் தோன்றும் அசைவின்மை கைப்பொருள்\nபோகூழால் தோன்றும் மடி"],
  [372, "பேதைமை ஊட்டும் பசிஅஃது அறிவுஅகற்றும்\nஆகூழ் உறும்பாற் படும்"],
  [373, "நுண்ணிய நூல்பல கற்பினும் மற்றும்தன்\nஉண்மை அறிவே மிகும்"],
  [374, "இருவேறு உலகத்து இயற்கை திருவேறு\nதெள்ளியர் ஆதலும் வேறு"],
  [375, "நல்லவை எல்லா அன்றாகும் தீயவை\nநல்லவாம் செல்வமுற் கால்"],
  [376, "பரியினும் ஆகவாம் பால்அல்வ உய்த்துச்\nசொரியினும் போகா தம"],
  [377, "வகுத்தான் வகுத்த வகையல்லால் கோடி\nதொகுத்தார்க்கும் துய்த்தல் அரிது"],
  [378, "துறப்பார்மன் துப்புரவு இல்லார் உறற்பால\nஊட்டா கழியு மெனின்"],
  [379, "நன்றாங்கால் நல்லவாக் காண்பவர் அன்றாங்கால்\nஅல்லற்படுவது எவன்"],
  [380, "ஊழின் பெருவலி யாவுள மற்றொன்று\nசூழினும் தான்முந் துறும்"]
];
 CHAPTER_KURALS[39] = [
  [381, "அஞ்சாமை ஈகை அறிவூக்கம் இந்நான்கும்\nஎஞ்சாமை வேந்தற்கு இயல்பு"],
  [382, "தூங்காமை கல்வி துணிவுடைமை இம்மூன்றின்\nநீங்கா நிலன்ஆள்ப வற்கு"],
  [383, "அறன்இழுக்காது அல்லவை நீக்கி மறன்இழுக்கா\nமானம் உடையது அரசு"],
  [384, "கொடையளி செங்கோல் குடியோம்பல் நான்கும்\nஉடையான்ஆம் வேந்தர்க்கு ஒளி"],
  [385, "இயற்றலும் ஈட்டலும் காத்தலும் காத்த\nவகுத்தலும் வல்லது அரசு"],
  [386, "காட்சிக்கு எளியன் கடுஞ்சொல்லன் அல்லனேல்\nமீக்கூறும் மன்னன் நிலம்"],
  [387, "இன்சொலால் ஈத்தளிக்க வல்லார்க்குத் தன்சொலால்\nதான்கண் டனைத்திவ் வுலகு"],
  [388, "முறைசெய்து மொப்பாற்றான் முந்துறும் வேந்தன்\nஇறைஎன்று வைக்கப் படும்"],
  [389, "செவிகைப்பச் சொற்பொறுக்கும் பண்புடை வேந்தன்\nகவிக்குடைக்கீழ் தங்கும் உலகு"],
  [390, "கொடையுடையன் கண்ணோட்டம் உடையன் உலகத்து\nநடையுடையன் வேந்தர்க்கு அரசு"]
];
 CHAPTER_KURALS[40] = [
  [391, "கற்க கசடறக் கற்பவை கற்றபின்\nநிற்க அதற்குத் தக"],
  [392, "எண்ணென்ப ஏனை எழுத்தென்ப இவ்விரண்டும்\nகண்ணென்ப வாழும் உயிர்க்கு"],
  [393, "கண்ணுடையர் என்பவர் கற்றோர் முகத்திரண்டு\nபுண்ணுடையர் கல்லா தவர்"],
  [394, "உவப்பத் தலைக்கூடி உள்ளப் பிரிதல்\nஅனைத்தே புலவர் தொழில்"],
  [395, "உடையார்முன் இல்லார்போல் ஏக்கற்றும் கற்றார்\nகடையரே கல்லா தவர்"],
  [396, "தொட்டனைத் தூறும் மணற்கேணி மாந்தர்க்குக்\nகற்றனைத் தூறும் அறிவு"],
  [397, "யாதானும் நாடமால் ஊராமால் என்னொருவன்\nசாந்துணையும் கல்லாத வாறு"],
  [398, "ஒருமைக்கண் தான் கற்ற கல்வி ஒருவற்கு\nஎழுமையும் ஏமாப்பு உடைத்து"],
  [399, "தாமின் புறுவது உலகின் புறக்கண்டு\nகாமுகர் கற்றறிந் தார்"],
  [400, "கேடில் விழுச்செல்வம் கல்வி ஒருவற்கு\nமாடல்ல மற்றை யவை"]
];
 CHAPTER_KURALS[41] = [
  [401, "அரங்கின்றி வட்டமடித் தற்றே நிரம்பிய\nநூலின்றிக் கோட்டி கொளல்"],
  [402, "கல்லாதான் சொற்காமுறு தல் நலம்இல்லான்\nகல்லாஅ தோள்பா லது"],
  [403, "கல்லா தவரும் நனிநல்லர் கற்றார்முன்\nசொல்லாது இருக்கப் பெறின்"],
  [404, "கல்லாதான் திட்பம் கழியும்கால் கற்றறிந்தான்\nநல்லறிவு ஆகி விடும்"],
  [405, "கல்லா ஒருவன் தகைமை தலைப்பெய்து\nசொல்லாடச் சோர்வு படும்"],
  [406, "உளரென்னும் மாத்திரையர் அல்லால் பயவாக்\nகளரனையர் கல்லா தவர்"],
  [407, "நுண்மாண் நுழைபுலம் இல்லான் எழில்நலம்\nமண்மாண் புனைபாவை அற்று"],
  [408, "நல்லார்கண் பட்ட வறுமையின் இன்னாதே\nகல்லார்கண் பட்ட திரு"],
  [409, "மேற்பிறந்தா ராயினும் கல்லாதார் கீழ்ப்பிறந்தும்\nகற்றார் அனைத்திலர் பாடு"],
  [410, "விலங்கொடு மக்கள் அனையர் இலங்குநூல்\nகற்றாரோடு ஏனை யவர்"]
];
 CHAPTER_KURALS[42] = [
  [411, "செல்வத்துள் செல்வம் செவிச்செல்வம் அச்செல்வம்\nசெல்வத்துள் எல்லாம் தலை"],
  [412, "செவிக்குணவு இல்லாத போழ்து சிறிது\nவயிற்றுக்கும் ஈயப் படும்"],
  [413, "செவிஉணவின் கேள்வி உடையார் அவியுணவின்\nஆன்றாரோடு ஒப்பர் நிலத்து"],
  [414, "கற்றிலன் ஆயினும் கேட்க அஃதொருவற்கு\nஒற்கத்தின் ஊற்றாந் துணை"],
  [415, "இழுக்கல் உடையுழி ஊற்றுக்கோல் அற்றே\nஒழுக்கம் உடையார்வாய்ச் சொல்"],
  [416, "எனைத்தானும் நல்லவை கேட்க அனைத்தானும்\nஆன்ற பெருமை தரும்"],
  [417, "பிழைத்துணர்ந்தும் பேதைமை சொல்லார் இழைத்துணர்ந்து\nஈண்டிய கேள்வி யவர்"],
  [418, "கேட்பினும் கேளாத் தகையவே கேள்வியால்\nதோட்கப் படாத செவி"],
  [419, "நுணங்கிய கேள்வியர் அல்லார் வணங்கிய\nவாயினர் ஆதல் அரிது"],
  [420, "செவியின் சுவையுணரா வாயுணர்வின் மாக்கள்\nஅவிந்தும் வாழினும் என்"]
];
 CHAPTER_KURALS[43] = [
  [421, "அறிவற்றம் காக்கும் கருவி செறுவார்க்கும்\nஉள்ளழிக்கல் ஆகா அரண்"],
  [422, "சென்ற இடத்தால் செலவிடாது தீதொரீஇ\nநன்றின்பால் உய்ப்பது அறிவு"],
  [423, "எப்பொருள் யார்யார்வாய்க் கேட்பினும் அப்பொருள்\nமெய்ப்பொருள் காண்பது அறிவு"],
  [424, "எண்பொருள வாகச் செலச்சொல்லித் தான்பிறர்வாய்\nநுண்பொருள் காண்பது அறிவு"],
  [425, "உலகம் தழீஇய தொட்பம் மலர்தலும்\nகூம்பலும் இல்லது அறிவு"],
  [426, "எவ்வது உறைவது உலகம் உலகத்தோடு\nஅவ்வது உறைவது அறிவு"],
  [427, "அறிவுடையார் ஆவ தறிவார் அறிவிலார்\nஅஃதறி கல்லா தவர்"],
  [428, "அஞ்சுவ தோம்பல் அறிவார் நெஞ்சத்து\nஅஞ்சாமை அஃதிலார் கண்"],
  [429, "எதிரதாக் காக்கும் அறிவினார்க்கில்லை\nஅதிர வருவதோர் நோய்"],
  [430, "அறிவுடையார் எல்லாம் உடையார் அறிவிலார்\nஎன்னுடைய ராயினும் இல்"]
];
 CHAPTER_KURALS[44] = [
  [431, "செருக்கும் சினமும் சிறுமையும் இல்லார்\nபெருக்கம் பெருமித நீர துடைத்து"],
  [432, "இவறலும் மாண்புஇறந்த மானமும் மாணா\nஉவகையும் ஏதம் அரசுக்கு"],
  [433, "தினைத்துணையாக் குற்றமும் நாடிப் பின்செய்வார்\nவிழுமம் துடைத்தவர் நட்பு"],
  [434, "குற்றமே காக்க பொருளாகக் குற்றமே\nஅற்றந்தந்து அல்லல் படுத்தும்"],
  [435, "வருமுன்னர்க் காவாதான் வாழ்க்கை எரிமுன்னர்\nவைத்தூறு போலக் கெடும்"],
  [436, "தன்குற்றம் நீக்கிப் பிறற்குற்றம் காண்கிற்பின்\nஎன்குற்றம் ஆகும் இறைக்கு"],
  [437, "செயற்பால தோரும் அரணே ஒருவற்கு\nஉயற்பால தோரும் பழி"],
  [438, "பற்றுள்ளம் என்னும் இவறன்மை எற்றுள்ளும்\nஎண்ணப் படுவதொன் றன்று"],
  [439, "வியற்கசெய் யாற்கொல் வினையறிந்தார் நெஞ்சத்து\nஅயிர்க்க வராதது ஒன்று"],
  [440, "காதல காத லறியாமை உய்க்கிற்பின்\nஏதிலார் ஏதிலார் நெஞ்சத்து"]
];
 CHAPTER_KURALS[45] = [
  [441, "அறன்அறிந்து மூத்த அறிவுடையார் கேண்மை\nதிறனறிந்து தேர்ந்து கொளல்"],
  [442, "உற்றநோய் நீக்கி உறாஅமை முற்காக்கும்\nபெற்றியார்ப் பேணிப் கொளல்"],
  [443, "அரியவற்றுள் எல்லாம் அரிதே பெரியாரைப்\nபேணித் தமராக் கொளல்"],
  [444, "தம்மின் பெரியார் தமரா ஒழுகுதல்\nவன்மையுள் எல்லாம் தலை"],
  [445, "சூழ்வார்கண் ணாக ஒழுகலான் மன்னவன்\nசூழ்வாரைச் சூழ்ந்து கொளல்"],
  [446, "தக்கா ரினத்தனாய்த் தான்ஒழுக வல்லானை\nசெற்றார் செயக்கிடந்த தில்"],
  [447, "இடிக்குந் துணையாரை இல்லாத ஏமரா\nமன்னன் கெடுப்பார் இலானும் கெடும்"],
  [448, "இடிபாரை இல்லாத ஏமரா மன்னன்\nகெடுப்பார் இலானும் கெடும்"],
  [449, "முதலிலார்க்கு ஊதியம் இல்லை மதலையாம்\nசார்பிலார்க்கு இல்லை நிலை"],
  [450, "பல்லார் பகைகொளலின் பத்தடுத்த தீமைத்தே\nநல்லார் தொடர்கை விடல்"]
];
 CHAPTER_KURALS[46] = [
  [451, "சிற்றினம் அஞ்சும் பெருமை சிறுமைதான்\nசுற்றமாச் சூழ்ந்து விடும்"],
  [452, "நிலத்தியல்பால் நீர்திரிந் தற்றாகும் மாந்தர்க்கு\nஇனத்தியல்பால் ஆகும் அறிவு"],
  [453, "மனத்தானாம் மாந்தர்க்கு உணர்ச்சி இனத்தானாம்\nஇன்னான் எனப்படும் சொல்"],
  [454, "மனத்துளது போலக் காட்டி யொருவற்கு\nஇனத்துள தாகும் அறிவு"],
  [455, "மனத்தூய்மை செய்வினை தூய்மை இரண்டும்\nஇனத்தூய்மை தூவா வரும்"],
  [456, "மனந்தூயார்க்கு எச்சம் நன்றாகும் இனந்தூயார்க்கு\nசெய்தவற்றுள் எல்லாம் தலை"],
  [457, "மனநலம் மன்னுயிர்க்கு ஆக்கம் இனநலம்\nஎல்லாப் புகழும் தரும்"],
  [458, "மனநலம் நன்குடைய ராயினும் சான்றோர்க்கு\nஇனநலம் ஏமாப்பு உடைத்து"],
  [459, "மனநலத்தின் ஆக்கம் கெடுமற் றினநலத்தின்\nஏதம் படுபா டறிந்து"],
  [460, "நல்லினத்தின் ஊங்குத் துணையில்லை தீயினத்தின்\nஅல்லற்படுப்பது ஒன்று இல்"]
];
 CHAPTER_KURALS[47] = [
  [461, "அழிவ தோவும் அழிவதூஉம் ஆவ தறிவார்\nபெருக்கத்தில் தீர்ந்தாரும் இல்"],
  [462, "தெரிந்த இனத்தோடு தேர்ந்தெண்ணிச் செய்வார்க்கு\nஅரும்பொருள் யாதொன்றும் இல்"],
  [463, "ஆக்கம் கருதி முதலிழக்கும் செய்வினை\nஊக்கியார் அறிவுடை யார்"],
  [464, "தெளிவிலார் ஆக்கம் தொடங்குவர் இன்பம்\nஇகந்து பழிபடு பா டறிந்து"],
  [465, "வகைமாண்ட வல்லுருவம் பெற்றம் புலியின்தோல்\nபோர்த்துமேய்ந் தற்று"],
  [466, "செய்தக்க அல்ல செயக்கெடும் செய்தக்க\nசெய்யாமை யானும் கெடும்"],
  [467, "எண்ணித் துணிக கருமம் துணிந்தபின்\nஎண்ணுவாம் என்பது இழுக்கு"],
  [468, "ஆற்றின் வருந்தா வருத்தம் பலர்நின்று\nபோற்றினும் பொத்துப் படும்"],
  [469, "நன்றாற்றல் உள்ளும் தவறுண்டு அவரவர்\nபண்பறிந்து ஆற்றாக் கடை"],
  [470, "எள்ளாத எண்ணிச் செயல்வேண்டும் தம்மோடு\nகொள்ளாத கொள்ளாது உலகு"]
];
 CHAPTER_KURALS[48] = [
  [471, "வினைவலியும் தன்வலியும் மாற்றான் வலியும்\nதுணைவலியும் தூக்கிச் செயல்"],
  [472, "ஒல்வ தறிவது அறிந்ததன் கண்தங்கிச்\nசெல்வார்க்குச் செல்லாதது இல்"],
  [473, "உடைத்தம் வலியறியார் ஊக்கத்தின் ஊங்கி\nஇடைக்கண் முரிந்தார் பலர்"],
  [474, "அமைந்தாங் கொழுகான் அளவறியான் தன்னை\nவியந்தான் விரைந்து கெடும்"],
  [475, "பீலிபெய் சாகாடும் அச்சிறும் அப்பண்டம்\nசால மிகுத்துப் பெயின்"],
  [476, "நுனிக்கொம்பர் ஏறினார் அஃதிறந்து ஊக்கின்\nஉயிர்க்கிறுதி ஆகி விடும்"],
  [477, "ஆற்றின் அளவு அறிந்து ஈக அதுபொருள்\nபோற்றி வழங்கும் நெறி"],
  [478, "ஆகாறு அளவு இட்டி தாயினும் கேடில்லை\nபோகாறு அகலா க் கடை"],
  [479, "அளவறிந்து வாழாதான் வாழ்க்கை உளபோலத்\nதோன்றி கெடும்"],
  [480, "உளவரை தூக்காத ஒப்புர வாண்மை\nவளவரை வல்லைக் கெடும்"]
];
 CHAPTER_KURALS[49] = [
  [481, "பகல்கற்குக் கூகையைக் காக்கை இகல்வெல்லும்\nவேந்தர்க்கு வேண்டும் பொழுது"],
  [482, "பருவத்தோடு ஒட்ட ஒழுகல் திருவினைத்\nதீராமை ஆர்க்குங் கயிறு"],
  [483, "அருவினை யென்ப உளவோ கருவினால்\nகாலம் அறிந்து செயின்"],
  [484, "ஞாலம் கருதினும் கைகூடும் காலம்\nகருதி இடத்தால் செயின்"],
  [485, "காலம் கருதி இருப்பர் கலங்காது\nஞாலம் கருது பவர்"],
  [486, "ஊக்க முடையான் ஒடுக்கம் பொருதகர்\nதாக்கற்குப் பேருந் தகைத்து"],
  [487, "பொள்ளென ஆங்கே புறம்வேரார் காலம்பார்த்து\nஉள்வேர்ப்பர் ஒள்ளி யவர்"],
  [488, "செறுவாரைக் காணின் சுமக்க இறுதிகாலம\nஉறுவார்க் கதலை தலை"],
  [489, "எய்தற்கரிய துயைந்தக்கால் அந்நிலையே\nசெய்தற்கரிய செயல்"],
  [490, "கொக்கொக்க கூம்பும் பருவத்து மற்றதன்\nகுத்தொக்க சீர்த்த இடத்து"]
];
 CHAPTER_KURALS[50] = [
  [491, "தொடங்கற்க எவ்வினையும் ஓவற்க முற்றும்\nஇடனறிந்து காப்பார் அறிவு"],
  [492, "முரண் சேர்ந்த மொய்ம்பினக் கண்ணும் அரண்சேர்ந்தாம்\nஆக்கம் பலவுந் தரும்"],
  [493, "ஆற்றாரும் ஆற்றல் அடைவர் இடனறிந்து\nபோற்றார்கண் போற்றிச் செயின்"],
  [494, "எண்ணியார் எண்ணம் இழப்பர் இடனறிந்து\nதுன்னியார் துன்னிச் செயின்"],
  [495, "நெடும்புனலில் வெல்லும் முதலை அப்புனலின்\nநீங்கின் அதனைப் பிற"],
  [496, "கடலோடா கால்வல் நெடுந்தேர் கடலோடும்\nநாவாயும் ஓடா நிலத்து"],
  [497, "அஞ்சாமை அல்லால் துணைவேண்டா எஞ்சாமை\nஎண்ணி இடத்தால் செயின்"],
  [498, "சிறுபடையான் செல்லிடம் சேரின் உருபடையான்\nஊக்கம் அழிந்து விடும்"],
  [499, "சிறைநலமும் சீரும் இலரெனினும் மாந்தர்\nஉறைநிலத்தால் ஊக்கம் மிகும்"],
  [500, "நரிநரி செந்நாய் கடிப்பர் நல்யானை\nவரிநிலத்தில் ஆழப் படின்"]
];
 CHAPTER_KURALS[51] = [
  [501, "அறம்பொருள் இன்பம் உயிரச்சம் நான்கின்\nதிறம்தெரிந்து தேறப் படும்"],
  [502, "குடிபிறந்து குற்றமற்றான் ஆயின் அவனை\nவிடிபிறந்து தேறப் படும்"],
  [503, "அரியகற்று ஆசற்றார் கண்ணும் தெரியுங்கால்\nஇன்மை அரிதே வெளிறு"],
  [504, "குணநாடிக் குற்றமும் நாடி அவற்றுள்\nமிகைநாடி மிக்க கொளல்"],
  [505, "பெருமைக்கும் ஏனைச் சிறுமைக்கும் தத்தம்\nகருமமே கட்டளைக் கல்"],
  [506, "அற்றாரைத் தேறுதல் ஓம்புக மற்றவர்\nசுற்றத்தார் கண்ணும் அறார்"],
  [507, "காதல் இருமையான் குற்றமறைந் தற்றால்\nபேதைமைத் தேறல் எனல்"],
  [508, "தேரான் தெளிவும் தெளிந்தான்கண் ஐயுறவும்\nதீரா இடும்பை தரும்"],

  [510, "தேரானைத் தேறுதலும் தேறியான்கண் ஓவாது\nஆராயான் செய்தலும் பாடு"]
];
 CHAPTER_KURALS[52] = [
  [511, "நன்மையும் தீமையும் நாடி நலம்புரிந்த\nதன்மையான் ஆளப் படும்"],
  [512, "வாரி பெருக்கி வளம்படுத்து உற்றவை\nஆராய்வான் செய்க வினை"],
  [513, "அன்புஅறிவு தேற்றம் அவாவின்மை இந்நான்கும்\nநன்குடையான் கட்டே வினை"],

  [515, "அறிந்தாற்றிச் செய்கிற்பாற்கு அல்லால் வினையைக்\nசிறந்தானென்று ஏவற்பாற் றன்று"],
  [516, "செய்வானை நாடி வினைநாடி காலத்தோடு\nஎய்த உணர்ந்து செயல்"],
  [517, "இதனை இதனால் இவன்முடிக்கும் என்றுஆய்ந்து\nஅதனை அவன்கண் விடல்"],
  [518, "வினைக்குரிமை நாடிய பின்றை அவனை\nஅதற்குரிமை ஆக்கப் படும்"],
  [519, "வினைமகிழ்ச்சி மார்த்தாண்டன் என்றுஆய்ந்து அவனை\nவினைமன்னன் ஆக்கல் எவன்"],

 CHAPTER_KURALS[53] = [
  [521, "பற்றற்ற காலத்தும் பற்றறார் சுற்றத்தார்\nஅற்றற்றால் ஆக்கம் தரும்"],
  [522, "சுற்றத்தால் சுற்றப் படவொழுகல் செல்வந்தான்\nபெற்றத்தால் பெற்ற பயன்"],
  [523, "அளவளாவு இல்லாதான் வாழ்க்கை குளவளாக்\nகோடின்றி நீர்நிறைந் தற்று"],

  [525, "கொடுத்தலும் இன்சொலும் ஆற்றின் அடுக்கிய\nசுற்றத்தால் சுற்றப் படும்"],

  [527, "காக்கைக்கு கரவா கரைந்துண்ணும் சுற்றமும்\nஅத்தகையார்க்கே யுள"],
  [528, "பொதுநோக்கான் வேந்தன் வரிசையா நோக்கின்\nஅதுநோக்கி வாழ்வார் பலர்"],
  [529, "தமராகித் தற்றுறந்தார் சுற்றத்தார் ஆவர்\nஅமராகாக் காரணம் நீங்கு வழி"],

 CHAPTER_KURALS[54] = [
  [531, "இறந்த மகிழ்ச்சியின் மைந்துறும் போழ்தின்\nமறதியின் மைந்தின் இடும்பை"],
  [532, "பொச்சாப்புக் கொல்லும் புகழை அறிவினை\nநிச்சயக் கொல்லும் சினம்"],

  [538, "புகழ்ந்தவை போற்றிச் செயல்வேண்டும் செய்யாது\nஇகழ்ந்தார்க்கு எழுமையும் இல்"],

  [540, "உள்ளியது எய்தல் எளிதுமன் மற்றும்தான்\nஉள்ளியது உள்ளப் பெறின்"]

 CHAPTER_KURALS[55] = [
  [541, "ஓர்ந்துகண் ஓடாது இறைபுரிந்து யார்மாட்டும்\nதேர்ந்துசெய் வஃதே முறை"],

  [543, "அந்தணர் நூற்கும் அறத்திற்கும் ஆதியாய்\nநின்றது மன்னவன் கோல்"],

  [545, "இயல்புளிக் கோலோச்சும் மன்னவன் நாட்ட பெயலும்\nவிளையும் தொக்கு"],
  [546, "வேலன்று வென்றி தருவது மன்னவன்\nகோலதூஉம் கோடா தெனின்"],
  [547, "இறைகாக்கும் வையகம் எல்லாம் அவனை\nமுறைகாக்கும் முட்டாச் செயின்"],
  [548, "எண்பதத்தான் ஓரா முறைசெய்யா மன்னவன்\nதண்பதத்தான் தானே கெடும்"],
  [549, "குடிபுறம் காத்தோம்பிக்குற்றம் கடிதல்\nவடுவன்று வேந்தன் தொழில்"],
  [550, "கொலையிற் கொடியாரை வேந்தன் ஒறுத்தல்\nகளையினைக் கட்டதனோடு நேர்"]
];
 CHAPTER_KURALS[56] = [
  [551, "கொலைமேற்கொண்டாரின் கொடிதே அலைமேற்கொண்டு\nஅல்லற்படுத்து ஒழுகும் வேந்தன்"],
  [552, "வேலொடு நின்றான் இடுஎன்றது போலும்\nகோலொடு நின்றான் இரவு"],

  [558, "இன்மையின் இன்னாது உடைமை முறைசெய்யா\nமன்னவன் கோல்கீழ்ப் படின்"],
  [559, "முறைகோடி மன்னவன் செய்யின் உறைகோடி\nவானம் வழங்காது விடும்"],
  [560, "ஆபயன் குன்றும் அறுதொழிலோர் நூல்மறப்பர்\nகாவலன் காவான் எனின்"]
];
 CHAPTER_KURALS[57] = [
  [561, "தக்காங்கு நாடித் தலைச்செல்லா வண்ணத்தால்\nஒத்தாங்கு ஒறுப்பது வேந்து"],

  [566, "கடுமொழியன் கையிகந்த தண்டத்தன் ஆயின்\nநெடுமொழி நீடாது கெடும்"],
  [567, "இறைகடியன் என்றுஉரைக்கும் இன்னாச்சொல் வேந்தன்\nஉறைகடியொடு ஒல்லைக் கெடும்"],
  [568, "செல்லா இடத்துச் சினம்காப்பான் சினம்காப்பான்\nசெல்லா இடத்துஇல் எவன்"],
  [569, "அரணின்றேல் ஆற்றல் இகழும் அரணின்றேல்\nஅஞ்சும்கொல் அஞ்சா தவர்"],
  [570, "வெருவந்த செய்தொழுகும் வெங்கோலன் ஆயின்\nஒருவந்தம் ஆள்வினை இல்"]

 CHAPTER_KURALS[58] = [
  [571, "கண்ணோட்டம் என்னும் கழிபெருங் காரிகை\nஉண்மையான் உண்டுஇவ் வுலகு"],

  [577, "கண்ணோட்டம் இல்லவர் கண்இலார் கண்உடையார்\nகண்ணோட்டம் இன்மையார் இல்"],
  [578, "கருமம் சிதையாமல் கண்ணோட வல்லார்க்கு\nஉரிமை உடைத்திவ் வுலகு"],
  [579, "ஒறுத்தக்கண் ஓடி விழுமமச் செய்தாரும்\nபொறுத்தல் சான்றோர்க்கு அறிவு"],

 CHAPTER_KURALS[59] = [
  [581, "ஒற்றும் உரைசான்ற நூலும் இவைஇரண்டும்\nதெற்றென்க மன்னவன் கண்"],

 CHAPTER_KURALS[60] = [
  [591, "உடையர் எனப்படுவது ஊக்கம் அஃதிலார்\nஉடையது உடையரோ மற்று"],

 CHAPTER_KURALS[61] = [
  [601, "மடிமடிக் கொண்டுஒழுகும் மாண்பிலார்க் கில்லை\nகுடிமடிக் கொண்டு கெடும்"],

 CHAPTER_KURALS[62] = [

 CHAPTER_KURALS[63] = [
  [621, "இடுக்கண் வருங்கால் நகுக அதனை\nஅடுத்தூர்வது அஃதொப்பது இல்"],

 CHAPTER_KURALS[64] = [
  [631, "கருவியும் காலமும் செய்கையும் செய்யும்\nஅருவினையும் மாண்டது அமைச்சு"],

 CHAPTER_KURALS[65] = [

 CHAPTER_KURALS[66] = [

 CHAPTER_KURALS[67] = [

 CHAPTER_KURALS[68] = [
  [671, "சூழ்ச்சி முடிவு துணிவெய்தல் அத்துணிவு\nதாழ்ச்சியுள் தங்குதல் தீது"],

 CHAPTER_KURALS[69] = [
  [681, "அன்புஅறிவு ஆராய்ந்த சொல்வன்மை தூதுரைப்பார்க்கு\nஇன்றி யமையாத மூன்று"],

 CHAPTER_KURALS[70] = [
  [691, "அகலாது அணுகாது தீக்காய்வார் போல்க\nஇகழ்வேந்தர்ச் சேர்ந்தழுகு வார்"],

 CHAPTER_KURALS[71] = [
  [701, "கூறாமல் நோக்கிக் குறிப்பறிவான் எஞ்ஞான்றும்\nமாறா உலகிற்கு அணி"],

 CHAPTER_KURALS[72] = [
  [711, "சொல்வகை அறிந்து சொலல்வேண்டும் சொல்லிய\nவண்ணம் செயல்அறிவு நேர்"],

 CHAPTER_KURALS[73] = [

 CHAPTER_KURALS[74] = [

 CHAPTER_KURALS[75] = [

  [742, "மணிநீரும் மண்ணும் மலையும் அணிநிழற்\nகாடும் உடையது அரண்"],
  [743, "உயரம் அகலம் திண்மை அருமை\nஅந்நான்கின் அமைந்தது அரண்"],
  [744, "சிறுகாப்பின் பேரிடத்த தாகி உறுபகை\nஊக்கம் அழிப்பது அரண்"],
  [745, "கொளற்கரிதாய்க் கொண்டகண் டஞ்சாது உட்பங்கிற்கு\nஉளற்கரிதாய் நின்றது அரண்"],
  [746, "எல்லாப் பொருளும் உடைத்தாய் இடத்துதவும்\nநல்லாள் உடையது அரண்"],
  [747, "முற்றலாலும் முற்றி எறிதலாலும் உள்ளிருந்தார்\nசெய்வினையான் வெல்லற்பாற் றன்று"],
  [748, "முற்றியும் முற்றாது எறிந்தும் அறைகூவும்\nபற்றாரைப் பற்றுறுப்பது அரண்"],
  [749, "முனைமுகத்து மாற்றலர் சாய வினைமுகத்து\nவீறெய்தி மாண்டது அரண்"],
  [750, "எனைமாட்சித் தாகியக் கண்ணும் வினைமாட்சி\nஇல்லார்கண் இல்லது அரண்"]
];
 CHAPTER_KURALS[76] = [
  [751, "பொருளல் லவரைப் பொருளாகச் செய்யும்\nபொருளல்ல தில்லை பொருள்"],
  [752, "இல்லாரை எல்லாரும் எள்ளுவர் செல்வரை\nஎல்லாரும் செய்வர் சிறப்பு"],
  [753, "பொருளென்னும் பொய்யா விளக்கம் இருளறுக்கும்\nஎண்ணிய தேயத்துச் சென்று"],
  [754, "அறன்ஈனும் இன்பமும் ஈனும் திறன்அறிந்து\nதீதின்றி வந்த பொருள்"],
  [755, "அருளொடும் அன்பொடும் வாராப் பொருளாக்கம்\nபுல்லார் புரள விடல்"],
  [756, "உறுபொருளும் உல்கு பொருளும் தன்ஒன்னார்த்\nதெறுபொருளும் வேந்தன் பொருள்"],
  [757, "அருளென்னும் அன்பீன் குழவி பொருளென்னும்\nசெல்வச் செவிலியால் உண்டு"],
  [758, "குன்றேறி யானைப்போர் கண்டற்றால் தன்கைத்தொன்\nதுண்டாகச் செய்வான் வினை"],
  [759, "செய்க பொருளைச் செறுநர் செருக்கறுக்கும்\nஎஃகதனின் கூரியது இல்"],
  [760, "ஒண்பொருள் காழ்ப்ப இயற்றியார்க்கு எண்பொருள்\nஏனை இரண்டும் ஒருங்கு"]
];
 CHAPTER_KURALS[77] = [
  [761, "உறுப்புஅமைந்து ஊறுஅஞ்சா வெல்படை வேந்தன்\nவெறுக்கையுள் எல்லாம் தலை"],
  [762, "உலைவிடத்து ஊறுஅஞ்சா வன்கண் தொலைவிடத்துத்\nதொல்படைக் கல்லால் அரிது"],
  [763, "அழிவன்று அறைகூவும் ஆழ்கடல் போன்ற\nவழிவந்தது வான்படை யென்று"],
  [764, "நிலைமக்கள் சால உடைத்தெனினும் தானை\nதலைமக்கள் இல்வழி இல்"],
  [765, "ஒடலவிழ்ந்த வன்கண் உடைத்தாயினும் தானை\nமுன்னிற்கப் பாயும் எவன்"],
  [766, "மறமானம் மாண்ட வழிச்செலவு தேற்றம்\nஎனநான்கே ஏமம் படைக்கு"],
  [767, "திறனறிந்து தேர்ந்துசெய் வஃதே முறைசெய்து\nமறனறிந்து வாரா படை"],
  [768, "அடல்தகையும் ஆற்றலும் இல்லெனினும் தானை\nபடைத்தகையால் பாடு பெறும்"],
  [769, "சிறுமையும் செல்லா இடமும் இகழும்\nஉறுபகை யில்லா படை"],
  [770, "நிலைமக்கள் சால உடைத்தெனினும் தானை\nதலைமக்கள் இல்வழி இல்"]
];
 CHAPTER_KURALS[78] = [
  [771, "என்னைமுன் நில்லன்மின் தெவ்விர் பலரென்னை\nமுன்னின்று கல்நின்ற வர்"],
  [772, "கான முயலெய்த அம்பினில் யானை\nபிழைத்தவேல் ஏந்தல் இனிது"],
  [773, "பேராண்மை என்ப தறுகண்ஒன்று உற்றக்கால்\nஊராண்மை மற்றதன் எஃகு"],
  [774, "கைவேல் களிற்றொடு போக்கி வருபவன்\nமெய்வேல் பறியா நகும்"],
  [775, "விழித்தக்கண் வேல்கொண்டெறிய அழித்திமைப்பின்\nஒட்டன்றோ வன்க ணவர்க்கு"],
  [776, "விழுப்புண் படாதநா ளெல்லாம் வழுக்கினுள்\nவைக்கும்தன் நாளை எடுத்து"],
  [777, "சுழலும் இசைவேண்டி வேண்டா உயிரார்\nகழல்யாப்புக் காரிகை யுடைத்து"],
  [778, "உறங்குவது போலும் சாக்காடு உறங்கி\nவிழிப்பது போலும் பிறப்பு"],
  [779, "இழைத்தாரும் வைதாரும் செய்கிற்பார் யாரே\nபிழைத்தார்தாங் கூறிய சொற்"],
  [780, "புரந்தார்கண் நீர்மல்கச் சாகிற்பின் சாக்காடு\nஇரந்துகோள் தக்கது உடைத்து"]
];
 CHAPTER_KURALS[79] = [
  [781, "செயற்கரிய யாவுள நட்பின் அதுபோல்\nவினைக்கரிய யாவுள காப்பு"],
  [782, "நிறைநீர நீரவர் கேண்மை பிறைமதிப்\nபின்நீர பேதையார் நட்பு"],
  [783, "நவில்தொறும் நூல்நயம் போலும் பயில்தொறும்\nபண்புடை யாளர் தொடர்பு"],
  [784, "நகுதற் பொருட்டன்று நட்பு மிகுதிக்கண்\nமேற்சென்று இடித்தற் பொருட்டு"],
  [785, "புணர்ச்சி பழகுதல் வேண்டா உணர்ச்சிதான்\nநட்பாங் கிழமை தரும்"],
  [786, "முகநக நட்பது நட்பன்று நெஞ்சத்து\nஅகநக நட்பது நட்பு"],
  [787, "அழிவிந் நீக்கி ஆறுய்த்து அழிவின்கண்\nஅல்லல் உழப்பதாம் நட்பு"],
  [788, "உடுக்கை இழந்தவன் கைபோல ஆங்கே\nஇடுக்கண் களைவதாம் நட்பு"],
  [789, "நட்பிற்கு வீற்றிருக்கை யாதெனில் கொட்பின்றி\nஒல்லும்வாய் ஊன்றும் நிலை"],
  [790, "இனையர் இவரெமக்கு இன்னம்யாம் என்று\nபுனையினும் புல்லென்னும் நட்பு"]
];
 CHAPTER_KURALS[80] = [
  [791, "நாடாது நட்டலின் கேடில்லை நட்டபின்\nவீடில்லை நட்பாள் பவர்க்கு"],
  [792, "ஆய்ந்தாய்ந்து கொள்ளாதான் கேண்மை கடைமுறை\nதான்அழிந்து அல்லல் தரும்"],
  [793, "குணனும் குடிமையும் குற்றமும் குன்றா\nஇனனும் அறிந்துயார்க் குநட்பு"],
  [794, "குடிபிறந்து குற்றமற் றானைப்பொருள் கொடுத்துங்\nகொள்ளற்பாற் சூழ்ந்து நெறி"],
  [795, "அழச்சொல்லி அல்லதிடித்து வழக்கறியா\nநம்மோடு நட்டார்க்கு நல்"],
  [796, "கேட்டினும் உண்டுஓர் உறுதி கிளைஞரை\nநீட்டி அளப்பதோர் கோல்"],
  [797, "ஊதியம் என்பது ஒருவற்குப் பேதையார்\nகேண்மை ஒரீஇ விடல்"],
  [798, "உள்ளற்க உள்ளம் சிறுகுவ கொள்ளற்க\nஅல்லற்கண் ஆற்றார்தம் நட்பு"],
  [799, "இடுக்கண் வருங்கால் நகுக அதனை\nஅடுத்தூர்வது அஃதொப்பது இல்"],
  [800, "மருவுக மாசற்றார் கேண்மைஒன்று ஆற்றின்\nஒருவுக ஒப்பில்லார் நட்பு"]
];
 CHAPTER_KURALS[81] = [
  [801, "பழைமை எனப்படுவது யாதெனின் யாதொன்றும்\nகிழமையைக் கீழ்வழியா நெறி"],
  [802, "நட்பிற்கு உறுப்புக்கெழு தகைமை அவணின்றே\nபெட்பு அறிவுடை யார்"],
  [803, "பழையம்கண் நோற்றுப் பழகிற்றேல் வேந்தன்\nகிழமை சிதையாமல் காப்பார்"],
  [804, "விழைதகையான் வேண்டி யிருப்பர் கெழுதகையாற்\nகேளாது நட்டார் செயின்"],
  [805, "பேதைமைத் தேறல் எனல்வேண்டா நட்டார்கண்\nஏதம் பலவும் தரும்"],
  [806, "எல்லை கடவார் பழைமையார் எவ்வகையான்\nதொல்லைத் தொடர்புடை யார்"],
  [807, "அழிவந்த செய்யினும் அன்பறார் அன்பின்\nவழிவந்த கேண்மை யவர்"],
  [808, "கேளிழுக்கம் கேளாக் தகைமையார் நட்பினை\nநாளிழுக்கம் வாரா துலகு"],
  [809, "கெடாஅ வழிவந்த கேண்மையார் கேண்மை\nவிடாஅர் விழையும் உலகு"],
  [810, "பழையம்கண் நோற்றுப் பழகிற்றேல் வேந்தன்\nகிழமை சிதையாமல் காப்பார்"]
];
 CHAPTER_KURALS[82] = [
  [811, "பருகுவார் போலினும் பண்பிலார் கேண்மை\nபெருகலின் குன்றல் இனிது"],
  [812, "உறின்நட்டு அறின்ஒரூஉம் ஒப்பிலார் கேண்மை\nபெறினும் இழப்பினும் என்"],
  [813, "உறுவது சீர்தூக்கும் நட்பும் பெறுவது\nகொள்வாரும் கள்வரும் நேர்"],
  [814, "அமரகத்து ஆற்றாரும் அஞ்சும்கொல் அஞ்சா\nதமரகத்து ஆற்றாரை விட்டு"],
  [815, "செய்தேமமச் செய்யாது சிதைக்கும் பகைவர்போல்\nமையல் அறிவார் நட்பு"],
  [816, "பேதையார் நட்பின் அறிவுடையார் ஏமுற்ற\nபகைமை எழுமை உறும்"],
  [817, "நகைவகையான் ஆகுவது உண்டோ பிறிதின்நோய்\nதன்நோய்போல் போற்றாக் கடை"],
  [818, "ஒல்லும் கருமம் உடன்படா தாரைவிட்\nடொல்லும்வா யெல்லாம் விட்டிடல்"],
  [819, "சொல்லொன்று மற்றுஅவர் செய்பொன்று மாண்பிலார்\nபுல்லென்னும் கேண்மை விடல்"],
  [820, "இணரெரி தோய்வன்ன இன்னா செயினும்\nபுணரின் வெகுளாமை நன்று"]
];
 CHAPTER_KURALS[83] = [
  [821, "சீரிடத்துக் கானின் எறியும் பகைவர்கேண்\nகூடாநின்று உட்பகை யாய்க் கொளல்"],
  [822, "மனத்தின் அமையாது மைந்துறும் போழ்தின்\nஇனத்தின் அமையா தவர்"],
  [823, "சொல்லினால் நல்வகை காட்டிச் செயல்வகையான்\nஅல்லவை செய்யாரை விட்டு"],
  [824, "தொழுதகை யுள்ளும் படையொடுங்கும் ஒன்னார்\nஅழுதகண்ணீரும் அனைத்து"],

 CHAPTER_KURALS[84] = [
  [831, "பேதைமை என்பது ஒன்று யாதெனின் ஏதங்கொண்டு\nஊதியம் போக விடல்"],

 CHAPTER_KURALS[85] = [
  [841, "அறிவின்மை இன்மையுள் இன்மை பிறிதின்மை\nஇன்மையா வையா துலகு"],

 CHAPTER_KURALS[86] = [
  [851, "இகலென்ப எல்லா உயிர்க்கும் பகலென்னும்\nபண்பின்மை ஈனும் நோய்"],

 CHAPTER_KURALS[87] = [

 CHAPTER_KURALS[88] = [

 CHAPTER_KURALS[89] = [
  [881, "நிழல்நீரும் இன்னாத இன்னா தமர்நீரும்\nஇன்னாவாம் இன்னா செயின்"],

 CHAPTER_KURALS[90] = [

 CHAPTER_KURALS[91] = [
  [901, "மனைவிழைவார் மாண்பயன் எய்தார் வினைவிழைவார்\nவேண்டாமை வேண்ட வரும்"],

 CHAPTER_KURALS[92] = [

 CHAPTER_KURALS[93] = [

 CHAPTER_KURALS[95] = [

 CHAPTER_KURALS[96] = [

 CHAPTER_KURALS[97] = [

 CHAPTER_KURALS[99] = [
  [981, "கடன்என்ப நல்லவை எல்லாம் கடனறிந்து\nசான்றாண்மை வாழ்ப வர்க்கு"],
  [982, "குணநலச் சான்றோர் நலனே பிறநலம்\nஎந்நலத்து உள்ளதூஉம் அன்று"],
  [983, "அன்புநாண் ஒப்புரவு கண்ணோட்டம் வாய்மையொடு\nஐந்துசால்பு ஊன்றிய தூண்"],
  [984, "கொல்லாமை சூழும் நெறிஅறம் சான்றாண்மிக்\nகல்லாமை சொல்லற்க வடு"],
  [985, "ஆற்றுவார் ஆற்றல் பணிதல் அதுசான்றோர்\nமாற்றாரை மாற்றும் படை"],
  [986, "சால்பிற்குக் கட்டளைக் கல்லென்ப தன்முன்னின்\nதொல்பா டறியார்முன் சொல்"],
  [987, "இன்னாசெய் தார்க்கும் இனியவே செய்யாக்கால்\nஎன்ன பயத்ததோ சால்பு"],
  [988, "இன்மை ஒருவற்கு இளிவன்று சால்பென்னும்\nதிண்மைஉண் டாகப் பெறின்"],
  [989, "ஊழி பெயரினும் தாம்பெயரார் சான்றாண்மைக்கு\nஆழி எனப்படு வார்"],
  [990, "சான்றவர் சான்றாண்மை குன்றின் இருநிலந்தான்\nதாங்காது தண்பெயல் விண்"]
];
 CHAPTER_KURALS[100] = [
  [991, "எண்பதத்தால் எய்தல் எளிதென்ப யார்மாட்டும்\nபண்புடைமை என்னும் வழக்கு"],
  [992, "அன்புடைமை ஆன்ற குடிப்பிறத்தல் இவ்விரண்டும்\nபண்புடைமை என்னும் வழக்கு"],
  [993, "உறுப்புஒத்தல் மக்கள்ஒப்பு அன்றால் வெறுத்தக்க\nபண்பொத்தல் ஒப்பதாம் ஒப்பு"],
  [994, "நயனொடு நன்றி புரிந்த பயனுடையார்\nபண்புபா ராட்டும் உலகு"],
  [995, "நகையுள்ளும் இன்னாது இகழ்ச்சி பகையுள்ளும்\nபண்புபா ராட்டும் உலகு"],
  [996, "பண்புடையார்ப் பட்டுண்டு உலகம் அதுஇன்றேல்\nமண்புக்கு மாய்வது மண்"],
  [997, "அரம்போலும் கூர்மையர் ஆயினும் மரம்போல்வர்\nமக்கள்பண்பு இல்லாத வர்"],
  [998, "நண்பாற்றல் நட்டார் பிரிவிற்கும் அவாவென்னும்\nதுன்பத்துள் துன்பம் கெடின்"],
  [999, "ஒளியார்முன் ஒள்ளியர் ஆதல் வெளியார்முன்\nவெண்முத்துப் பூணாரோடு நேர்"],
  [1000, "பண்பிலான் பெற்ற பெருஞ்செல்வம் நன்பால்\nகலந்தீமையால் திரிந்தற்று"]
];
 CHAPTER_KURALS[101] = [
  [1001, "வைத்தவண் டான்காப்பப் பூணெனின் வையத்து\nவைப்பார் விடல்சூழ்ந்த மாண்பு"],
  [1002, "அளவறியான் மூர்க்கன் அளவிறந்து உண்பான்\nஅளவிறந்து நோய்மல்கிச் சாம்"],
  [1003, "கல்லாதான் சொற்கா முறுதல் முலையிரண்டும்\nஇல்லாதான் பெண்காமுற் றற்று"],
  [1004, "எச்சம் இலார்க்கும் இலியர்க்கும் இல்எனாது\nஅச்சம் இலாதான் பொருள்"],
  [1005, "அன்பிலன் ஆன்ற துணையிலன் தான்கொண்ட\nவன்பிலன் ஞாலத்து அறிவு"],
  [1006, "ஏவவும் செய்கலான் தான்தேறான் அவ்வுயிர்\nபோவமளவும் ஓர் நோய்"],
  [1007, "நச்சப் படாதவன் செல்வம் நடுவூருள்\nநச்சு மரம்பழுத் தற்று"],
  [1008, "அற்பறிந்து ஆன்றமைந்த சொல்லான்எஞ் ஞான்றும்\nதிறனறிந்தான் தேறப் படும்"],
  [1009, "சீருடைச் செல்வர் சிறுமையுள் பட்டக்கால்\nசீருடை மானம் சிதையாது காப்பார்"],
  [1010, "பண்பிலான் பெற்ற பெருஞ்செல்வம் நன்பால்\nகலந்தீமையால் திரிந்தற்று"]
];
 CHAPTER_KURALS[102] = [
  [1011, "கருமத்தால் நாணுதல் நாணுத்தக் கவற்றுள்\nபெருமை உடைத்துஅந் நெறி"],
  [1012, "ஊணுடையான் ஆடை உடையான் பிறர்செய்வ\nநாணுடையான் நல்லான் எனல்"],
  [1013, "கண்ணோட்டம் உள்ளொழித்து வாழ்தலின் அந்நிலையே\nபுண்ணோட்டம் இல்லா நெறி"],
  [1014, "அணியன்றோ நாணுடைமை சான்றோர்க்கு அஃதின்றேல்\nபிணியன்றோ பீடு நடை"],
  [1015, "பிறர்பழியும் தம்பழியும் நாணுவார் நாணிற்கு\nஉறைவிடம் என்பார் உலகு"],
  [1016, "நாண்வேலி கொள்ளாது நாணழிந்து வாழ்பவர்\nவாண்போல் பகைவர்கேண் நேர்"],
  [1017, "நாணால் உயிரைத் துறப்பர் உயிர்ப்பொருட்டால்\nநாண்துறவார் நாணாள் பவர்"],
  [1018, "பிறர்நாணத் தக்கது தான்நாணா னாயின்\nஅறம்நாணத் தக்கது உடைத்து"],
  [1019, "குலஞ்சுடும் கொள்கை பிழைப்பின் நலஞ்சுடும்\nநாணின்மை நின்றக் கடை"],
  [1020, "நாணகத் தில்லார் இயக்கம் மரப்பாவை\nநாணால் உயிர்மருட்டி அற்று"]
];
 CHAPTER_KURALS[103] = [
  [1021, "கருமம் மடிவறச் செய்தல் தன்நாடிக்\nகருமம் உயர்த்தி விடல்"],
  [1022, "ஆள்வினையும் ஆன்ற அறிவும் எனவிரண்டின்\nநீள்வினையால் நீளும் குடி"],
  [1023, "குடிசெய்வல் என்னும் ஒருவற்குத் தெய்வம்\nமடிதற்றுத் தான்முந்துறும்"],
  [1024, "சூழாமல் தானே முடிவெய்தும் தம்குடியைத்\nதாழாமல் செய்வான் வினை"],
  [1025, "குற்றம் இலனாய்க் குடிசெய்து வாழ்வானைச்\nசுற்றமாச் சுற்றும் உலகு"],
  [1026, "நல்லாண்மை என்பது ஒருவற்குத் தான்பிறந்த\nஇல்லாண்மை ஆக்கிக் கொளல்"],
  [1027, "அமரகத்து ஆற்றாரும் அஞ்சும்கொல் அஞ்சா\nதமரகத்து ஆற்றாரை விட்டு"],
  [1028, "குடிசெய்வார்க்கு இல்லை பருவம் மடிசெய்து\nமானம் கருதக் கெடும்"],
  [1029, "இடும்பைக்கே கொள்கலம் ஆம் கொல்லோ குடும்பத்தைக்\nகுற்ற மறைப்பான் உடம்பு"],
  [1030, "இடுக்கண் வருங்கால் நகுக அதனை\nஅடுத்தூர்வது அஃதொப்பது இல்"]
];
 CHAPTER_KURALS[104] = [
  [1031, "சுழன்றும்ஏர்ப் பின்னது உலகம் அதனால்\nஉழந்தும் உழவே தலை"],
  [1032, "உழுவார் உலகத்தார்க்கு ஆணிஅஃ தாற்றாது\nஎழுவாரை யெல்லாம் பொறுத்து"],
  [1033, "உழுதுண்டு வாழ்வாரே வாழ்வார்மற் றெல்லாம்\nதொழுதுண்டு பின்செல் பவர்"],
  [1034, "பலகுடை நீழலும் தம்குடைக்கீழ் காண்பர்\nஅலகுடை நீழலவர்"],
  [1035, "இரவார் இரப்பார்க்கு ஒன்று ஈவர் கரவாது\nகைசெய்து ஊண்மாலை யவர்"],
  [1036, "உழவினார் கைம்மடங்கின் இல்லை விழைவதூஉம்\nவிட்டேம் என்பார்க்கும் நிலை"],
  [1037, "தொடிப்புழுதி கஃசா உணக்கின் பிடித்தெருவும்\nவேண்டாது சாலப் படும்"],
  [1038, "ஏரினும் நன்றால் எருவிடுதல் கட்டபின்\nநீரினும் நன்றதன் காப்பு"],
  [1039, "செல்லான் கிழவன் இருப்பின் நிலம்புலந்து\nஇல்லாளின் ஊடி விடும்"],
  [1040, "இலம்என்று அசைஇ யிருப்பாரைக் காணின்\nநிலமகள் பூமி நகும்"]
];
 CHAPTER_KURALS[105] = [
  [1041, "இன்மையின் இன்னாதது யாதெனில் இன்மையின்\nஇன்மையே இன்னாதது ஒன்று"],
  [1042, "இன்மை எனுமொரு பாவி மறுமையும்\nஇம்மையும் இன்றித் தரும்"],
  [1043, "தொல்வரவும் தோலும் கெடுக்கும் தொகையாக\nநல்குரவு என்னும் நசை"],
  [1044, "இற்பிறந்தார்க் கண்ணும் இகழ்வந் தெய்தும்\nநல்குரவு என்னும் நசை"],
  [1045, "நல்குரவு என்னும் இடும்பையுள் பல்கரைத்\nதுன்பங்கள் சென்று படும்"],
  [1046, "நற்பொருள் நன்குணர்ந்து சொல்லினும் நல்கூர்ந்தார்\nசொற்பொருள் சோர்வு படும்"],
  [1047, "அறஞ்சாரா நல்குரவு ஈன்றாBlock தானும்\nபிறன்போல நோக்கப் படும்"],
  [1048, "இன்றும் வருவதுகொல் இன்னாமை நேற்றுமன்னர்\nஎன்னை நலிந்தது அணைத்து"],
  [1049, "நெருப்பினுள் துஞ்சலும் ஆகும் நிரப்பினுள்\nயாதொன்றும் கண்பாடு அரிது"],
  [1050, "துப்பிலார் துப்புஅற்றார் ஆகித் துவரத்துறவார்\nபிறர்மிசை வாழ்பவர் நேர்"]
];
 CHAPTER_KURALS[106] = [
  [1051, "இரக்க இரத்தக்கார்க் காணின் கரப்பின்\nஅவர்பழி தம்பழி அன்று"],
  [1052, "இன்பம் உவகை தருமே இரப்பவர்க்கு\nஈவோர் உவகை எனின்"],
  [1053, "கரப்பிலா நெஞ்சின் கடனறிவார் முன்நின்று\nஇரப்பும் ஓர் ஏர் உடைத்து"],
  [1054, "இரப்பாரும் ஈவார்க்குப் போன்றே கரப்பிலார்\nகனவிலும் தேற்றாதார் நேர்"],
  [1055, "இல்லாமை சொல்லி இரப்பாரும் ஈவார்க்குப்\nபொல்லாமை யொன்றும் இலர்"],
  [1056, "நல்குரவு என்னும் இடும்பை தீர்ப்பாரைக்\nகாணின் களித்துவிடும் நெஞ்சு"],
  [1057, "இகழ்ந்தெள்ளா தீவாரைக் காணின் மகிழ்ந்துள்ளம்\nஉள்ளுள் உவகை மிகும்"],
  [1058, "இரப்பாரை இல்லாயின் ஈர்ங் கண்மா ஞாலம்\nமரப்பாவை சென்றுவந் தற்று"],
  [1059, "ஈவார்க்குப் பின்என் ஆம் இன்பம் இரப்பாரைத்\nதாமுவப்பக் காணாக் கடை"],
  [1060, "இரப்பான் சினம்கொள்ளா தாகுக தன்முன்\nகரப்பான் கழியக் கெடும்"]
];
 CHAPTER_KURALS[107] = [
  [1061, "கரப்பிலா நெஞ்சினாரைக் காணின் இரப்பாரே\nஇரப்பும் ஒருவகை ஏர்"],
  [1062, "இரந்தும் உயிர்வாழ்தல் வேண்டின் பரந்து\nகெடுக உலகியற்றி யான்"],
  [1063, "இன்மையின் இன்னாதது யாதெனில் இன்மையின்\nஇன்மையே இன்னாதது ஒன்று"],
  [1064, "இடமெல்லாம் கொள்ளாத் தகைத்தே இடமிலாக்\nகண்ணும் இரவா நெறி"],
  [1065, "அறஞ்சாரா நல்குரவு ஈன்றாBlock தானும்\nபிறன்போல நோக்கப் படும்"],
  [1066, "நெருப்பினுள் துஞ்சலும் ஆகும் நிரப்பினுள்\nயாதொன்றும் கண்பாடு அரிது"],
  [1067, "இரந்தும் உயிர்வாழ்தல் வேண்டின் பரந்து\nகெடுக உலகியற்றி யான்"],
  [1068, "இகழ்ந்தெள்ளா தீவாரைக் காணின் மகிழ்ந்துள்ளம்\nஉள்ளுள் உவகை மிகும்"],
  [1069, "கரப்பிலா நெஞ்சின் கடனறிவார் முன்நின்று\nஇரப்பும் ஓர் ஏர் உடைத்து"],
  [1070, "கரப்பிலார் கனவிலும் தேற்றாதார் கேண்மை\nஇரப்பாரை இல்லாயின் என்"]
];
 CHAPTER_KURALS[108] = [
  [1071, "மக்களே போல்வர் கயவர் அவரன்ன\nஒப்பாரி யாமுண்டது இல்"],
  [1072, "நன்றறி வாரின் கயவர் திருவுடையர்\nநெஞ்சத்து அவலம் இலர்"],
  [1073, "தேவரே போல்வர் கயவர் அவருந்தாம்\nமேவன செய்துஒழுக லான்"],
  [1074, "அகப்பட்டி ஆவாரைக் காணின் அவரிற்\nமிகப்பட்டுச் செம்மாக்கும் கீழ்"],
  [1075, "அச்சமே கீழ்களது ஆசாரம் எச்சம்\nஅவாவே உண்டேல் சிறிது"],
  [1076, "அறைபறை யன்னர் கயவர்தாம் கேட்ட\nமறைபிறர்க்கு உய்த்துரைத்த லான்"],
  [1077, "ஈர்ங்கை விதிரார் கயவர் கொடிறுடைக்கும்\nகூன்கையர் அல்லா தவர்க்கு"],
  [1078, "சொல்லப் பயன்படுவர் சான்றோர் கரும்புபோல்\nகொல்லப் பயன்படும் கீழ்"],
  [1079, "உடுப்பதூஉம் உண்பதூஉம் காணின் பிறர்மேல்\nவடுக்காண வற்றாகும் கீழ்"],
  [1080, "எற்றிற்கு உரியர் கயவரொன்று உற்றக்கால்\nவிற்றிற்கு உரியர் விரைந்து"]
];
 CHAPTER_KURALS[109] = [
  [1081, "அணங்குகொல் ஆய்மயில் கொல்லோ கனங்குழை\nமாதர்கொல் மாலும்என் நெஞ்சு"],
  [1082, "நோக்கினாள் நோக்கெதிர் நோக்குதல் தாக்குணங்கு\nதானைக்கொண் டன்ன துடைத்து"],
  [1083, "மறப்பல் எனினும் மறவாது என்நெஞ்சம்\nதுறப்பல் எனினும் தொடர்ந்து"],
  [1084, "கண்டார் உயிருண்ணும் தோற்றத்தால் பெண்மடந்தை\nபண்போல் பணைத்தோ ளவள்"],
  [1085, "கூற்றமோ கண்ணோ பிணையோ மடவரல்\nநோக்கமிம்மூன்றும் உடைத்து"],
  [1086, "கொடும்புருவம் கோடா மறைப்பின் நடுங்கஞர்\nசெய்யல மன் இந்நோக்கு"],
  [1087, "கடமான்று அஃதாற்றா தோளம்போல் நோக்கு\nநடைமான்றாள் நல்கூர்ந்தார் மேல்"],
  [1088, "அணங்குடை அரணில்லாள் என்றுஅஞ்சான் கொல்லோ\nகுணங்குடி கொள்ளாதான் நோக்கு"],
  [1089, "சிறுமையும் செல்லா இடமும் இகழும்\nஉறுபகை யில்லா படை"],
  [1090, "நெஞ்சத்தோடு ஒத்தாள் எனினும் அவளொடு\nவெஞ்சொல் உரைத்தல் அரிது"]
];
 CHAPTER_KURALS[110] = [
  [1091, "இருநோக்கு இவளுண்கண் உள்ளது ஒருநோக்கு\nநோய்நோக்கு ஒன்றுஅந்நோய் மருந்து"],
  [1092, "கண்விதுப் புற்றுக் கலிழ்வதோ காதலன்\nபுணராமை முந்துற் றென"],
  [1093, "நோக்கினாள் நோக்கி இறைஞ்சினாள் அஃதவள்\nயாக்கினுள் அன்புவளர்த் தற்று"],
  [1094, "யான்நோக்கும் காலை நிலன்நோக்கும் நோக்காக்கால்\nதான்நோக்கி மெல்ல நகும்"],
  [1095, "குறிப்பொன்று கூறினாள் போலக் குவளை\nநெறிப்பொன்று நோக்கி நின்றாள்"],
  [1096, "சொல்லொன்று மற்றுஅவர் செய்பொன்று மாண்பிலார்\nபுல்லென்னும் கேண்மை விடல்"],
  [1097, "மாறுபாடு இல்லாத உண்டி மறுத்துண்ணின்\nஊறுபாடு இல்லை உயிர்க்கு"],
  [1098, "அசைஇயற் குண்டோ ரோர் ஆண்பாலார்க் கென்னோ\nபசையியற் பாராட்டுங் கீழ்"],
  [1099, "ஏவவும் செய்கலான் தான்தேறான் அவ்வுயிர்\nபோவமளவும் ஓர் நோய்"],
  [1100, "கண்ணொடு கண்ணிணை நோக்குஒக்கின் வாய்ச்சொற்கள்\nஎன்ன பயனும் இல"]
];
 CHAPTER_KURALS[111] = [
  [1101, "கண்டுகேட்டு உண்டுயிர்த்து உற்றுஅறியும் ஐம்புலனும்\nஒண்தொடி கண்ணே உள"],
  [1102, "பிணிக்கு மருந்து பிறமன் அணியிழை\nதன்பிணிக்குத் தானே மருந்து"],
  [1103, "தாம்வீழ்வார் மென்தோள் துயிலின் இனிதுகொல்\nதாமரைக் கண்ணான் உலகு"],
  [1104, "நீங்கின் தெறூஉம் குறுகின் குளிர்காயும்\nதீயாண்டுப் பெற்றாள் இவள்"],
  [1105, "வேட்டப் பொழுதின் அவையவை போலுமே\nதோட்டார்பூண் மென்தோள் துயில்"],
  [1106, "உறுதோறு உயிர் தளிர்ப்பத் தீண்டலால் பேதைக்கு\nஅமிழ்தின் இயன்றன தோள்"],
  [1107, "தம்மில் இருந்து தமதுபாத்து உண்பாரும்\nஅம்மான் மென்தோள் புணர்ச்சி நேர்"],
  [1108, "வீழுஇருவர்க்கு இனிதே புணர்ச்சி முயக்கம்\nஇடையீடுபடின் ஆற்றாமை உடைத்து"],
  [1109, "ஊடலும் உத்தரவும் ஒப்புரவும் என்றுஇந்நான்\nகூடலின் இன்பம் தரும்"],
  [1110, "அறிதோறும் அறியாமை கண்டற்றால் காமம்\nசெறிதோறும் சேயிழை மாட்டு"]
];
 CHAPTER_KURALS[112] = [
  [1111, "நன்னீரை வாழி அனிச்சமே நின்னினும்\nமென்னீரள் யாம்வீழ் பவள்"],
  [1112, "மலர்காணின் மையாத்தி நெஞ்சே இவள்கண்\nபலர்காணும் பூவொக்கும் என்று"],
  [1113, "முறிமேனி முத்தம் முறுவல் வெறிநாற்றம்\nவேல்வடிவ கண்இவள் மாட்டு"],
  [1114, "காணின் குவளை கவிழ்ந்துநிலன் நோக்கும்\nமாணிழை கண்ஒவ்வேம் என்று"],
  [1115, "அனிச்சப்பூக் கால்களையாள் பெய்தாள் நுசுப்பிற்கு\nநல்ல பறைபடா தற்று"],
  [1116, "விண்மகிழ் தீம்பால் விழுமியாள் மேனிக்கு\nமண்மகிழ் மல்லல் அணைத்து"],
  [1117, "மாதர் முகந்தானே சந்திரனாயின் இவள்\nமேனிக்கு மாறும்உண்டோ இல்"],
  [1118, "மாதர் முகம்போல் ஒளிவிட வல்லையாயின்\nகாதலை நீயும் மதி"],
  [1119, "மலரன்ன கண்ணாள் முகம்ஒப்பின் ஞாயிBlock\nஎல்லாரும் காணும் நிலத்து"],
  [1120, "அனிச்சமும் அன்னத்தின் தூவியும் மாதர்\nஅடிக்கு நெருஞ்சிப் பழம்"]
];
 CHAPTER_KURALS[113] = [
  [1121, "பாலோடு அளாய நீர் போன்றது ஒளிரும்இழை\nபாலோடு எனக்கள்ள தொடர்பு"],
  [1122, "உடம்பொடு உயிரிடை என்னமற்று அன்ன\nமடந்தையொடு எம்மிடை நட்பு"],
  [1123, "கருமணிக் பாவாய்நீ போதாயாம் வீழும்\nதிருநுதற்கு இல்லை இடம்"],
  [1124, "வாழ்தல் உயிர்க்கன்னள் ஆயிழை சாதல்\nஅதனின் பிரிவாரது இடத்து"],
  [1125, "உள்ளுவன் மன்யான் மறப்பின்மற வாத\nகொள்ளத்தகை யாள் குணம்"],
  [1126, "கண்ணுள்ளின் போகார் இமைப்பின் பருவரார்\nநுண்ணியர்எம் காத லவர்"],
  [1127, "கண்ணுள்ளார் காத லவராகக் கண்ணும்\nஎழுதாம் கரப்பாக்கு அறிந்துக"],
  [1128, "நெஞ்சத்தார் காத லவராக எய்தும்பின்\nவெய்யது உவப்பார்வேப் பாக்கு"],
  [1129, "இமைப்பின் கரப்பாக்கு அறிவல்கண் டார்த்\nதிமைப்பாரோ ஈங்கிவ் வுலகு"],
  [1130, "உவந்துறைவர் நெஞ்சத் தெமக்கவர் மற்றென்\nகண்ணுள் உறைவர் களித்து"]
];
 CHAPTER_KURALS[114] = [
  [1131, "காமம் உழந்து வருந்தினார்க்கு ஏமமாய்\nமடலல்லது இல்லை வழி"],
  [1132, "நாணொடு நல்லாண்மை விட்டு வழிவந்த\nமடலூர்வன் மாண்புடை யார்"],
  [1133, "நாணொடு நல்லாண்மை உடையேன்மற்று ஆங்கு\nநாணொடு நல்லாண்மை விட்டு"],
  [1134, "காமக் கடும்பூசல் தாங்காது நாணென்னும்\nஏமக் கலமுறிந்த தற்று"],
  [1135, "தொடங்கிய கைகொடுத்து மாண்டார் வினைத்திட்பம்\nவேந்தன்கண் ஊறெய்தி உள்ளப் படும்"],
  [1136, "மடலூர்தல் யாமத்தும செய்யுமென் நெஞ்சம்\nமடலூர்தல் மாலை யவள்"],
  [1137, "கடலன்ன காமம் உழந்தும் மடலேறாப்\nபெண்ணிற் பெருந்தக்கது இல்"],
  [1138, "நிறையரியர் மன்பேதை யென்னாது காமம்\nமறையிறந்து மன்று படும்"],
  [1139, "அறம்பொருள் இன்பம் உயிரச்சம் நான்கின்\nதிறம்தெரிந்து தேறப் படும்"],
  [1140, "கண்ணெதிரே கள்ளமாய் நோக்கும் கயவர்போல்\nநண்ணிய காமம் தரும்"]
];
 CHAPTER_KURALS[115] = [
  [1141, "அலரெழ ஆருயிர் நிற்கும் அதனைப்\nபலரறியார் பாக்கியத் தால்"],

const CHAPTERS = (() => {
  const chapters = [];
  for(let i = 0; i < 133; i++) {
    const chapterNum = i + 1;
    const start = i * 10 + 1;
    const end = start + 9;
    let kurals = CHAPTER_KURALS[chapterNum];
    let book;
    if(i < 38) book = 1;
    else if(i < 108) book = 2;
    else book = 3;
    chapters.push({
      num: chapterNum,
      book: book,
      iyal: ((i % 10) + 1),
      name: SECTION_NAMES[i],
      nameEn: SECTION_NAMES[i],
      kurals: kurals
    });
  }
  return chapters;
})();

let cur=0, playing=false, timer=null, elapsed=0;
const DURATIONS=[3000,3000,5000,5000];

function buildChapSel(){
  const d=document.getElementById('chapSel');
  d.innerHTML=CHAPTERS.map((c,i)=>`<button class="chap-pill ${i===0?'on':''}" onclick="loadChapter(${i})">${c.num}. ${c.name}</button>`).join('');
}

function loadChapter(i){
  const ch=CHAPTERS[i];
  const bookName = ch.book===1?'அறத்துப்பால்':(ch.book===2?'பொருட்பால்':'காமத்துப்பால்');
  document.getElementById('intro-sub').innerHTML=`குறள் எண் : ${ch.kurals[0][0]}– ${ch.kurals[9][0]}<br>பால் : ${bookName}<br>அதிகாரம் : ${ch.name}`;
  document.getElementById('chap-l1').textContent=`பால் : ${bookName}`;
  document.getElementById('chap-l2').textContent=`இயல் : ${ch.iyal}`;
  document.getElementById('chap-l3').textContent=`அதிகாரம் : ${ch.num}`;
  document.getElementById('chap-l4').textContent=`குறள் : ${ch.kurals[0][0]}– ${ch.kurals[9][0]}`;
  fillParchment('kc1', ch.kurals.slice(0,5));
  fillParchment('kc2', ch.kurals.slice(5,10));
  document.querySelectorAll('.chap-pill').forEach((p,j)=>p.classList.toggle('on',j===i));
  goSlide(0);elapsed=0;
}

function fillParchment(id, kurals){
  const d=document.getElementById(id);
  d.innerHTML=kurals.map((k,i)=>`
    <div class="kural-item" style="animation-delay:${i*0.1}s">
      <div class="kural-num">குறள் ${k[0]}</div>
      <div class="kural-text">${k[1]}</div>
    </div>
  `).join('');
}

function goSlide(n){
  document.querySelectorAll('.slide').forEach((s,i)=>s.classList.toggle('active',i===n));
  cur=n;
  document.getElementById('sc').textContent=`${n+1} / 4`;
  document.getElementById('prog').style.width=(n/3*100)+'%';
}

function nextSlide(){elapsed=0;if(cur<3)goSlide(cur+1);else{stopPlay();goSlide(0)}}
function prevSlide(){elapsed=0;if(cur>0)goSlide(cur-1)}

function startPlay(){
  playing=true;
  document.getElementById('playBtn').textContent='⏸';
  timer=setInterval(()=>{
    elapsed+=200;
    const dur=DURATIONS[cur];
    const frac=elapsed/dur;
    const base=cur/3;
    document.getElementById('prog').style.width=(base*100+frac/3*100)+'%';
    const secs=Math.floor((DURATIONS.slice(0,cur).reduce((a,b)=>a+b,0)+elapsed)/1000);
    document.getElementById('tl').textContent=`${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;
    if(elapsed>=dur){elapsed=0;if(cur<3)goSlide(cur+1);else{stopPlay();goSlide(0)}}
  },200);
}

function stopPlay(){
  playing=false;
  document.getElementById('playBtn').textContent='▶';
  clearInterval(timer);
}

document.getElementById('playBtn').onclick=()=>playing?stopPlay():startPlay();

function seekProgress(e){
  const r=e.currentTarget.getBoundingClientRect();
  const frac=(e.clientX-r.left)/r.width;
  const slide=Math.floor(frac*4);
  goSlide(Math.min(slide,3));
  elapsed=0;
}

buildChapSel();
loadChapter(0);
</script>
